background: 'Ryan ‘‘FOBS’’ Graves is a former F-18 pilot with over a decade of service in the U.S. Navy, which he joined in 2009, including two deployments in Operation Enduring Freedom and Operation Inherent Resolve. In 2014 he was near Virginia Beach as part of VFA-11, a Navy Fighter/Attack Squadron made up of F/A-18F Super Hornets. As a pilot, he was trained to be an expert observer, tasked with identifying any aircraft within the operating area. He is a formally trained engineer and was trained as an aviation safety officer by the Navy. He founded Americans for Safe Aerospace to create a center of support, research, and public education for aircrew impacted by UAP encounters, and he is the Chair of the UAP Integration & Outreach Committee for the American Institute of Aeronautics and Astronautics.

  '
uap_relevance: 'Graves has witnessed advanced UAP on multiple sensor systems firsthand. Upon an upgrade to VFA-11 radar system in 2014, the squadron began to detect unknown objects operating in their airspace; initially dismissed as software glitches, the radar tracks were corroborated with infrared sensors and visual ID. A pivotal incident occurred during an air combat training mission in Warning Area W-72, an exclusive block of airspace ten miles east of Virginia Beach, where a dark gray cube inside of a clear sphere was fixed directly at the GPS entry point and two F-18 Super Hornets 100 feet apart were forced to take evasive action. Over time, UAP sightings became an open secret among the squadron aircrew. He is here to voice the concerns of countless commercial aircrew and military veterans who have confided their similar encounters with him. Through Americans for Safe Aerospace he now has nearly 5,000 members and is actively working with more than 30 UAP witnesses. He is also the Chair of the UAP Integration & Outreach Committee for the American Institute of Aeronautics and Astronautics, where they have assembled a volunteer team of almost 80 PhDs and aerospace engineers dedicated to tackling the science around this issue.

  '
