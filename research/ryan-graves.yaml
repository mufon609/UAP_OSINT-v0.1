quotes:
- id: q1
  added_date: '2026-04-20'
  text: I have witnessed advanced UAP on multiple sensor systems firsthand, and I'm here to voice the concerns of countless commercial aircrew and military veterans who have confided their similar encounters with me.
  source:
    path: government/docs-house-gov-graves-written-testimony-20230726.pdf
    location: line 10
  significance: Firsthand multi-sensor UAP observation claim framing; representative-of-network framing for confided encounters from commercial aircrew and military veterans
  context: written testimony submitted for the July 26, 2023 House Oversight UAP hearing — opening statement
  observation_type: direct
  statement_date: '2023-07-26'
- id: q2
  added_date: '2026-04-20'
  text: It has been more than a decade since my squadron began witnessing advanced UAP demonstrating complex maneuvers on a regular basis, and we still don't have answers.
  source:
    path: government/docs-house-gov-graves-written-testimony-20230726.pdf
    location: line 16
  significance: Decade-long squadron observation timeline; "still don't have answers" framing
  context: written testimony submitted for the July 26, 2023 House Oversight UAP hearing
  observation_type: direct
  statement_date: '2023-07-26'
- id: q3
  added_date: '2026-04-20'
  text: I joined the U.S. Navy in 2009. As a pilot, I was trained to be an expert observer, tasked with identifying any aircraft within our operating area. In 2014, I was near Virginia Beach as part of VFA-11, a Navy Fighter/Attack Squadron made up of F/A-18F Super Hornets. Upon an upgrade to our radar system, we began to detect unknown objects in our airspace. Initially dismissed as software glitches, we soon corroborated these radar tracks with infrared sensors, confirming their physical presence.
  source:
    path: government/docs-house-gov-graves-written-testimony-20230726.pdf
    location: line 43
  significance: 2009 Navy joining; 2014 VFA-11 assignment near Virginia Beach with F/A-18F Super Hornets; radar upgrade detection + infrared corroboration; expert-observer training framing
  context: written testimony submitted for the July 26, 2023 House Oversight UAP hearing — the "My experience — UAP encounters in W-72" section
  observation_type: direct
  statement_date: '2023-07-26'
- id: q4
  added_date: '2026-04-20'
  text: Over time, UAP sightings became an open secret among our aircrew. They were a common occurrence, seen by most of my colleagues on radar and occasionally up close. The sightings were so frequent that they became part of daily briefs.
  source:
    path: government/docs-house-gov-graves-written-testimony-20230726.pdf
    location: line 50
  significance: Squadron-culture framing — UAP sightings as "open secret" and common occurrence; normalized into daily briefs
  context: written testimony submitted for the July 26, 2023 House Oversight UAP hearing
  observation_type: direct
  statement_date: '2023-07-26'
- id: q5
  added_date: '2026-04-20'
  text: A pivotal incident occurred during an air combat training mission in Warning Area W-72, an exclusive block of airspace ten miles east of Virginia Beach. All traffic into the training area goes through a single GPS point at a set altitude. Just at the moment the two jets crossed the threshold, one of the pilots saw a dark gray cube inside of a clear sphere — motionless against the wind, fixed directly at the entry point. The jets, only 100 feet apart, were forced to take evasive action. They terminated the mission immediately and returned to base. Our squadron submitted a safety report, but there was no official acknowledgement of the incident and no further mechanism to report the sightings.
  source:
    path: government/docs-house-gov-graves-written-testimony-20230726.pdf
    location: line 54
  significance: Flagship W-72 encounter — two jets 100 feet apart at GPS entry point, dark gray cube inside clear sphere motionless at the threshold, evasive action, safety-report institutional non-response
  context: written testimony submitted for the July 26, 2023 House Oversight UAP hearing — the "My experience — UAP encounters in W-72" section
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q6
  added_date: '2026-04-20'
  text: The UAP we encountered and tracked on multiple sensors behaved in ways that surpassed our understanding and technology. The UAP could accelerate at speeds up to Mach 1, hold their position against hurricane-force winds, and outlast our fighter jets, operating continuously throughout the day. They did not have any visible means of lift, control surfaces or propulsion — nothing that resembled normal aircraft with wings, flaps or engines. I am a formally trained engineer and I have no explanation for this.
  source:
    path: government/docs-house-gov-graves-written-testimony-20230726.pdf
    location: line 65
  significance: UAP kinematic + observable-characteristics summary — Mach 1 acceleration, hurricane-wind stationary, no visible propulsion / lift / control surfaces; "formally trained engineer, no explanation" framing
  context: written testimony submitted for the July 26, 2023 House Oversight UAP hearing — "Advanced UAP defy conventional explanation" section
  observation_type: direct
  statement_date: '2023-07-26'
- id: q7
  added_date: '2026-04-20'
  text: I founded Americans for Safe Aerospace to create a center of support, research, and public education for aircrew impacted by UAP encounters. We now have nearly 5,000 members and are actively working with more than 30 UAP witnesses who have approached us. I am also the Chair of the UAP Integration & Outreach Committee for the American Institute of Aeronautics and Astronautics, where we have assembled a volunteer team of almost 80 PhDs and aerospace engineers dedicated to tackling the science around this issue.
  source:
    path: government/docs-house-gov-graves-written-testimony-20230726.pdf
    location: line 18
  significance: ASA + AIAA founding/role scope — nearly 5,000 members, 30+ UAP witnesses; Chair of AIAA UAP Integration & Outreach Committee with almost 80 PhDs and aerospace engineers
  context: written testimony submitted for the July 26, 2023 House Oversight UAP hearing — opening statement
  observation_type: direct
  statement_date: '2023-07-26'
- id: q8
  added_date: '2026-04-20'
  text: Recently, I have received confirmation that these encounters were also a shock to the chain of command from one of our advisors at ASA, Rear Admiral Tim Gallaudet, former head of National Oceanic and Atmospheric Administration, and Oceanographer of the Navy.
  source:
    path: government/docs-house-gov-graves-written-testimony-20230726.pdf
    location: line 72
  significance: Tim Gallaudet named as ASA advisor — former NOAA head and Oceanographer of the Navy; chain-of-command confirmation framing
  context: written testimony submitted for the July 26, 2023 House Oversight UAP hearing — "Advanced UAP defy conventional explanation" section
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q9
  added_date: '2026-04-20'
  text: While serving as an Admiral with Fleet Forces Command, he received a classified email on SIPRNET in 2015 from his boss, the Operations Commander, to all 1- and 2-star Admiral subordinates. The title of the email was "Urgent safety of flight issue." He attached the now famous GO-FAST UAP video from a Navy F/A-18, asking if anyone knew their origin, and expressed safety of flight concerns about multiple near mid-air collisions with UAP in the early warning area off Virginia Beach where my encounters occurred, noting they might shut down the exercise for safety reasons.
  source:
    path: government/docs-house-gov-graves-written-testimony-20230726.pdf
    location: line 76
  significance: Gallaudet's 2015 SIPRNET "Urgent safety of flight issue" email — Fleet Forces Command Operations Commander with GO-FAST video to all 1- and 2-star Admirals; location corroboration with Graves's own encounter area
  context: written testimony submitted for the July 26, 2023 House Oversight UAP hearing — "Advanced UAP defy conventional explanation" section
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q10
  added_date: '2026-04-20'
  text: I was not. I was there when the pilot landed. He canceled the mission after. I was there. He was in the ready room with all his gear on with his mouth open and I asked him what the problem was and he said he almost hit one of those darn things.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2676
  significance: Direct eyewitness account of the fellow pilot's post-encounter reaction — ready room, mouth open, "almost hit one of those darn things"; Graves was there during debrief
  context: sworn oral testimony, House Oversight Subcommittee UAP hearing, July 26, 2023 — Q&A exchange with Ranking Minority Member Jamie Raskin (3-minute additional round)
  observation_type: direct
  statement_date: '2023-07-26'
- id: q11
  added_date: '2026-04-20'
  text: Some of the behaviors that we saw in our working area, we would see these objects being at 0.0 Mach —that is zero airspeed—over certain pieces of the ground. So, what that means just like a river if you throw a bobber in it is going to float downstream. These objects were staying completely stationary in category four hurricane winds. These same objects would then accelerate to supersonic speeds—1.1, 1.2 Mach—and they would do so in very erratic and quick behaviors that we do not—I do not have an explanation for.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 1169
  significance: Flagship kinematic description — 0.0 Mach stationary in category-four hurricane winds, then supersonic 1.1-1.2 Mach in erratic behaviors; bobber-in-river analogy
  context: sworn oral testimony, House Oversight Subcommittee UAP hearing, July 26, 2023 — Q&A exchange with Rep. Tim Burchett
  observation_type: direct
  statement_date: '2023-07-26'
- id: q12
  added_date: '2026-04-20'
  text: Certainly. In the 2003 timeframe, a large group of Boeing contractors were operating near one of the launch facilities at Vandenberg Air Force Base when they observed a very large 100-yard sighted red square approach the base from the ocean and hover at low altitude over one of the launch facilities. This object remained for about 45 seconds or so before darting off over the mountains. There was a similar event within 24 hours, later in the evening. This was a morning event, I believe 8:45 in the morning. Later in the evening, post sunset, there were reports of other sightings on base including some aggressive behaviors. These objects were approaching some of the security guards at rapid speeds before darting off, and this is information that was received through one of the witnesses that have approached me at Americans for Safe Aerospace.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 1421
  significance: 2003 Vandenberg AFB incident relayed from an ASA witness — Boeing contractors observed a 100-yard red square at a launch facility
  context: sworn oral testimony, House Oversight Subcommittee UAP hearing, July 26, 2023 — Q&A exchange with Rep. Anna Paulina Luna
  observation_type: relayed
  statement_date: '2023-07-26'
