credibility_notes: 'Graves''s testimony is under oath before the House Oversight Subcommittee on National Security, the Border, and Foreign Affairs. He was trained as an aviation safety officer by the Navy and states he is a formally trained engineer. Over a decade of service in the U.S. Navy including two deployments in Operation Enduring Freedom and Operation Inherent Resolve. Firsthand multiple sensor observations at VFA-11 in 2014 corroborated radar tracks with infrared sensors and visual ID. The Warning Area W-72 encounter is a squadron witnessed incident he was not one of the two pilots on, but he was there when that pilot landed in the ready room. Through Americans for Safe Aerospace he has nearly 5,000 members and more than 30 UAP witnesses. Rear Admiral Tim Gallaudet — former head of the National Oceanic and Atmospheric Administration ([`/organizations/noaa`]) and Oceanographer of the Navy — is one of the advisors at ASA. As an Admiral with Fleet Forces Command in 2015, Gallaudet received a classified SIPRNET email with the title "Urgent safety of flight issue" and the GO-FAST UAP video ([`/media/go-fast`]) attached. The email expressed safety of flight concerns about multiple near mid-air collisions with UAP in the early warning area off Virginia Beach where Graves''s encounters occurred.

  '
