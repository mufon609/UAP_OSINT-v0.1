  statement_date: '2022-07-20'
  text: 'Dr. Kirkpatrick was asked by USD(I&S) to stand-up and lead AARO in early 2022. Known as Dr. K to his staff and team, he brings over two decades of experience and a significant depth of expertise in scientific and technical intelligence (S&TI), S&TI and space policy, research and development, acquisitions, and operations, specializing in space/counterspace mission areas.

    '
