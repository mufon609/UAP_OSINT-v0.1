- id: nq1
  added_date: '2026-04-29'
  observed: 'Mr. Kirkpatrick'
  canonical: 'Dr. Kirkpatrick'
  location: stenographic transcript throughout (e.g., speaker tags at SASC transcript lines 439, 1194, 1665)
