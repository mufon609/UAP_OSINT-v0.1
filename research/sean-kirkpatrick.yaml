    location: "p. 13-14"
  significance: The most-cited single line from Kirkpatrick's tenure. The institutional NHI-avoidance script preserved nearly verbatim by his successor Jon Kosloski
  context: Sworn-style oral testimony, Senate Armed Services Subcommittee on Emerging Threats and Capabilities AARO oversight hearing
- id: q5
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2023-04-19'
  text: 'In other words, AARO''s mission is to turn UAP into SEP, somebody else''s problem.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 13"
  significance: Kirkpatrick's rhetorical framing of AARO's mission as a hand-off operation
  context: SASC oversight hearing, Kirkpatrick oral statement
- id: q6
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2023-04-19'
  text: 'The AARO team of more than three dozen experts is organized around four functional areas: operations, scientific research, integrated analysis, and strategic communications.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 9-37"
  significance: Kirkpatrick's description of AARO's structure including a strategic communications function as one of four functional areas
  context: SASC oversight hearing, Kirkpatrick oral statement
- id: q7
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2023-04-19'
  text: 'So as of this week we are tracking over -- a total of 650 cases.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
