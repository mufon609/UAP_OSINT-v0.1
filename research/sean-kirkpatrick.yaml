credibility_notes: 'This section documents specific patterns in the public record concerning (a) affiliations after AARO with unusual documentation patterns, (b) conduct while in office, (c) the November 2023 UAPDA legislative revisions and Kirkpatrick''s later characterization of them, (d) statements about prior UAP involvement that are in tension with the documented record, and (e) the timing relationship between Sancorp''s Insider Threat work for OUSD(I&S) and Kirkpatrick''s April 19 2023 SASC testimony asking for counterintelligence authority. Several events sit within a narrow window during the final months of his AARO tenure — the February 28 2023 Reveal Systems patent continuation, the October 16 2023 Nonlinear Solutions LLC registration, the November 2023 OUSD(I&S) UAPDA revisions, the November 8 2023 departure announcement, the December 1 2023 last day, and the December 2023 ORNL appointment — and are presented together below for chronological visibility. Full detail is in the Affiliations, Program Involvement, Timeline, and Relationships sections.


  AARO new-start count. The DoD bio released at AARO establishment (July 20 2022) identifies the USSPACECOM Intelligence Enterprise as the fifth IC new-start organization Kirkpatrick led; the WestExec bio after his retirement identifies AARO as the sixth. The DoD, AFCEA, HandWiki, and Potomac Officers Club bio pages also identify the JICSpOC IC support assignment about 2014 to 2016 as a similar new-start effort, putting three of six explicitly named. The remaining three are not named in any retrieved bio. The count of six comes only from the WestExec bio, a curated source written after his retirement; the DoD bio''s count at the time of writing in mid-2022 is five.


  Group A — Affiliations after AARO with unusual documentation patterns. Multiple title forms are used for his ORNL role. Per DOE Office of Hearings and Appeals decision FIA-24-0036, the UT-Battelle FOIA Coordinator memorandum identifies Kirkpatrick by the internal title "Chief Operating Officer for the National Security Sciences Directorate". An archived 2023 capture of his ORNL staff profile used "Chief Technology Officer for Defense and Intelligence Programs". The November 7 2024 NSSA Space Domain Awareness Forum agenda used "Chief Technology Officer, National Security Programs". The October 31 2024 CSIS author bio described him only by his USSPACECOM tenure with no mention of AARO or ORNL, and the WestExec and Elara Nova bio pages do not mention ORNL. The ORNL staff profile page at ornl.gov was live in early November 2023, six days before the Hicks departure announcement of November 8 2023; the page was live again on December 8 2024 but became 404 by December 22 2024 and was still 404 on August 4 2025. Other ORNL staff named Kirkpatrick still have a live profile.


  Group B — Conduct while in office. Three documentary records sit within the AARO tenure window. (i) Reveal Systems patent family — Kirkpatrick is named as an inventor with Erik T. Bogaard and Jason F. Fairchild on three Reveal Systems Inc. USPTO patent applications from a 2019 provisional. The applications cover an integrated influencer commerce platform — a co-branded MasterCard pre-paid payment card ("InCard"), biometric authentication of the influencer at login, posting, and purchase, Bluetooth Low Energy in-store location tracking, machine learning analysis of influencer content to identify purchase events, tiered influencer chain tracking across multiple users, and direct integration with retailer point-of-sale systems for card linked offers. Patent figures render the consumer brand as "Reveel"; the corporate assignee on all three applications is "Reveal Systems, Inc." Per the May 2020 USPTO assignment record on US20200357080A1, the corporate assignee is identified as a California entity. Deeper corporate detail (specific entity number, state of incorporation filing date, current operating status, principals beyond the inventor list) is held only by registry services that block automated retrieval through CAPTCHA and is not available through open channels. The May 7 2019 provisional was filed while Kirkpatrick was Deputy Director of Intelligence at U.S. Space Command; the original was filed May 7 2020 (later abandoned), the first continuation November 30 2021 while he was Chief Scientist at DIA''s Missile and Space Intelligence Center, and the second continuation February 28 2023, seven months into his AARO tenure. (ii) Nonlinear Solutions LLC was registered in North Carolina at a personal residence in Franklin NC on October 16 2023 while Kirkpatrick was sitting AARO Director. (iii) The encrypted Signal text exchange with Christopher Mellon dated June 11 to 13 2023 is registered in Statements — Kirkpatrick characterized Mellon''s framing of the Grusch matter as "absurd and false" and told Mellon "you are defending and adjudicating, and you''re undermining the very organization you purported to help establish for this purpose". The exchange was released April 18 2024 under FOIA 24-F-0266.


  Group C — November 2023 OUSD(I&S) revisions to the UAP Disclosure Act. The 33-page line-by-line revisions to the Senate-passed UAP Disclosure Act of 2023 were reviewed by the Office of the Under Secretary of Defense for Intelligence and Security and submitted to congressional negotiators in November 2023, weakening the legislation''s independent disclosure mechanisms. Per a July 2024 Marik von Rennenkampff interview cited in Douglas Johnson''s analysis (July 2024), Kirkpatrick said of these revisions that "we convinced Congress last year not to go down that road". He separately confirmed by email to Johnson that no one from the White House, EOP, NSC, or any other higher authority called him or his boss to put pressure on him to soften his position.


  Group D — Statements about prior UAP involvement. In a May 8 2024 split-screen interview with journalist Steven Greenstreet — transcript reporting in Unknown Country June 12 2024 and The UFO Chronicles June 2024 — Kirkpatrick characterized himself as "an independent outside reviewer" at the April 19 2018 SSCI/SASC Skinwalker Ranch briefing. Brandon Fugal''s May 9 2024 X post documents a photograph from that briefing showing Kirkpatrick at the head of the table while Fugal''s team presented; Fugal subsequently shared metadata that set the capture to 1:31 PM ET on April 19 2018, between 1:00 and 3:30 PM ET. On June 22 2024, Liberation Times reported that the Department of Defense had confirmed in writing to the publication that Kirkpatrick attended the briefing. The "outside reviewer" framing in the Greenstreet interview is in tension with imagery of Kirkpatrick at the head of the table in the photograph and with Fugal''s account that Kirkpatrick told attendees they "already know" the reality of the UFO phenomenon.


  Per the same Greenstreet interview, summarized in the Unknown Country June 12 2024 article: "an evasive Kirkpatrick stated that he had no interest in UFOs, ''not beyond the occasional movie,'' and that he did not ''perform any duties regarding UFOs or paranormal phenomena'' prior to taking the helm of AARO." Both denials are in tension with Kirkpatrick''s own admission that he attended the April 19 2018 SSCI/SASC Skinwalker Ranch briefing as "an independent outside reviewer" of AATIP/AAWSAP research, four years before AARO''s establishment — involvement prior to AARO that constitutes both interest and duties regarding UFOs/paranormal phenomena. The "outside reviewer" framing is also in tension with FOIA 24-F-0894 documents indicating that Kirkpatrick joined Acting Director Phillips and a third (b)(6)-redacted participant in presenting two AARO Historical Record Report classified Hill briefings on March 6 2024 — Compartmented Annex Brief to Senior Staff (1300-1400) and TS//SCI Brief to Intelligence and Defense Committee Professional Staff Members (1400-1530) — three months after his December 1 2023 official AARO departure. Per the Wirkkala read-out summary: "BLUF: Both briefs were well attended and went well. Dr. Kirkpatrick attended the first brief and the majority of the second brief."


  HRR Vol 1 rollout. Internal Pentagon emails released August 26 2025 under FOIA case 24-F-0894 (Black Vault analysis) document a tightly controlled press rollout for the AARO Historical Record Report Vol 1 — the report Kirkpatrick signed before his departure and which AARO publicly released March 8 2024 under Acting Director Tim Phillips. Multiple journalists from Scientific American, the Washington Examiner, and Finland''s national broadcaster YLE requested inclusion in press briefings or interviews with Phillips; those requests were declined. Pentagon spokesperson Sue Gough wrote: "At this time, we are looking to keep any media engagement with AARO''s acting director to a small group." A small invite-only briefing was held on March 8 2024. In an email chain dated March 5 2024 discussing the draft press release, Gough asked whether ODNI should be referenced because "the legislation calls for AARO producing the report — but Dir, AARO reports to PDDNI, too, so wanted to check"; the reply with the sender redacted was "Confirming that we''re good without any ODNI mention." AARO is required by statute to report to both the Deputy Secretary of Defense and the Principal Deputy Director of National Intelligence per 50 U.S.C. § 3373 — yet the public Vol 1 rollout omitted any ODNI reference, with the omission agreed by both Pentagon and ODNI Public Affairs offices. The same release captures Gough writing "We do not want to see sUAS added to AARO''s portfolio!" to David A. Kozik (Director of Congressional Activities, OUSD(I&S)) after Senator Gillibrand asked AARO to take on counter-drone coordination during a Senate briefing on drone incursions.


  Group E — Sancorp Insider Threat contract preceded Kirkpatrick''s request for counterintelligence authority. Kirkpatrick''s April 19 2023 SASC oral testimony stated that AARO was "operating under Title 10 authorities" and would benefit from "additional authorities for collection tasking, counter-intelligence". Sancorp Consulting''s AARO Support Services contract HQ003422C0094 had its period of performance start date August 22 2022 and was signed September 1 2022 per the federal contract record — between seven and eight months before Kirkpatrick''s SASC testimony. Sancorp''s Company News page documents prior Insider Threat work for OUSD(I&S), including a September 2019 OUSD(I&S) Insider Threat contract and INSA Insider Threat Subcommittee participation from March 2021. The HQ003422C0094 Performance Work Statement, released via FOIA 23-F-1114 (cover letter September 11 2023; 11 pages withheld in their entirety per (b)(5)), documents task areas covering Executive Administrative Support, Strategy, Plans, and Policy Support, Congressional Affairs, Public Affairs, and FOIA Support, Data Architecture Support, Planning, Programming, Budgeting and Executive Support, Reporting Support, and Operations Support; counterintelligence is not listed among the contract task areas. Robert Skvarla, Jr. submitted MuckRock FOIA case 23-F-0905 on May 19 2023 to the OSD/JS Freedom of Information Division for records related to award ID HQ003422C0094; partial release of 34 of 125 responsive pages issued September 11 2023, with 91 pages withheld.

