background: 'Dr. Sean M. Kirkpatrick was born in Columbus, Georgia to an Army family and grew up in the Atlanta area. He attended the University of Georgia ([`/organizations/uga`]) for both undergraduate and graduate work, receiving a B.S. in Physics in 1991 and a Ph.D. in Physics in 1995 under the supervision of William Dennis (Thesis: Experimental and Theoretical Investigation of Nonequilibrium Acoustic Phonon Dynamics in Praseodymium-Doped Fluorides). His doctoral work was in nonlinear and nonequilibrium phonon dynamics of rare earth doped fluoride crystals. After receiving his Ph.D. he took a postdoctoral position at the University of Illinois Urbana-Champaign investigating laser-induced molecular vibrations of high explosives under an AFOSR program. In 1996 he was offered a National Research Council Fellowship at the U.S. Naval Research Laboratory in Washington D.C. investigating novel solid-state lasers for the Department of the Navy. In 1997 he was recruited by the Air Force Research Laboratory to build an Ultrafast Laser Physics Lab to investigate nonlinear optics, novel ultrafast spectroscopic methods, and nonlinear micro/nano-fabrication techniques for the Air Force.


  In 2003 he was offered a program manager position in the National Reconnaissance Office ([`/organizations/nro`]), and converted to CIA in 2005. In 2007 he was assigned as Chief Technology Officer in a joint CIA-DIA program office, where he later became division chief as a DIA officer. In 2010 he was asked to serve as the space control portfolio manager for the Deputy Assistant Secretary of Defense, Space and Intelligence, Office of the Secretary of Defense. In 2012 he returned to DIA and served as the Defense Intelligence Officer for Scientific and Technical Intelligence (DIO/S&TI), serving as the Department of Defense''s counterpart to the National Intelligence Manager for Science and Technology until 2016. He was appointed to the Defense Intelligence Senior Executive Service in 2012. From 2016 to 2022 he served in a variety of senior intelligence roles including Deputy Director of Intelligence, U.S. Strategic Command ([`/organizations/usstratcom`]); Director, National Security Strategy, National Security Council ([`/organizations/nsc`]); Deputy Director of Intelligence and the DNI Representative for U.S. Space Command ([`/organizations/usspacecom`]); and Chief Scientist at DIA''s Missile and Space Intelligence Center.


  Awards include the Joint Meritorious Civilian Service Award, the National Intelligence Exceptional Achievement Medal, four National Intelligence Collaboration medallions, the NRO Innovation and Achievement Award, the Cleary Award for Scientific Excellence, and the DIA Director''s Award for Excellence.


  Per the AFCEA biography, Kirkpatrick''s wife Amy is a State Department officer and his daughter Maya was in college as of the AFCEA bio (~2019).

  '
uap_relevance: 'Dr. Kirkpatrick was asked by USD(I&S) Ronald Moultrie ([`/people/ronald-moultrie`]) of OUSD(I&S) ([`/organizations/ousd-is`]) to stand up and lead AARO ([`/organizations/aaro`]) — the successor to the Navy-led UAP Task Force ([`/organizations/uaptf`]) — in early 2022. He was the inaugural Director of AARO from July 20, 2022 through December 1, 2023. He was the witness at the April 19, 2023 Senate Armed Services Subcommittee on Emerging Threats and Capabilities oversight hearing on AARO ([`/events/2023-04-19-sasc-aaro-hearing`]), at which he said clearly for the record that AARO has found no credible evidence thus far of extraterrestrial activity, off world technology, or objects that defy the known laws of physics. The hearing record is preserved in his oral testimony transcript ([`/transcripts/2023-04-19-sasc-kirkpatrick`]) and his Statement for the Record submitted before the hearing ([`/documents/written-testimony-kirkpatrick-2023`]). One of his last acts before retiring was to sign AARO''s Historical Record Report Volume 1; AARO publicly released the report March 8, 2024 under his successor Tim Phillips ([`/people/tim-phillips`]). After his retirement Kirkpatrick has been a continuing public voice on UAP across three Scientific American articles, a Peter Bergen ([`/people/peter-bergen`]) podcast appearance, and several jointly written papers with NSSA Moorman Center colleagues and a CSIS commentary.

  '
