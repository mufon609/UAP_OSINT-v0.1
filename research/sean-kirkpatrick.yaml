- id: q9
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2023-04-19'
  text: 'There are some authorities that we need. We currently are operating under Title 10 authorities but we have good relationships across the other agencies. But having additional authorities for collection tasking, counter-intelligence --

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 31"
