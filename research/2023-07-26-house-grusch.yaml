quotes:
- id: q1
  added_date: '2026-04-20'
  text: My name is David Charles Grusch. I was an intelligence officer for 14 years both in the U.S. Air Force, both active-duty Air National Guard and Reserve at the rank of Major and most recently from 2021 to 2025—excuse me, 2023—at the National Geospatial Intelligence Agency, NGA, at the GS–15 civilian level, which is the military equivalent of a full bird colonel.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 733
  significance: Identity — rank, agencies, service span; oral contains mistake-and-correction "2021 to 2025—excuse me, 2023" not present in written testimony
  context: opening statement
  statement_date: '2023-07-26'
- id: q2
  added_date: '2026-04-20'
  text: I was my agency's co-lead in unidentified anomalous phenomena and trans medium object analysis as well as reporting to the UAP Task Force—UAPTF—and eventually, once it was established, the All-Domain Anomaly Resolution Office—AARO.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 739
  significance: UAP-specific role — NGA co-lead; UAPTF and AARO reporting
  context: opening statement
  statement_date: '2023-07-26'
- id: q3
  added_date: '2026-04-20'
  text: I became a whistleblower through a PPD–19 urgent concern filing in May 2022 with the intelligence community inspector general following concerning reports from multiple esteemed and credentialed current and former military and intelligence community individuals that the U.S. Government is operating with secrecy above congressional oversight with regards to UAPs.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 745
  significance: Whistleblower filing mechanism — PPD-19 Urgent Concern with ICIG; oral includes "in May 2022" date detail not present in written; secrecy-above-oversight framing
  context: opening statement
  statement_date: '2023-07-26'
  category: filed-claim
- id: q4
  added_date: '2026-04-20'
  text: My testimony is based on information I have been given by individuals with a long-standing track record of legitimacy and service to this country, many of whom also have shared compelling evidence in the form of photography, official documentation, and classified oral testimony to myself and many of my various colleagues.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 751
  significance: Evidentiary basis — relayed information from named classes of individuals; forms of evidence shared (photography, official documentation, classified oral testimony)
  context: opening statement
  statement_date: '2023-07-26'
- id: q5
  added_date: '2026-04-20'
  text: I have taken every step I can to corroborate this evidence over a period of 4 years while I was with the UAP Task Force and do my due diligence on the individuals sharing it.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 756
  significance: Corroboration process — 4-year window; oral adds "while I was with the UAP Task Force" detail not present in written testimony
  context: opening statement
  statement_date: '2023-07-26'
- id: q6
  added_date: '2026-04-20'
  text: But as I stand here under oath now, I am speaking to the facts as I have been told them. In the U.S. Air Force in my National Reconnaissance Office—NRO—reservist capacity, I was a member of the UAP Task Force from 2019 to 2021.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 766
  significance: Sworn-testimony framing + UAPTF membership — Grusch distinguishes sworn testimony from independent verification; 2019-2021 UAPTF tenure in NRO reservist capacity
  context: opening statement
  statement_date: '2023-07-26'
- id: q7
  added_date: '2026-04-20'
  text: I served at the NRO operations center on the Director's briefing staff, which included the coordination of the Presidential daily brief and supporting a variety of contingency operations, which I was the reserve intelligence division chief backup.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 770
  significance: NRO Operations Center role — Director's briefing staff; PDB coordination; reserve intelligence division chief backup
  context: opening statement
  statement_date: '2023-07-26'
- id: q8
  added_date: '2026-04-20'
  text: In 2019, the UAP Task Force Director asked me to identify all special access programs and controlled access programs, also known as SAPs and CAPs, we needed to satisfy our congressionally mandated mission and we would direct report at the time to the DEP/SecDef.
