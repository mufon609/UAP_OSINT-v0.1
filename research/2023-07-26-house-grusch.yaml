description: 'David Grusch''s ([`/people/david-grusch`]) sworn oral testimony at the July 26, 2023 House Oversight Subcommittee on National Security, the Border, and Foreign Affairs hearing on unidentified anomalous phenomena ([`/events/2023-07-26-house-uap-hearing`]). Grusch is one of three witnesses sworn at the hearing; Ryan Graves ([`/people/ryan-graves`]) and David Fravor ([`/people/david-fravor`]) also testified. Grusch''s written testimony ([`/documents/written-testimony-grusch-2023`]) was also submitted for the record.


  Grusch''s opening statement — his 14 years as an intelligence officer in the U.S. Air Force ([`/organizations/us-air-force`]) at the rank of Major across active-duty, Air National Guard and Reserve, and most recently at the National Geospatial Intelligence Agency ([`/organizations/nga`]) at the GS–15 civilian level; his agency''s co-lead in unidentified anomalous phenomena and trans medium object analysis reporting to the UAP Task Force ([`/organizations/uaptf`]) and the All-Domain Anomaly Resolution Office ([`/organizations/aaro`]); becoming a whistleblower through a PPD–19 ([`/documents/ppd-19`]) urgent concern in May 2022 with the intelligence community inspector general ([`/organizations/icig`]); member of the UAP Task Force from 2019 to 2021 in National Reconnaissance Office ([`/organizations/nro`]) reservist capacity on the Director''s briefing staff with Presidential daily brief coordination; the 2019 UAP Task Force Director tasking to identify all special access programs and controlled access programs to satisfy their congressionally mandated mission with direct report to the DEP/SecDef; the multi-decade UAP crash retrieval and reverse engineering program he was informed of in the course of his official duties and denied access to when he requested it; and his decision to report this information to his superiors and multiple inspectors general with suffered retaliation.


  Grusch''s Q&A exchange under oath — interviewing over 40 witnesses over 4 years with exact locations provided to the Inspector General; an open whistleblower reprisal investigation and active planned reprisal activity from senior leadership at previous agencies, and his "administrative terrorism" — "their tool in the toolbox to silence people, especially, you know, career government service cares about their career, cares about their clearance"; a classified conversation with Dr. Kirkpatrick ([`/people/sean-kirkpatrick`]) in April 2022 before Kirkpatrick took over AARO in July 2022, and DoD Prepublication and Security Review as the clearance path for his public testimony; "I personally interviewed those individuals" with direct knowledge of nonhuman origin craft; briefed to a preponderance of the Defense Department''s ([`/organizations/dod`]) space and aerospace compartmented programs; 10 U.S. Code Section 119 and Gang of 8 notification on waived bigoted unacknowledged SAPs; misappropriation of funds and self-fund as the funding mechanism with IR&D as a corporations overcharging channel; NGA satellite imagery as one of his primary tasks with an April 2023 information cutoff date; the sworn statement that Dr. Kirkpatrick''s "no credible evidence" public statement is "not accurate"; Executive Order 13526 ([`/documents/executive-order-13526`]) delineates the classification levels with "a misnomer that there is anything actually above top secret"; about 11½ hours with both intel committees; his statement "I did actually help author" the UAP Task Force 2019 Security Classification guide ([`/documents/uap-scg-2019`]) with the Director; multiple colleagues of his that got injured by both UAPs and people within the Federal Government, and what he personally witnessed himself and his wife as "very disturbing"; the origin question through the "holographic principle" theoretical framework as "a fact witness and not an expert"; sworn statement "yes" on active disinformation campaign (on his prior NewsNation ([`/organizations/newsnation`]) interview), and biologics that "came with" some of these recoveries — "Nonhuman" as the assessment of people with direct knowledge on the program currently still on the program; the PPD–19 and ICD 120 ([`/documents/icd-120`]) process to intel committees with no good way to the House and Senate Armed Services Committees ([`/organizations/hasc`], [`/organizations/sasc`]) despite Title 10 equities at play; cited Article Three of the 1971 agreement on measures to reduce the risk of outbreak of nuclear war ([`/documents/1971-nuclear-war-risk-reduction-agreement`]) with the George Washington University National Security Archive ([`/organizations/gwu-national-security-archive`]) 2013 declassified provisions; has concerns about Federal Acquisition Regulations ([`/documents/federal-acquisition-regulations`]) violations based on interviews conducted under his official duties; and closing on "purely a sense of duty" and the oath he swore as a cadet 18 years ago.

  '
