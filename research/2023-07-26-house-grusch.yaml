  context: opening statement
  statement_date: '2023-07-26'
- id: q9
  added_date: '2026-04-20'
  text: At the time, due to my extensive executive level intelligence support duties I was cleared to literally all relevant compartments and in a position of extreme trust both in my military and civilian capacities.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 779
  significance: Clearance scope — self-description of compartmented access and institutional trust (parallels written q9)
  context: opening statement
  statement_date: '2023-07-26'
- id: q10
  added_date: '2026-04-20'
  text: I was informed in the course of my official duties of a multi-decade UAP crash retrieval and reverse engineering program to which I was denied access to those additional read-ons when I requested it.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 783
