    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2075
  significance: Personal witness of disturbing activity (Grusch and wife) in the context of human-targeting harm; refusal to acknowledge tradecraft
  context: Q&A exchange with Rep. Eric Burlison (waived on)
  statement_date: '2023-07-26'
- id: q36
  added_date: '2026-04-20'
  text: To answer your first question and, you know, I am here as a fact witness and not an expert, but I will give you a theoretical framework at least to work off to kind of espouse crashes. Regardless of, you know, your level of sentience, right—you know, planes crash, cars crash, and a number of sorties, however high, a small percentage are going to end in, you know, mission failure, if you will, as we say in the Air Force. And then in terms of multidimensionality, that kind of thing, the framework that I am familiar with, for example, is something called the holographic principle both—it derives itself from general relativity and quantum mechanics and that is if you want to imagine a 3D object such as yourself casting a shadow onto a 2D surface that is the holographic principle.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2101
  significance: Self-framing as "fact witness and not an expert"; holographic-principle theoretical framework for multidimensionality; crashes framed as mission-failure percentage (quote truncated at page 37 boundary; post-break content on line 2117+ covers projection and scientific trope)
  context: Q&A exchange with Rep. Eric Burlison (waived on)
  statement_date: '2023-07-26'
- id: q37
  added_date: '2026-04-20'
  text: As previously stated publicly, yes.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2262
  significance: Sworn affirmative on active U.S. Government disinformation campaign to deny UAP existence
  context: Q&A exchange with Subcommittee Member Nancy Mace
  statement_date: '2023-07-26'
  category: filed-claim
- id: q38
  added_date: '2026-04-20'
  text: As I have stated publicly already in my News Nation interview, biologics came with some of these recoveries. Yes.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2319
  significance: Flagship — sworn affirmative that biologics accompanied some craft recoveries; cites News Nation interview as prior public statement
  context: Q&A exchange with Subcommittee Member Nancy Mace
  statement_date: '2023-07-26'
  category: filed-claim
- id: q39
  added_date: '2026-04-20'
  text: Nonhuman, and that was the assessment of people with direct knowledge on the program I talked to that are currently still on the program.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2322
  significance: Flagship — characterizes biologics as "nonhuman" per assessment of direct-knowledge program personnel currently on the program
  context: Q&A exchange with Subcommittee Member Nancy Mace
  statement_date: '2023-07-26'
  category: filed-claim
- id: q40
  added_date: '2026-04-20'
  text: Yes. There was some issue with mine. So, you know, PPD–19 process it goes to the intel committees either through PPD–19 or ICD 120. There is not a good way for the intelligence community Inspector General to provide that to other committees, and I asked my information to be sent to the House and Senate Armed Services Committee because there are Title 10 equities at play. But there was no smooth process to do so.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2544
  significance: Procedural gap in ICIG whistleblower routing — PPD-19 and ICD 120 channels do not route to HASC/SASC despite Title 10 equities
  context: Q&A exchange with Rep. Tim Burchett (3-minute additional round, yielded from Ogles)
  statement_date: '2023-07-26'
  category: filed-claim
- id: q41
  added_date: '2026-04-20'
  text: You are referring to actual—a public treaty in the U.N. register—it is funny you mentioned that—the agreement on measures to reduce the risk of outbreak of nuclear war signed in 1971. Unclassified treaty publicly available, and if you cite the George Washington University National Security Archives you will find the declassified, in 2013, specific provisions and the specific red line flash message traffic with the specific codes pursuant to Article Three and Article—also situation two, which is in the previously classified NSA archive.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2594
  significance: References 1971 U.S.-Soviet nuclear-war-risk-reduction treaty Article Three; cites George Washington University National Security Archives 2013 declassification of red-line flash message provisions
  context: Q&A exchange with Rep. Anna Paulina Luna (waived on; 3-minute additional round)
  statement_date: '2023-07-26'
- id: q42
  added_date: '2026-04-20'
  text: I have concerns based on the interviews I conducted under my official duties of potential violations of the Federal Acquisition Regulations—the FAR.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2614
  significance: Federal Acquisition Regulations (FAR) violation concerns from interviews conducted under official duties — specific white-collar-crime allegation anchor
  context: Q&A exchange with Rep. Anna Paulina Luna (waived on; 3-minute additional round)
  statement_date: '2023-07-26'
  category: filed-claim
- id: q43
  added_date: '2026-04-20'
  text: Purely a sense of duty. My first swore an oath when I was a cadet 18 years ago and I still uphold that even out of uniform.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2704
  significance: Motivation statement — 18-year oath anchor (cadet-era) as out-of-uniform duty basis
  context: Q&A exchange with Rep. Tim Burchett (closing 3-minute round)
  statement_date: '2023-07-26'
- id: q44
  added_date: '2026-04-20'
  text: I will just touch on the whistleblower side of it. I do encourage, you know, current and former military, intelligence community, and industry contractors to come forward in a legal way, either through the IC or DoD or whatever the cognizant IGs are to join me in this discussion.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 2738
  significance: Public encouragement to other would-be whistleblowers to come forward through IC/DoD IG channels
  context: Q&A exchange with Rep. Tim Burchett (closing 3-minute round)
  statement_date: '2023-07-26'
