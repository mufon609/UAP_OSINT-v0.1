- id: q24
  added_date: '2026-04-20'
  text: A complicated question. So, there is, you know, some—I would call it abuse here. So, congressional oversight of conventional Special Access Programs—and I will use Title 10, DoD as an example, right. So, 10 U.S. Code Section 119 discusses congressional oversight of SAPs, discusses the DEP/SecDef's ability to waive congressional reporting. However, the Gang of 8 is at least supposed to be notified if a—you know, a waived or a waive bigoted unacknowledged SAP is created and that is public law.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 1526
  significance: Legal framework — 10 USC §119 congressional oversight of SAPs; DEP/SecDef waiver authority; Gang of 8 notification on waived-bigoted unacknowledged SAPs
  context: Q&A exchange with Subcommittee Member Jared Moskowitz
  statement_date: '2023-07-26'
- id: q25
