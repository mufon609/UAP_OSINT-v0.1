  context: Q&A exchange with Ranking Minority Member Jamie Raskin
  statement_date: '2023-07-26'
- id: q17
  added_date: '2026-04-20'
  text: Certain senior leadership at previous agencies I was associated with and that is all I will say publicly. But I can provide more details in a closed environment.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 1332
  significance: Attributes reprisal source to senior leadership at prior agencies (NRO / NGA / UAPTF-era context)
  context: Q&A exchange with Ranking Minority Member Jamie Raskin
