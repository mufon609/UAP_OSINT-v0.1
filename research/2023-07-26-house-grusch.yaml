  category: filed-claim
- id: q14
  added_date: '2026-04-20'
  text: I know the exact locations and those locations were provided to the Inspector General and some of which to the intelligence committees. I actually had the people with the firsthand knowledge provide a protected disclosure to the Inspector General.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 1151
  significance: Protected-disclosure chain — exact locations provided to ICIG and some to intelligence committees; firsthand-knowledge individuals filed separate protected disclosures
  context: Q&A exchange with Ranking Member Robert Garcia
  statement_date: '2023-07-26'
  category: filed-claim
- id: q15
  added_date: '2026-04-20'
  text: Yes. I have to be careful what I say in detail because there is an open whistleblower reprisal investigation on my behalf, and I do not want to compromise that investigation by providing anything that may help provide somebody information. But it was very brutal and very unfortunate. Some of the tactics they used to hurt me both professionally and personally, to be quite frank. Yes.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 1218
