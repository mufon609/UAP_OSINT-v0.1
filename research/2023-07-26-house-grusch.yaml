  context: opening statement
  statement_date: '2023-07-26'
  category: filed-claim
- id: q11
  added_date: '2026-04-20'
  text: I made the decision based on the data I collected to report this information to my superiors and multiple inspectors general and, in effect, becoming a whistleblower. As you know, I have suffered retaliation for my decision, but I am hopeful that my actions will ultimately lead to a positive outcome of increased transparency.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 787
  significance: Reporting decision + retaliation — report to superiors and multiple Inspectors General; assertion of retaliation
  context: opening statement
  statement_date: '2023-07-26'
  category: filed-claim
- id: q12
  added_date: '2026-04-20'
  text: Yes, I can speak to that very briefly in an unclassified manner. As you know, the preponderance of my complaint was classified to the intelligence communities. Both material acquisition and exploitation activity, also baselining the UAPs but not sharing it with, you know, intelligence professionals that are actually doing step briefs to pilots, that kind of information.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 1018
  significance: Preponderance of ICIG complaint was classified; specifies scope (material acquisition + exploitation + baselining) hidden from intelligence professionals briefing pilots
  context: Q&A exchange with Subcommittee Chair Glenn Grothman
  statement_date: '2023-07-26'
  category: filed-claim
- id: q13
  added_date: '2026-04-20'
  text: Absolutely, based on interviewing over 40 witnesses over 4 years.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 1148
  significance: Flagship claim — affirms under oath that U.S. Government is in possession of UAPs; specifies evidentiary basis as 40+ witness interviews over 4 years
  context: Q&A exchange with Ranking Member Robert Garcia
