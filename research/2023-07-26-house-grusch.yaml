  statement_date: '2023-07-26'
  category: filed-claim
- id: q23
  added_date: '2026-04-20'
  text: Based on conventional advanced tech I was briefed to the preponderance of the Defense Department's both space and aerospace compartmented programs. Yes.
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: line 1517
  significance: Scope of conventional-tech briefings — "preponderance" of DoD space and aerospace compartmented programs
