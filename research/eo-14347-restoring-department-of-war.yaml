  text: |-
    By the authority vested in me as President by the
    Constitution and the laws of the United States of
    America, it is hereby ordered:
  source:
    path: government/eo-14347-restoring-department-of-war-20250910.txt
    location: 'Preamble (lines 30-32 of the extracted source)'
  significance: 'Constitutional preamble — vests authority in the President under the Constitution and the laws of the United States. Standard Executive Order opening.'
  statement_date: '2025-09-05'
- id: q2
  added_date: '2026-05-03'
  text: |-
    The name ``Department of War,'' more than the current
    ``Department of Defense,'' ensures peace through
    strength, as it demonstrates our ability and
    willingness to fight and win wars on behalf of our
    Nation at a moment's notice, not just to defend.
  source:
    path: government/eo-14347-restoring-department-of-war-20250910.txt
    location: 'Section 1 (Purpose), pivot sentence on the rationale for the rename (lines 45-49 of the extracted source)'
  significance: 'Section 1 (Purpose) pivot sentence — asserts the rename rationale: "peace through strength" via "ability and willingness to fight and win wars." Federal Register typography (LaTeX-style ``...'') preserved verbatim.'
  statement_date: '2025-09-05'
- id: q3
  added_date: '2026-05-03'
  text: |-
    Sec. 2. Implementation. (a) The Secretary of Defense is
    authorized the use of this additional secondary title--
    the Secretary of War--and may be recognized by that
    title in official correspondence, public
    communications, ceremonial contexts, and non-statutory
    documents within the executive branch.
  source:
    path: government/eo-14347-restoring-department-of-war-20250910.txt
    location: 'Section 2 (Implementation) subsection (a) (lines 58-63 of the extracted source)'
  significance: 'Section 2(a) — operative authorization of the secondary title "Secretary of War" for the Secretary of Defense, scoped to official correspondence, public communications, ceremonial contexts, and non-statutory executive-branch documents.'
  statement_date: '2025-09-05'
- id: q4
  added_date: '2026-05-03'
  text: |-
    (b) The Department of Defense and the Office of
    the Secretary of Defense may be referred to as the
    Department of War and the Office of the Secretary of
    War, respectively, in the contexts described in
    subsection (a) of this section.
  source:
    path: government/eo-14347-restoring-department-of-war-20250910.txt
    location: 'Section 2 (Implementation) subsection (b) (lines 65-69 of the extracted source)'
  significance: 'Section 2(b) — institutional secondary title authorization extending 2(a) to the Department of Defense and the Office of the Secretary of Defense as Department of War / Office of the Secretary of War. Source for the "Department of War" / "OUSW" institutional branding.'
  statement_date: '2025-09-05'
- id: q5
