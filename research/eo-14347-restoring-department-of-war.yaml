    apply, as appropriate, to subordinate officials within
    the Department of Defense, who may use corresponding
    secondary titles such as Deputy Secretary of War or
    Under Secretary of War in the contexts described in
    subsection (a) of this section.
  source:
    path: government/eo-14347-restoring-department-of-war-20250910.txt
    location: 'Section 2 (Implementation) subsection (c) (lines 70-75 of the extracted source)'
  significance: 'Section 2(c) — extends the secondary title authorization to subordinate officials, with "Deputy Secretary of War" and "Under Secretary of War" as illustrative corresponding titles. Authorizes the OUSW(I&S) form (Office of the Under Secretary of War for Intelligence and Security) used in Arlo Solutions ([`/organizations/arlo-solutions`]) and Sancorp Consulting ([`/organizations/sancorp-consulting`]) post-2025 corporate marketing.'
  statement_date: '2025-09-05'
- id: q6
  added_date: '2026-05-03'
  text: |-
    (e) Statutory references to the Department of
    Defense, Secretary of Defense, and subordinate officers
    and components shall remain controlling until changed
    subsequently by the law.
  source:
    path: government/eo-14347-restoring-department-of-war-20250910.txt
    location: 'Section 2 (Implementation) subsection (e) (lines 82-85 of the extracted source)'
  significance: 'Section 2(e) — statutory-controlling clause. Establishes that the secondary title authorization in 2(a)-(d) does not change the statutory name of the Department; statutory references remain "Department of Defense" / "Secretary of Defense" until changed by an act of Congress. Anchors the OUSD-in-procurement / OUSW-in-marketing asymmetry observed in Arlo and Sancorp records.'
  statement_date: '2025-09-05'
