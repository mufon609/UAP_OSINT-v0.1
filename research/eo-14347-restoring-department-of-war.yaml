description: 'Executive Order 14347 of September 5, 2025 — Restoring the United States Department of War — was filed at the Federal Register on September 9, 2025 at 11:15 am and at Federal Register Volume 90 Number 173 (Wednesday, September 10, 2025) at pages 43893-43894 (FR Doc No. 2025-17508). The Order has Section 1 (Purpose), Section 2 (Implementation), and Section 3 (General Provisions).


  Section 1 (Purpose): on August 7, 1789, President George Washington ([`/people/george-washington`]) signed into law a bill establishing the United States Department of War ([`/organizations/department-of-war-historical`]); the Department of War, along with the later formed Department of the Navy ([`/organizations/department-of-the-navy`]), won the War of 1812, World War I, and World War II.


  Section 2(a) authorized the Secretary of Defense the use of the additional secondary title — Secretary of War — in official correspondence, public communications, ceremonial contexts, and non-statutory documents within the executive branch. Section 2(b) authorized the Department of Defense ([`/organizations/dod`]) and the Office of the Secretary of Defense ([`/organizations/osd`]) to be referred to as the Department of War and the Office of the Secretary of War, respectively, in the contexts described in subsection (a). Section 2(c) shall apply to subordinate officials within the Department of Defense, who may use corresponding secondary titles such as Deputy Secretary of War or Under Secretary of War. Section 2(d) ordered all executive departments and agencies to recognize and accommodate the use of such secondary titles in internal and external communications, provided that the use of such titles does not create confusion with respect to legal, statutory, or international obligations. Section 2(e) states that statutory references to the Department of Defense, Secretary of Defense, and subordinate officers and components shall remain controlling until changed subsequently by the law. Section 2(f) ordered the Secretary of War to submit, within 30 days of the date of this order, a notification to the President for transmittal to the Congress of any office, executive department or agency, component, or command that begins using a secondary Department of War designation. Section 2(g) ordered the Secretary of War to submit, within 60 days, a recommendation to the President on the actions required to permanently change the name of the Department of Defense to the Department of War, to include the proposed legislative and executive actions necessary to accomplish this renaming.


  Section 3 (General Provisions) states that nothing in this order shall be construed to impair the authority granted by law to an executive department or agency or the functions of the Director of the Office of Management and Budget ([`/organizations/omb`]); the order shall be implemented consistent with applicable law and subject to the availability of appropriations; the order is not intended to create any right or benefit, substantive or procedural, enforceable at law or in equity; and the costs for publication of the order shall be borne by the Department of War.

  '
