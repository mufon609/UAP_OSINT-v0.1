quotes:
- id: q1
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'Thank you, Chairwoman Gillibrand, Ranking Member Ernst, and distinguished members of the Subcommittee and Congress. It is a privilege to be here today to testify on the Department of Defense''s efforts to address Unidentified Anomalous Phenomena.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 1, ¶2"
  significance: Opening cordiality and statement of testimony purpose; differs from the oral version in which Kirkpatrick added a self-correction "the Defense -- Defense's efforts"
  context: Statement for the Record opening
- id: q2
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'AARO has accomplished much in the 9 months since it was established. The AARO team of more than three dozen experts is organized around four functional areas: operations, scientific research, integrated analysis, and strategic communications.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 1, ¶2"
  significance: Kirkpatrick describes AARO's organizational structure — four functional areas including a strategic communications function; written-statement formulation, slightly different wording from the oral version ("9 months" vs "last nine months")
  context: Statement for the Record
- id: q3
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'In the nine months since AARO''s establishment, we have taken important steps to improve UAP data collection, standardize the Department''s UAP internal reporting requirements, and implement a framework for rigorous scientific and intelligence analysis, resolving cases in a systematic and prioritized manner.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 1, ¶2"
  significance: Summary of AARO's first-nine-months work program — data collection, internal reporting standardization, framework for analysis
  context: Statement for the Record
- id: q4
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'Meanwhile, consistent with legislative direction, AARO is also carefully reviewing and researching the U.S. Government''s UAP-related historical record. AARO is leading a focused effort to better characterize, understand, and attribute UAP, with priority given to UAP reports by DoD and IC personnel in or near areas of national security importance.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 1, ¶2"
  significance: Kirkpatrick frames AARO's historical-record review as legislative direction — the work that resulted in AARO Historical Record Report Vol I (released March 2024)
  context: Statement for the Record
- id: q5
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'It is important to note, however, that AARO is the culmination of decades of DoD, Intelligence Community, and congressionally-directed efforts to successfully resolve UAP encountered first and foremost by U.S. military personnel, specifically Navy and Air Force pilots.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 2"
  significance: Kirkpatrick situates AARO in lineage of decades of DOD/IC/congressionally-directed UAP resolution work; specifies Navy and Air Force pilots as primary witness population
  context: Statement for the Record
- id: q6
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'The law establishing AARO is ambitious, and it will take time to realize the full mission. We cannot answer decades of questions about UAP all at once, but we must begin somewhere. While I assure you that AARO will follow scientific evidence wherever it leads, I ask for your patience as DoD first prioritizes the safety and security of our military personnel and installations, in all domains.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 2"
  significance: Kirkpatrick asks for patience and frames the priority order — military personnel and installations first; commits to following scientific evidence wherever it leads
  context: Statement for the Record
- id: q7
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'However, it would be naive to believe that the resolution of all UAP can be solely accomplished by the DoD and IC alone. We will need to prioritize collection and leverage authorities for monitoring all domains within the continental United States. AARO''s ultimate success will require partnerships with the interagency, industry, academia, the scientific community, and the public.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 2"
  significance: Kirkpatrick acknowledges DOD/IC alone are insufficient; flags continental-U.S. monitoring authorities and partnerships as needed extensions
  context: Statement for the Record
- id: q8
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'AARO is partnering with the Services, Intelligence Community, DOE and across the U.S. government to tap into the resources of the interagency. The UAP challenge is more an operational and scientific issue than an intelligence issue.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 2"
  significance: Kirkpatrick reframes UAP from intelligence problem to operational and scientific problem; lists Services / IC / DOE as core partners
  context: Statement for the Record
- id: q9
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'I want to underscore today that only a very small percentage of UAP reports display signatures that could reasonably be described as ''anomalous.'' The majority of unidentified objects reported to AARO demonstrate mundane characteristics of balloons, unmanned aerial systems, clutter, natural phenomena, or other readily explainable sources.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 2"
  significance: Kirkpatrick characterizes the AARO case-resolution distribution — only a very small percentage anomalous; majority resolve to mundane sources; written version puts 'anomalous' in single quotes
  context: Statement for the Record
- id: q10
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'Without sufficient data, we are unable to reach defendable conclusions that meet the high scientific standards we set for resolution, and I will not close a case that we cannot defend the conclusions of.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 3"
  significance: Kirkpatrick's evidentiary discipline — will not close cases without defendable conclusions; written version uses "we cannot defend" plural; oral version uses "I cannot defend" singular
  context: Statement for the Record
- id: q11
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'Yet, time and again, with sufficient scientific-quality data, it is fact that UAP often, but not always, resolve into readily-explainable sources. Humans are subject to deception and illusions, sensors to unexpected responses and malfunctions, and in some cases intentional interference. Getting to the handful of cases that pass this level of scrutiny is the mission of AARO.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 3"
  significance: Kirkpatrick frames the data-quality and observer-error problem — humans subject to deception and illusions, sensors to malfunctions and intentional interference
  context: Statement for the Record
- id: q12
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'AARO is a member of the Department''s support to the Administration''s "Tiger Team" effort to deal with stratospheric objects such as the PRC High Altitude Balloon. When previously unknown objects are successfully identified, it is AARO''s role to quickly and efficiently hand off such readily-explainable objects to the Intelligence or Law Enforcement Communities for further analysis and appropriate action.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 3"
  significance: Kirkpatrick references the Administration's Tiger Team effort for stratospheric objects (post-PRC High Altitude Balloon event); frames AARO's hand-off role to Intelligence and Law Enforcement Communities
  context: Statement for the Record
- id: q13
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'Meanwhile, for the few cases in all domains that do demonstrate potentially anomalous characteristics, AARO exists to help the DoD, IC, and interagency resolve those anomalous cases. In doing so, AARO is approaching these cases with the highest level of objectivity and analytic rigor. This includes physically testing and employing modeling and simulation to validate our analyses and underlying theories, then peer reviewing the results within the U.S. Government, industry partners, and with appropriately-cleared academic institutions before reaching any conclusions.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 3"
  significance: Kirkpatrick describes AARO's analytic-rigor protocol — physical testing, modeling, simulation, peer review across government, industry, cleared academia
  context: Statement for the Record
- id: q14
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'I should also state clearly for the record that in our research AARO has found no credible evidence thus far of extraterrestrial activity, off-world technology, or objects that defy the known laws of physics.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 4"
  significance: Kirkpatrick's on-record statement — AARO has found no credible evidence of extraterrestrial activity, off-world technology, or objects defying the known laws of physics; the canonical line of the hearing
  context: Statement for the Record
- id: q15
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'In the event sufficient scientific data were ever obtained that a UAP encountered can only be explained by extraterrestrial origin, we are committed to working with our interagency partners at NASA to appropriately inform the U.S. Government''s leadership of its findings.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 4"
  significance: Kirkpatrick describes the conditional commitment for any future extraterrestrial-origin finding — interagency partnership with NASA to inform U.S. Government leadership
  context: Statement for the Record
- id: q16
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'For those few cases that have been leaked to the public previously, and subsequently commented on by the U.S. Government, I encourage those who hold alternative theories or views to submit your research to credible peer-reviewed scientific journals. AARO is working to do the same. That is how science works, not by blog or social media.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 4"
  significance: Kirkpatrick's framing of the public-discourse standard — peer-reviewed journals, not blog or social media; commits AARO to the same standard
  context: Statement for the Record
- id: q17
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'However, AARO''s work will take time if we are committed to doing it right. It means adhering to the scientific method and the highest standards of research integrity. It means being methodical and scrupulous. It means withholding judgment in favor of evidence. It means following the data where it leads, wherever it leads. It means establishing scientific, peer reviewed theoretical underpinnings of observed data. AARO is committed to those standards.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 4"
  significance: Kirkpatrick's closing standards commitment — scientific method, research integrity, methodical and scrupulous, withholding judgment in favor of evidence
  context: Statement for the Record closing
- id: q18
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'I am proud of AARO''s progress over the last nine months. Much remains to be done, but the hard work is under way. Thank you for your continued support, and I look forward to your questions.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 4"
  significance: Kirkpatrick's final closing — pride in AARO's progress, acknowledgment of remaining work, formal close to the written statement
  context: Statement for the Record final close
- id: q19
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'We are grateful for sustained congressional engagement on this issue, which paved the way for DoD''s establishment of the All-domain Anomaly Resolution Office in July of last year. Though AARO is still a young office, the spotlight on UAP in recent months underscores the importance of its work and the need for UAP to be taken seriously as a matter of national security. All leadership that I''ve had the pleasure of working with, whether DoD, IC, DOE, Civil, Scientific or Industrial, view Congress as a critical partner in this endeavor.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 1, ¶2"
  significance: Kirkpatrick frames AARO''s national-security stakes — though still a young office, the spotlight on UAP underscores the importance of its work; characterizes Congress as a critical partner across DoD, IC, DOE, civil, scientific, and industrial leadership
  context: Statement for the Record — early-document framing of congressional partnership and national-security stakes
- id: q20
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'After all, UAP encountered first by highly capable DoD and IC platforms, featuring the nation''s most advanced sensors, are those UAP most likely to be successfully resolved by my office assuming data can be collected. If AARO succeeds in first improving the ability of military personnel to quickly and confidently resolve UAP that they encounter, I believe that in time we will have greatly advanced the capability of the entire United States Government, including its civilian agencies, to resolve UAP.

    '
  source:
    path: government/armed-services-senate-gov-kirkpatrick-statement-20230419.pdf
    location: "p. 2"
  significance: Kirkpatrick projects AARO success forward to a whole-of-government capability — military personnel resolving UAP first, then the entire United States Government including civilian agencies; explicit civilian-agencies extension framing absent from oral version
  context: Statement for the Record — forward projection of AARO success path
