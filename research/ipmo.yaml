    location: 'Speaker Session Summary, ¶1 (October 3, 2023 IPMO 101 talk by James Holly)'
  significance: 'Primary attestation that three Secretaries of Defense, under two administrations, signed off on IPMO''s establishment, per Holly''s October 3, 2023 NSI Speaker Series IPMO 101 talk. Compensates for the absent establishment instrument by attesting senior-level approval, but does not name the three SecDefs or provide the underlying memoranda.'
