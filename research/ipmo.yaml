description: 'The Influence and Perception Management Office (IPMO) is a [`/organizations/dod`] office within the Office of the Under Secretary of Defense for Intelligence and Security ([`/organizations/ousd-is`]). Per a memorandum signed by Acting Director James A. Holly ([`/people/james-holly`]) on May 27, 2022, IPMO was established on March 1, 2022 per direction from the Secretary of Defense and the Under Secretary of Defense for Intelligence and Security. The Performance Work Statement for Sancorp Consulting''s ([`/organizations/sancorp-consulting`]) IPMO Support Services contract HQ003422C0064 states at §1.2 that the USD(I&S) is supported by the Director for Defense Intelligence (Collection and Special Programs) (DDI(C&SP)), who is in turn supported by the Director of the IPMO for all influence and perception management related matters.


  IPMO is tasked with the development of broad thematic influence guidance focused on key adversaries, the promulgation of competitive influence strategies focused on specific defense issues, and the conduct of oversight, governance, and integration related to influence and perception management matters across DoD components. Per the FY 2026 OSD OP-5 budget submission, IPMO is the OUSD(I&S) center of gravity for efforts to deliberately influence foreign defense and intelligence entities to behave in ways that benefit U.S. defense-related strategic interests; its activities include the development of thematic influence guidance and integrated influence strategies; oversight of intelligence support to operations in the information environment; oversight and governance of deception activities; oversight and governance of deliberate conceal and selective reveal of strategic defense capabilities; and management of designated compartmented programs.


  IPMO is comprised of four divisions per the 23-S-3438 IPMO 101 slides (cleared for Open Publication September 27, 2023 by the DoD Office of Prepublication and Security Review) and per the NSI Speaker Series page for Holly''s October 3, 2023 IPMO 101 Speaker Session: 1) Integrated Influence Division, 2) Perception Management Division, 3) Deception Activities Division, and 4) Intel Support to Influence Activities Division. The Integrated Influence Division develops tailored influence guidance focused on specific adversaries and threats; the Perception Management Division develops and executes policy, oversight, and governance related to DoD perception management (reveal/conceal of defense capabilities) programs and activities; the Deception Activities Division develops and executes policy, oversight, and governance related to global DoD deception programs and activities; and the Intel Support to Influence Activities Division develops and executes policy, oversight, and governance related to DoD intelligence support to influence and information programs and activities.


  The Holly Notre Dame memorandum of May 27, 2022 is the available primary source for IPMO''s establishment. Per the NSI Speaker Series page for Holly''s October 3, 2023 IPMO 101 Speaker Session, three Secretaries of Defense, under two administrations, signed off on its establishment. No statutory authority appears in the public record — no NDAA section, no codified provision in 10 or 50 U.S.C., and no DoD Directive or DoD Instruction publicly available. The FY 2023 OSD OP-5 budget submission documents "Develop DoD Issuance Charter for Influence and Perception Management Office" as a development measure with FY 2022 target 1 and FY 2023 target N/A.


  Per the FY 2026 OSD OP-5 budget submission, IPMO is funded under OUSD(I&S) alongside the Defense Military Deception Program Office ([`/organizations/dmdpo`]), the OSD Red Team ([`/organizations/osd-red-team`]), the Strategy Coordination Program Office ([`/organizations/scpo`]), the Counterproliferation of Weapons of Mass Destruction Office ([`/organizations/cp-wmd`]), Advanced Intelligence Capabilities ([`/organizations/aic`]), the Law Enforcement Oversight and Compliance Directorate ([`/organizations/le-oversight-compliance-directorate`]), and AARO ([`/organizations/aaro`]) — established four months after IPMO under the same parent. Sancorp Consulting ([`/organizations/sancorp-consulting`]) provides IPMO Support Services under three prime contracts (HQ003422C0064, HQ003423C0061, HQ003424C0046) awarded by Washington Headquarters Services ([`/organizations/whs`]) Acquisition Directorate as 8(A) Sole Source contracts.

  '
