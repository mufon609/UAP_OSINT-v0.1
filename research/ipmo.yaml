- id: q1
  added_date: '2026-05-02'
  text: |-
    On 01 March 2022, per direction from the Secretary of Defense (SecDef) and Under
    Secretary of Defense for Intelligence and Security (USD(I&S)), the Influence and Perception
    Management Office (IPMO) was established. Among other things, the IPMO is tasked with
    the development of broad thematic messaging guidance and specific strategies for the
    execution of DoD activities designed to influence foreign defense-related decision-makers to
    behave in a manner beneficial to U.S. interests.
  source:
    path: government/notre-dame-ipmo-memo-20220527.pdf
    location: 'p. 1, ¶1 (Notre Dame memo establishment paragraph)'
  significance: 'Holly Notre Dame memo establishment paragraph — primary public attestation of IPMO''s March 1, 2022 establishment by SecDef and USD(I&S) direction, signed by Acting Director James A. Holly on May 27, 2022. Closest available primary source for IPMO establishment; no underlying SecDef or USD(I&S) establishment memo has surfaced.'
  context: 'Notre Dame National Security Innovation Course memorandum, signed by Acting Director James A. Holly, May 27, 2022'
  statement_date: '2022-05-27'
- id: q2
  added_date: '2026-05-02'
  text: 'During the years of IPMO''s creation, three Secretaries of Defense, under two administrations, signed off on its establishment, underscoring the need for this kind of office.'
