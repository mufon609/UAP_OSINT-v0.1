  added_date: '2026-05-02'
  text: |-
    All-domain Anomaly Resolution Office (AARO) - The AARO synchronizes efforts across the Department and with other U.S. Federal
    departments and agencies to detect, identify, and attribute objects of interest in, on, or near military installations, operating areas, training
    areas, special use airspace, and other areas of interest, and, as necessary, to mitigate any associated risks to safety of operations and
    national security. This includes anomalous, unidentified space, airborne, submerged and transmedium objects.
  source:
    path: government/osd-op5-fy24-20260501.pdf
    location: 'OUSD(I&S) program section, sub-office cluster, AARO bullet (complete bullet passage; does not span a page break)'
  significance: 'FY 2024 OSD OP-5 sub-office cluster bullet for AARO — attests AARO''s presence as a sister sub-office under OUSD(I&S) alongside IPMO in the FY 2024 budget framing. By FY 2026 the AARO bullet is no longer in this sub-office cluster; near-identical operational language ("synchronizes efforts across the Department... detect, identify, and attribute objects of interest...") appears under "Advanced Intelligence Capabilities (AIC)" instead — corroborates entity e11''s AARO→AIC budget-document rebrand observation. Anchors the cluster-membership chronology relevant to the description''s "AARO ... established four months after IPMO under the same parent" framing.'
  context: 'OSD OP-5 FY 2024 budget submission, OUSD(I&S) program section, AARO sub-office bullet'
