  added_date: '2026-05-01'
  date: '2024-03-06'
  event: 'Heather King (SES, Secretary of Defense office) emails OSD/PA that the Deputy SecDef flagged the Langley/Breaking Defense story as connected to the AARO HRR rollout. Documents Deputy SecDef office linking JBLE December 2023 drone incursions to AARO HRR Vol I rollout in DoD internal correspondence three months before external reporting (FOIA 24-F-0894).'
  category: other
  source:
    path: government/blackvault-foia-24-f-0894-aaro-vol-1-rollout-emails.pdf
    location: Heather King email to Meagher / Waibel, March 6, 2024 10:19 AM
