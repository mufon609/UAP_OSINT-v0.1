  added_date: '2026-05-01'
  date: '2024-03-06'
  event: 'Pentagon spokesperson Sue Gough emails David A. Kozik (OUSD(I&S) Director Congressional Activities) at 1:45 PM with "Importance: High": "We do not want to see sUAS added to AARO''s portfolio!" Formal AARO PA position contesting Sen. Gillibrand''s same-day request that AARO catalog sUAS incursions (FOIA 24-F-0894).'
  category: other
  source:
    path: government/blackvault-foia-24-f-0894-aaro-vol-1-rollout-emails.pdf
    location: Sue Gough email to David Kozik, March 6, 2024 1:45 PM
- id: t23
  added_date: '2026-05-01'
  date: '2024-03-07'
  event: 'David A. Kozik replies that AARO "absolutely should be involved in cUAS efforts in a *coordinating* role, but they should not/not be the lead", attributing the Gillibrand framing to "a prep failure on our part for ASD HD&HA". Documents direct operational coordination between AARO Public Affairs and OUSD(I&S) Congressional Activities at email-thread level (FOIA 24-F-0894).'
  category: other
  source:
    path: government/blackvault-foia-24-f-0894-aaro-vol-1-rollout-emails.pdf
    location: David Kozik reply email to Gough, March 7, 2024 9:23 AM
