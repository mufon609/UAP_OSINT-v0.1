  source:
    path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
    location: 'Hicks AARO establishment memo, p. 1, ¶3 second bullet'
  note: AAROEXEC is the AARO Executive Council, renamed by the Hicks AARO establishment memo from the predecessor AOIMEXEC. Per the Hicks memo, the mission of the AAROEXEC is to provide oversight and direction to the AARO. Distinct from the parent USD(I&S) reporting line; AAROEXEC is the senior governance body that reviews AARO direction.
