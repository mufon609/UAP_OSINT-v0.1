naming_quirks:
- id: nq1
  added_date: '2026-04-20'
  observed: All-domain
  canonical: All-Domain
  location: Hicks memo + early establishment docs
  source_path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
  resolution: preserve-as-sic-in-quotes
  note: The Hicks establishment memo and the first DoD press release use lowercase 'd' in "All-domain Anomaly Resolution Office". Subsequent DoD press releases (Kirkpatrick departure, Kosloski appointment) use capital 'D' — "All-Domain Anomaly Resolution Office". Both forms appear in source and are preserved verbatim in the quoted passages.
- id: nq3
  added_date: '2026-04-30'
  observed: stand-up
  canonical: stand up
  location: Kirkpatrick biography source — "Dr. Kirkpatrick was asked by USD(I&S) to stand-up and lead AARO in early 2022"
  source_path: government/media-defense-gov-kirkpatrick-biography-20220720.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'Kirkpatrick biography uses hyphenated "stand-up" as a verb form. Description prose now matches source verbatim.'
- id: nq2
  added_date: '2026-04-20'
  observed: Airborne Object Identification and Management Group
  canonical: Airborne Object Identification and Management Synchronization Group
  location: Hicks memo p.1
  source_path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
  resolution: preserve-as-sic-in-quotes
  note: The Hicks memo uses "Airborne Object Identification and Management Group" (drops "Synchronization") when referring to the original November 2021 memorandum title. The AOIMSG press release and its own body use the full "Airborne Object Identification and Management Synchronization Group (AOIMSG)" form. Both are source-attested; quoted passages preserve verbatim.
- id: nq4
  added_date: '2026-05-01'
  observed: 170 meters away from the plume
  canonical: 170 kilometers from the volcano
  location: SASC stenographic transcript (Kosloski oral testimony) vs. AARO unclassified slide deck
  source_path: government/armed-services-senate-gov-aaro-case-slides-20241119.pdf
  resolution: disputed
  note: 'Mt. Etna 2018 case distance figure differs between two same-day primary sources. AARO unclassified slide deck (created Nov 18, 2024 5:24 PM EST) states the object was a balloon "approximately 170 kilometers from the volcano" (slide 6). The SASC stenographic transcript records Kosloski''s oral testimony as "170 meters away from the plume" (transcript page 7-line 886 of stenographic record). Both are AARO-attributed primary sources from the November 19, 2024 SASC hearing. The repository preserves both verbatim quotes and does not adjudicate which figure is correct; the slide deck represents AARO''s pre-prepared written attestation while the transcript captures the spoken oral testimony.'
rumors:
- id: r1
  added_date: '2026-04-20'
  claim: Kirkpatrick's December 2023 departure was driven by conflict with Congressional whistleblower investigators and/or political pressure rather than voluntary retirement
  status: not-primary-source-established
  observed_sources:
  - Circulating in public discourse attributed to unnamed sources and to commentary accompanying the November 2023 departure announcement
  note: The Hicks statement is the only primary-source account of the departure's framing surfaced in the 11-source corpus here; absent conflicting primary evidence, the announcement framing stands as the authoritative public record
- id: r2
  added_date: '2026-04-20'
  claim: AARO's investigatory scope was narrowed or constrained by DoD leadership to exclude access to classified programs that would have contained evidence of UAP reverse-engineering activities
  status: not-primary-source-established
  observed_sources:
  - Widely referenced in public UAP discourse and in commentary on the HRR Vol I findings
  - Explicit claims attributed to witnesses at 2023-07-26 House Oversight hearing and subsequent testimony that is archived in this repository
  note: AARO's own primary sources assert adequate investigatory access; counter-claims live in other archived primary sources. The disagreement is a cross-node analytical finding rather than a gap in AARO's primary record
