created: '2026-04-20'
description: 'The All-domain Anomaly Resolution Office ([`/organizations/aaro`]) is a [`/organizations/dod`] office established on July 15, 2022 by Deputy Secretary of Defense Kathleen Hicks, following the enactment of Section 1683 of the National Defense Authorization Act for Fiscal Year 2022. Per the Hicks memorandum, AARO was established "to carry out the duties that were to be fulfi lled by the AOIMSG"; upon AARO''s establishment, the Secretary of the [`/organizations/us-navy`] was directed to disestablish the Unidentified Aerial Phenomena Task Force ([`/organizations/uaptf`]).


  The Hicks memorandum states AARO "will serve as the authoritative office of the Unidentified Aerial Phenomena (UAP) and UAP-related activities for the DoD" and "is the DoD focal point for all UAP and UAP-related activities". Its mission is to "synchronize efforts across the Department and with other Federal departments and agencies to detect, identify, and attribute objects of interest in, on, or near military installations, operating areas, training areas, special use airspace, and other areas of interest, and, as necessary, to mitigate any associated threats to safety of operations and national security." Scope includes "anomalous, unidentified space, airborne, submerged, and transmedium objects."


  The Unidentified Aerial Phenomena Task Force was established on August 4, 2020 by Deputy Secretary of Defense David L. Norquist; the Airborne Object Identification and Management Synchronization Group ([`/organizations/aoimsg`]) was established on November 23, 2021 as the successor to the UAPTF and renamed to AARO in July 2022. AARO operates in coordination with the Office of the Director of National Intelligence ([`/organizations/odni`]).


  Dr. Sean M. Kirkpatrick ([`/people/sean-kirkpatrick`]) was asked by USD(I&S) to stand-up and lead AARO in early 2022; he led the office through December 2023. Timothy A. Phillips ([`/people/tim-phillips`]) assumed the duties of the Deputy Director (Acting Director) in October 2023. Dr. Jon T. Kosloski ([`/people/jonathan-kosloski`]) arrived on detail from the National Security Agency ([`/organizations/nsa`]) to be appointed the director in 2024. AARO published its [`/documents/aaro-historical-record-report-vol-i`] in March 2024. The Hicks establishment memorandum also renamed the predecessor AOIMEXEC to the AARO Executive Council ([`/organizations/aaroexec`]) — its mission, per the memorandum, is "to provide oversight and direction to the AARO."


  On November 19, 2024 Kosloski appeared before the Senate Armed Services Subcommittee on Emerging Threats and Capabilities — his first hearing as AARO Director — presenting three case resolutions: the 2013 Puerto Rico transmedium case (assessed as a pair of balloons or sky lanterns floating at 7 knots over an airport, descending to 200 meters), the 2017 GOFAST video (assessed as an object closer to 13,000 feet rather than near the water, with apparent fast movement explained by parallax), and a 2018 Mt. Etna UAV case (a balloon drifting with the wind, with the slide deck stating "approximately 170 kilometers from the volcano" and the stenographic transcript of Kosloski''s oral testimony stating "170 meters away from the plume"). All three case resolutions were presented at high or moderate confidence with the support of IC and S&T partners.


  AARO is established under the Under Secretary of Defense for Intelligence and Security (USD(I&S); see [`/organizations/ousd-is`]) per the Hicks establishment memorandum, which directs the USD(I&S) to establish the AARO in coordination with the Director of Administration and Management ([`/organizations/da-m`]). Sancorp Consulting, LLC ([`/organizations/sancorp-consulting`]) provides AARO Support Services under prime contracts HQ003422C0094 (signed September 1, 2022) and HQ003424C0096 (signed August 23, 2024), both awarded by Washington Headquarters Services ([`/organizations/whs`]). The contract Performance Work Statement defines task areas including Executive Administrative Support, Strategy, Plans, and Policy Support, Congressional Affairs, Public Affairs, and FOIA Support, Data Architecture Support, Planning, Programming, Budgeting and Executive Support, Reporting Support, and Operations Support; the contract Routing Data Table identifies AARO as the Service Approver and Service Acceptor at DoDAAC HQ0208. The FY 2024 OSD OP-5 budget submission (released June 2023) named the OUSD(I&S) subordinate office "All-domain Anomaly Resolution Office (AARO)" with mission language drawn from the Hicks establishment memorandum; the FY 2025 OSD OP-5 (released March 2024) is the first budget submission to name the same subordinate office "Advanced Intelligence Capabilities (AIC)" with mission language drawn from the same memorandum and the same statutory reporting line to the Deputy Secretary of Defense and the Principal Deputy Director of National Intelligence per 50 U.S.C. § 3373. The FY 2026 OSD OP-5 (released June 2025) retains the AIC name. The public-facing aaro.mil website and subsequent DoD press releases continue to use the AARO name; no public DoD announcement of an AARO renaming has been issued.


  In late July 2023, Deputy Secretary of Defense Hicks ([`/people/kathleen-hicks`]) moved to personally oversee AARO and repositioned Director Kirkpatrick ([`/people/sean-kirkpatrick`]) to report directly to her — per DefenseScoop reporting (Brandi Vincent ([`/people/brandi-vincent`]), August 30, 2023). Hicks took action late that month, partly to help speed up AARO''s launch of the congressionally mandated public website (subsequently launched on August 31, 2023). Per the same reporting, between November 2022 and April 2023, the AARO website launch package had moved back and forth between the OUSD(I&S) Front Office and AARO at least every other week under USD(I&S) Moultrie''s ([`/people/ronald-moultrie`]) request, with AARO regularly coordinating the memo and Kirkpatrick attending several in-person meetings with the under secretary. Hicks''s late-July reorganization placed AARO''s operational reporting line in alignment with 50 U.S.C. § 3373, under which Director, AARO reports to the Deputy Secretary of Defense and the Principal Deputy Director of National Intelligence — and followed within days of the July 26, 2023 House Oversight UAP hearing.


  AARO Historical Record Report Volume I documents KONA BLUE — a proposed UAP recovery and reverse-engineering program brought to AARO''s attention by interviewees who claimed it was a sensitive DHS compartment to cover up the retrieval and exploitation of "non-human biologics." Per the report, KONA BLUE traces its origins to the DIA-managed AAWSAP/AATIP program (cancelled by DIA in 2012); after cancellation, supporters proposed to DHS that they create and fund a new version under a Special Access Program covering UAP investigations, paranormal research and reverse-engineering of "any recovered off-world spacecraft that they hoped to acquire." A Prospective Special Access Program (PSAP) was officially requested but eventually rejected by DHS leadership for lacking merit. The report''s finding: "no extraterrestrial craft or bodies were ever collected" and the SAP "was never approved or stood up, and no data or material was transferred to DHS."


  Historical Record Report Volume I states "AARO will publish Volume II in accordance with the date established in Section 6802 of the National Defense Authorization Act for Fiscal Year 2023" — Section 6802(j) of the Intelligence Authorization Act for Fiscal Year 2023 set the deadline at "Not later than 540 days after the date of the enactment". As of February 25, 2026 (per archived DefenseScoop coverage), AARO has not published Volume II.


  FOIA case 24-F-0894 (released August 26, 2025; 14 pages responsive across five Initial Denial Authorities — Plescow, Lane, Morrison, Rose, and Shockley, drawn from Intelligence and Security, Legislative Affairs, the Office of the Director of National Intelligence, Public Affairs, and the Under Secretary of Defense for Policy) documents Pentagon internal coordination on the March 8, 2024 AARO Historical Record Report Volume I rollout. On March 5, 2024, Pentagon spokesperson Sue Gough ([`/people/sue-gough`]) emailed her ODNI counterpart asking whether DNI/ODNI should be referenced in the press release given that "Dir, AARO reports to PDDNI, too" per 50 U.S.C. § 3373; the ODNI counterpart replied "Confirming that we''re good without any ODNI mention" — the public rollout omitted any ODNI reference, with the omission agreed by both Pentagon and ODNI Public Affairs offices. On March 6, 2024, AARO Acting Director Phillips delivered two classified Hill briefings on the Historical Record Report (Compartmented Annex Brief 1300-1400; TS//SCI Brief 1400-1530), joined in both sessions by Dr. Sean Kirkpatrick ([`/people/sean-kirkpatrick`]) — three months after his December 1, 2023 official AARO departure — and a third (b)(6)-redacted attendee; Hill staff at the Compartmented Annex session asked AARO leadership for "perspectives and recommendations for countering inaccurate or misleading narratives related to UAP based on the review". The same day, PTDO ASD Becky Zimmerman briefed 14 senators (Reed, Wicker, Shaheen, Gillibrand, Ernst, Cramer, Tuberville, Rounds, Schmitt, Cotton, Manchin, Peters, Kaine, and Kelly) on the December events at JBLE; per Lane Bodian''s OSD OASD LA read-out, Sen. Gillibrand had an "animated response" indicating "sUAS should be catalogued by AARO". Sue Gough emailed David A. Kozik ([`/people/david-kozik`]) (OUSD(I&S) Director Congressional Activities) at 1:45 PM with subject "FW: Following up from Unders" and Importance: High flag: "Flagging for you in case you haven''t heard. We do not want to see sUAS added to AARO''s portfolio!" Kozik replied the next morning that AARO "absolutely should be involved in cUAS efforts in a *coordinating* role, but they should not/not be the lead", explaining the Gillibrand "lead role" characterization as "a prep failure on our part for ASD HD&HA". Heather King, of the Secretary of Defense office, separately emailed the OSD PA chain at 10:19 AM that "the Deputy asked us to flag for you that the Langley topic re: Breaking Defense may be connected to the AARO rollout that occurred this week" — the Deputy Secretary of Defense office linked the JBLE drone story to the AARO Historical Record Report rollout in DoD''s own internal correspondence three months before any external reporter drew the connection.


  AARO''s FY 2024 Consolidated Annual Report on Unidentified Anomalous Phenomena, dated November 14, 2024, documents 757 UAP reports received during the May 1, 2023 – June 1, 2024 reporting period (485 occurred during the reporting period; 272 occurred outside of the reporting period between 2021 and 2022 and were not included in previous annual UAP reports). 49 cases were resolved during the reporting period (all to prosaic objects); 243 additional cases were recommended for closure pending peer review; 444 cases lacked sufficient data and were placed in the Active Archive. AARO determined 21 cases merit further analysis by its IC and S&T partners "based on reported anomalous characteristics and/or behaviors."


  Kosloski''s November 19, 2024 Statement for the Record reported AARO has "over 1,600 UAP reports in its holdings from across the U.S. government" to date and stated, "to date, AARO has discovered no verifiable evidence of extraterrestrial beings, activity, or technology." The FY 2024 Annual Report documents the GREMLIN prototype sensor system, developed by Georgia Tech Research Institute ([`/organizations/gtri`]), for detecting, tracking, and characterizing UAP — first test event March 2024 with a 90-day pattern-of-life collection scheduled at a site of national security.


  At the November 13, 2024 House Oversight + Cybersecurity/IT subcommittee hearing "Unidentified Anomalous Phenomena: Exposing the Truth", Subcommittee Chairwoman Nancy Mace ([`/people/nancy-mace`]) (R-S.C.) and Subcommittee Chairman Glenn Grothman ([`/people/glenn-grothman`]) (R-Wis.) delivered opening statements at the joint subcommittee hearing. Mace stated, "We will also hear from the witnesses today allegations of UAP-related misinformation and disinformation by government officials of which they are personally aware and directly experienced." Witnesses submitted written testimony characterizing AARO''s analytic and historical work as flawed. Michael Shellenberger ([`/people/michael-shellenberger`]) wrote that "critics say that AARO''s 63-page history of the US government''s investigation into UAPs since the end of World War II was riddled with factual errors and poor referencing, including to Wikipedia." Shellenberger also wrote that Christopher Mellon ([`/people/christopher-mellon`]) (former Deputy Assistant Secretary of Defense) called the historical records report "the most error-ridden and unsatisfactory government report I can recall reading during or after decades of government service."


  Tim Gallaudet ([`/people/tim-gallaudet`]) (former NOAA Administrator and Navy Rear Admiral) wrote that "AARO needs to explain the inaccuracies and incompleteness31 of AARO''s first historical records report32 so that the Congress can understand: (a) if AARO is failing to meet its Congressional mandate, and (b) under what authority AARO has conducted this and other examples of disinformation." Gallaudet also wrote that during a meeting with "the then acting AARO director and his senior staff" he "was the object of an hours-long influence operation" attempting to disparage well-known UAP reports including the USS Nimitz tic-tac encounter.


  AARO officially reached Full Operational Capability (FOC) as of October 1, 2024 — the start of Fiscal Year 2025. DefenseScoop exclusively confirmed the FOC status on Thursday, December 5, 2024; DOD spokesperson Sue Gough stated AARO "now has the requisite personnel, expertise, facilities and tools to carry out its core mission". The DefenseScoop article comes as Director Kosloski prepares to participate in a classified briefing with the House Oversight and Accountability Committee on Friday, December 6, 2024 — Subcommittee on National Security, the Border, and Foreign Affairs Chairman Glenn Grothman (R-Wis.) requested the briefing.


  On February 19, 2026, President Donald J. Trump posted to TRUTH Social directing the Secretary of War "and other relevant Departments and Agencies, to begin the process of identifying and releasing Government files related to alien and extraterrestrial life, unidentified aerial phenomena (UAP), and unidentified flying objects (UFOs), and any and all other information connected to these highly complex, but extremely interesting and important, matters." DefenseScoop''s February 25, 2026 coverage referenced this as Trump''s "UAP disclosure promise" — the forthcoming executive order with which Secretary of War Pete Hegseth ([`/people/pete-hegseth`]) stated AARO would be in "full compliance".


  In the same DefenseScoop coverage, Jordan Flowers ([`/people/jordan-flowers`]), executive director of the Disclosure Foundation ([`/organizations/disclosure-foundation`]), encouraged the Pentagon to move quickly, pointing to AARO''s "long-overdue" annual and historical reports, anticipated UAP classification guide, and vacant deputy director role.


  On March 31, 2026, the House Oversight and Government Reform Task Force on the Declassification of Federal Secrets ([`/organizations/oversight-task-force-declassification`]), Chairwoman Anna Paulina Luna ([`/people/anna-paulina-luna`]) (R-Fla.), wrote to Secretary of War Hegseth requesting delivery of 46 UAP video files "as soon as possible but no later than April 14, 2026". The letter states that "Whistleblowers informed the Task Force that AARO possesses additional video records of potential UAP sightings" and that "The Task Force has found responses from AARO, when questioned about UAP sightings and provided data, less than adequate." The list includes UAP clips referenced by callsign and date — spherical UAP, transmedium UAP, MQ-9 sightings, and the February 12, 2023 USAF ANG F-16C "shoots down UAP over Lake Huron". Cc: the Honorable Jasmine Crockett, Ranking Member of the Task Force.

  '
