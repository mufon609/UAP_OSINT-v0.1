  significance: 'Pentagon spokesperson Sue Gough (OSD/PA) to David A. Kozik (Director Congressional Activities, OUSD(I&S)) on March 6, 2024 — explicit institutional position that AARO''s portfolio should not be expanded to include small unmanned aircraft systems (sUAS) cataloging despite Sen. Gillibrand''s same-day request at the SASC briefing on JBLE drone incursions. Sent at 1:45 PM with "Importance: High" flag.'
