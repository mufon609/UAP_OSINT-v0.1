rumors:
- id: r1
  added_date: '2026-04-20'
  claim: Kirkpatrick's December 2023 departure was driven by conflict with Congressional whistleblower investigators and/or political pressure rather than voluntary retirement
  status: not-primary-source-established
  observed_sources:
  - Circulating in public discourse attributed to unnamed sources and to commentary accompanying the November 2023 departure announcement
  note: The Hicks statement is the only primary-source account of the departure's framing surfaced in the 11-source corpus here; absent conflicting primary evidence, the announcement framing stands as the authoritative public record
- id: r2
  added_date: '2026-04-20'
  claim: AARO's investigatory scope was narrowed or constrained by DoD leadership to exclude access to classified programs that would have contained evidence of UAP reverse-engineering activities
  status: not-primary-source-established
  observed_sources:
  - Widely referenced in public UAP discourse and in commentary on the HRR Vol I findings
  - Explicit claims attributed to witnesses at 2023-07-26 House Oversight hearing and subsequent testimony that is archived in this repository
  note: AARO's own primary sources assert adequate investigatory access; counter-claims live in other archived primary sources. The disagreement is a cross-node analytical finding rather than a gap in AARO's primary record
