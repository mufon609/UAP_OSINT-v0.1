  text: |-
    Thanks Sue—yeah, there's a bit of challenge here. AARO absolutely should be involved in cUAS efforts in a *coordinating* role, but they should not/not be the lead. The problem is, the rest of DoD doesn't always think to include them even in the coordinating role—or forgets to mention that they're part of the team when they're engaging certain members of Congress who are convinced they must be part of the team.
  source:
    path: government/blackvault-foia-24-f-0894-aaro-vol-1-rollout-emails.pdf
    location: 'David A. Kozik reply email to Sue Gough, March 7, 2024 9:23 AM, Subject "RE: Following up from Unders"'
  significance: 'David A. Kozik (Director Congressional Activities, OUSD(I&S)) reply to Gough on March 7, 2024 — establishes OUSD(I&S)''s institutional position that AARO has a coordinating but not lead role in counter-sUAS efforts, and attributes the Sen. Gillibrand "lead role" framing to a "prep failure on our part for ASD HD&HA" (Becky Zimmerman) at the prior-day SASC briefing. Confirms operational coordination between AARO Public Affairs (Gough) and OUSD(I&S) Congressional Activities (Kozik) on AARO''s Hill-facing scope.'
  context: 'FOIA 24-F-0894, David Kozik (OUSD(I&S) Director Congressional Activities) reply email to Sue Gough, March 7, 2024 9:23 AM'
  statement_date: '2024-03-07'
