    location: 'USAspending record HQ003422C0094, recipient field'
  note: Sancorp Consulting LLC provides AARO support services under prime contracts HQ003422C0094 (initial 2022, \$4,061,786.51) and HQ003424C0096 (follow-on 2024, \$3,471,829.40). Performance Work Statement defines eight task areas including Executive Administrative Support, Strategy/Plans/Policy Support, Congressional Affairs/Public Affairs/FOIA Support, Data Architecture, Planning/Programming/Budgeting/Executive Support, Reporting Support, and Operations Support.
