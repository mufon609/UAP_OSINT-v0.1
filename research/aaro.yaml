  text: |-
    Deputy Defense Secretary Kathleen Hicks recently moved to personally oversee the Pentagon’s unidentified anomalous phenomena (UAP) investigation team formally known as the All-domain Anomaly Resolution Office, DefenseScoop has exclusively learned. And a new website will soon be launched where incidents can be reported.
  source:
    path: news/defensescoop-hicks-aaro-oversight-20230830.html
    location: 'article body, ¶ following byline'
  significance: 'DefenseScoop exclusive (Brandi Vincent, August 30, 2023) reporting that AARO''s operational reporting line transitioned from OUSD(I&S) (USD(I&S) Moultrie) to direct Deputy Secretary of Defense (Hicks) oversight in late July 2023 — within days of the July 26, 2023 House Oversight UAP hearing. Co-anchored with the website-launch announcement.'
  context: 'DefenseScoop, "Hicks takes direct oversight of Pentagon''s UAP office; new reporting website to be launched", August 30, 2023'
  statement_date: '2023-08-30'
- id: q58
  added_date: '2026-05-01'
  text: |-
    Hicks now holds regular meetings with AARO’s inaugural director, Sean Kirkpatrick — who she’s also repositioned to report directly to her.
  source:
    path: news/defensescoop-hicks-aaro-oversight-20230830.html
    location: 'article body, ¶3'
  significance: 'Specific attestation that Kirkpatrick was repositioned to report directly to the Deputy Secretary of Defense — clarifying the operational reporting-chain change. Per 50 U.S.C. § 3373, AARO''s statutory operational reporting line is to DEPSECDEF and PDDNI; the late-July 2023 transition gave that statutory structure operational effect.'
  context: 'DefenseScoop August 30, 2023 reporting on Hicks''s late-July 2023 reporting-chain change'
  statement_date: '2023-08-30'
- id: q59
  added_date: '2026-05-01'
  text: |-
    Between November 2022 and April 2023, that submitted package moved back and forth between the I&S front office and AARO at least every other week. At Moultrie’s request, AARO regularly responded to questions, made edits and re-coordinated the memo. And Kirkpatrick also had several in-person meetings with the undersecretary.
  source:
    path: news/defensescoop-hicks-aaro-oversight-20230830.html
    location: 'article body, AARO website-launch timeline section'
  significance: 'Documents OUSD(I&S) Front Office / AARO operational friction during the November 2022 – April 2023 period — the AARO website-launch package was iterated bi-weekly between OUSD(I&S) Front Office and AARO under USD(I&S) Moultrie''s direct review. Establishes the operational tension that preceded Hicks''s late-July 2023 direct-oversight transition.'
  context: 'DefenseScoop August 30, 2023 reporting; Kirkpatrick attribution'
  statement_date: '2023-08-30'
- id: q60
  added_date: '2026-05-01'
  text: |-
    All-domain Anomaly Resolution Office (AARO) - The AARO synchronizes efforts across the Department and with other U.S. Federal departments and agencies to detect, identify, and attribute objects of interest in, on, or near military installations, operating areas, training areas, special use airspace, and other areas of interest, and, as necessary, to mitigate any associated risks to safety of operations and national security. This includes anomalous, unidentified space, airborne, submerged and transmedium objects.
  source:
    path: government/osd-op5-fy24-20260501.pdf
    location: 'OSD OP-5 FY 2024 Operation and Maintenance Budget Estimates, OUSD(I&S) program section'
  significance: 'FY 2024 OSD OP-5 budget submission (released June 2023) names the OUSD(I&S) sub-office "All-domain Anomaly Resolution Office (AARO)" with mission language essentially identical to AARO''s 50 U.S.C. § 3373 statutory carveout — same mission text that the FY 2025 and FY 2026 budget submissions later attribute to "Advanced Intelligence Capabilities (AIC)". Anchors the FY24-vs-FY25 budget-document name change.'
  context: 'OSD OP-5 FY 2024 budget, OUSD(I&S) program section'
  statement_date: '2023'
- id: q61
  added_date: '2026-05-01'
  text: |-
    Advanced Intelligence Capabilities (AIC) synchronizes efforts across the Department and with other U.S. Federal departments and agencies to detect,
                identify, and attribute objects of interest in, on, or near military installations, operating areas, training areas, special-use airspace, and other areas of
                interest, and, as necessary, to mitigate any associated risks to the safety of operations and national security. This includes anomalous, unidentified
                space, airborne, submerged, and transmedium objects.
  source:
    path: government/osd-op5-fy25-20260501.pdf
    location: 'OSD OP-5 FY 2025 Operation and Maintenance Budget Estimates, OUSD(I&S) program section'
  significance: 'FY 2025 OSD OP-5 budget submission (released March 2024) is the first OSD OP-5 release to name the OUSD(I&S) sub-office "Advanced Intelligence Capabilities (AIC)" rather than "All-domain Anomaly Resolution Office (AARO)" — narrows the budget-document rename window to between FY24 OP-5 (March 2023) and FY25 OP-5 (March 2024). Mission text is substantively identical to the FY24 AARO program description and to the Hicks AARO establishment memo. Same OUSD(I&S) sub-office under a different budget-document name.'
  context: 'OSD OP-5 FY 2025 budget, OUSD(I&S) program section, Defense-Wide intelligence and security narrative'
  statement_date: '2024'
