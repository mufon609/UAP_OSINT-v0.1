  added_date: '2026-05-01'
  text: 'A case that we thought would be a transmedium case as it was reported, is well-known on the outside, known as the Puerto Rico case. It was data collected in 2013, when a Customs and Border Patrol aircraft observed an object flying near an airport in Puerto Rico.'
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20241119.pdf
    location: 'p. 14, lines 9-13'
  significance: Kosloski Nov 19 2024 SASC testimony — frames the Puerto Rico case (2013 Customs and Border Patrol observation near airport)
  context: AARO Director Jonathan Kosloski first SASC Subcommittee on Emerging Threats and Capabilities hearing testimony, November 19, 2024
  statement_date: '2024-11-19'
- id: q22
  added_date: '2026-05-01'
  text: 'So we assessed that the object, likely a pair of balloons or sky lanterns, was floating at about 7 knots over the airport and descending to about 200 meters.'
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20241119.pdf
    location: 'p. 15, lines 4-7'
  significance: Kosloski case resolution — Puerto Rico 2013 transmedium case assessed as a pair of balloons or sky lanterns floating over the airport at 7 knots, descending to 200 meters; the apparent transmedium behavior was an infrared-imaging artifact when water temperature matched object temperature
  context: AARO Director Kosloski Nov 19 2024 SASC testimony, Puerto Rico case-resolution explanation
  statement_date: '2024-11-19'
- id: q23
  added_date: '2026-05-01'
  text: 'The GOFAST captured the public attention and congressional attention when it was made public in 2017. It looks like an object flying very fast over the water, very close to the water. Through a very careful geospatial intelligence analysis, using trigonometry, we assessed with high confidence that the object is not actually close to the water but is rather closer to 13,000 feet.'
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20241119.pdf
    location: 'p. 15, lines 9-15'
  significance: Kosloski case resolution — GOFAST (2017 publicly released video) assessed with high confidence as an object at approximately 13,000 feet altitude rather than close to the water; apparent fast motion is parallax / a trick of the eye when a high-altitude object is imaged from a closer-altitude platform
  context: AARO Director Kosloski Nov 19 2024 SASC testimony, GOFAST case-resolution explanation
  statement_date: '2024-11-19'
- id: q24
  added_date: '2026-05-01'
  text: 'An interesting case, which I do not believe the public is familiar with, is captured in 2018 from a UAV flying in the Mediterranean, watching Mt. Etna as it was erupting. And it appears that that object is flying through the plume of superheated gas and ash.'
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20241119.pdf
    location: 'p. 15, lines 22-25 to p. 16, line 1'
  significance: Kosloski introduces the 2018 Mt. Etna UAV case — AARO captured object that appeared to be flying through the plume of an erupting volcano in the Mediterranean
  context: AARO Director Kosloski Nov 19 2024 SASC testimony, Mt. Etna case-resolution introduction
  statement_date: '2024-11-19'
- id: q25
  added_date: '2026-05-01'
  text: 'This was a rather difficult case to resolve. We had to pull in support from a number of IC and S&T partners, and even reach out to a volcanologist. And through very detailed 3D modeling and pixel-by-pixel analysis of the object as it is traversing across the clouds, they assessed that the object was actually 170 meters away from the plume and not flying through it.'
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20241119.pdf
    location: 'p. 16, lines 2-8'
  significance: Kosloski case resolution — Mt. Etna 2018 case resolved through 3D modeling and pixel-by-pixel analysis with IC, S&T, and volcanologist support; object was 170 meters away from the plume, not flying through it
  context: AARO Director Kosloski Nov 19 2024 SASC testimony, Mt. Etna case-resolution
  statement_date: '2024-11-19'
- id: q26
  added_date: '2026-05-01'
  text: 'And to be clear, AARO does not believe every object is a bird, a balloon, or a UAV. We do have some very anomalous objects.'
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20241119.pdf
    location: 'p. 16, lines 9-11'
  significance: Kosloski clarifying that AARO acknowledges genuinely anomalous cases remain in the corpus — case resolutions reflect what AARO can presently resolve, not a categorical denial of unexplained phenomena
  context: AARO Director Kosloski Nov 19 2024 SASC testimony, framing remarks following the Mt. Etna case-resolution
  statement_date: '2024-11-19'
