  event: 'OSD OP-5 FY 2025 budget submission (released March 2024) names the OUSD(I&S) sub-office "Advanced Intelligence Capabilities (AIC)" — first budget release to use AIC rather than "AARO". Mission language substantively identical to FY 2024 OP-5 AARO description. AARO public name preserved on aaro.mil and in DoD press releases; no DoD renaming announcement.'
  category: other
  source:
    path: government/osd-op5-fy25-20260501.pdf
    location: OSD OP-5 FY 2025 OUSD(I&S) program section
