  - id: q7
    added_date: '2026-04-30'
    text: |
      On 01 March 2022, per direction from the Secretary of Defense (SecDef) and Under
                 Secretary of Defense for Intelligence and Security (USD(I&S)), the Influence and Perception
                 Management Office (IPMO) was established. Among other things, the IPMO is tasked with
                 the development of broad thematic messaging guidance and specific strategies for the
                 execution of DoD activities designed to influence foreign defense-related decision-makers to
                 behave in a manner beneficial to U.S. interests.
    source:
      path: government/notre-dame-ipmo-memo-20220527.pdf
      location: 'p. 1, ¶1 (signed by James A. Holly, Acting Director, IPMO)'
    significance: 'IPMO Notre Dame memo, signed by James A. Holly, Acting Director, May 27, 2022 — documents IPMO''s March 1, 2022 establishment by direction from SecDef and USD(I&S), and IPMO''s tasking with thematic messaging guidance and influence strategies.'
    statement_date: '2022-05-27'
  - id: q8
    added_date: '2026-04-30'
    text: |
      Counter-insider threat was developed by the Office of the Undersecretary of Defense for Intelligence and
      Security (OUSDI&S). Like counterterrorism, “counter-insider threat” supports the philosophy that programs need
      an operational approach in execution and are not simply “policies and governance.” Several DoD organizations
      have adopted this approach; however, no policy exists which dictates naming conventions for Programs.
    source:
      path: news/insa-naming-convention-20220900.pdf
      location: 'p. 4, COUNTER-INSIDER THREAT section'
    significance: 'INSA September 2022 Naming Convention paper, p. 4 Counter-Insider Threat section — credits OUSD(I&S) as the developer of counter-insider-threat doctrine.'
    statement_date: '2022-09'
  - id: q9
    added_date: '2026-04-30'
    text: |
      March 2021 - SANCORP Joins the Intelligence and National Security Alliance (INSA). INSA is a nonpartisan, nonprofit trade association for driving public-private partnerships to advance intelligence and national security priorities with more than 150 industry corporate partners and hundreds of individuals. Team SANCORP is participating in various groups including the Insider Threat Subcommittee.
    source:
      path: news/sancorp-careers-20260430.html
      location: 'Company News page, March 2021 entry'
    significance: 'Sancorp Company News, March 2021 entry — INSA membership announcement and Insider Threat Subcommittee participation.'
