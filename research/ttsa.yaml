  note: Majority shareholder — Gravity Holdings LLC (whose sole member is the DeLonge Family Trust) holds 52.16% of Class A Common Stock outstanding per the fiscal year 2024 Form 1-K filed April 17 2025. The June 1 2021 Binding Term Sheet Amendment issued 784,970 shares at $1.20 per share to DeLonge to be held by Gravity Holdings LLC, consolidating the ownership concentration.
