description: 'To The Stars Academy of Arts and Science Inc. ([`/organizations/ttsa`]) is a Delaware Public Benefit Corporation founded in 2017 by Tom DeLonge ([`/people/tom-delonge`]), Dr. Harold E. Puthoff ([`/people/hal-puthoff`]), and Jim Semivan ([`/people/jim-semivan`]), at 1051 S. Coast Hwy 101 Suite B, Encinitas, California ([`/locations/encinitas-california`]). Its science and aerospace division was retired in the February 2021 reorganization; the Company amended its name to "To The Stars Inc." in November 2021 and now operates with a focus on entertainment. The company launched a Regulation A offering qualified by the United States Securities and Exchange Commission on July 10, 2017, offering up to 10,000,000 shares of Class A Common Stock at $5.00 per share with a $50,000,000 maximum raise. TTSA acquired To The Stars, Inc. ([`/organizations/to-the-stars-inc`]), an existing business that now comprises the company''s Entertainment Division, as a wholly-owned subsidiary during formation, and organized operations into three divisions — Entertainment, Aerospace, and Science.


  The company launched publicly on October 11, 2017. On December 16, 2017 — two months after the TTSA launch — the New York Times published an article about the Pentagon''s Advanced Aerospace Threat Identification Program ([`/organizations/aatip`]) by Helene Cooper ([`/people/helene-cooper`]), Ralph Blumenthal ([`/people/ralph-blumenthal`]), and Leslie Kean ([`/people/leslie-kean`]). Former Pentagon military intelligence official Luis Elizondo ([`/people/luis-elizondo`]) left his Pentagon post to join the company, describing his prior role as running "a sensitive aerospace threat identification program focusing on unidentified aerial technologies"; he served as Director of Global Security and Special Programs. Steve Justice ([`/people/steve-justice`]), a former Program Director for Advanced Systems at Lockheed Martin''s Skunk Works ([`/organizations/lockheed-martin-skunk-works`]), directed the Aerospace Division and later served as COO; Chris Mellon ([`/people/christopher-mellon`]), a former Deputy Assistant Secretary of Defense for Intelligence, served as National Security Affairs Advisor. Jim Semivan is a retired Central Intelligence Agency ([`/organizations/cia`]) Senior Intelligence Service officer. The company''s Advisory Board disclosed in the 2017 SEC filing included Chris Mellon, Adele Gilpin, Dr. Norman Kahn, Dr. Colm Kelleher ([`/people/colm-kelleher`]), Dr. Garry Nolan ([`/people/garry-nolan`]), and Dr. Paul Rapp. In 2016, an email from Tom DeLonge to John Podesta ([`/people/john-podesta`]) referenced retired USAF Lt. General William N. McCasland ([`/people/william-mccasland`]) as having helped assemble the advisory team, with DeLonge describing McCasland as the former commander of the Air Force Research Laboratory at Wright-Patterson Air Force Base ([`/organizations/wright-patterson-afb`]).


  TTSA''s Aerospace Division announced The ADAM Research Project (Acquisition and Data Analysis of Materials) in July 2018 under Puthoff''s leadership. By late September 2018, TTSA publicly reported it had collected seven pieces of material, from multiple sources, to study for The ADAM Research Project; the most widely discussed specimen — a layered metallic sample primarily composed of magnesium, zinc, and bismuth — was the subject of a TTSA blog post dated September 27, 2018. On October 1, 2019 (with public announcement October 17), TTSA and the U.S. Army ([`/organizations/us-army`]) Combat Capabilities Development Command Ground Vehicle Systems Center ([`/organizations/ccdc-ground-vehicle-systems-center`]) executed Cooperative Research and Development Agreement 19-15 titled Novel and Emerging Technology Exploitation, committing approximately $750,000 in estimated U.S. Government resources to assess TTSA''s materiel and technology innovations across metamaterials, quantum physics, quantum communications, and beamed energy propulsion. The CRADA named Elizondo as TTSA''s Principal Investigator and Dr. Joseph Cannon ([`/people/joseph-cannon`]) and Ben Soave as the Army''s. Subsequent to the TTSA–DEVCOM CRADA, the All-domain Anomaly Resolution Office ([`/organizations/aaro`]), founded in 2022, contracted Oak Ridge National Laboratory ([`/organizations/ornl`]) to independently assess and perform thorough characterization studies on the specimen; ORNL''s April 2024 Synopsis and AARO''s July 2024 Supplement concluded the material is terrestrial in origin and "consistent with Mg alloy research and development projects and experimental manufacturing methods in the mid-20th century." An earlier aerospace research company run by Robert Bigelow ([`/organizations/bigelow-aerospace`]) was the Pentagon program''s principal funding recipient per the 2017 Times article.


  In late 2020 the Company''s original science and aerospace principals — Elizondo, Mellon, and Justice — left the Company; the fiscal year 2021 Form 1-K (April 2022) described Elizondo as a former company employee and Mellon as former chairman of the scientific advisory board. On December 24, 2020, TTSA executed a Binding Term Sheet selling Love Movie LLC ([`/organizations/love-movie-llc`]) to DeLonge for $525,000 and terminating the AvA Licensing Agreement. In February 2021 the Company announced a strategic reorganization "scaling back initiatives in science and tech commercialization" and refocused on film and television; the science and technology division — Space-Time Metric Engineering, Beamed Energy Propulsion Launch Systems, SCOUT, VAULT, and the A.D.A.M. Research Project — was described as "now retired" in the fiscal year 2021 Form 1-K. The Encinitas office and retail lease was mutually terminated April 1, 2021. On June 1, 2021 a Binding Term Sheet Amendment converted $941,964 of DeLonge payments into 784,970 shares held by Gravity Holdings LLC ([`/organizations/gravity-holdings-llc`]). On September 18, 2021 the Company''s Third Regulation A offering terminated (a Fourth qualified March 31, 2022 but raised no funds). On November 30, 2021 the Company amended its name from "To The Stars Academy Of Arts and Science Inc." to "To The Stars Inc." to better reflect its focus on entertainment; both names are maintained as registered trademarks. The subsequent 315 S. Coast Highway 101 Suite U38 Encinitas address is used for mail only. These events are documented in the TTSA fiscal year 2021 Form 1-K ([`/documents/sec-ttsa-1k-2021`]) filed May 2, 2022.


  CRADA 19-15 with the U.S. Army ended in 2024. In September 2024, the Company sent Dr. Hal Puthoff and Dr. Eric Davis ([`/people/eric-davis`]), its own scientists, to meet with the laboratory to discuss the results in more detail; a memorandum by Puthoff and Davis to the Board of Directors was published on the Company website in February 2025. The Puthoff/Davis analysis (and the ORNL analysis) did not reveal any form of proof of exotic (Extraterrestrial, Ultra-terrestrial, or inter-dimensional) origin, but it did not absolutely rule it out either.


  The 2024 Form 1-K received a going concern qualification from independent auditors. Gravity Holdings LLC (whose sole member is the DeLonge Family Trust) holds 52.16% of Class A Common Stock outstanding. Current board (as of the April 17, 2025 1-K filing) includes Tom DeLonge, Jim Semivan, Stan Spry ([`/people/stan-spry`]), and J. Christopher Mizer ([`/people/j-christopher-mizer`]); current Advisory Board includes Dr. Adele Gilpin, Dr. Norman Kahn, Joe Schurman, Dr. Paul Rapp, Chris Herndon, and Dr. Harold E. Puthoff (moved from board to Advisory Board by April 2022).

  '
