  added_date: '2026-04-22'
  person_path: /people/tom-delonge
  role: Founder, President, and interim Chief Executive Officer
  period_start: '2017-02'
  period_end: '2022'
  leadership_class: director
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: p. 31
  note: Founder of the company and principal investor; President of TTS subsidiary since 2015. Title changed during the 2020 and 2021 corporate restructuring — by the fiscal year 2021 Form 1-K filed April 2022 the role changed from "Founder, President, and interim CEO" (2017 1-A) to "Founder, Chairman of the Board and Interim Chief Executive Officer"; the President title moved to Kari DeLonge of the TTSM subsidiary.
- id: kp1b
  added_date: '2026-04-22'
  person_path: /people/tom-delonge
  role: Founder, Chairman of the Board, and interim Chief Executive Officer
  period_start: '2022'
  leadership_class: director
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Directors/Officers section, Thomas DeLonge listing
  note: Title change confirmed by the fiscal year 2021 Form 1-K (April 2022); role subsequently confirmed in the fiscal year 2024 Form 1-K (April 2025). "Interim" has appeared in the CEO title across all eight years of the Company's operation.
- id: kp2
  added_date: '2026-04-22'
  person_path: /people/hal-puthoff
  role: Co-Founder and Vice President Science and Technology
  period_start: '2017'
  period_end: '2022'
  leadership_class: director
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: p. 31
  note: President and CEO of EarthTech International, Inc. (ETI), and Director of the Institute for Advanced Studies at Austin (IASA) since 1985. Per the fiscal year 2021 Form 1-K filed April 30 2022, Puthoff had recently left his position on the Company's board of directors to serve on the Advisory Board — dated to early 2022 by this language.
- id: kp2b
  added_date: '2026-04-22'
  person_path: /people/hal-puthoff
  role: Advisory Board member (transitioned from Board of Directors)
  period_start: '2022'
  leadership_class: advisor
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Advisory Board roster
  note: Puthoff moved from the Board of Directors to the Advisory Board by early 2022; confirmed in the fiscal year 2021 Form 1-K filed April 30 2022. EarthTech International and Institute for Advanced Studies at Austin positions continue since 1985.
- id: kp3
  added_date: '2026-04-22'
  person_path: /people/jim-semivan
  role: Co-Founder and Vice President Operations
  period_start: '2017'
  leadership_class: director
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: p. 31
  note: Retired from the Central Intelligence Agency's Directorate of Operations after 25 years as an operations officer; member of the Senior Intelligence Service.
- id: kp4
  added_date: '2026-04-22'
  person_path: /people/luis-elizondo
  role: Director of Global Security and Special Programs
  period_start: '2017-10'
  period_end: '2021'
  leadership_class: staff
  source:
    path: news/tothestarsacademy-home-20180108.html
    location: TTSA 2018 homepage Team section
  note: Career intelligence officer whose experience includes working with the U.S. Army, the Department of Defense, the National Counterintelligence Executive, and the Director of National Intelligence; ran a sensitive aerospace threat identification program focusing on unidentified aerial technologies. The fiscal year 2021 Form 1-K (April 2022) described Elizondo as "former company employee" — confirming departure by early 2022. A more specific date (reportedly December 20, 2020 Coast to Coast AM announcement) is not in the sources this artifact has cited.
- id: kp5
  added_date: '2026-04-22'
  person_path: /people/steve-justice
  role: Aerospace Division Director (later COO)
  period_start: '2017'
  period_end: '2021'
  leadership_class: director
  source:
    path: news/tothestarsacademy-home-20180108.html
    location: TTSA 2018 homepage Team section
  note: Former Lockheed Martin Skunk Works Program Director for Advanced Systems. The February 2021 strategic reorganization (per fiscal year 2021 Form 1-K) reduced the science and tech initiatives and retired the science and technology division of which Justice's Aerospace Division was part; Justice is not listed on the current Directors table as of the April 2022 fiscal year 2021 1-K filing.
- id: kp6
  added_date: '2026-04-22'
  person_path: /people/christopher-mellon
  role: National Security Affairs Advisor; former chairman of the scientific advisory board
  period_start: '2017'
  period_end: '2021'
  leadership_class: advisor
  source:
    path: news/tothestarsacademy-home-20180108.html
    location: TTSA 2018 homepage Team section
  note: Former Deputy Assistant Secretary of Defense for Intelligence; former Staff Director of Senate Select Committee on Intelligence. The fiscal year 2021 Form 1-K (April 2022) described Mellon as "former chairman of the scientific advisory board" — role changed from "National Security Affairs Advisor" in the 2018 TTSA website to chairman of the scientific advisory board by the time of his departure. Not listed on the current Advisory Board as of the April 2022 1-K filing.
- id: kp7
  added_date: '2026-04-22'
  person_path: /people/garry-nolan
