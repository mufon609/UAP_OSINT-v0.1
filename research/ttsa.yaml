quotes:
- id: q1
  added_date: '2026-04-22'
  text: |
    The company is a Public Benefit Corporation founded in 2017 by a former senior Intelligence Officer with the CIA, a distinguished research scientist, and an award-winning artist with the goal of creating a dynamic consortium that can be a positive vehicle for change by supporting progressive thought through academic research, exotic engineering, and cinematic entertainment.
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: "Part II, ¶ 'Description of Business', p. 2"
  significance: TTSA's self-description as a Delaware Public Benefit Corporation spanning academic research, exotic engineering, and cinematic entertainment.
- id: q2
  added_date: '2026-04-22'
  text: |
    TTS AAS was incorporated in February 2017, and although the Entertainment Division conducted through our subsidiary TTS has been conducted for several years, we are intending to expand into completely new businesses.
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: p. 7, 'Risk Factors'
  significance: Primary-source founding date — TTSA incorporated February 2017; Entertainment Division inherited from pre-existing To The Stars, Inc. (TTS) subsidiary.
- id: q3
  added_date: '2026-04-22'
  text: |
    Tom DeLonge is the founder, President, and interim CEO of the company.  He is also President of the company's subsidiary, TTS, and has been since 2015.
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: p. 31, 'Directors, Executive Officers and Significant Employees'
  significance: DeLonge's TTSA leadership role (Founder, President, interim CEO) and his prior TTS presidency since 2015.
- id: q4
  added_date: '2026-04-22'
  text: |
    The company's Advisory Board consists of accomplished scientists, researchers, inventors, and former intelligence and governmental officials with a proven track record of success in their respective fields. The Advisory Board is Chris Mellon, Adele Gilpin, Dr. Norman Kahn, Dr. Colm Kelleher, Dr. Garry Nolan, and Dr. Paul Rapp.
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: p. 33, 'Advisory Board'
  significance: Full Advisory Board roster as of the 2017 SEC filing — six named members.
- id: q5
  added_date: '2026-04-22'
  text: |
    General McCasland He mentioned he's a "skeptic", he's not. I've been working with him for four months. I just got done giving him a four hour presentation on the entire project a few weeks ago. Trust me, the advice is already been happening on how to do all this. He just has to say that out loud, but he is very, very aware- as he was in charge of all of the stuff. When Roswell crashed, they shipped it to the laboratory at Wright Patterson Air Force Base. General McCasland was in charge of that exact laboratory up to a couple years ago. He not only knows what I'm trying to achieve, he helped assemble my advisory team. He's a very important man.
  source:
    path: news/wikileaks-podesta-email-3099-delonge-mccasland-20160125.html
    location: "Email body, Subject: 'General McCasland', 2016-01-25"
  significance: DeLonge's on-record attribution to retired Lt. Gen. William N. McCasland of pre-TTSA advisory-team assembly; primary-source chain of custody claim regarding 1947 Roswell material and Wright-Patterson AFB laboratory.
- id: q6
  added_date: '2026-04-22'
  text: |
    Most of the money went to an aerospace research company run by a billionaire entrepreneur and longtime friend of Mr. Reid's, Robert Bigelow, who is currently working with NASA to produce expandable craft for humans to use in space.
  source:
    path: news/nyt-glowing-auras-pentagon-ufo-20171216.html
    location: NYT article, 2017-12-16
  significance: NYT's framing of Bigelow Aerospace as the Pentagon program's contractor — context for TTSA's positioning as a successor commercial vehicle for former-program personnel.
- id: q7
  added_date: '2026-04-22'
  text: |
    Elizondo left his Pentagon post to join To The Stars Academy of Arts & Science, a consortium of scientists, aerospace engineers and creatives founded by company President and CEO Tom DeLonge, VP of Science and Technology Dr. Hal Puthoff (also quoted in the Times story) and = VP of Operations Jim Semivan. The principals include Aerospace Division Director Steve Justice and National Security Affairs Advisor Chris Mellon. The company launched this past October with a mission to explore exotic science and technologies to rapidly transition innovative ideas into world-changing products and services.
  source:
    path: news/tothestarsacademy-home-20180108.html
    location: TTSA homepage news section, Dec 16 2017 press release
  significance: TTSA's own framing of the Elizondo-joining event and the full principal/advisor roster as of late 2017.
- id: q8
  added_date: '2026-04-22'
  text: |
    To The Stars Academy of Arts & Science Announces The ADAM Research Project, an Academic Research Program Focused on Exotic Materials for Technology Innovation
  source:
    path: news/ttsa-blog-adam-research-project-intro-20180727.html
    location: Blog post title, 2018-07-26
  significance: Primary source for the ADAM Research Project announcement — exact program title and purpose as stated by TTSA at launch.
- id: q9
  added_date: '2026-04-22'
  text: |
    Over the last three months, To The Stars Academy has collected seven pieces of material, from multiple sources, to study for The ADAM Research Project.
  source:
    path: news/ttsa-blog-material-of-interest-magnesium-zinc-bismuth-20180929.html
    location: Blog post body, 2018-09-27
  significance: TTSA's on-record claim of seven material samples collected between approximately June and September 2018 — quantifies the ADAM material inventory at the specimen-announcement date.
- id: q10
  added_date: '2026-04-22'
  text: |
    To The Stars Academy of Arts & Science (TTSA) announced today a Cooperative Research and Development Agreement (CRADA) with the U.S. Army Combat Capabilities Development Command to advance TTSA's materiel and technology innovations in order to develop enhanced capabilities for Army ground vehicles.
  source:
    path: news/tothestarsacademy-home-20200105.html
    location: TTSA homepage news, Oct 17 2019 press release
  significance: TTSA's announcement of the U.S. Army CCDC CRADA — public-facing statement of the partnership.
- id: q11
  added_date: '2026-04-22'
  text: |
    TTSA's technology solutions, which leverage developments in material science, space-time metric engineering, quantum physics, beamed energy propulsion, and active camouflage, have the potential to enhance survivability and effectiveness of multiple Army systems.
  source:
    path: news/tothestarsacademy-home-20200105.html
    location: TTSA homepage news, Oct 17 2019 press release
  significance: TTSA-stated technology areas brought to the Army CRADA — matches the Government Activity scope in the actual CRADA document.
- id: q12
  added_date: '2026-04-22'
  text: |
    To the Stars Academy of Arts and Science is a company with materiel and technology Innovations that offer capability advancements for Army ground vehicles. These technology innovations have been acquired, designed, and produced by the Collaborator, leveraging advancements in metamateiiais and quantum physics to push performance gains. The Collaborator will share their Innovations with the Government, who will use its laboratories and resources to characterize the technologies and determine if they have appropriate applications on ground vehicles.
  source:
    path: government/army-ttsa-crada-19-15-nete-20191001.pdf
    location: CRADA 19-15, Section II, Article A - Project Description
  significance: Primary-source Army-side description of TTSA's role as Collaborator and the scope of the CRADA. OCR artifact preserved verbatim ('metamateiiais').
- id: q13
  added_date: '2026-04-22'
  text: |
    The Government is interested in a variety of the Collaborator's technologies, such as, but not limited to inertial mass reduction mechanical/struefural metamateriais, electromagnetic metamaterial wave guides, quantum physics, quantum communications, and beamed energy propulsion,
  source:
    path: government/army-ttsa-crada-19-15-nete-20191001.pdf
    location: CRADA 19-15, Article D.1, Government Activity
  significance: Primary-source enumeration of the specific TTSA technologies the U.S. Army committed to test and characterize. OCR artifacts preserved ('struefural metamateriais').
- id: q14
  added_date: '2026-04-22'
  text: |
    The other contributors for this effort are:
       1) The Office of the Secretary of Defense (OSD) can share historical reports of findings and origin of materiel solutions in the possession of the Collaborator,
  source:
    path: government/army-ttsa-crada-19-15-nete-20191001.pdf
    location: CRADA 19-15, Article C.2, Other Participants
  significance: Primary-source documentation of the Office of the Secretary of Defense's explicit contractual role — OSD can share historical reports on origin of TTSA's material. Evidentiary link to AATIP-era records.
- id: q15
  added_date: '2026-04-22'
  text: |
    Experimentation on Alleged Extraterrestrial Spacecraft Sample: AARO has concluded that a sample from an alleged crashed off-world spacecraft that AARO acquired from a private UAP investigating organization and the U.S. Army is a manufactured, terrestrial alloy and does not represent off-world technology or possess any exceptional qualities.
  source:
    path: government/aaro-hrr-volume-1-20240308.pdf
    location: AARO HRR Vol I, Section V Executive Summary findings
  significance: AARO's explicit acquisition-from-TTSA-plus-Army statement and its core conclusion on the material — terrestrial manufactured alloy, Mg-Zn-Bi composition.
- id: q16
  added_date: '2026-04-22'
  text: |
    The U.S. Army had also conducted in-house analysis on the sample, and while AARO generally agrees with its conclusions, AARO found that the structure was not purely layered magnesium alloy and bismuth.
  source:
    path: government/aaro-hrr-volume-1-20240308.pdf
    location: AARO HRR Vol I, material-analysis subsection
  significance: AARO HRR Vol I's explicit confirmation that the U.S. Army conducted in-house analysis on the sample before AARO — the CRADA-era work.
- id: q17
  added_date: '2026-04-22'
  text: |
    Previously, US Army Combat Capabilities Development Command (DEVCOM) established a Cooperative Research and Development Agreement (CRADA) with To the Stars Academy (TTSA) to evaluate the feasibility of exploiting any potential disruptive technology associated with this widely discussed specimen.
  source:
    path: government/aaro-ornl-synopsis-metallic-specimen-202404.pdf
    location: Synopsis Introduction, p. 1
  significance: AARO/ORNL's explicit statement that the TTSA-DEVCOM CRADA preceded AARO's involvement with the specimen.
- id: q18
  added_date: '2026-04-22'
  text: |
    Subsequent to the TTSA–DEVCOM CRADA, AARO secured science and technology partner Oak Ridge National Laboratory (ORNL), one of 17 US Department of Energy national laboratories, to independently assess and perform thorough characterization studies on the specimen
  source:
    path: government/aaro-ornl-synopsis-metallic-specimen-202404.pdf
    location: Synopsis Introduction, p. 1
  significance: Primary-source naming of ORNL as AARO's materials-testing partner, chronologically following the TTSA-DEVCOM CRADA.
- id: q19
  added_date: '2026-04-22'
  text: |
    In 2022, The All-domain Anomaly Resolution Office (AARO) contracted with Oak Ridge National Laboratory (ORNL) to conduct materials testing on a magnesium (Mg) alloy specimen. This specimen has been publicly alleged to be a component recovered from a crashed extraterrestrial vehicle in 1947, and purportedly exhibits extraordinary properties, such as functioning as a terahertz waveguide to generate antigravity capabilities.
  source:
    path: government/aaro-supplement-to-ornl-analysis-202407.pdf
    location: Supplement, Overview section, p. 1
  significance: AARO Supplement's explicit 2022 AARO-ORNL contract date and the public allegations (1947 crash recovery, terahertz waveguide / antigravity).
- id: q20
  added_date: '2026-04-22'
  text: |
    ORNL assessed this specimen to be terrestrial in origin and that it does not meet the theoretical requirements to function as a terahertz (THz) waveguide. AARO concurs with ORNL's assessment and provides this supplementary material to add historical context to account for its likely origin. The specimen's characteristics are consistent with Mg alloy research and development projects and experimental manufacturing methods in the mid-20th century.
  source:
    path: government/aaro-supplement-to-ornl-analysis-202407.pdf
    location: Supplement, Overview section, p. 1
  significance: AARO's final concurrence with ORNL's terrestrial-origin finding and AARO's contextualization of the specimen as mid-20th-century Mg alloy R&D material.
