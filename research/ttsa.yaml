  leadership_class: advisor
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: p. 33
  note: Listed as an Advisory Board member in the 2017 SEC Form 1-A filing.
- id: kp8
  added_date: '2026-04-22'
  person_path: /people/colm-kelleher
  role: Advisory Board member
  period_start: '2017'
  leadership_class: advisor
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: p. 33
  note: Advisory Board member per the 2017 SEC filing.
- id: kp9
  added_date: '2026-04-22'
  person_path: /people/kari-delonge
  role: Chief Marketing and Product Officer (TTS subsidiary)
  period_start: '2011'
  period_end: '2022'
  leadership_class: staff
  source:
    path: government/sec-ttsa-1a-partii-20170710.html
    location: p. 32
  note: Chief Marketing and Product Officer for company's subsidiary TTS; sister of Tom DeLonge; has served in this position since the company's inception in 2011. By the fiscal year 2021 Form 1-K filed April 30 2022 she is listed as Chief Content Officer of the parent company and President of TTSM, showing that the prior Chief Marketing and Product Officer role at TTS ended no later than early 2022.
- id: kp9b
  added_date: '2026-04-22'
  person_path: /people/kari-delonge
  role: Chief Content Officer for the Company and President of To The Stars Media Inc.
  period_start: '2022'
  leadership_class: staff
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Directors/Officers section, Kari DeLonge role listing
  note: Current role — Chief Content Officer at the parent Company plus President of the TTSM subsidiary (To The Stars Media Inc.). Role confirmed in both the fiscal year 2021 1-K (April 2022) and fiscal year 2024 1-K (April 2025) filings; the 2022 start reflects the earliest source that states the new title in this artifact.
- id: kp10
  added_date: '2026-04-22'
  person_path: /people/j-christopher-mizer
  role: Director
  period_start: '2019-05-14'
  leadership_class: director
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Directors/Officers section, J. Christopher Mizer listing
  note: Appointed to indefinite term of office on May 14, 2019 per the fiscal year 2021 1-K. Director as of the fiscal year 2024 1-K (April 2025) filing. Affiliated with Vivaris Capital.
- id: kp11
  added_date: '2026-04-22'
  person_path: /people/stan-spry
  role: Director
  period_start: '2021-06-14'
  leadership_class: director
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Directors/Officers section, Stan Spry listing
  note: Appointed to indefinite term of office on June 14, 2021 per the fiscal year 2021 1-K. Director as of the fiscal year 2024 1-K (April 2025) filing. Founded Cartel Pictures (terminated December 2024) and renamed it Evoke Entertainment LLC; the fiscal year 2021 1-K documents TTSA's March 24, 2021 co-production agreement with Cartel Pictures.
