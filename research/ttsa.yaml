- id: q24
  added_date: '2026-04-22'
  text: |
    In 2019, we entered into a Cooperative Research and Development Agreement ("CRADA") with the U.S. Army's Combat Capabilities Development Command ("USACCDC") to advance developments in material science, space-time metric engineering, quantum physics, beamed energy propulsion and active camouflage. After the pandemic halted research for most of 2020 and 2021, in 2022, the USACCDC continued to focus on testing the anomalous materials that we provided to them (the "Materials") in order to determine the possible uses in a military or civilian environment.
  source:
    path: government/sec-ttsa-1k-partii-20250417.html
    location: SEC 1-K FY2024, CRADA subsection
  significance: TTSA FY2024 1-K — CRADA scope 2019-2022, pandemic delay, USACCDC testing of the "anomalous materials"
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2024, filed April 17, 2025'
  statement_date: '2025-04-17'
- id: q25
  added_date: '2026-04-22'
  text: |
    In 2022, The All-domain Anomaly Resolution Office (AARO), an office within the United States Office of the Secretary of Defense, was congressionally mandated to explore historical records of Unidentified Anomalous Phenomena ("UAP") incidents and publicly report its findings. As part of their oversight and through the CRADA, Oak Ridge National Laboratory (ORNL) was tasked with conducting the Materials analysis to assess whether the specimen is of terrestrial origin and the bismuth in the specimen could act as a terahertz waveguide.
  source:
    path: government/sec-ttsa-1k-partii-20250417.html
    location: SEC 1-K FY2024, AARO / ORNL subsection
  significance: TTSA FY2024 1-K — material-custody chain from TTSA through USACCDC CRADA to AARO oversight and ORNL analysis
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2024, filed April 17, 2025'
  statement_date: '2025-04-17'
- id: q26
  added_date: '2026-04-22'
  text: |
    In April 2024, ORNL produced a summary of findings that concluded the Materials to be terrestrial in origin and that it does not meet the theoretical requirements to function as a terahertz (THz) waveguide. The Company was pleased that the ORNL and AARO completed their analysis and while the report offers suggestions as to the possible provenance of the Mg-Bi material, it did not offer a firm conclusion as to the origin and purpose of the Materials along with other seeming anomalies.  Consequently, the Company had more questions, and in September 2024, we sent Dr. Hal Puthoff and Dr. Eric Davis, our own scientists, to meet with the laboratory to discuss the results in more detail. In February 2025, the Company published a memorandum by Dr. Hal Puthoff and Dr. Eric Davis to our board of directors on its website about their findings.
  source:
    path: government/sec-ttsa-1k-partii-20250417.html
    location: SEC 1-K FY2024, AARO / ORNL subsection
  significance: TTSA FY2024 1-K — Puthoff/Davis September 2024 ORNL visit and February 2025 counter-memorandum to the TTSA Board of Directors
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2024, filed April 17, 2025'
  statement_date: '2025-04-17'
- id: q27
  added_date: '2026-04-22'
  text: |
    In the end, both the report and memorandum did not reveal any form of proof of exotic (Extraterrestrial, Ultra-terrestrial, or inter-dimensional) origin, but it did not absolutely rule it out either.
  source:
    path: government/sec-ttsa-1k-partii-20250417.html
    location: SEC 1-K FY2024, AARO / ORNL subsection
  significance: TTSA FY2024 1-K — Puthoff/Davis analysis result, neither confirming exotic origin nor ruling it out
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2024, filed April 17, 2025'
  statement_date: '2025-04-17'
- id: q28
  added_date: '2026-04-22'
  text: |
    The CRADA ended in 2024 and the Company is committed to continually seeking to have research and analysis conducted on all Material received by it in an effort to determine the differences between what is ordinary and what is extraordinary.
  source:
    path: government/sec-ttsa-1k-partii-20250417.html
    location: SEC 1-K FY2024, AARO / ORNL subsection
  significance: Primary-source confirmation that CRADA 19-15 ended in 2024, and TTSA's post-CRADA stated mission continuity.
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2024, filed April 17, 2025'
  statement_date: '2025-04-17'
- id: q29
  added_date: '2026-04-22'
  text: |
    'To The Stars' and 'To The Stars Academy of Arts and Science' are registered trademarks of the Company.
  source:
    path: government/sec-ttsa-1k-partii-20250417.html
    location: SEC 1-K FY2024, Intellectual Property section
  significance: TTSA FY2024 1-K — both "To The Stars" and "To The Stars Academy of Arts and Science" maintained as registered trademarks after the November 2021 name amendment
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2024, filed April 17, 2025'
  statement_date: '2025-04-17'
- id: q30
  added_date: '2026-04-22'
  text: |
    Dr. Hal Puthoff and Dr. Eric Davis's analysis was completed and submitted to the Board of Directors on the 27th of September with a recommendation that we hold off publishing their report until a specified additional scientific contributor weighs in.
  source:
    path: news/ttsa-puthoff-davis-ornl-analysis-memo-20250228.html
    location: TTSA 'TTS* Analysis on ORNL Report' blog post, 2025-02-28
  significance: TTSA's on-record blog-post acknowledgment that the Puthoff/Davis internal memo was submitted to the Board on September 27, 2024, with initial publication delayed pending input from another scientific contributor (never received).
  context: 'TTSA website blog post, ''TTS* Analysis on ORNL Report'', February 28, 2025'
  statement_date: '2025-02-28'
- id: q31
  added_date: '2026-04-22'
  text: |
    What is important about the Puthoff/Davis report, however, is that they were able to clarify aspects of the ORNL report that were not clear while also confirming that the material, natural as it may be, is still a bit of an unknown quantity.  In the end though, the Puthoff/Davis analysis (and the ORNL analysis) did not reveal any form of proof of exotic (Extraterrestrial, Ultra-terrestrial, or inter-dimensional) origin, but it did not absolutely rule it out either.
  source:
    path: news/ttsa-puthoff-davis-ornl-analysis-memo-20250228.html
    location: TTSA 'TTS* Analysis on ORNL Report' blog post, 2025-02-28, body
  significance: Puthoff/Davis counter-analysis published by TTSA — confirms no proof of exotic origin while framing as "did not absolutely rule it out"
  context: 'TTSA website blog post, ''TTS* Analysis on ORNL Report'', February 28, 2025'
  statement_date: '2025-02-28'
- id: q32
  added_date: '2026-04-22'
  text: |
    To The Stars Academy of Arts and Science Inc. (the "company") has determined to terminate the offering for shares of its Class A Common Stock. No further subscriptions will be accepted for the current offering after September 18, 2021. Subscriptions in the offering will be accepted up to and including that date and processed as promptly as possible.
  source:
    path: government/sec-ttsa-253g2-reg-a-termination-20210917.html
    location: SEC Form 253(g)(2) Supplement dated September 17, 2021, File No. 024-11243
  significance: Primary-source termination of TTSA's Regulation A+ offering effective September 18, 2021 — ends the $50M crowdfunding chapter of the company's 2017-2021 capital-raising history.
  context: 'SEC Form 253(g)(2) Supplement (File No. 024-11243), September 17, 2021'
  statement_date: '2021-09-17'
- id: q33
  added_date: '2026-04-22'
  text: |
    Kari DeLonge is the Chief Content Officer for the Company and the President of the Company's subsidiary To The Stars Media Inc. She served as Chief Marketing and Product Officer of company subsidiary TTS since its inception in 2011, overseeing worldwide media launches including Billboard Top 200 albums, critically acclaimed independent films and award-winning books.
  source:
    path: government/sec-ttsa-1k-partii-20250417.html
    location: SEC 1-K FY2024, Directors/Officers section, Kari DeLonge bio
  significance: Primary-source confirmation of Kari DeLonge's current dual role (Chief Content Officer of the parent Company + President of the TTSM subsidiary) and the 2011-origin Chief Marketing and Product Officer role at the TTS subsidiary she held previously.
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2024, filed April 17, 2025'
  statement_date: '2025-04-17'
- id: q34
  added_date: '2026-04-22'
  text: |
    Dr. Harold E. Puthoff is a co-founder of the Company, and recently left his position on the Company's board of directors to serve on our Advisory Board. Prior to joining us in in 2017, Dr. Puthoff was, and still is, President and CEO of EarthTech International, Inc. (ETI), and Director of the Institute for Advanced Studies at Austin (IASA), positions he has held since 1985.
  source:
    path: government/sec-ttsa-1k-partii-20250417.html
    location: SEC 1-K FY2024, Advisory Board / Puthoff bio
  significance: Puthoff — TTSA Board of Directors to Advisory Board transition by early 2022; concurrent EarthTech International Presidency and IASA directorship since 1985 (OCR preserves "in in 2017")
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2024, filed April 17, 2025'
  statement_date: '2025-04-17'
- id: q35
  added_date: '2026-04-22'
  text: |
    On November 30, 2021, the Company amended its name from "To The Stars Academy Of Arts and Science Inc.," to "To The Stars Inc." in order to better reflect the Company's focus on entertainment.
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Item 1 and Note 1 to Financial Statements
  significance: Primary-source corporate-action date of the name amendment — November 30, 2021 — and the company's own stated reason ("to better reflect the Company's focus on entertainment"). Replaces the imprecise "by 2024" framing used in prior versions of this artifact.
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
- id: q36
  added_date: '2026-04-22'
  text: |
    In February 2021, the Company announced a strategic reorganization that will allow it to build on the momentum of the businesses where we are seeing the highest success to accelerate growth in our entertainment initiatives. To achieve our goals, we have refocused our operations by scaling back initiatives in science and tech commercialization and are placing a greater emphasis on developing and producing content in film and TV.
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Item 1 Business strategic reorganization passage
  significance: February 2021 strategic reorganization — TTSA scales back science and tech commercialization, refocuses on film/TV (nine months before the November 2021 name amendment)
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
- id: q37
  added_date: '2026-04-22'
  text: |
    In 2020, after COVID-19 was declared a national emergency, we saw a significant standstill in the science and technology initiatives that were part of our now retired science and technology division. This includes Space-Time Metric Engineering, Beamed Energy Propulsion Launch Systems, SCOUT, VAULT and A.D.A.M., due to the U.S. Government shifting focus and priorities as well as laboratories being closed down.
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Operations overview
  significance: TTSA FY2021 1-K — science and technology division retired (Space-Time Metric Engineering, Beamed Energy Propulsion Launch Systems, SCOUT, VAULT, A.D.A.M.)
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
- id: q38
  added_date: '2026-04-22'
  text: |
    The series featured an interview with former military intelligence official and former company employee, Luis Elizondo, who ran the program and former chairman of the scientific advisory board and Deputy Assistant Secretary of Defense for Intelligence, Chris Mellon.
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Item 1 Business, discussion of Unidentified series
  significance: TTSA FY2021 1-K — Elizondo "former company employee" and Mellon "former chairman of the scientific advisory board" by April 2022
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
- id: q39
  added_date: '2026-04-22'
  text: |
    On April 1, 2021, the Company mutually terminated its lease to its Encinitas office and retail location with the landlord.
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Item 1 Business, operations passage
  significance: TTSA FY2021 1-K — Encinitas office and retail lease mutually terminated April 1, 2021
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
- id: q40
  added_date: '2026-04-22'
  text: |
    The Company entered into the Binding Term Sheet, dated December 24, 2020, under which the Company sold Love Movie LLC and its intellectual property to Thomas DeLonge, for total consideration of $525,000 comprising $125,000 and forgiveness of debt amounting to $400,000 of unpaid Minimum Royalty Guarantees under the AvA Licensing Agreement (dated April 26, 2017, and amended in a side letter dated August 29, 2020).
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Related Party Transactions — Binding Term Sheet
  significance: December 24, 2020 Binding Term Sheet — TTSA sells Love Movie LLC to DeLonge for $525,000 ($125k cash + $400k debt forgiveness)
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
- id: q41
  added_date: '2026-04-22'
  text: |
    On June 1, 2021, the Company entered into an Amendment to the Binding Term Sheet with Mr. DeLonge, whereby, the Company agreed to terminate the previous services agreement with Mr. DeLonge and ceased to provide any services to Mr. DeLonge. Along with the termination of the services, Mr. DeLonge agreed to provide a capital contribution to the Company in exchange for common stock of the Company. The Company and Mr. DeLonge agreed that the total capital contribution was $941,964 for payments made on behalf of the Company through June 30, 2021. In exchange for the capital contribution the Company will issue Mr. DeLonge 784,970 shares of its common stock at a price per share of $1.20 to be held by Gravity Holdings, LLC.
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Related Party Transactions — BTS Amendment
  significance: June 1, 2021 Binding Term Sheet Amendment — DeLonge $941,964 capital contribution converts to 784,970 shares at $1.20/share held by Gravity Holdings LLC
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
- id: q42
  added_date: '2026-04-22'
  text: |
    The Third Offering was paused on December 18, 2020 while the Company took time to review operations. The offering terminated in September 2021. The Company qualified for a fourth Regulation A offering on March 31, 2022 and has yet to raise funds as of the date of this filing.
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Regulation A Offerings history
  significance: TTSA Reg A offerings — Third Offering paused December 18, 2020 and terminated September 2021; Fourth Offering qualified March 31, 2022, no funds raised
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
- id: q43
  added_date: '2026-04-22'
  text: |
    On February 27, 2022, the Company entered into a consulting agreement with Exchange Listing, LLC ("Exchange Listing"), under which Exchange Listing will provide advisory and capital market services with the goal of enabling the Company to list its securities on the Nasdaq or NYSE (the "Advisory Agreement"). The Advisory Agreement compensates Exchange Listing, in part, with the sale of the Company's Class A Common Stock in an amount equivalent to 255,654 shares, or 2% of the outstanding shares, for par value price of $0.001 per share, for a total purchase price of $256.
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Note 15 Related Party Transactions — Exchange Listing Advisory Agreement
  significance: Exchange Listing Advisory Agreement — February 27, 2022 signing; 255,654 Class A shares at par value + warrants for 250,000 shares at $2.00 exercise; Nasdaq/NYSE listing goal by January 19, 2024
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
- id: q44
  added_date: '2026-04-22'
  text: |
    In the event the Company's securities are not listed on Nasdaq or the NYSE by January 19, 2024 all Class A Common Stock will be returned to the Company.
  source:
    path: government/sec-ttsa-1k-partii-20220502.html
    location: SEC 1-K FY2021, Exchange Listing Advisory Agreement reversion clause
  significance: Exchange Listing Advisory Agreement reversion clause — if not listed on Nasdaq/NYSE by January 19, 2024, all Class A Common Stock returned to the Company
  context: 'SEC Form 1-K Annual Report for fiscal year ended December 31, 2021, filed May 2, 2022'
  statement_date: '2022-05-02'
