rumors:
- id: r1
  added_date: '2026-04-22'
  claim: TTSA possesses or possessed physical debris from an off-world crashed spacecraft recovered in 1947 (widely attributed to the Roswell incident).
  status: primary-source-disputed
  observed_sources:
  - DeLonge's 2016-01-25 email to Podesta referencing Roswell and Wright-Patterson AFB (primary-source claim made by DeLonge himself, not independently verified)
  - Public discourse around the ADAM Research Project specimen (widely reported in UAP-focused media 2018-2024)
  - Public discourse around the TTSA-DEVCOM CRADA material
  note: |
    AARO HRR Volume I (March 2024) and the AARO/ORNL Synopsis (April 2024) and AARO Supplement (July 2024) together refute the extraterrestrial-origin claim for the specific magnesium-zinc-bismuth specimen that TTSA transferred through the DEVCOM CRADA to AARO. ORNL's characterization found the material is 'terrestrial in origin' and 'does not meet the theoretical requirements to function as a terahertz waveguide'. AARO's Supplement concludes the specimen 'is consistent with Mg alloy research and development projects and experimental manufacturing methods in the mid-20th century'. The 1947-crash provenance claim is not primary-source-supported by any document archived in this repository. TTSA's own counter-analysis — the Puthoff/Davis memorandum submitted to the TTSA Board on September 27, 2024 and published February 28, 2025 — concurs that the analysis 'did not reveal any form of proof of exotic (Extraterrestrial, Ultra-terrestrial, or inter-dimensional) origin' while qualifying that it 'did not absolutely rule it out either.' TTSA's published corporate position therefore does not endorse the 1947-extraterrestrial claim. The FY2021 Form 1-K (April 2022) additionally describes TTSA's science and technology division — including A.D.A.M. — as 'now retired', documenting the company's own disclosure that the material-analysis research framework ended with the February 2021 strategic reorganization.
- id: r2
  added_date: '2026-04-22'
  claim: Retired Lt. Gen. William N. McCasland personally facilitated TTSA's founding-era advisory team and had insider knowledge of recovered UAP material at Wright-Patterson Air Force Base.
  status: not-primary-source-established
  observed_sources:
  - DeLonge's 2016-01-25 email to Podesta (WikiLeaks Podesta emails #3099)
  - Public discourse about the TTSA-McCasland relationship
  note: |
    The sole primary-source attestation of McCasland's advisory-team role is DeLonge's own 2016 email to Podesta. McCasland has not publicly confirmed or denied the claim, and no independent primary-source documentation of his TTSA involvement is archived in this repository. The Podesta email itself is primary-source-authentic (SPF/DMARC/DKIM validated in the raw source), but it documents DeLonge's claim about McCasland, not McCasland's own statements.
