  added_date: '2026-04-20'
  added_by_iteration: i0
  text: In 2019, the UAPTF director tasked me to identify all Special Access Programs & Controlled Access Programs (SAPs/CAPs) we needed to satisfy our congressionally mandated mission.
  source:
