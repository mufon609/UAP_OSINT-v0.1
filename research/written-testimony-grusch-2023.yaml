  added_by_iteration: i0
  text: It is with a heavy heart and a determined spirit that I stand, under oath, before you today, having made the decision based on the data I collected, and reported, to provide this information to the committee. I am driven in this duty by a conviction to expose what I viewed as a grave congressional oversight issue and a potential abuse of executive branch authorities.
  source:
