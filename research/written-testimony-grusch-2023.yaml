  significance: SAPs/CAPs tasking — 2019 directive from UAPTF director to identify relevant compartmented programs
  context: institutional role
- id: q9
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: At the time, due to my extensive executive-level intelligence support duties, I was cleared to literally all relevant compartments and in a position of extreme trust in both my military and civilian capacities.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
