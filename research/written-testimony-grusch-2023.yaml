  text: My name is David Charles Grusch. I was an intelligence officer for 14 years, both in the US Air Force (USAF) at the rank of Major and most recently, from 2021-2023, at the National Geospatial-Intelligence Agency at the GS-15 civilian level, which is the military equivalent of a full-bird Colonel.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶3
  significance: Opening — identity, rank, agencies, service span
  context: opening statement
- id: q2
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: I was my agency’s co-lead in Unidentified Anomalous Phenomena (UAP) and trans-medium object analysis, as well as reporting to UAP Task Force (UAPTF) and eventually the All-Domain Anomaly Resolution Office (AARO).
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶3
  significance: UAP-specific role — NGA co-lead; UAPTF and AARO reporting
  context: opening statement
