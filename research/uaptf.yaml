  note: DoD PA attribution via Gough statement is the strongest on-record government attestation. Corroborated by Americans for Safe Aerospace advisors listing ("Ex Director, UAP Task Force"). Exact period dates not specified by primary source — see research_gap g2.
- id: kp2
  added_date: '2026-04-20'
  person_path: /people/travis-taylor
  role: Chief Scientist (informal designation, time-limited SMDC assignment)
  leadership_class: advisor
  source:
    path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
    location: A1 response from DoD spokesperson Susan Gough
  note: Per Gough, Taylor remained a government employee of U.S. Army Space and Missile Defense Command (SMDC) and was provided to UAPTF on a time-limited basis; "chief scientist" designation was informal.
- id: kp3
  added_date: '2026-04-20'
  person_path: /people/david-grusch
  role: Member (in his National Reconnaissance Office reservist capacity)
  period_start: '2019'
  period_end: '2021'
  leadership_class: staff
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶8
  note: Grusch's sworn written testimony attests "I was a member of the UAPTF from 2019-2021" in his NRO reservist capacity. The 2019 start date predates UAPTF's formal August 4, 2020 establishment by approximately one year, indicating either an informal pre-2020 task force / ONI UAP cell that was retroactively formalized as UAPTF, or that Grusch testified to continuous Task-Force-equivalent membership spanning the informal-to-formal transition. The April 16, 2020 UAP Security Classification Guide also predates the public August 2020 establishment, corroborating a pre-2020 operational lineage.
