iterations:
- id: i0
  date: '2026-04-20'
  trigger: initial-build
  summary: |
    First real-content gov-kind organization node post-F.5c/AARO; second organization node overall. 11 archived primary sources spanning the DoD establishment press release, the FOIA-released UAP Security Classification Guide (April 16, 2020, Naval Intelligence Activity) and UAPTF Charter (September 1, 2020, Naval Intelligence Activity), the ODNI Preliminary Assessment (UAPTF's flagship output), the 2022-05-17 HPSCI transcript (Bray/Moultrie testimony on UAPTF transition), the Hicks AARO memorandum (UAPTF disestablishment directive), the AOIMSG and AARO establishment press releases (successor-chain attestation), Senate Report 116-233 (IAA FY2021 "Advanced Aerial Threats" — Senate on-record UAPTF reference at ONI), a June 2022 Black Vault article carrying the DoD Public Affairs (Gough) statement naming John Stratton as UAPTF lead and Dr. Travis Taylor as informal Chief Scientist, and the Americans for Safe Aerospace home page corroborating Stratton as "Ex Director, UAP Task Force".

    11 Key Passages — establishment (Norquist approval + Navy/USD(I&S) placement; mission statement), UAP SCG identifying UAPTF at Office of Naval Intelligence (April 2020, pre-public-announcement), UAPTF Charter Congressional mandate + DSD direction (Sept 2020), Charter Purpose and NIA-designates-leadership language, ODNI Preliminary Assessment Director accountability + UAPTF drafting body + cross-agency contributor list, Senate Report 116-233 Advanced Aerial Threats UAPTF@ONI, Gough Stratton/Taylor statement, Hicks memo UAPTF disestablishment directive.

    3 key_personnel — Stratton (director, 2020-2022 approximate, DoD PA attribution via Gough), Travis Taylor (advisor / informal Chief Scientist, time-limited SMDC assignment), David Grusch (staff, 2019-2021, sworn written testimony primary source). Karl Nell logged as rumors r1 pending primary source.

    3 org_relationships — AOIMSG successor, AARO successor, ODNI partner. Parent attested via parent_organization_path (/organizations/oni); Naval Intelligence Activity captured in description and entities_referenced.

    9 timeline entries tracing UAP SCG issuance (pre-public-announcement April 2020) through UAPTF establishment → Charter signing → ODNI assessment → AOIMSG successor → Gough statement → Hicks memo disestablishment → AARO succession.

    11 entities_referenced, 2 naming_quirks (John / Jay Stratton; Unidentified Aerial Phenomena vs Anomalous terminology shift), 6 research_gaps (Norquist memo full text, Stratton exact dates, UAPTF staffing/budget, Karl Nell primary source, EXCOM governance, exact disestablishment date), 2 rumors (Nell role; scope-constraint allegations).
