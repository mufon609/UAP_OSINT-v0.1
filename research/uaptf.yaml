naming_quirks:
- id: nq1
  added_date: '2026-04-20'
  added_by_iteration: i0
  observed: John Stratton
  canonical: Jay Stratton
  location: Gough DoD PA statement (Q1 answer)
  source_path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
  resolution: preserve-as-sic-in-quotes
  note: The DoD Public Affairs statement uses Stratton's legal first name "John"; the canonical form used in secondary sources (memoir announcement, podcast appearances, Americans for Safe Aerospace advisor listing) is the nickname "Jay". Both forms are source-attested; quoted passages preserve the "John" form verbatim.
- id: nq2
  added_date: '2026-04-20'
  added_by_iteration: i0
  observed: Unidentified Aerial Phenomena
  canonical: Unidentified Aerial Phenomena
  location: UAPTF name across all primary sources
  source_path: government/defense-gov-uaptf-establishment-20200814.html
  resolution: use-canonical
  note: UAPTF era uses "Unidentified Aerial Phenomena" (plural); later AARO-era documents use "Unidentified Anomalous Phenomena". The terminology shift tracks with the AARO scope expansion to include space, submerged, and transmedium objects per the Hicks memorandum. UAPTF's own naming remains "Unidentified Aerial Phenomena Task Force" in all of its primary sources.
research_gaps:
- id: g1
  added_date: '2026-04-20'
  added_by_iteration: i0
  statement: Locate the full text of the Norquist memorandum approving UAPTF establishment (August 4, 2020)
  methodology: The DoD press release of August 14, 2020 attests the memorandum's existence but the memorandum text itself has not been publicly released in the sources reviewed. FOIA the Department of the Navy or OUSD(I&S) for the memorandum; monitor Black Vault FOIA document archive for subsequent releases
  resolved: false
- id: g2
  added_date: '2026-04-20'
  added_by_iteration: i0
  statement: Establish Jay Stratton's exact UAPTF period start and end dates from primary source
  methodology: The Gough DoD PA statement (June 2022) uses past tense ("was leading") and refers to Stratton as "former Office of Naval Intelligence senior civilian" — implying Stratton had departed ONI by June 2022 but does not specify period dates. Secondary sources place him as first Director from 2019. Cross-reference with his forthcoming memoir (William Morrow / HarperCollins) if published
  resolved: false
- id: g3
  added_date: '2026-04-20'
  added_by_iteration: i0
  statement: Determine UAPTF staffing, budget, and internal organizational structure
  methodology: Not publicly documented in the 11 primary sources archived for i0. The UAPTF Charter (September 2020) is heavily redacted on focus areas, detailed responsibilities, and member-agency participation details. Cross-reference with DoD budget submissions, congressional appropriations language, and future FOIA releases
  resolved: false
- id: g4
  added_date: '2026-04-20'
  added_by_iteration: i0
  statement: Confirm Karl Nell's role as Army liaison / Army Director supporting UAPTF (2021-2022) from a primary source
  methodology: Nell's role is attested in multiple secondary sources (Americans for Safe Aerospace advisor listing, Debrief article, SALT bio); no primary source archived in the REFACTOR corpus confirms it. Target FOIA releases from the U.S. Army, Nell's own retirement / service record, or on-record congressional testimony
  resolved: false
