quotes:
- id: q1
  added_date: '2026-04-20'
  text: On Aug. 4, 2020, Deputy Secretary of Defense David L. Norquist approved the establishment of an Unidentified Aerial Phenomena (UAP) Task Force (UAPTF). &nbsp;The Department of the Navy, under the cognizance of the Office of the Under Secretary of Defense for Intelligence and Security, will lead the UAPTF.
  source:
    path: government/defense-gov-uaptf-establishment-20200814.html
    location: article body ¶1
  significance: Establishment — Norquist approval + Navy/USD(I&S) placement
  context: DoD press release, August 14, 2020
  statement_date: '2020-08-14'
- id: q2
  added_date: '2026-04-20'
  text: The Department of Defense established the UAPTF to improve its understanding of, and gain insight into, the nature and origins of UAPs. &nbsp;The mission of the task force is to detect, analyze and catalog UAPs that could potentially pose a threat to U.S. national security.
  source:
    path: government/defense-gov-uaptf-establishment-20200814.html
    location: article body ¶2
  significance: Mission statement — detect, analyze, catalog UAPs
  context: DoD press release, August 14, 2020
  statement_date: '2020-08-14'
- id: q3
  added_date: '2026-04-20'
  text: 'This classification guide is issued for the purpose of identifYing specific topics

    of information associated with the Office of Naval Intelligence, Unidentified Aerial Phenomenon

    (UAP) Task Force that meet the standards and criteria for classification and protection in

    accordance with Executive Order (E.O.) 13526, "Classified National Security Information," as

    amended, and its implementing directives.'
  source:
    path: government/blackvault-uap-security-classification-guide-20200416.pdf
    location: p.1, Purpose
  significance: UAP Security Classification Guide identifies UAPTF at Office of Naval Intelligence — April 16, 2020 (four months before public establishment announcement)
  context: UAP Security Classification Guide (ID# 04-030), Naval Intelligence Activity, April 16, 2020 (OCR preserves "identifYing" for "identifying")
  statement_date: '2020-04-16'
- id: q4
  added_date: '2026-04-20'
  text: This chaner establishes the Congressionally mandated, Deputy Secretary of Defense directed Unidentified Aerial Phenomenon Task Force.
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: p.1, introductory paragraph
  significance: UAPTF Charter attests Congressional mandate + DSD direction as joint authority
  context: UAPTF Charter, Naval Intelligence Activity, signed September 1, 2020 (OCR preserves "chaner" for "charter")
  statement_date: '2020-09-01'
- id: q5
  added_date: '2026-04-20'
  text: The purpose of the Task Force is to create a single entity tasked with working across the Department of Defense, and with the Intelligence Community (IC) and the Interagency, to develop and execute plans to collect, exploit, and analyze operational and scientific and technical data on unexplained Unidenlified Aerial Phenomenon (UAP). currently posing a threat to U.S. National Security.
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: p.1, Purpose
  significance: UAPTF Charter Purpose — single cross-DoD/IC/Interagency entity for UAP data
  context: UAPTF Charter, Naval Intelligence Activity, signed September 1, 2020 (OCR preserves "Unidenlified" for "Unidentified")
  statement_date: '2020-09-01'
- id: q6
  added_date: '2026-04-20'
  text: Leadership of the Task Force will be designated by the Director of the Naval Intelligence Activity.
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: p.3, Roles and Responsibilities
  significance: UAPTF Charter — Director of the Naval Intelligence Activity designates UAPTF leadership
  context: UAPTF Charter, Naval Intelligence Activity, signed September 1, 2020
  statement_date: '2020-09-01'
- id: q7
  added_date: '2026-04-20'
  text: The Director, UAPTF, is the accountable official for ensuring the timely collection and consolidation of data on UAP.
  source:
    path: government/dni-gov-odni-preliminary-assessment-20210625.pdf
    location: p.3, SCOPE AND ASSUMPTIONS
  significance: ODNI Preliminary Assessment — accountability framing for the Director of UAPTF
  context: ODNI Preliminary Assessment, June 25, 2021
  statement_date: '2021-06-25'
- id: q8
  added_date: '2026-04-20'
  text: UAPTF and the ODNI National Intelligence Manager for Aviation drafted this report, with input from USD(I&S), DIA, FBI, NRO, NGA, NSA, Air Force, Army, Navy, Navy/ONI, DARPA, FAA, NOAA, NGA, ODNI/NIM-Emerging and Disruptive Technology, ODNI/National Counterintelligence and Security Center, and ODNI/National Intelligence Council.
  source:
    path: government/dni-gov-odni-preliminary-assessment-20210625.pdf
    location: p.3, SCOPE AND ASSUMPTIONS
  significance: ODNI Preliminary Assessment — UAPTF as drafting body plus the cross-agency contributor list
  context: ODNI Preliminary Assessment, June 25, 2021
  statement_date: '2021-06-25'
- id: q9
  added_date: '2026-04-20'
  text: 'The Committee supports the efforts of the Unidentified Aerial

    Phenomenon Task Force at the Office of Naval Intelligence to

    standardize collection and reporting on unidentified aerial phe-

    nomenon, any links they have to adversarial foreign governments,

    and the threat they pose to U.S. military assets and installations.'
  source:
    path: government/govinfo-senate-report-116-233-iaa-fy2021.pdf
    location: Advanced Aerial Threats section
  significance: Senate Select Committee on Intelligence on-record acknowledgment of UAPTF at ONI
  context: Senate Report 116-233 (Intelligence Authorization Act for Fiscal Year 2021)
  statement_date: '2020-06-17'
- id: q10
  added_date: '2026-04-20'
  text: At the time of Dr. Taylor’s initial work with the UAPTF, former Office of Naval Intelligence senior civilian John Stratton was leading the effort and informally referred to Dr. Taylor as his chief scientist as efforts to assemble a larger team were underway.
  source:
    path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
    location: A1 response from DoD spokesperson Susan Gough
  significance: DoD Public Affairs statement naming John (Jay) Stratton as UAPTF lead and Dr. Travis Taylor as informal Chief Scientist
  context: DoD Public Affairs statement via DoD spokesperson Susan Gough, released to The Black Vault, June 29, 2022
  statement_date: '2022-06-29'
- id: q11
  added_date: '2026-04-20'
  text: I also direct the Secretary of the Navy to disestablish the Unidentified Aerial Phenomena Task Force (UAPTF) no later than the date the AARO is established, and to support the orderly transition of the UAPTF, including the transfer of any data, analysis, or other relevant material, to the AARO.
  source:
    path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
    location: p.1
  significance: UAPTF disestablishment directive — Secretary of the Navy to disestablish UAPTF and transfer data to AARO
  context: Hicks AARO establishment memorandum, July 15, 2022
  statement_date: '2022-07-15'
key_personnel:
- id: kp1
  added_date: '2026-04-20'
  person_path: /people/jay-stratton
  role: Director (named as former Office of Naval Intelligence senior civilian "leading the effort" per DoD Public Affairs statement)
  leadership_class: director
  source:
    path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
