  significance: USAspending description field for SASP BPA Call Order HQ003425F0104 — verbatim "ADMINISTRATIVE, POLICY, OPERATIONS, AND ANALYTIC SUPPORT SERVICES." matches Arlo's SASP press release scope
    summary verbatim.
  statement_date: '2025-02-21'
