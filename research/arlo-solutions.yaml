    '
  source:
    path: government/usaspending-arlo-bpa-hq003425a0004.json
    location: USAspending API record — description field (HQ003425A0004 BPA)
  significance: USAspending description field for parent BPA HQ003425A0004 — confirms the BPA's scope is to the OUSD(I&S) Enterprise broadly, with task-order-level scoping to specific sub-directorates (SASP
    Call Order = HQ003425F0104). Procurement system retains "Office of the Under Secretary of Defense for Intelligence & Security" wording; Arlo's marketing parallels with the alternative "Office of the
    Under Secretary of War" form.
  statement_date: '2025-02-14'
- id: q16
  added_date: '2026-05-03'
  text: 'Founded in 2014, Arlo Solutions (Arlo) is an SBA 8(a) certified

    small business based in Washington, DC. We are the trusted

    advisors of agency leaders, providing innovative solutions that

    simplify complex data challenges. Committed to quality,

    accountability, and trust, we share our expertise to forward the

    work of the defense and intelligence communities.

    '
  source:
    path: news/arlo-company-overview-2021-08.pdf
