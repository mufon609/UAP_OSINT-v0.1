description: 'Arlo Solutions, LLC is a small business of Washington, D.C. founded in 2014 by Arlene Wube ([`/people/arlene-wube`]) and Lonye Ford ([`/people/lonye-ford`]). According to Arlo''s March 16,
  2026 SASP press statement, Arlo is a service-disabled veteran owned small business, woman owned small business, and 8(a) small business based in Washington, DC; Lonye Ford is named CEO. According to USAspending
  records (recipient UEI JSRCFJVJM874; CAGE Code 72UJ9), Arlo''s business categories include 8(a) Program Participant, Black American Owned Business, Economically Disadvantaged Women Owned Small Business,
  Service Disabled Veteran Owned Business, Small Business, and Women Owned Small Business. The recipient address according to USAspending is 200 Massachusetts Ave NW Suite 700 Washington, DC 20001. The March 16, 2026 SASP press statement named Lonye Ford as CEO; Arlene Wube and broader Arlo staff do not appear in the SASP press statement. Arlo''s 2021 Company Overview also shows Arlo as Subcontractor on CDM Analytical & Technical Services, SITE III Solutions for IT Enterprise, and VECTOR Transformation & Operational Readiness.


  Arlo''s principal federal customer is the Office of the Under Secretary of Defense for Intelligence and Security ([`/organizations/ousd-is`]) — Arlo''s corporate marketing uses the form OUSW(I&S) (Office of the Under Secretary of War for Intelligence and Security), while the federal procurement record (USAspending, GAO B-422985) identified the customer using the OUSD(I&S) form. See Sancorp Consulting ([`/organizations/sancorp-consulting`]) for the Executive Order framework documenting this adoption. According to USAspending records, Arlo has held prime contracts issued by Washington Headquarters Services ([`/organizations/whs`]) to
  OUSD(I&S) since September 2019, including Personnel Security Policy Support (HQ003419C0172), Business Operations and Support Services (HQ003420C0104), Counterintelligence, Law Enforcement and Security
  Policy Support (HQ003421C0078, HQ003422F0271, HQ003423F0356), Cyberspace Oversight Support Services (HQ003422C0092), Admin Support Services (HQ003421C0090), Event Planning Support Services (HQ003423C0093),
  and Integrated Vetting Policy & Analytical Support (HQ003424F0190 — a $3.7 million contract with the OUSD(I&S) CL&S Integrated Vetting team announced by Arlo on April 18, 2024). On February 14, 2025, WHS established
  the OUSD(I&S) Enterprise BPA HQ003425A0004 under solicitation HQ003424R0178; the good faith estimate amount for all BPAs is $856 million across the four BPA vendors, not Arlo''s individual limit. The public GAO B-422985.4 / B-422985.5 decision named three of the four BPA vendors established after the reevaluation (Sancorp, Premier, Arlo); the remaining vendor is not named in the public decision. Comprehensive Approach LLC ([`/organizations/comprehensive-approach-solutions`]) held the September 2024 EXDIR Call Order 1 award before the corrective action; whether Comprehensive Approach is among the four BPA vendors established after the reevaluation is not stated in the public GAO decision. On February 21, 2025, WHS signed BPA Call Order HQ003425F0104 with Arlo for SASP support.


  The HQ003425A0004 BPA and HQ003425F0104 SASP Call Order were awarded after a reevaluation of solicitation HQ003424R0178. According to the Government Accountability Office decision Matter of Sancorp Consulting
  LLC, B-422985.4 / B-422985.5 (June 11, 2025), WHS issued the RFQ on May 23, 2024 under the General Services Administration Federal Supply Schedule Professional Services multiple award schedule contract;
  nine vendors submitted quotations; in September 2024, WHS established BPAs with, and issued Call Order 1 (EXDIR) to, Comprehensive Approach LLC and Call Order 2 (SASP) to Sancorp Consulting ([`/organizations/sancorp-consulting`]).
  Following protests by Arlo and Premier Enterprise Solutions ([`/organizations/premier-enterprise-solutions`]), the agency took corrective action: stating it would terminate the BPAs and call orders, reevaluate
  quotations, and make new award decisions. The reevaluation awarded Call Order 1 (EXDIR) to Premier and Call Order 2 (SASP) to Arlo. Sancorp filed a protest of the reevaluation. The GAO dismissed Sancorp''s
  challenges to the SASP call order on the basis that Sancorp''s proposed staff officer key personnel had submitted a letter of resignation dated February 7, 2025 with a last official day of February 14, 2025 — before WHS issued the SASP call order — and that Sancorp
  had failed to advise the agency of the unavailability of the quoted key person, making Sancorp''s SASP quotation unacceptable and Sancorp ineligible to challenge the SASP call order. The GAO denied Sancorp''s
  challenges to the EXDIR call order. As of the public GAO record, only the EXDIR (Premier) and SASP (Arlo) call orders had been awarded under the four BPAs; additional call orders under those BPAs are not reflected in the decision.


  Solicitation HQ003424R0178 issued call orders for SASP and EXDIR support services. Sancorp''s separate prime contracts at other OUSD(I&S) Offices ([`/organizations/aaro`]; [`/organizations/ipmo`]) were
  not part of HQ003424R0178 and continued under Sancorp.

  '
