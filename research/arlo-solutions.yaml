naming_quirks:
- id: nq1
  observed: VA T4NG2
  canonical: OUSD(I&S) Enterprise BPA
  location: Contract Vehicles & Schedules page — heading above the HQ003425A0004 entry
  source_path: news/arlo-contract-vehicles-20260503.html
  resolution: use-canonical
  note: 'Arlo''s own Contract Vehicles & Schedules page renders the heading "VA T4NG2" above the HQ003425A0004 contract entry, but the description body and contract number confirm the entry is the OUSD(I&S) Enterprise BPA, not a VA contract. Disposition (investigated 2026-05-03): Arlo is NOT a T4NG2 prime — USAspending shows zero VA contracts under UEI JSRCFJVJM874 (top 50 awards). The same contract-vehicles HTML carries a `/wp-content/uploads/2024/10/VA-T4NG2-Logo-300x300-2.png` asset URL (line 1090); under WordPress''s `YYYY/MM/` upload-folder convention this places the logo upload in October 2024, indicating prior T4NG2 marketing intent (likely subcontractor-team positioning or aspirational bid material that did not result in a prime award). Most parsimonious explanation for the heading-vs-body mismatch: CMS template-reuse error after the OUSD(I&S) BPA HQ003425A0004 win in February 2025, where Arlo overwrote the body text but did not update the heading or replace the logo.'
  added_date: '2026-05-03'
- id: nq2
  observed: Intelligent & Security
  canonical: Intelligence & Security
  location: GAO B-422985 BACKGROUND ¶1 — RFQ basics paragraph
  source_path: government/gao-b-422985-wayback-20250708.html
  resolution: preserve-as-sic-in-quotes
  note: GAO source contains "Intelligent & Security" where the standard form is "Intelligence & Security" — single-instance source typo, preserved verbatim in q2.
  added_date: '2026-05-03'
- id: nq3
  observed: OUSW(I&S)
  canonical: OUSD(I&S)
  location: Arlo SASP press release dateline + lede; Arlo recruitment page Influence/Deception/Perception position descriptions
  source_path: news/arlo-press-85m-sasp-20260503.html
  resolution: preserve-as-sic-in-quotes
  note: Arlo's post-2025 corporate marketing uses the alternative form OUSW(I&S) (Office of the Under Secretary of War for Intelligence and Security) where USAspending and the GAO B-422985 decision use
    OUSD(I&S). Reflects the post-EO-14347 DoD/DoW dual-naming pattern documented in Sancorp's record. Preserve source form verbatim in quotes from Arlo marketing; canonical OUSD(I&S) form applies in description
    prose.
  added_date: '2026-05-03'
