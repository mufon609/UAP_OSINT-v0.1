quotes:
- id: q1
  added_date: '2026-05-03'
  text: 'Sancorp Consulting, LLC, a small business of Falls Church, Virginia, protests the issuance of orders to Premier Enterprise Solutions, LLC, a small business of Upper Marlboro, Maryland, and Arlo
    Solutions, LLC, a small business of Washington, D.C., under request for quotations (RFQ) No. HQ003424R0178, issued by the Department of Defense, Washington Headquarters Service (WHS), for technical,
    administrative, and professional support services.

    '
  source:
    path: government/gao-b-422985-wayback-20250708.html
    location: Decision opening paragraph (DECISION section, ¶1)
  significance: GAO B-422985.4 / B-422985.5 decision opening paragraph (June 11, 2025) — names Arlo Solutions, LLC as a small business of Washington, D.C. and identifies it as one of two call
    order awardees under WHS RFQ HQ003424R0178 for technical, administrative, and professional support services (Premier holds Call Order 1 EXDIR; Arlo holds Call Order 2 SASP). The parent BPA was awarded to four vendors total per the GAO public decision.
  statement_date: '2025-06-11'
- id: q2
  added_date: '2026-05-03'
  text: 'The agency issued the RFQ on May 23, 2024, under the General Services Administration Federal Supply Schedule (FSS) Professional Services - Business Services multiple award schedule contract. Agency
    Report (AR), Tab 14, RFQ at 3.[1] The RFQ, set aside for 8(a) small businesses and issued under Federal Acquisition Regulation (FAR) subpart 8.4, sought quotations to establish multiple award blanket
    purchase agreement (BPAs) with vendors to provide technical, administrative, and professional support services to the Office of the Under Secretary of Defense for Intelligent & Security (OUSD(I&S))
    enterprise.[2] Id. at 3, 76. The solicitation anticipated establishing BPAs consisting of a base year and four 1-year option periods, and contemplated issuing orders against those BPAs on a fixed-price,
    labor-hour, or time-and-materials basis. Id. at 3. The “good faith estimate amount” for all BPAs is $856 million. Id.

    '
  source:
    path: government/gao-b-422985-wayback-20250708.html
    location: BACKGROUND section, ¶1 (RFQ basics)
  significance: 'RFQ HQ003424R0178 established multiple-award 8(a) BPAs to provide technical, administrative, and professional support services to the OUSD(I&S) enterprise — five-year ordering period (one base + four option years), $856 million good faith estimate amount for all BPAs (aggregate across four BPA vendors, not any single vendor''s individual ceiling). Note source typo: "Intelligent & Security" appears in source where the standard form is "Intelligence & Security" (preserved verbatim).'
  statement_date: '2025-06-11'
- id: q3
  added_date: '2026-05-03'
  text: 'The RFQ provided a performance work statement (PWS) for the BPA’s general requirements, and specific PWSs for the two initial call orders that would be awarded concurrently with the establishment
    of the BPAs. AR, Tab 2a, BPA PWS; AR, Tab 11a, Call Order 1 (EXDIR) PWS; AR, Tab 11b, Call Order 2 (SASP) PWS. Under call order 1, the awardee is to provide services to the I&S Executive Directorate
    (EXDIR). AR, Tab 11a, EXDIR Call Order PWS at 1. With call order 2, the awardee will provide services to the Sensitive Activities & Special Programs (SASP) Office. AR, Tab 11b, SASP Call Order PWS at
    1.

    '
  source:
    path: government/gao-b-422985-wayback-20250708.html
    location: BACKGROUND section, ¶2 (BPA + 2 call orders)
  significance: Call Order 1 awardee provides services to the I&S Executive Directorate (EXDIR); Call Order 2 awardee provides services to the Sensitive Activities & Special Programs (SASP) Office. The
    two call orders are scoped to two distinct OUSD(I&S) sub-directorates and were awarded concurrently with the BPAs.
  statement_date: '2025-06-11'
- id: q4
  added_date: '2026-05-03'
  text: 'The agency received quotations from nine vendors by the July 17, deadline for receipt of quotations. Contracting Officer’s Statement and Memorandum of Law (COS/MOL) at 5. In September, WHS established
    a BPA with, and issued call order 1 (EXDIR) to, Comprehensive Approach LLC d/b/a Comprehensive Approach Solutions. COS/MOL at 5. At the same time, WHS established a BPA with, and issued call order 2
    (SASP) to, Sancorp. Id. Following notification of the awards, Arlo and Premier filed protests with our Office, challenging the agency’s evaluation and award decisions. Arlo Sols., LLC, B‑422985, B-422985.2,
    Oct. 16, 2024 (unpublished decision); Premier Enter. Sols., LLC, B-422985.3, Oct. 16, 2024 (unpublished decision). In response, the agency advised our office that it intended to take corrective action;
    specifically, the agency stated that it would terminate the BPAs and call orders, reevaluate quotations, and make new award decisions. Id. We dismissed the protests as academic on October 16. Id.

    '
  source:
    path: government/gao-b-422985-wayback-20250708.html
    location: BACKGROUND section, ¶4 (initial September 2024 awards + protests + corrective action)
  significance: 'Procedural history: nine vendors submitted quotations by the July 17, 2024 deadline; September 2024 initial awards put EXDIR Call Order 1 with Comprehensive Approach Solutions and SASP
    Call Order 2 with Sancorp; Arlo and Premier protested; WHS took corrective action, terminated the BPAs and call orders, reevaluated quotations, and made new award decisions; GAO dismissed the initial
    Arlo and Premier protests as academic on October 16, 2024.'
  statement_date: '2025-06-11'
- id: q5
  added_date: '2026-05-03'
  text: 'AR, Tab 45, Source Selection Decision Document (SSDD) at 21, 36.[3] The contracting officer, who was the source selection authority (SSA), determined that WHS would establish BPAs with four vendors,
    including Sancorp, Premier, and Arlo. COS/MOL at 6. Relevant here, the SSA found that Premier’s quotation represented the best value for the EXDIR call order, and that Arlo’s quotation represented the
    best value for the SASP call order, and the agency issued the orders accordingly. AR, Tab 45, SSDD at 35, 45. This protest followed.

    '
  source:
    path: government/gao-b-422985-wayback-20250708.html
    location: BACKGROUND section, reevaluation outcome (SSDD summary)
  significance: 'Reevaluation outcome: WHS established BPAs with four vendors including Sancorp, Premier, and Arlo; Premier won EXDIR Call Order 1 on best-value tradeoff and Arlo won SASP Call Order 2 on
    best-value tradeoff. Sancorp''s second-round protest of the reevaluation is the subject of B-422985.4 / B-422985.5.'
  statement_date: '2025-06-11'
- id: q6
  added_date: '2026-05-03'
  text: 'In its response, Sancorp confirms that X “resigned from Sancorp in February 2025” and provided a copy of X’s letter of resignation, dated February 7, 2025--before the agency issued the SASP call
    order at issue. Supp. Comments at 3; exh. B to Supp. Comments. Sancorp nonetheless contends that it did not have an obligation to inform the agency because the firm did not have actual knowledge of
    X’s unavailability. Supp. Comments at 2-3.

    '
  source:
    path: government/gao-b-422985-wayback-20250708.html
    location: DISCUSSION section — Arlo's request for dismissal (key personnel X unavailability)
  significance: 'Mechanics of Sancorp''s SASP-call-order loss: Sancorp''s proposed staff officer key personnel "X" submitted a resignation letter dated February 7, 2025 (last day February 14, 2025), before
    WHS issued the SASP call order. Sancorp argued it lacked actual knowledge of X''s unavailability; GAO did not accept this defense.'
  statement_date: '2025-06-11'
- id: q7
  added_date: '2026-05-03'
  text: 'As discussed above, an unacceptable quotation cannot form the basis of award. Paragon Sys., Inc., B-422828, B-422828.2, Nov. 19, 2024, 2024 CPD ¶ 283 at 10. Where, as here, the record reflects
    that the protester’s quotation for the SASP call order was unacceptable, Sancorp does not qualify as an interested party to challenge other aspects of the agency’s evaluation and selection decision
    with respect to the issuance of the SASP call order. Orion Gov’t Servs., supra at 7. The challenges to the SASP call order are therefore dismissed.

    '
  source:
    path: government/gao-b-422985-wayback-20250708.html
    location: DISCUSSION section — disposition of SASP challenges (dismissal ruling)
  significance: 'GAO ruling on Arlo''s intervenor request for dismissal: Sancorp''s SASP-call-order quotation was rendered unacceptable by the failure to disclose X''s unavailability; Sancorp is not an
    interested party to challenge the SASP call order; SASP challenges therefore dismissed (in addition to the EXDIR challenges, which were denied on the merits in the same decision).'
  statement_date: '2025-06-11'
- id: q8
  added_date: '2026-05-03'
  text: 'Washington, DC  – Arlo Solutions announced today that it has been awarded a multi-year contract valued at more than $85 million to provide comprehensive administrative, policy, operations, and
    analytic support services to the Sensitive Activities & Special Programs (SASP) office within the Office of the Under Secretary of War for Intelligence and Security (OUSW(I&S)).

    '
  source:
    path: news/arlo-press-85m-sasp-20260503.html
    location: Press release dateline + lede paragraph (March 16, 2026)
  significance: 'Arlo''s own announcement of the SASP contract — confirms scope ("comprehensive administrative, policy, operations, and analytic support services"), customer office (SASP within OUSW(I&S)),
    and approximate value ("more than $85 million"). Note: "OUSW(I&S)" is Arlo''s post-2025 marketing form; USAspending and GAO records use "OUSD(I&S)".'
  statement_date: '2026-03-16'
- id: q9
  added_date: '2026-05-03'
  text: '“We are honored to support the critical missions of OUSW(I&S),” said Lonye Ford, CEO of Arlo Solutions. “Arlo remains committed to delivering cleared, highly qualified professionals; disciplined
    program management; and repeatable quality to help ensure responsive, data-informed decision-making for DoW leadership.”

    '
  source:
    path: news/arlo-press-85m-sasp-20260503.html
    location: Press release CEO quote ¶
  significance: Lonye Ford named verbatim as CEO of Arlo Solutions in the company's own SASP press release; first primary-source attestation of Ford's CEO role at the time of the SASP contract announcement
    (March 16, 2026).
  statement_date: '2026-03-16'
- id: q10
  added_date: '2026-05-03'
  text: 'Washington, DC  – Arlo Solutions was awarded a $3.7 million contract with the Office of the Under Secretary of Defense for Intelligence & Security OUSD(I&S) CL&S Integrated Vetting team.

    '
  source:
    path: news/arlo-press-cls-vetting-20260503.html
    location: Press release dateline + lede paragraph (April 18, 2024)
  significance: Arlo's own announcement of the OUSD(I&S) CL&S Integrated Vetting contract (April 18, 2024) — $3.7 million ceiling. USAspending HQ003424F0190 obligated $1,474,125.12 against this scope; the
    press release names the contract amount per the BPA ceiling, USAspending the obligated total.
  statement_date: '2024-04-18'
- id: q11
  added_date: '2026-05-03'
  text: 'The CL&S oversees the Integrated Vetting and Reform as well as policy and governance for personnel security and vetting. The DDI (CL&S) is responsible for fulfilling its core functions of policy
    development, conducting outreach to appropriate DoD and Intelligence Community (IC) elements, and overseeing Counterintelligence, Law Enforcement & Security.

    '
  source:
    path: news/arlo-press-cls-vetting-20260503.html
    location: Press release CL&S scope ¶ (April 18, 2024)
  significance: Identifies the CL&S directorate within OUSD(I&S) — the Director for Defense Intelligence (Counterintelligence, Law Enforcement & Security) and its scope of personnel security, vetting, and
    oversight of CI/LE/Security activities. Anchors Arlo's CL&S work as a separate OUSD(I&S) sub-directorate engagement distinct from SASP.
  statement_date: '2024-04-18'
- id: q12
  added_date: '2026-05-03'
  text: 'Technical, Administrative and Professional Support Services to OUSDI&S Enterprise BPA.

    The objective of this effort is to obtain specialized and sensitive Technical, Administrative, and Professional Services to assist OUSD(I&S) in performance of its oversight mission and responsibilities.
    Task areas include Professional Services; Policy, Technical and Analytical Expertise; Consulting Services; Information Technology Support; Facilities Support; Administrative Support; Physical, Personnel
    and Operations Security Services; Human Resources Support; Resource Management Support; and Training Support.

    '
  source:
    path: news/arlo-contract-vehicles-20260503.html
    location: Contract Vehicles & Schedules — OUSD(I&S) Enterprise BPA description block
  significance: 'Arlo''s own description of the OUSD(I&S) Enterprise BPA HQ003425A0004 task areas — "specialized and sensitive Technical, Administrative, and Professional Services" across ten enumerated task categories. Arlo''s page heading for this contract is "VA T4NG2" but the description body and the contract number HQ003425A0004 confirm it is the OUSD(I&S) Enterprise BPA, not a VA contract. T4NG2 is a separate VA IT vehicle (Transformation Twenty-One Total Technology Next Generation 2). Arlo is NOT a T4NG2 prime — USAspending shows zero VA contracts under Arlo''s UEI JSRCFJVJM874. The heading-vs-body mismatch on Arlo''s page is most likely a CMS template-reuse error — the same contract-vehicles HTML carries a `VA-T4NG2-Logo-300x300-2.png` image at URL path `/wp-content/uploads/2024/10/`, which under WordPress''s `YYYY/MM/` upload-folder convention places the asset upload in October 2024 — suggesting prior T4NG2 marketing intent (subcontractor positioning or aspirational bid material) before the page entry was re-purposed for the OUSD(I&S) BPA win in February 2025.'
  statement_date: '2025-02-14'
- id: q13
  added_date: '2026-05-03'
  text: 'The Influence, Deception, and Perception Management Activities Staff Officer V will work as a contractor to support the Office of the Under Secretary of War for Intelligence and Security (OUSD(I&S))...

    '
  source:
    path: news/arlo-recruitment-20260503.html
    location: Recruitment page — Influence, Deception, and Perception Management Activities Staff Officer V listing
  significance: Arlo's own recruitment page advertises Influence, Deception, and Perception Management Activities Staff Officer SME IV and V positions (verbatim mission language paralleling the IPMO charter). The role description pairs the long form "Office of the Under Secretary of War for Intelligence and Security" with the abbreviation "OUSD(I&S)" — a hybrid mismatch within Arlo's own page in which the spelled-out form uses War while the parenthetical abbreviation retains the D for Defense. No IPMO-direct contract is named on the recruitment page or elsewhere in Arlo's primary-source record.
  statement_date: '2026-05-03'
- id: q14
  added_date: '2026-05-03'
  text: '"description":"ADMINISTRATIVE, POLICY, OPERATIONS, AND ANALYTIC SUPPORT SERVICES."

    '
  source:
    path: government/usaspending-arlo-hq003425f0104.json
