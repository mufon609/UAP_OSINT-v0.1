quotes:
- id: q1
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'As you know, my name is David Fravor. I am a retired Commander in the United States Navy. In 2004, I was a commanding officer of Strike Fighter Squadron 41, the world-famous Black Aces. We were tasked to Carrier Airwing 11 stationed on board the USS Nimitz and had begun a 2-month workup cycle off the coast of California.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 805-810
  significance: Opening — identity, 2004 VFA-41 command role, 2-month workup cycle off California coast
  context: opening statement
- id: q2
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'On this day we were scheduled for a 2 V 2 air to air training with the USS Princeton as our control. When we launched off, Nimitz, my wingman, was joining up. We were told that the training was going to be suspended and we are going to proceed with real-world tasking.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 811-815
  significance: Training context, launch, training suspension for real-world tasking on check-in with Princeton
  context: opening statement
- id: q3
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'As we proceeded to the west, the air controller was counting down the range to an object that we were going to, and we were unaware of what we were going to see when we arrived. There the controller told us that these objects had been observed for over 2 weeks coming down from over 80,000 feet, rapidly descending to 20,000 feet, hanging out for hours and then going straight back up. For those that do not realize, above 80,000 feet is space.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 816-822
  significance: Approach direction (west) + 2-week prior tracking history + altitude behavior pattern
  context: opening statement
- id: q4
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'We arrived at the location at approximately 20,000 feet and the controller called merge plot, which means that our radar blip was now in the same resolution cell as the contact. As we looked around, we noticed that we saw some whitewater off our right side. It is important to note that the weather on this day was as close to perfect as you could ask for off the coast of San Diego. Clear skies, light winds, calm seas, no whitecaps from waves. So, the whitewater stood out in a large blue ocean.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 823-830
  significance: Merge plot explanation, San Diego weather conditions, whitewater first observation
  context: opening statement
- id: q5
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'All four of us, because we were an F–18F so we had pilots and WSO in the backseat, looked down and saw a white Tic Tac object with a longitudinal axis pointing north south and moving very abruptly over the water like a ping pong ball. There were no rotors, no rotor wash, or any sign of visible control surfaces like wings. As we started clockwise toward the object my WSO and I decided to go down and take a closer look with the other aircraft staying in high cover to observe both us and the Tic Tac.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 831-839
  significance: Tic Tac visual description — 4 observers, white, north-south axis, ping-pong-ball movement, no rotors/wash/control surfaces; WSO/clockwise/high-cover tactical setup
  context: opening statement
- id: q6
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'We proceeded around the circle about 90 degrees from the start of our descent and the object suddenly shifted its longitudinal axis, aligned it with my aircraft, and began to climb. We continued down another 270 degrees, nose low, where the Tic Tac would have been. Our altitude at this point was about 15,000 feet and a Tic Tac was about 12,000. As we pulled nose onto the object within about a half mile of it, it rapidly accelerated in front of us and disappeared. Our wingman, roughly 8,000 feet above us, lost contact also.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 840-848
  significance: Descent geometry — 90°/270° descent, Tic Tac axis-shift toward Fravor's aircraft, altitudes 15,000/12,000 ft, wingman at 8,000 ft, half-mile disappearance
  context: opening statement
- id: q7
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'the controller came up and said, ''''sir, you are not going to believe this, but that thing is at your CAP point roughly 60 miles away in less than a minute.'''' You can calculate the speed.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 853-855
  significance: CAP point reacquisition with direct controller quote — 60 miles in less than a minute
  context: opening statement
- id: q8
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'We returned to Nimitz. We were taking off our gear. We were talking to one of my crews, who was getting ready to launch. We mentioned it to him, and they went out and luckily got the video that you see, that 90-second video. What you do not see is the radar tape that was never released, and we do not know where it is at, of the act of jamming that the object put on an APG–73 radar, and I can get into modes later if you are interested.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 856-863
  significance: Follow-on crew captured 90-second video + radar tape never released + APG-73 jamming claim
  context: opening statement
- id: q9
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'What is shocking to us is that the incident was never investigated. None of my crew were ever questioned. The tapes were never taken and after a couple days it turned into a great story with friends. It was not until 2009, until Jay Stratton had contacted me to investigate. Unbeknownst to all, he was part of the ATIP program in the Pentagon led by Lue Elizondo.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 864-869
  significance: Non-investigation + 2009 Stratton contact + ATIP program in Pentagon led by Elizondo
  context: opening statement
- id: q10
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'There was an unofficial official report that came out that is now on the internet. Years later, I was contacted by the other pilot, Alex Dietrich, and asked if I would been contacted and I said no, but I am willing to talk.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 870-872
  significance: Unofficial official report on the internet + Dietrich contact + Fravor's response
  context: opening statement
- id: q11
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'I was contacted by Mr. Elizondo, and we talked for a short period of time. He said we would be in contact.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 873-874
  significance: Elizondo direct contact with Fravor — conversation was brief
  context: opening statement
- id: q12
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'A few weeks after that I was made aware that Lue had left the Pentagon in protest and joined forces with Tom DeLonge, Chris Mellon, Steve Justice and others to form To the Stars Academy, an organization that pressed the issue with leading industry experts and U.S. Government officials.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 875-879
  significance: TTSA formation — Elizondo left Pentagon in protest; co-founders DeLonge, Mellon, Justice; organization pressed industry experts and USG officials
  context: opening statement
- id: q13
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'They work with Leslie Keane, who is present today, Ralph Blumenthal and Helene Cooper to publish the articles in the 2017 New York Times and it removed the stigma on the topic of UFOs, which is why we are here today.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 880-883
  significance: NYT 2017 articles — Kean (spelled Keane), Blumenthal, Cooper; Kean identified as present at the hearing
  context: opening statement
- id: q14
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'Those articles opened the door for the government and public that cannot be closed. It has led to an interest from our elected officials who are not focused on little green men but figuring out where these craft are, where are they from, the technology they possess, how do they operate.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 884-888
  significance: Disclosure impact — elected officials focused on craft origin and technology rather than "little green men"
  context: opening statement
- id: q15
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'It also led to the Whistleblower Protection Act in the NDAA. There are multiple witnesses coming forward to say—that have firsthand knowledge, and Mr. Grusch just covered that.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 889-891
  significance: Whistleblower Protection Act in NDAA + Grusch cross-reference
  context: opening statement
- id: q16
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'What concerns me is that there is no oversight from our elected officials on anything associated with our government processing or working on craft believed not from this world. This issue is not a full public disclosure that can undermine national security, but it is about ensuring that our system of checks and balances works across all work done in the government using taxpayer funds.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 892-897
  significance: Oversight concern + checks-and-balances framing; explicit clarification that the ask is not full public disclosure
  context: opening statement
- id: q17
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'Relative to government programs, even unacknowledged waived programs have some level of oversight by the appropriate committee members in the House and Senate and this work that is said to be occurring from whistleblower testimoneys should not be exempt.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 898-902
  significance: Waived-program oversight precedent — oral-only program-classification framing
  context: opening statement
- id: q18
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'In closing, I would like to say that the Tic Tac object we engaged in 2004 was far superior to anything that we had on time, have today, or looking to develop in the next 10 years.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 903-905
  significance: Closing Tic Tac performance assessment
  context: opening statement
- id: q19
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'If we in fact have programs that possess this technology, it needs to have oversight from those people that the citizens of this great country elected in office to represent what is best for the United States and best for the citizens.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 908-911
  significance: Closing oversight call — elected officials represent citizens
  context: opening statement
- id: q20
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'None. We had a standard debrief where the backseaters went down to our carrier intel center and briefed would have happened and that was it. No one else talked to us and I was in the top 20 in the battle group. No one came. That captain was aware. The admiral was aware. Nothing was done.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 974-978
  significance: Q&A — post-incident response detail (carrier intel debrief only, top 20 in battle group, captain and admiral aware)
  context: Q&A with Chairman Grothman
- id: q21
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'Yes, and here is why. The technology that we faced was far superior than anything that we had, and you could put that anywhere. If you had one, you captured one, you reverse engineered it, you got it to work, you are talking something that can go into space, go someplace, drop down in a matter of seconds, do whatever it wants, and leave and there is nothing we can do about it. Nothing.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 989-995
  significance: Q&A — national security threat framing via reverse-engineering hypothetical
  context: Q&A with Chairman Grothman
- id: q22
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'No. I think it is far beyond, actually, our material science that we currently possess.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 1207-1208
  significance: Q&A — Tic Tac performance beyond current material science
  context: Q&A with Representative Burchett
- id: q23
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'I will say we did not see an object. There was something there to cause the whitewater and when we turned around it was gone. So, there was something there that obviously moved.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 1243-1246
  significance: Q&A — whitewater source not visually identified; movement inferred from disappearance
  context: Q&A with Representative Burchett
- id: q24
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'My crew that launched after we landed experienced significant jamming to the APG–73 radar, which was what we had on board, which is a mechanically scan very high-end system prior to the APG–79 and, yes, it did pretty much everything you could do—range, velocity, aspect—and then it split the lock, then the targeting pod is passive. That is what we were able to get the video on.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 1257-1263
  significance: Q&A — APG-73 jamming mechanics (range/velocity/aspect; split lock; passive targeting pod as path to the video)
  context: Q&A with Representative Burchett
- id: q25
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'Actually, I have been treated very well and the six people that were involved, myself included, all of them have or will be retiring from the military as 05s, 06s, and all my friends that are very senior, three and four stars, I have talked to them. They believe. They understand there is a problem. But no, I was actually treated really well.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 1356-1361
  significance: Q&A — career treatment; six people involved retiring as 05s/06s; three- and four-star officers privately agree
  context: Q&A with Representative Raskin
- id: q26
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'Well, I will say, you know, I am not like a UFO fanatic. It is not me. But I will tell you that what we saw with four sets of eyes over a 5-minute period still—there is nothing—we have nothing close to it. It was amazing to see. I told my buddy, I wanted to fly it. But that is—just an incredible technology.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 1365-1369
  significance: Q&A — 5-minute encounter duration, 4 witnesses; Fravor's pre-encounter disposition
  context: Q&A with Representative Raskin
- id: q27
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'So, we got within a half mile of the Tic Tac, which people say that is pretty far, but in airplanes that is actually relatively close. No, it was perfectly white, smooth, no windows, although when we did take the original FLIR video that is out there when you put it on a big screen it actually had two little objects that came out of the bottom of it. But other than that, no windows, no seams, no nothing.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 1500-1506
  significance: Q&A — surface features at half-mile (white, smooth, no windows/seams); two small objects exiting bottom seen on FLIR1 big-screen
  context: Q&A with Representative Moskowitz
- id: q28
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'I would say yes. I would say that, you know, starting in 2017 when it actually came out, it took that stigma away. I mean, I have talked to multiple Senators who said prior to that if you would have mentioned UAP, you would have been laughed off the Hill and now we are sitting here today for a public testimony on what is actually going on. You know, I am hoping that this curve will be more of an exponential and we will get more and more transparent to the level that we can.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 1692-1699
  significance: Q&A — Senators' pre-2017 stigma framing ("laughed off the Hill")
  context: Q&A with Representative Frost
- id: q29
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'I would think—well, in my opinion, I will say things are over-classified. I know for a fact the video or the pictures that came out in the—I think it was the 2020 report, that had the stuff off the East Coast that were taken with an iPhone off the East Coast. A buddy of mine was one of the senior people there and he said they originally classified it TS/SCI, and my question then was what is TS/SCI about these? They are an iPhone literally off the vacapes. That is not TS/SCI. So, they are over classified, and as soon as they do that they go in a vault and then you all have to look for them.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2030-2040
  significance: Q&A — over-classification example (East Coast iPhone footage classified TS/SCI); specific 2020 report reference
  context: Q&A with Representative Biggs
- id: q30
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'Yes. I was an enlisted Marine, Naval Academy graduate, Navy, flew for 18 years. Got a Master''s from University of Houston and I have worked in the private sector for the last what now, 19—16 years, 17 years. I do a lot of defense work.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2352-2355
  significance: Q&A — biographical summary (enlisted Marine, Naval Academy graduate, 18 years Navy, University of Houston Master's, 16-17 years private-sector defense work) — not in companion written testimony
  context: Q&A with Representative Langworthy
- id: q31
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'Yes. We were at a work up with all the battle groups. So, we integrate the ships with the carrier, the airwing with the carrier, and we start working. So, we were doing an air to air defense to hone not only our skills but those of the USS Princeton when they had been tracking them for 2 weeks. The problem was that there was never manned aircraft airborne when they were tracking them and this was the first day and, unfortunately, we were the ones airborne and went and saw it.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2360-2368
  significance: Q&A — battle-group workup context; first day of manned flight during Princeton's 2-week tracking
  context: Q&A with Representative Langworthy
- id: q32
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'That is correct. For some people that cannot—know what a Tic Tac is it is a giant flying propane tank.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2377-2378
  significance: Q&A — Tic Tac size analogy ("giant flying propane tank")
  context: Q&A with Representative Langworthy
- id: q33
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'The Princeton tracked it. The Nimitz tracked it. The E2 tracked it. We never saw it on our radars. Our fire control radars never picked it up.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2381-2383
  significance: Q&A — multi-platform radar tracking (Princeton + Nimitz + E2) vs Fravor's own fire-control radars not picking up the contact
  context: Q&A with Representative Langworthy
- id: q34
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'No, there is none. There is no IR plume coming out and Chad, who took the video, went through all the EO, which is black and white TV and the I&R modes and there is no visual signs of propulsion. It is just sitting in space at 20,000 feet.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2394-2397
  significance: Q&A — follow-on crew member first name "Chad" + EO/IR modes propulsion check; no IR plume, no visual propulsion signs
  context: Q&A with Representative Langworthy
- id: q35
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'Abruptly, very determinant. It knew exactly what it was doing. It was aware of our presence and it had acceleration rates—I mean, it went from zero to matching our speed in no time at all.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2403-2406
  significance: Q&A — Tic Tac maneuvering characterized as aware and intentional ("knew exactly what it was doing", "aware of our presence")
  context: Q&A with Representative Langworthy
- id: q36
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'No. You know, it has been said it is probably the most credible UFO sighting in history, based on all the sensors that were tracking it and then for us to get visual. And to go against the naysayers that it is something on the screen or whatever, I mean, there is four sets of human eyeballs. We are all very credible. Of the six of us that were involved in the thing, including the video, every one of us is going to do 20-plus years in the military in very responsible positions. I would say the world needs to know that. It is not a joke.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2439-2448
  significance: Q&A — "most credible UFO sighting in history" characterization; 6 involved personnel with 20+ year military careers
  context: Q&A with Representative Langworthy
- id: q37
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'I never felt that we were alone with all the planets out there. But I was not a UFO person. I was not watching History Channel and Mufon and all that.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2628-2630
  significance: Q&A — pre-encounter personal UFO disposition (not a UFO person before 2004)
  context: Q&A with Representative Raskin (second round)
- id: q38
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'I was pestered by a friend, and I asked why and he said, you are the one person that they cannot discredit, and you will add credibility to the New York Times article. And so after about six times I said OK.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2708-2711
  significance: Q&A — motivation for coming forward (friend's six-time ask; credibility argument for the NYT article)
  context: Q&A with Representative Burchett (second round)
- id: q39
  added_date: '2026-04-19'
  added_by_iteration: i0
  statement_date: '2023-07-26'
  text: 'For me, you know, I was an accident investigator. So, the biggest thing that you learn, and I think that witnesses need to do is, one, do not try and make the fish bigger than it was. Stick to the facts. Write it down and do not speculate what you think it is because it will sway your decision. Just write the facts down. We can get all the facts together and we can start to investigate and get a real honest story instead of it was this big.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: lines 2754-2761
  significance: Q&A — Fravor's self-identification as a former accident investigator; witness-discipline advice
  context: Q&A with Representative Burchett (second round)
