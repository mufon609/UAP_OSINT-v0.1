naming_quirks:
- id: nq1
  added_date: '2026-04-19'
  added_by_iteration: i0
  observed: Leslie Keane
  canonical: Leslie Kean
  location: line 880
  source_path: government/congress-gov-house-hearing-transcript-20230726.pdf
  resolution: preserve-as-sic-in-quotes
  note: Fravor's oral testimony repeats the same trailing-'e' misspelling of the journalist's surname that appears in his written statement (see written-testimony-fravor-2023 nq1). Two-source attestation strengthens the pattern as a consistent Fravor-authored variant rather than a stenographic error. Use canonical form in prose outside quoted passages.
- id: nq2
  added_date: '2026-04-19'
  added_by_iteration: i0
  observed: Lue
  canonical: Luis Elizondo
  location: lines 869, 875
  source_path: government/congress-gov-house-hearing-transcript-20230726.pdf
  resolution: preserve-as-sic-in-quotes
  note: Fravor uses "Lue" (2 instances in this transcript — q9 "led by Lue Elizondo" and q12 "I was made aware that Lue had left") as an alias-of-record for Luis Elizondo. The repeated usage indicates a familiar-name convention rather than a typo. Use canonical "Luis Elizondo" in prose; preserve "Lue" inside quoted passages.
- id: nq3
  added_date: '2026-04-19'
  added_by_iteration: i0
  observed: ATIP program
  canonical: AATIP (Advanced Aerospace Threat Identification Program)
  location: line 869
  source_path: government/congress-gov-house-hearing-transcript-20230726.pdf
  resolution: disputed
  note: Fravor's oral testimony uses "ATIP program" in the Pentagon led by Lue Elizondo (q9), paralleling the same program name in his written testimony (written-testimony-fravor-2023 nq3 — "ATIP (Anomalous Threat Identification Program)"). The oral form omits the expansion the written form provides. Whether ATIP refers to AATIP or a distinct program remains unresolved; see research_gap rg3.
