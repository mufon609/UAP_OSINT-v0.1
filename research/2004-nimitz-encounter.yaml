  trigger: audit-correction
  summary: |
    Audit driven by contributor feedback on the i0 check #16 warning set. The i0 baseline shipped with 4 check #16 warnings that I had rationalized as "legitimate synthesis vocabulary" (word-form drift, repo-conventional naming, and a tracked naming quirk). User feedback corrected this: every warning in EVIDENTIARY prose needs real resolution — either source-matched prose or promotion of the source-vs-prose variance to structured evidentiary data — not synthesis-acceptance. The "Lue" case in particular: source uses "Lue" twice in sworn congressional testimony, making it Fravor's alias-of-record for Elizondo, not a typo to paper over with canonical substitution.

    Scope clarification from the same exchange: the zero-warnings standard applies to free-prose synthesis fields (description, uap_relevance, credibility_notes, background). It does NOT apply to timeline event cells, which are compact navigational labels — forcing source-form vocabulary there trades readability for no factual gain. Timeline events remain subject to check #16 reporting (the validator is impartial by design) but the contributor policy allows warnings to persist in timeline cells when the source-match edit reduces clarity without adding precision. See feedback_check16_warnings_must_resolve.md for the full policy.

    Corrections applied in this iteration:

      (1) description — "workup cycle preparing for a combat deployment" → "workup cycle that would prepare the squadron for a combat deployment". Source line 9 says "that would prepare us for a combat deployment"; the squadron-scoped referent matches source's "we" = VFA-41.

      (2) description — "staying for hours" → "would stay for hours". Source line 31 exact phrase.

      (3) description — "Fravor's written testimony ([`/documents/written-testimony-fravor-2023`]) states that..." → "Fravor's Statement for the House Oversight Committee ([`/documents/written-testimony-fravor-2023`]) says that...". Source line 1 titles the document "Statement for the House Oversight Committee"; repo-internal filename convention (`written-testimony-*.md`) does not license substituting that convention into content prose.

      (4) description — "led by [`/people/luis-elizondo`]" → "led by Lue Elizondo ([`/people/luis-elizondo`])". Preserves Fravor's 2-instance alias-of-record while keeping the canonical wrap path for cross-reference resolution.

      (5) timeline t1 — "preparing for a combat deployment" → "that would prepare the squadron for a combat deployment". Same fix as (1) in a different entry; this one corrects a subject-referent drift (Battle Group → squadron) and is the edit, not the word-form drift which is exempt.

      (6) naming_quirks nq1 — note strengthened from "source spells the name as Lue; canonical is Luis; use canonical in prose" to "source uses 'Lue' twice in sworn testimony = alias-of-record for Elizondo; source form preserved in prose; schema resolution enum's 'preserve-as-sic-in-quotes' read as 'preserve source form wherever it is the evidentiary referent of record' since encounter events have no quote blocks". Also flagged the cross-artifact inconsistency with Fravor's i1 artifact (which does not yet track this quirk for the same source).

