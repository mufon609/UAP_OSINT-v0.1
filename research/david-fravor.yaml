credibility_notes: 'Fravor observed the [`/events/2004-nimitz-encounter`] as flight lead of the 2 V 2 Air to Air exercise in November 2004. In his Statement for the House Oversight Committee: [`/people/alex-dietrich`] was "the other pilot in my flight" and "also lost visual"; the [`/organizations/uss-princeton`] "Aegis SPY 1 radar" showed the object had reappeared 60 miles east at the CAP point; "the now famous approximately 90 second video" ([`/media/flir1-video`]) was "taken" by a [`/organizations/uss-nimitz`] crew and "released by the USG in 2017".

  '
