background: 'David Fravor is a retired [`/organizations/us-navy`] Commander. In November 2004 he was the Commanding Officer of Strike Fighter Squadron Forty-One — the "Black Aces" ([`/organizations/vfa-41`]) — attached to Carrier Airwing Eleven ([`/organizations/carrier-airwing-eleven`]) and stationed onboard [`/organizations/uss-nimitz`] (CVN-68). The squadron was at the beginning of a workup cycle that would prepare them for a combat deployment to the Persian Gulf for operations supporting the ground forces in Iraq.

  '
uap_relevance: 'Fravor first-hand observed the November 2004 [`/events/2004-nimitz-encounter`] from [`/organizations/uss-nimitz`]. In 2009 [`/people/jay-stratton`] contacted Fravor: "Jay was part of the ATIP (Anomalous Threat Identification Program) program led by Lue Elizondo out of the DOD" ([`/organizations/dod`]). In 2016 [`/people/alex-dietrich`] (Fravor''s wingman) contacted Fravor; shortly after, [`/people/luis-elizondo`] contacted Fravor. Fravor was made aware that Elizondo had left the pentagon in protest and joined forces with [`/people/tom-delonge`], [`/people/christopher-mellon`], [`/people/steve-justice`] and others to form [`/organizations/ttsa`]. The [`/documents/written-testimony-fravor-2023`] is Fravor''s Statement for the House Oversight Committee on the UAP topic.

  '
