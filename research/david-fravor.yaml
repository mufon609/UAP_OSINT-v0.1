background: 'David Fravor is a retired [`/organizations/us-navy`] Commander. In November 2004 he was the Commanding Officer of Strike Fighter Squadron Forty-One — the "Black Aces" ([`/organizations/vfa-41`]) — attached to Carrier Airwing Eleven ([`/organizations/carrier-airwing-eleven`]) and stationed onboard [`/organizations/uss-nimitz`] (CVN-68). The squadron was at the beginning of a workup cycle that would prepare them for a combat deployment to the Persian Gulf for operations supporting the ground forces in Iraq.

  '
uap_relevance: 'Fravor first-hand observed the November 2004 [`/events/2004-nimitz-encounter`] from his F/A-18F after he launched off the [`/organizations/uss-nimitz`]. In 2009 [`/people/jay-stratton`] contacted Fravor to investigate what they observed; in his House Oversight Statement Fravor stated that Stratton was "part of the ATIP (Anomalous Threat Identification Program) program led by Lue Elizondo out of the DOD" ([`/organizations/dod`]). Years later [`/people/alex-dietrich`] (the other pilot in Fravor''s flight) contacted Fravor in 2016; shortly after, [`/people/luis-elizondo`] contacted Fravor. Fravor was made aware that Elizondo had left the Pentagon in protest and joined forces with [`/people/tom-delonge`], [`/people/christopher-mellon`], [`/people/steve-justice`] and others to form [`/organizations/ttsa`]. The [`/documents/written-testimony-fravor-2023`] is Fravor''s Statement for the House Oversight Committee on the UAP topic.

  '
