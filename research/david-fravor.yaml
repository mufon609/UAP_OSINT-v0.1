credibility_notes: 'Fravor observed the [`/events/2004-nimitz-encounter`] as flight lead of the 2 V 2 Air to Air training exercise in November 2004. In his House Oversight Statement: [`/people/alex-dietrich`] was the other pilot in his flight and also lost visual; the [`/organizations/uss-princeton`] Aegis SPY 1 radar showed the object had reappeared 60 miles east at the CAP point; the approximately 90 second targeting pod video ([`/media/flir1-video`]) was taken by a crew that launched after Fravor returned to the [`/organizations/uss-nimitz`], and was released by the USG in 2017.

  '
