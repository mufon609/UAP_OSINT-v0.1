quotes:
- id: q1
  added_date: '2026-04-19'
  added_by_iteration: i0
  text: As all 4 looked down we saw a small white Tic Tac shaped object with the longitudinal axis pointing N/S and moving very abruptly over the white water.
  source:
    path: government/oversight-house-gov-fravor-written-testimony-20230726.pdf
    location: lines 37-39
  significance: Initial Tic Tac visual acquisition
  context: Written testimony, House Oversight Committee
  observation_type: direct
  statement_date: '2023-07-26'
- id: q2
  added_date: '2026-04-19'
  added_by_iteration: i0
  text: As we pulled nose onto the object at approximately ½ of a mile with the object just left of our nose, it rapidly accelerated and disappeared right in front of our aircraft.
  source:
    path: government/oversight-house-gov-fravor-written-testimony-20230726.pdf
    location: lines 47-48
  significance: Intercept — object behavior at closest approach
  context: Written testimony, House Oversight Committee
  observation_type: direct
  statement_date: '2023-07-26'
- id: q3
  added_date: '2026-04-19'
  added_by_iteration: i0
  text: This Tic Tac Object had just traveled 60 miles in a very short period of time (less than a minute), was far superior in performance to my brand-new F/A-18F and did not operate with any of the known aerodynamic principles that we expect for objects that fly in our atmosphere.
  source:
    path: government/oversight-house-gov-fravor-written-testimony-20230726.pdf
    location: lines 52-55
  significance: Post-intercept — Princeton radar reacquisition and performance assessment
  context: Written testimony, House Oversight Committee
  observation_type: direct
  statement_date: '2023-07-26'
- id: q4
  added_date: '2026-04-19'
  added_by_iteration: i0
  text: What is shocking is that the incident was never investigated, none of my crew were ever questioned, tapes were never taken, and after a couple of days, it turned into a great story to tell friends.
  source:
    path: government/oversight-house-gov-fravor-written-testimony-20230726.pdf
    location: lines 64-66
  significance: Lack of post-incident investigation
  context: Written testimony, House Oversight Committee
  observation_type: direct
  statement_date: '2023-07-26'
- id: q5
  added_date: '2026-04-19'
  added_by_iteration: i0
  text: Not until 2009 did Jay Stratton contact me to investigate what we observed. Unbeknownst to all of us, Jay was part of the ATIP (Anomalous Threat Identification Program) program led by Lue Elizondo out of the DOD.
  source:
    path: government/oversight-house-gov-fravor-written-testimony-20230726.pdf
    location: lines 66-68
  significance: Disclosure chain — Stratton contact in 2009 and ATIP attribution to Elizondo
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q6
  added_date: '2026-04-19'
  added_by_iteration: i0
  text: In the weeks that passed I was made aware that Lue had left the pentagon in protest and joined forces with Tom Delonge, Chris Mellon, Steve Justice and others to form To The Stars Academy.
  source:
    path: government/oversight-house-gov-fravor-written-testimony-20230726.pdf
    location: lines 78-79
  significance: TTSA formation — Elizondo / DeLonge / Mellon / Justice, per Fravor's relayed awareness
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
