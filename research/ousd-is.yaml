  note: 'Law Enforcement Oversight and Compliance Directorate. Per FY 2026 OSD OP-5, the Directorate serves as the senior advisor to the USD(I&S) for law enforcement policy, supported by an additional 18 FTEs and \$4,334 thousand in associated OUSD(I&S) Compensation and Benefits funding to implement direction contained within the Deputy Secretary of Defense memo dated 21 April 2023, designating OUSD(I&S) as the Principal Staff Assistant for Law Enforcement. Stand-up tense shift between FY 2025 OSD OP-5 (March 2024, future tense) and FY 2026 OSD OP-5 (June 2025, present tense) attests operational status was achieved sometime between March 2024 and June 2025, well after the original 90-day deadline (~July 20, 2023).'
