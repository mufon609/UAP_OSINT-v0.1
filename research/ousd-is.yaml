naming_quirks:
- id: nq1
  added_date: '2026-04-30'
  observed: USD(I)
  canonical: USD(I&S)
  location: 'historical references prior to NDAA FY2020 § 1621 (December 20, 2019)'
  source_path: government/pl-116-92-ndaa-fy2020.pdf
  resolution: preserve-as-sic-in-quotes
  note: The position was formally titled "Under Secretary of Defense for Intelligence" (USD(I)) from establishment in 2002 through December 19, 2019. Section 1621 of P.L. 116-92 redesignated the position effective on enactment (December 20, 2019). Pre-rename primary sources (Clapper SAP packet, Vickers nomination, Lettre testimony) attest the USD(I) form. Use the contemporaneous form when quoting and the canonical USD(I&S) form for current references.
- id: nq2
  added_date: '2026-04-30'
  observed: USW (Intelligence & Security)
  canonical: USD(I&S)
  location: war.gov Office of the Secretary of War organizational structure listing
  source_path: government/wargov-office-of-secretary-of-war.html
  resolution: preserve-as-sic-in-quotes
  note: Per EO 14347 Section 2(c), subordinate officials may use corresponding secondary titles such as Under Secretary of War in non-statutory contexts. The war.gov institutional listing uses USW (Intelligence & Security); statutory references per 10 U.S.C. § 137 retain the USD(I&S) form per EO 14347 Section 2(e).
- id: nq3
  added_date: '2026-04-30'
  observed: AAITP
  canonical: AATIP
  location: Clapper SAP packet, throughout
  source_path: government/clapper-depsecdef-sap-packet-final-20091117.pdf
  resolution: preserve-as-sic-in-quotes
  note: The November 17, 2009 Clapper memorandum is an OCR-scan source (Acrobat 9.55 Paper Capture Plug-in) where "AATIP" extracted as "AAITP" — character-cluster transposition typical of OCR errors. The memorandum also writes the longer-form name "Advanced Aerospace Threat and Identification Program" — also "Identification" rather than "Identification" suggests the underlying name is correctly Advanced Aerospace Threat Identification Program. Preserved in verbatim quotes; canonical form used outside quotes.
- id: nq4
  added_date: '2026-04-30'
  observed: AA WSAP
  canonical: AAWSAP
  location: Clapper SAP packet, throughout
  source_path: government/clapper-depsecdef-sap-packet-final-20091117.pdf
  resolution: preserve-as-sic-in-quotes
  note: OCR-scan source has unintended whitespace inside the AAWSAP acronym (AA WSAP). Preserved in verbatim quotes.
- id: nq5
  added_date: '2026-04-30'
  observed: 'DEfENSE PENTAGON'
  canonical: DEFENSE PENTAGON
  location: Clapper SAP packet letterhead
  source_path: government/clapper-depsecdef-sap-packet-final-20091117.pdf
  resolution: preserve-as-sic-in-quotes
  note: OCR-scan letterhead extraction of "DEFENSE PENTAGON" produced the lowercase-f variant "DEfENSE". Preserved in verbatim letterhead quote.
- id: nq6
  added_date: '2026-04-30'
  observed: ovember
  canonical: November
  location: Hicks AARO establishment memorandum, throughout
  source_path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
  resolution: preserve-as-sic-in-quotes
  note: OCR-scan dropped the leading "N" from "November" in multiple places (e.g., "ovember 23, 2021"). Preserved in verbatim quotes if the affected passage is excerpted.
- id: nq7
  added_date: '2026-04-30'
  observed: fulfi lled
  canonical: fulfilled
  location: Hicks AARO establishment memorandum
  source_path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
  resolution: preserve-as-sic-in-quotes
  note: OCR-scan inserted whitespace inside "fulfilled" (rendered as "fulfi lled"). Preserved when excerpted in the AARO mission-statement quote.
- id: nq8
  added_date: '2026-04-30'
  observed: CUl
  canonical: CUI
  location: DODIG-2026-047 management advisory body
  source_path: government/dodig-2026-047-redacted-secure.pdf
  resolution: preserve-as-sic-in-quotes
  note: OCR-extraction of CUI (Controlled Unclassified Information) acronym occasionally renders the trailing "I" as lowercase "l" (CUl). Preserved in verbatim quotes.
