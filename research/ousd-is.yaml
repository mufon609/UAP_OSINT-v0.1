- id: or15
  added_date: '2026-05-01'
  organization_path: /organizations/aic
  relationship_type: subsidiary
  source:
    path: government/osd-op5-fy26-wayback-20260201.pdf
    location: OSD OP-5 FY 2026, OUSD(I&S) program section, AIC bullet
  note: Advanced Intelligence Capabilities. Per FY 2026 OSD OP-5, AIC reports directly to the DEPSECDEF and the Principal Deputy Director of National Intelligence — the literal NDAA FY23 § 1683 statutory carveout language unique to AARO. The FY 2024 OSD OP-5 (March 20, 2023 release per PDF CreationDate) named the same OUSD(I&S) sub-office "All-domain Anomaly Resolution Office (AARO)"; the FY 2025 OSD OP-5 (March 11, 2024 release) was the first to substitute "Advanced Intelligence Capabilities (AIC)" with substantively identical mission language; FY 2026 OSD OP-5 retains AIC. No public DoD announcement of an AARO renaming has been issued; aaro.mil website remains active under the AARO name. Pair with or7 (AARO, per Hicks establishment memorandum); structural relationship between the two is unresolved across three interpretations (umbrella budget category / quiet rebrand / new program absorbing AARO) and is currently described as separate subsidiaries until a primary-source resolution surfaces.
