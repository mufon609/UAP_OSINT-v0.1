  source:
    path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
    location: 'Hicks AARO establishment memo, p. 1, ¶3 third bullet'
  note: Deputy Secretary of Defense Hicks directed the USD(I&S) to establish the All-domain Anomaly Resolution Office on July 15, 2022 in coordination with the Director of Administration and Management. AARO was the cognizant subordinate office established under USD(I&S) direction. Two-track relationship since late July 2023 — OUSD(I&S) retains administrative cognizance (contracting, security, public-affairs clearance, FOIA review, Congressional Activities coordination); operational reporting transitioned to the Deputy Secretary of Defense per 50 U.S.C. § 3373. Pair with or15 (AIC); the FY 2025 and FY 2026 OSD OP-5 budget submissions name the same-mission OUSD(I&S) sub-office "Advanced Intelligence Capabilities (AIC)" while AARO continues to operate publicly under its own name (aaro.mil active, FOIA org chart still lists AARO). The structural relationship between AARO and AIC at primary-source level is unresolved across three interpretations (umbrella budget category / quiet rebrand / new program absorbing AARO); description prose carries the analysis.
