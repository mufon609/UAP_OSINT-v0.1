rumors:
- id: r1
  added_date: '2026-04-20'
  claim: The ranch is approximately 512 acres
  status: primary-source-disputed
  observed_sources:
  - Wikipedia
  - history.co.uk
  - Vice 2020
  - most post-2005 news sources
  note: Primary-source Uintah County assessor records (2026) show 480.19 acres across 7 parcels. The 1996 contemporaneous Deseret reporting of 480-acre is consistent with the 2026 parcel record. Modern 512-acre figure is repeated across secondary sources but contradicted by primary assessor data.
- id: r2
  added_date: '2026-04-20'
  claim: A bulletproof wolf-like creature was shot on the ranch during the Sherman era
  status: not-primary-source-established
  observed_sources:
  - Hunt for the Skinwalker (2005) popular lore
  - various paranormal-genre retellings
  note: Widely-circulated claim from the Sherman-era post-NDA period; not documented in the contemporaneous 1996 Deseret News reporting. Represents popular-lore content that Hunt for the Skinwalker (2005) introduced; primary-source backing unknown.
- id: r3
  added_date: '2026-04-20'
  claim: The ranch is the site of interdimensional portals / gateways
  status: not-primary-source-established
  observed_sources:
  - Gary Hart statements quoted in Deseret News October 1996
  - NIDS-era and post-NIDS paranormal-genre coverage
  note: The 1996 Deseret article quotes UFO researcher Gary Hart speculating about 'interdimensional doorway' — a researcher-speculation claim rather than a primary-source-established fact. The claim persists in popular discourse without direct primary-source backing.
- id: r4
  added_date: '2026-04-20'
  claim: The Skinwalker cryptid creature has been observed on the property
  status: not-primary-source-established
  observed_sources:
  - Hunt for the Skinwalker (2005)
  - The Secret of Skinwalker Ranch (History Channel, 2020-)
  note: The name 'Skinwalker Ranch' derives from Navajo/Ute skinwalker legends, but neither tribal affiliation has made on-record statements about the ranch. The cryptid observation claims are post-2005 lore without contemporaneous primary-source documentation.
