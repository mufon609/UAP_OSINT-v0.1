naming_quirks:
- id: nq1
  added_date: '2026-04-20'
  observed: 480-acre ranch
  canonical: 480.19-acre (7-parcel) ranch
  location: Deseret News October 1996 article body
  source_path: news/aliendave-nids-ranch-mirror-19961020.html
  resolution: use-canonical
  note: Primary-source Uintah County assessor records (2026) show 480.19 acres across 7 parcels totaling the ranch. Modern secondary sources (Wikipedia, history.co.uk, Vice 2020) repeat 512 acres — see rumor r1. The 1996 contemporaneous Deseret reporting of 480-acre is more accurate and matches the 2026 parcel-record sum.
- id: nq2
  added_date: '2026-04-20'
  observed: Tom and Ellen Gorman
  canonical: Terry and Gwen Sherman
  location: Hunt for the Skinwalker (2005) book throughout
  source_path: news/aliendave-nids-ranch-mirror-19961020.html
  resolution: use-canonical
  note: Kelleher and Knapp's 2005 book used pseudonyms 'Tom and Ellen Gorman' for the 1994-1996 owners. The actual names Terry and Gwen Sherman are documented in contemporaneous Deseret News reporting (1996). When quoting from Hunt for the Skinwalker directly in future node iterations, preserve the 'Gorman' form in-quote per preserve-as-sic-in-quotes pattern.
- id: nq3
  added_date: '2026-04-20'
  observed: Sherman ranch
  canonical: Skinwalker Ranch
  location: Deseret News 1996-1997 articles throughout
  source_path: news/aliendave-nids-ranch-mirror-19961020.html
  resolution: preserve-as-sic-in-quotes
  note: Pre-2005 primary sources (Deseret News 1996-1997) consistently call the property 'the Sherman ranch' or 'the former Sherman ranch'. The 'Skinwalker Ranch' naming entered public record via Kelleher and Knapp's 2005 book and became canonical post-2005. Both names apply to the same property; historical-primary-source quotes preserve the contemporaneous naming.
- id: nq4
  added_date: '2026-04-20'
  observed: Kenneth Myers
  canonical: Kenneth John Myers
  location: Frank Warren 2020 article
  source_path: news/theufochronicles-myers-family-20200412.html
  resolution: use-canonical
  note: Frank Warren's 2020 piece uses the full 'Kenneth John Myers' form while most sources use 'Kenneth Myers'. Preserve source form in quotes, use canonical elsewhere.
