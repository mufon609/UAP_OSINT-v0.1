description: 'Statement for the House Oversight Committee ([`/events/2023-07-26-house-uap-hearing`]) by David Fravor ([`/people/david-fravor`]), retired Commander in the U.S Navy ([`/organizations/us-navy`]). First, thank you to the committee for the invitation to speak on the UAP topic that has been in the news for the past 6 years. Fravor''s identification: in Nov 2004 the Commanding Officer of Strike Fighter Squadron Forty-One ([`/organizations/vfa-41`]) — the "World Famous Black Aces" — attached to Carrier Airwing Eleven ([`/organizations/carrier-airwing-eleven`]) and stationed onboard the USS Nimitz ([`/organizations/uss-nimitz`]) (CVN-68) at the beginning of a workup cycle to prepare for a combat deployment to the Persian Gulf supporting ground forces in Iraq.


  The Nov 2004 USS Nimitz UAP incident ([`/events/2004-nimitz-encounter`]): a 2 V 2 Air to Air training exercise with two F/A-18Fs as Blue Air controlled by the USS Princeton ([`/organizations/uss-princeton`]) (CG-59), with the Red Air flown by Marine F/A-18 squadron VMFA-232 ([`/organizations/vmfa-232`]); training suspended on launch for real world tasking; the air controller had been observing objects on their Aegis combat system for the prior two weeks, descending from above 80,000ft to 20,000ft; Merge Plot at 20,000 ft; a small white Tic Tac shaped object with longitudinal axis pointing N/S moving abruptly over white water; rapidly accelerated and disappeared in front of the aircraft at approximately ½ a mile; reappeared 60 miles east on the USS Princeton''s Aegis SPY 1 radar in less than a minute — far superior in performance to Fravor''s brand-new F/A-18F. The targeting pod video was taken by another Nimitz crew and released by the USG in 2017; the APG-73 radar jamming was not seen on the released video.


  In closing: the 2009 contact from Jay Stratton ([`/people/jay-stratton`]) on the ATIP (Anomalous Threat Identification Program) led by Lue Elizondo ([`/people/luis-elizondo`]) out of the DOD ([`/organizations/dod`]); Alex Dietrich ([`/people/alex-dietrich`]), invited to the Pentagon multiple times as the other pilot in Fravor''s flight; Elizondo''s 2016 contact with Fravor; Lue then joined forces with Tom Delonge ([`/people/tom-delonge`]), Chris Mellon ([`/people/christopher-mellon`]), Steve Justice ([`/people/steve-justice`]) to form To The Stars Academy ([`/organizations/ttsa`]); the work with Leslie Keane ([`/people/leslie-kean`]), Ralph Blumenthal ([`/people/ralph-blumenthal`]), and Helene Cooper ([`/people/helene-cooper`]) on the Dec 2017 NYT articles; and oversight by elected officials of programs working on craft "not from this world."

  '
