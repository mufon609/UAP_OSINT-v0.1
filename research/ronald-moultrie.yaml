quotes:
- id: q1
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-03-17'
  text: |
    Chairman Gallego, Ranking Member Kelly, and distinguished members of the
    Subcommittee, it is a privilege to testify on the current posture of the Defense Intelligence and
    Security Enterprise in addressing the threats facing the United States of America, its allies, and
    partners.
  source:
    path: government/hasc-iso-moultrie-witness-statement-20220317.pdf
    location: "p. 1, ¶3"
  significance: HASC ISO opening — establishes the posture-hearing framing and addresses the subcommittee leadership directly
  context: Prepared remarks, House Armed Services Committee Subcommittee on Intelligence and Special Operations
- id: q2
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-03-17'
  text: |
    As the Under Secretary of Defense for Intelligence and Security, I am committed to
    strengthening and leveraging an integrated partnership between the Department of Defense and
    the Intelligence Community for the defense of our nation.
  source:
    path: government/hasc-iso-moultrie-witness-statement-20220317.pdf
    location: "p. 1, ¶6"
  significance: HASC ISO mission statement — Moultrie's self-description of the USD(I&S) integration mandate
  context: Prepared remarks, House Armed Services Committee Subcommittee on Intelligence and Special Operations
- id: q3
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-03-17'
  text: |
    Through our four "Big Plays," we will optimize our efforts, deliver meaningful outcomes,
    and maintain our Nation's strategic advantage. These Big Plays are:
             •   Providing an information and decision advantage to our leaders and warfighters;
             •   Operationalizing our partnerships within the Department, the interagency, and our
                 allies and partners;
             •   Elevating security awareness and counterintelligence across the Department; and,
             •   Identifying, recruiting, training, and retaining a workforce capable of supporting the
                 Department's I&S requirements.
  source:
    path: government/hasc-iso-moultrie-witness-statement-20220317.pdf
    location: "p. 2, ¶3"
  significance: HASC ISO 'Big Plays' framework — Moultrie's stated four-priority structure for the OUSD(I&S) program of work
  context: Prepared remarks, House Armed Services Committee Subcommittee on Intelligence and Special Operations
- id: q4
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-03-17'
  text: |
    Last year, the President's $715 billion-dollar defense budget request included $23.3 billion
    for MIP. We believe that the resources requested in this year's budget will provide another
    opportunity to ensure our nation's strategic advantage.
  source:
    path: government/hasc-iso-moultrie-witness-statement-20220317.pdf
    location: "p. 2, ¶7"
  significance: HASC ISO budget framing — Moultrie cites $23.3B MIP figure for Military Intelligence Program FY22 within $715B defense budget
  context: Prepared remarks, House Armed Services Committee Subcommittee on Intelligence and Special Operations
- id: q5
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-03-17'
  text: |
    Consistent with the recommendations of the Government Accountability Office in its May
    2021 report regarding OUSD(I&S) oversight, we are taking the following actions to clarify and
    update our Enterprise governance and oversight frameworks:
             •   Revising policy and strategic guidance to establish clear expectations for oversight;
             •   Codifying management roles and responsibilities to enable effective governance at
                 the component level;
             •   Developing and incorporating a process to track and oversee enterprise performance
                 and enhance accountability; and
  source:
    path: government/hasc-iso-moultrie-witness-statement-20220317.pdf
    location: "p. 3, ¶6"
  significance: HASC ISO governance commitment — Moultrie cites GAO May 2021 report and outlines OUSD(I&S) oversight remediation steps
  context: Prepared remarks, House Armed Services Committee Subcommittee on Intelligence and Special Operations
- id: q6
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-12-16'
  text: |
    Thank you. Good afternoon. I'm Ronald Moultrie, the Under Secretary of Defense for Intelligence and Security. It's a pleasure to be here today to provide an update on the department's efforts to address unidentified anomalous phenomena, or UAP. In May of this year, I appeared before Congress for the first open hearing on UAP in 50 years. In my testimony, I underscored that the Department of Defense takes UAP reports seriously. You may have caught that I just said unidentified anomalous phenomena, whereas in the past the department has used the term unidentified aerial phenomena. This new terminology expands the scope of UAP to include submerged and trans-medium objects.  Unidentified phenomena in all domains, whether in the air, ground, sea or space, pose potential threats to personnel security and operations security, and they require our urgent attention.
  source:
    path: government/defense-gov-moultrie-kirkpatrick-aaro-roundtable-20221216.html
    location: line 956 ¶ Good afternoon I'm Ronald Moultrie
  significance: AARO Media Roundtable opening — Moultrie introduces the 'unidentified anomalous phenomena' terminology shift expanding UAP scope to submerged and trans-medium objects, and references his May 17 2022 HPSCI testimony as the first open UAP hearing in 50 years
  context: Joint USD(I&S)–AARO Director media roundtable
- id: q7
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-12-16'
  text: |
    At this time, the answer's no, we have nothing. We're committed -- and I have to say this because I -- I talked with the Secretary and I talked with the Deputy Secretary about this, about openness and objectivity, and transparency that we have committed to -- to the Congress, the American people, to you in the press corps. We have not seen anything that would -- but we -- we're certainly very early on -- that would lead us to believe that any of the objects that we have seen are of alien origin, if you will.  If we are -- if we find something like that, we will look at it and analyze it and take the appropriate actions.
  source:
    path: government/defense-gov-moultrie-kirkpatrick-aaro-roundtable-20221216.html
    location: line 1018 ¶ At this time
  significance: AARO Media Roundtable alien-origin denial — Moultrie's foundational on-record DoD denial of alien origin for UAP-observed objects, citing personal communications with the Secretary and Deputy Secretary about openness, objectivity, and transparency
  context: Joint USD(I&S)–AARO Director media roundtable, Q&A
- id: q8
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-12-16'
  text: |
    Let me answer. This is Ron Moultrie, Under Secretary of Defense for Intelligence and Security. Then I'll pass it to Dr. Kirkpatrick to give his -- his words on this. So, let me just characterize your question when you're talking about, we've been visited, is there a possibility of alien life? So, I'm gonna to discount meteorites and things like that, that might have microbes on it and those types of things, and just talk about things that may be intelligent life that may have crashed landed on our planet or that may have the -- in somehow visited our planet. In terms of holdings that I have seen and holdings, that that we have gone through -- and we are being very thorough about this, and we are going back and trying to understand all the compartmented programs that this department has had, understand all the relationships that we may have had with any other organizations and all the predecessor organizations that were established before we were officially a Department of Defense. We've looked at all that; I have not seen anything in those holdings to date that would suggest that there has been an alien visitation, an alien crash, or anything like that.  Once again, with what Dr. Kirkpatrick is doing, we are still very early on in the work that we're doing. But that means we have to go back retrospectively and understand some of the holdings that we have. And Dr. Kirkpatrick and his team is still doing that. But I have not seen anything today that would suggest that we have anything of that nature.
  source:
    path: government/defense-gov-moultrie-kirkpatrick-aaro-roundtable-20221216.html
    location: line 1122 ¶ Let me answer
  significance: AARO Media Roundtable 'holdings' boundary — Moultrie establishes the 'holdings I have seen' rhetorical boundary that limits AARO claims to documents and memos rather than physical artifacts; references compartmented programs, predecessor organizations, and pre-DoD legacy entities; this boundary persists as institutional posture across subsequent AARO leadership
  context: Joint USD(I&S)–AARO Director media roundtable, Q&A on alien visitation
- id: q9
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-12-16'
  text: |
    So, in my organization, which is the intelligence and security organization, we are responsible for the comprehensive security of all elements within the Department of Defense.  So that is our personnel, which is foremost in our minds, our platforms, our --our systems, our bases, our installations, and our -- our activities, whether they occur in any domain.  And we operate in all domains today. So, we operate under the surface of the water, we operate on land, we operate in the air, of course, we operate in space. Anything that appears within the proximity of our activities that is anomalous, something that we can't identify, we have the responsibility to resolve what that is, and to report that back to our commanders, to our operators, to ensure that they are safe.
  source:
    path: government/defense-gov-moultrie-kirkpatrick-aaro-roundtable-20221216.html
    location: line 1026 ¶ Sure, let me take that one
  significance: AARO Media Roundtable scope statement — Moultrie's articulation of the 'all-domain' framing covering air, ground, sea, and space, anchoring AARO's mandate in the OUSD(I&S) institutional security mission
  context: Joint USD(I&S)–AARO Director media roundtable, Q&A
- id: q10
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2022-12-16'
  text: |
    Any unauthorized system in our airspace we deem as a threat to safety. So, that can be one of our systems or one of our relatives -- it's any system that is not authorized or platform not authorized to be in a domain that is restricted, we consider that to be a potential threat to the safety of our personnel or to our platforms.
  source:
    path: government/defense-gov-moultrie-kirkpatrick-aaro-roundtable-20221216.html
    location: line 1098 ¶ Any unauthorized system
  significance: AARO Media Roundtable threat-framing — Moultrie's safety-of-personnel framing under which any unauthorized system in restricted airspace constitutes a potential threat regardless of origin or characterization
  context: Joint USD(I&S)–AARO Director media roundtable, Q&A
- id: q11
  added_date: '2026-04-29'
  observation_type: relayed
  statement_date: '2024-12-03'
  text: |
    LeoLabs has already established itself as a trusted leader in the Space Domain Awareness field and is well positioned to support a wide array of U.S. defense, Allied, and commercial requirements
  source:
    path: news/leolabs-moultrie-board-20241203.html
    location: line 311 ¶ I'm honored to join the company's Board
  significance: LeoLabs Board appointment quote — Moultrie's public statement on accepting the Outside Director role nine months after his February 29 2024 USD(I&S) departure
  context: LeoLabs press release announcing Moultrie's Board of Directors appointment
- id: q12
  added_date: '2026-04-29'
  observation_type: relayed
  text: |
    Ronald (Ron) Moultrie is the President/Owner of Ron Moultrie Consulting, LLC. He is an Appointed Board Member to both the President's Intelligence Advisory Board (PIAB) and the President's Intelligence Oversight Board (IOB).  Ron brings unique leadership and advisory experience having served as the Under Secretary of Defense for Intelligence and Security. Presidentially appointed and Senate confirmed, he was the senior advisor to the Secretary of Defense on all intelligence and security matters and managed a portfolio of over $30 billion dollars and 225,000 global civilian and uniformed personnel.
  source:
    path: news/insa-moultrie-bio.html
    location: line 249 ¶ Ronald (Ron) Moultrie is the President/Owner
  significance: INSA bio summary — Moultrie's post-government public-bio framing of his USD(I&S) tenure ($30B portfolio + 225,000 personnel)
  context: Intelligence and National Security Alliance public profile page (post-government)
- id: q13
  added_date: '2026-04-29'
  observation_type: relayed
  text: |
    The Honorable Ronald (Ron) Moultrie is highly sought after for his insights and experience on national security policy and global intelligence issues, emerging technology application, organizational leadership and corporate culture evolution.  He is on the Board of Nightwing, LeoLabs, Inc, the National Cryptologic Foundation, and he served on the President's Intelligence Advisory Board (PIAB) and the President's Intelligence Oversight Board (IOB), until January 2025.
  source:
    path: news/umd-moultrie-faculty-bio.html
    location: line 785 ¶ The Honorable Ronald (Ron) Moultrie
  significance: UMD School of Public Policy bio — current public listing of post-government board affiliations (Nightwing, LeoLabs, National Cryptologic Foundation) and PIAB/IOB end-of-service date (January 2025)
  context: University of Maryland School of Public Policy faculty profile page (post-government)
