- id: i0
  date: '2026-04-20'
  trigger: initial-build
  summary: 'First end-to-end population of the Grusch person artifact under the F.1b whistleblower renderer. Two archived primary sources: the written testimony (Opening Statement and Closing Statement, 3 pages, 104 lines) and the Congressional biographical submission (4 pages, 162 lines — effectively a resume / CV). 9 affiliations covering USAF Active Duty positions, USAF Reserve NRO tenure, concurrent Blue Sky Innovators civilian SETA role, APUS adjunct professorship, UAPTF membership 2019-2021, NGA GS-15 role, USAF Academy augmentee, 318 Cyber Operations Group IMA, and Sol Foundation COO. 15 timeline entries covering education milestones (BSc 2009, MA 2012, MPA in-progress 2023), major role transitions, security certifications (FSO 2016, IFPC 2020, SFPC 2021, SPSC 2021), the 2019 UAPTF director SAPs/CAPs tasking, and the 2023-07-26 hearing testimony. 11 quotes — 9 from written testimony (identity, UAP role, whistleblower filing mechanism, sworn-but-relayed framing, NRO role, SAPs/CAPs tasking, core multi-decade program allegation, retaliation, closing Non-Human Reverse Engineering Programs framing) and 2 from bio (professional identity per OBJECTIVE, NGA UAP-lead accomplishment). 3 quotes tagged category filed-claim (q3 whistleblower filing, q7 core program allegation, q8 retaliation) surfacing through the Claim Inventory renderer. relationships empty and vouching_chain empty at i0 — neither archived primary source names any specific individuals in Grusch-to-person relationships or provides external vouching attestations. 11 entities_referenced covering the orgs named in quotes (USAF, NGA, UAPTF, AARO, NRO, ICIG, DoD), PPD-19 document, both primary-source documents, and the hearing event. 2 rumors registered for the biologics assertion and specific-named-program terminology — widely attributed to Grusch but not present in the written statement extracted here. 6 research_gaps: PPD-19 filing date; identities of the individuals who shared evidence with Grusch; Vouching Chain population from third-party sources; retaliation specifics; cross-reference Material Differences against oral transcript; register bio PDF as its own document node.'
