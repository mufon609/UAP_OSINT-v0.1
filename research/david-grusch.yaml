quotes:
- id: q1
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: My name is David Charles Grusch. I was an intelligence officer for 14 years, both in the US Air Force (USAF) at the rank of Major and most recently, from 2021-2023, at the National Geospatial-Intelligence Agency at the GS-15 civilian level, which is the military equivalent of a full-bird Colonel.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶3
  significance: Identity, rank, agencies, service span
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q2
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: I was my agency’s co-lead in Unidentified Anomalous Phenomena (UAP) and trans-medium object analysis, as well as reporting to UAP Task Force (UAPTF) and eventually the All-Domain Anomaly Resolution Office (AARO).
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶3
  significance: UAP-specific role — NGA co-lead; UAPTF and AARO reporting
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q3
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: I became a Whistleblower, through a PPD-19 Urgent Concern filing with the Intelligence Community Inspector General (ICIG), following concerning reports from multiple esteemed and credentialed current and former military and Intelligence Community individuals that the US Government is operating with secrecy - above Congressional oversight - with regards to UAPs.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶4
  significance: Whistleblower filing mechanism and basis — PPD-19 Urgent Concern with ICIG
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  category: filed-claim
  statement_date: '2023-07-26'
- id: q4
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: But as I stand here under oath now, I am speaking to the facts as I have been told them.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶7
  significance: Sworn-but-relayed framing — testimony on facts as they have been told to Grusch
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q5
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: In the USAF, in my National Reconnaissance Office (NRO) reservist capacity, I was a member of the UAPTF from 2019-2021. I served in the NRO Operations Center on the director’s briefing staff, which included the coordination of the Presidential Daily Brief (PDB) and supporting contingency operations.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶8
  significance: NRO reservist role and UAPTF membership 2019-2021
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q6
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: In 2019, the UAPTF director tasked me to identify all Special Access Programs & Controlled Access Programs (SAPs/CAPs) we needed to satisfy our congressionally mandated mission.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶9
  significance: SAPs/CAPs tasking — 2019 directive from UAPTF director
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q7
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: I was informed, in the course of my official duties, of a multi-decade UAP crash retrieval and reverse engineering program to which I was denied access to those additional read-on’s.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶11
  significance: Core allegation — multi-decade UAP crash retrieval and reverse engineering program; denied access
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  category: filed-claim
  statement_date: '2023-07-26'
- id: q8
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: As you know, I have suffered retaliation for my decision. But I am hopeful that my actions will ultimately lead to a positive outcome of increased transparency.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶13
  significance: Retaliation claim — assertion of retaliation for the whistleblower decision
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  category: filed-claim
  statement_date: '2023-07-26'
- id: q9
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: It is my hope that the revelations we unearth through investigations of the Non-Human Reverse Engineering Programs I have reported will act as an ontological (earth-shattering) shock, a catalyst for a global reassessment of our priorities.
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Closing ¶18
  significance: Closing terminology — Non-Human Reverse Engineering Programs; ontological (earth-shattering) shock
  context: Written testimony, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q10
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: As a senior intelligence and strategic engagement advisor, I will provide subject matter expert-level support that utilizes my extensive time as a United States Air Force Intelligence Officer, DoD-contracted Science and Engineering Technical Advisor (SETA), and NGA Senior Geospatial Intelligence Officer.
  source:
    path: government/docs-house-gov-grusch-bio-20230726.pdf
    location: lines 10-13
  significance: Professional identity per Grusch's 2023 biographical submission
  context: Congressional biographical submission, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
- id: q11
  added_date: '2026-04-20'
  added_by_iteration: i0
  text: NGA lead for Unidentified Anomalous Phenomena (UAP) and Trans-Medium Anomaly issues. Executed new program of record responsive to direct tasking by the Congressional Intelligence Committees.
  source:
    path: government/docs-house-gov-grusch-bio-20230726.pdf
    location: lines 22-24
  significance: NGA UAP-lead accomplishment — program of record responsive to Congressional tasking
  context: Congressional biographical submission, House Oversight Committee
  observation_type: relayed
  statement_date: '2023-07-26'
