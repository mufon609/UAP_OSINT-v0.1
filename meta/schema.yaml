# Primary-source investigation knowledge-base — schema
#
# Single source of truth for node types, required sections, vocabularies,
# and structural rules. Read by scripts/validate.py and scripts/new.py.
# Human-readable rationale lives in meta/conventions.md.

schema:
  version: 1
  revision_date: 2026-04-17
  compatible_with: [1]
  # compatible_with lists which file-level schema_version values validate
  # cleanly against this spec. Expanded during migration windows; shrunk
  # when a version is retired. Migration docs live in
  # meta/toolkit-notes/schema-migrations/{from}-to-{to}.md.

# Every schema-governed file carries schema_version in its frontmatter
# (nodes, templates, research artifacts, governance docs under meta/).
# Version is checked at validation time against `schema.compatible_with`
# above. Mismatches surface as errors with a pointer to the migration doc.

# ---------------------------------------------------------------------------
# Cross-cutting vocabularies
# ---------------------------------------------------------------------------

status_markers:
  confirmed: "✅ Confirmed"
  pending: "⏳ Pending"
  flagged: "⚠ Flagged"
  disputed: "⚠ Disputed — unknown"     # both sides assert; neither has primary-source evidence
  contradiction: "❌ Contradiction"     # positions directly contradict and at least one side is backed by primary-source evidence

limits:
  table_cell_words_soft: 50  # table cells exceeding this should promote to
                              # a ### subsection or a finding node

quote_verification_fields:
  required: [Attributed to, Source, Verified]
  optional: [Location, Note]

# ---------------------------------------------------------------------------
# Open Questions formatting
# ---------------------------------------------------------------------------

open_questions:
  unresolved: "- [ ] {imperative statement} — {context}"
  resolved: "- [x] {original} — DONE YYYY-MM-DD: {resolution}"
  rule: |
    Remove resolved items and promote the resolution into the node body
    (Description, Key Passages, What It Confirms, Credibility Notes, etc).
    Retain `- [x] DONE` only for null findings, provenance-chain notes,
    or methodology outcomes where the closure itself is the useful record.

# ---------------------------------------------------------------------------
# Node types
# ---------------------------------------------------------------------------

types:

  # --- PERSON -------------------------------------------------------------
  # Person is the only node type with a claiming agent. Under the
  # statements-only discipline, every person node carries a universal
  # `## Statements` surface — verbatim quotes, speaker-attributed, marker-
  # flagged, split by `observation_type` into Direct Observations
  # (first-hand sensory testimony) and Other Statements (anything else the
  # person asserted, including relayed / inferential / published / filed-
  # claim material). Archetype-specific sections (Corroboration /
  # Claim Inventory / Program Involvement / Publication Record) remain
  # distinct but are cross-reference or metadata surfaces, NOT statement
  # surfaces — they point at other observers, list filed claims (rendered
  # from statements tagged `category: filed-claim`), track institutional
  # access, or index publications respectively. Timeline is required on
  # every archetype: one aggregated chronological table of dated facts
  # (role transitions, clearances, affiliations, observations, testimony,
  # publications, incidents) with a Category column enabling scan-by-type
  # without losing the chronological view.
  person:
    status_values: [active, in-progress]
    frontmatter:
      required: [id, type, schema_version, status, archetype, created]
      optional: [authored_works]  # list of /documents/... paths (doc_form: book)
    archetypes:
      eyewitness:
        description: "Someone who personally observed a documented event"
        required_sections:
          - Identity
          - Background
          - UAP Relevance
          - Affiliations
          - Statements
          - Timeline
          - Relationships
          - Corroboration
          - Credibility Notes
          - Associated Nodes
          - Open Questions / Research Gaps
      whistleblower:
        description: "Someone who filed a formal complaint and makes structured claims"
        required_sections:
          - Identity
          - Background
          - UAP Relevance
          - Affiliations
          - Statements
          - Timeline
          - Relationships
          - Claim Inventory
          - Credibility Notes
          - Vouching Chain
          - Associated Nodes
          - Open Questions / Research Gaps
      institutional-actor:
        description: "Significance rests on institutional access and role"
        required_sections:
          - Identity
          - Background
          - UAP Relevance
          - Affiliations
          - Statements
          - Timeline
          - Relationships
          - Program Involvement
          - Credibility Notes
          - Associated Nodes
          - Open Questions / Research Gaps
      reporter:
        description: "Significance rests on published journalism"
        required_sections:
          - Identity
          - Background
          - UAP Relevance
          - Affiliations
          - Statements
          - Timeline
          - Relationships
          - Publication Record
          - Credibility Notes
          - Associated Nodes
          - Open Questions / Research Gaps
    timeline_category_values:
      # Extensible; validator warns on unknown values but does not error.
      - affiliation
      - role
      - observation
      - testimony
      - publication
      - clearance
      - incident
      - filing
      - other
    section_rules:
      Background: {prose_only: true}
      Affiliations: {split: [Confirmed, Flagged]}
      Relationships: {split: [Confirmed, Flagged]}
      Statements:
        requires_quote_verification: true
        split: [Direct Observations, Other Statements]
      Timeline: {chronological: true}

  # --- ORGANIZATION -------------------------------------------------------
  # Under the statements-only discipline (post-Step-D document claims-layer
  # elimination, extended through events / transcripts / media): orgs don't
  # speak — officials speak for them. The previous `What Is Confirmed`
  # section was contributor-prose synthesis anchored to sources, same shape
  # as the document claims layer eliminated earlier. F.5 removes it across
  # all three kinds. Factual content about the org flows through:
  #   - Key Passages — verbatim excerpts from primary sources ABOUT the
  #     org (establishment press releases, statutory authority, director
  #     announcements, IG findings). Parallels document Key Passages but
  #     subject-about-org rather than doc-as-subject.
  #   - Timeline — dated events (founding, reorganization, leadership
  #     transition, contract, incident) with per-row source attribution.
  #   - Key Personnel — cross-reference surface (person_path + role +
  #     period + source), sub-grouped by leadership_class (director /
  #     deputy / staff / advisor / other) via renderer-side dispatch.
  #   - Primary Contracts (gov-contractor kind only) — contract metadata
  #     (number, period, value, counterparties, deliverables) with source
  #     attribution per row.
  #   - Description — labeled contributor synthesis (1-3 paragraphs);
  #     subject to check #16 prose-drift scoping.
  organization:
    status_values: [active, in-progress]
    frontmatter:
      required: [id, type, schema_version, status, kind, created]
    kinds:
      gov:
        description: "Government — federal department, agency, program office, federal lab, congressional body, military service, military unit"
        required_sections:
          - Overview
          - Description
          - Key Personnel
          - Key Passages
          - Timeline
          - Relationships
          - Associated Nodes
          - Open Questions / Research Gaps
      gov-contractor:
        description: "Organization whose existence is a government contract (e.g., BAASS, EarthTech)"
        required_sections:
          - Overview
          - Description
          - Key Personnel
          - Key Passages
          - Primary Contracts
          - Timeline
          - Relationships
          - Associated Nodes
          - Open Questions / Research Gaps
      private:
        description: "Private company, nonprofit, academic institution, media outlet"
        required_sections:
          - Overview
          - Description
          - Key Personnel
          - Key Passages
          - Timeline
          - Relationships
          - Associated Nodes
          - Open Questions / Research Gaps
    section_rules:
      Relationships: {split: [Confirmed, Flagged]}
      Key Personnel: {split: [Confirmed, Flagged]}
      Timeline: {chronological: true}
      Key Passages: {requires_quote_verification: true}
      Primary Contracts: {chronological: true}

  # --- DOCUMENT -----------------------------------------------------------
  document:
    status_values:
      - primary-source-confirmed
      - declassified-full
      - declassified-partial
      - classified
      - unverified-existence
    frontmatter:
      required: [id, type, schema_version, status, kind, doc_form, created]
      optional: [corpus, archival_status]
      # corpus: e.g., "aawsap-dird" — loads meta/addenda/{corpus}.md
      # archival_status: applies to non-gov-doc doc_forms where the full
      #   text may not be archived locally. Required when doc_form is
      #   `book`; optional for `article` and other non-gov-doc forms.
    archival_status_values:
      - full-text-archived
      - excerpts-only
      - not-archived
    conditionally_required:
      archival_status: "doc_form == book"
    kinds:
      gov-doc:
        description: "Government-originated document"
        # A document node IS the fact record — its evidentiary content is
        # verbatim source passages (Key Passages), not contributor-summarized
        # "claims". Other nodes that reference facts from a document link to
        # the document and cite the specific passage. No contributor-prose
        # synthesis layer sits between the source and the reader; drift
        # surfaces cannot exist where contributor prose cannot rephrase.
        required_sections:
          - Document Summary
          - Description
          - Provenance
          - Key Passages
          - Associated Nodes
          - Open Questions / Research Gaps
      non-gov-doc:
        description: "Non-government document — article, book, blog post, social-media post, private filing, personal correspondence"
        required_sections:
          - Document Summary
          - Description
          - Key Passages
          - Associated Nodes
          - Open Questions / Research Gaps
    doc_form_values:
      # Extensible. Validator warns on unknown values but does not error.
      # Document nodes are text-native only — video/photo/audio primary
      # sources move to the `media` type. Transcriptions of speech from
      # media sources live on transcript nodes.
      - technical-report
      - testimony
      - memo
      - letter
      - contract
      - press-release
      - assessment
      - bio
      - complaint
      - article
      - book
      - social-post
      - filing
      - database-extract
      - other
    section_rules:
      Key Passages: {requires_quote_verification: true}
      Provenance: {chronological: true}

  # --- EVENT --------------------------------------------------------------
  # Events are venues / incidents — they don't speak. Witness statements
  # live on transcript nodes + witness person nodes; documentary evidence
  # lives on document + media nodes. An event node is a convergence
  # point tying those nodes together.
  #
  # Hearings previously carried `What The Hearing Established` as a
  # contributor-prose synthesis section. F.2a collapses that into
  # `Witnesses & Testimony` — a cross-reference table (witness → oath
  # status → transcript/document nodes) with no synthesis prose.
  # Parallel to the news/book `What The Article Established` collapse
  # that shipped in the post-Step-D source-taxonomy consolidation.
  event:
    status_values: [documented, in-progress]
    frontmatter:
      required: [id, type, schema_version, status, kind, created]
    kinds:
      hearing:
        description: "Formal proceeding — congressional hearing, deposition"
        required_sections:
          - Event Summary
          - Description
          - Participants
          - Timeline
          - Key Testimony
          - Witnesses & Testimony
          - Associated Nodes
          - Open Questions / Research Gaps
      encounter:
        description: "Observed event — UAP sighting, incident"
        required_sections:
          - Event Summary
          - Description
          - Participants
          - Timeline
          - Corroboration
          - Associated Nodes
          - Open Questions / Research Gaps
    section_rules:
      Participants: {split: [Confirmed, Flagged]}
      Key Testimony: {requires_quote_verification: true}
      Timeline: {chronological: true}

  # --- TRANSCRIPT ---------------------------------------------------------
  transcript:
    status_values: [primary-source-confirmed, partial]
    frontmatter:
      required: [id, type, schema_version, status, kind, created]
      optional: [source_medium, derived_from]
      # source_medium: free-text metadata for the underlying source format
      #   (e.g., stenographic-pdf, youtube, podcast, broadcast, documentary,
      #   press-conference, conference-talk, deposition, radio, streaming).
      #   Not a controlled vocabulary — extensible as new formats appear.
      # derived_from: path to the underlying media or document node this
      #   transcript IS a text rendering OF (e.g., /media/gimbal-video for
      #   a transcript of a video file). Use ONLY when the transcript
      #   exists *because of* the linked source — i.e., the transcript is
      #   a derivative rendering, not an independent record. Most
      #   appropriate for `other`-kind transcripts (podcast → audio file;
      #   interview → video file; press conference → recording).
      #
      #   Do NOT use for hearing transcripts vs. their companion written
      #   testimony — those are independent primary records of the same
      #   event, not derivations. Use
      #   context_extrinsic.companion_written_testimony for that
      #   cross-reference instead (per F.3c D3, 2026-04-19). The renderer
      #   keeps a `derived_from → /documents/...` fallback on hearing
      #   transcripts for backward compatibility, but the convention is
      #   companion_written_testimony.
    kinds:
      hearing:
        description: "Verbatim record of a formal proceeding — congressional hearing, deposition. Material-differences dimension applies (written-vs-oral)."
        required_sections:
          - Publication Record
          - Summary
          - Speakers
          - Key Passages
          - Material Differences
          - Associated Nodes
          - Open Questions / Research Gaps
      other:
        description: "Verbatim record of any non-hearing speech source — interview, podcast, broadcast, documentary, film, conference talk, press conference, radio, streaming"
        required_sections:
          - Publication Record
          - Summary
          - Speakers
          - Key Passages
          - Associated Nodes
          - Open Questions / Research Gaps
    section_rules:
      Key Passages: {requires_quote_verification: true}

  # --- MEDIA --------------------------------------------------------------
  # Non-text-primary primary sources — photos, videos, audio, imagery.
  # Media nodes hold file metadata + provenance + contributor-authored
  # Description (synthesis, labeled). They MAY have verbatim Key Passages
  # when the source contains extractable speech (audio/video) or visible
  # text (legible text in a photo, on-screen text in a video frame).
  # Heavy speech content (full interview, full cockpit audio) spins up a
  # separate transcript node that points to the media via `derived_from`.
  media:
    status_values:
      - primary-source-confirmed
      - declassified-full
      - declassified-partial
      - classified
      - unverified-existence
    frontmatter:
      required: [id, type, schema_version, status, kind, created]
      optional: [corpus, derivation_of]
      # derivation_of: path to a parent media node when this media is an
      #   edited, cropped, re-encoded, or metadata-scrubbed derivative
      #   (e.g., DoD's official Gimbal release vs. a longer leaked
      #   version). When set, the Media Versioning section is required.
    kinds:
      photo:
        description: "Still photograph"
      video:
        description: "Motion video — with or without audio"
      audio:
        description: "Audio-only recording"
      imagery-other:
        description: "Satellite imagery, radar returns, infrared, maps, diagrams, document scans pre-OCR, screenshots"
    required_sections:
      - Media Summary
      - Description
      - Provenance
      - Key Passages
      - Associated Nodes
      - Open Questions / Research Gaps
    optional_sections:
      - Media Versioning
      # Required when derivation_of is set — explains what changed between
      # the parent and this derivative. Omit when this is the canonical /
      # original.
    conditionally_required:
      "Media Versioning": "derivation_of is set"
    section_rules:
      Provenance: {chronological: true}
      Key Passages:
        requires_quote_verification: true
        may_be_empty: true
        # Key Passages on media capture verbatim speech (audio/video) or
        # verbatim visible text (text legible in photo or on-screen in
        # video). The Location field in the verification block uses
        # timestamp for audio/video and in-frame location (quadrant,
        # coordinate, element) for imagery. May be empty when the source
        # has no extractable text or speech.

  # --- LOCATION -----------------------------------------------------------
  location:
    status_values: [active, historical]
    frontmatter:
      required: [id, type, schema_version, status, created]
    required_sections:
      - Overview
      - Description
      - Ownership Timeline
      - UAP-Scope Activity
      - Relationships
      - Associated Nodes
      - Open Questions / Research Gaps
    section_rules:
      Relationships: {split: [Confirmed, Flagged]}
      Ownership Timeline: {chronological: true}

  # --- FINDING ------------------------------------------------------------
  finding:
    status_values: [active, superseded, unresolved]
    frontmatter:
      required: [id, type, schema_version, status, entities, created]
      # `entities` is a list of node paths that the finding concerns.
      # Validator checks that each listed entity's body links back to this finding.
    creation_threshold: |
      Create a finding node when ANY of:
        (a) the pattern spans 3+ entity nodes,
        (b) the analytical narrative would exceed ~200 words in any single
            entity node's table cell or subsection, OR
        (c) the same text is about to be written into 3+ different nodes.
      Below these thresholds, keep the analysis in the single most relevant
      entity node.
    required_sections:
      - Summary
      - Timeline
      - Primary Source Basis
      - What This Establishes
      - Entities Involved
      - Open Questions / Research Gaps
    section_rules:
      Timeline: {chronological: true}

  # --- META ---------------------------------------------------------------
  meta:
    description: "Governing documents (conventions.md, topic/research-queue.md, addenda, toolkit-notes) — no enforced node structure"
    frontmatter:
      required: [id, type, schema_version, created]

  # --- RESEARCH-ARTIFACT --------------------------------------------------
  # Structured investigation record backing each node. Stored at
  # /research/{slug}.yaml as pure YAML (not markdown). One artifact per
  # content node; target_node declares the pointer.
  #
  # The research artifact is the canonical record of what the repository
  # knows about a node's subject. Nodes are regeneratable from research
  # artifacts via scripts/build-from-research.py (Phase II of the layered
  # build process).
  research-artifact:
    path_prefix: research/
    format: yaml

    # Top-level required keys — the research artifact is a flat YAML dict
    # (no markdown frontmatter / body distinction since it's pure YAML).
    required_keys:
      - id                    # research/{slug}; must match file path
      - type                  # literal: research-artifact
      - schema_version        # validated against schema.compatible_with
      - target_node           # {type}/{slug} of the node this artifact backs
      - status                # active | archived
      - created               # YYYY-MM-DD
      - last_iteration        # i0 | i1 | i2 ... (bumps with each iteration)
      - description           # 1-3 paragraphs of prose; renders as node's Description section
      - primary_sources       # list — sources this artifact draws on
      - document_intrinsic    # dict — facts the primary source(s) state internally.
      #   Per-type key conventions (read by the Phase II renderer):
      #     document:  internal_title, internal_date, authors_per_document,
      #                classification, classification_markings_on_document, pages
      #     person:    full_name, aliases, nationality, profession
      #                (renders as the `## Identity` table rows)
      #     media:     internal_title, capture_date, duration, dimensions,
      #                file_format, file_size, camera_device,
      #                embedded_metadata (dict or prose summary),
      #                color_mode, codec
      #                (renders as `## Media Summary` table rows, paired
      #                with context_extrinsic fields `display_title`,
      #                `release_date`, `primary_source_url` and the
      #                primary_sources[0].path / manifest sha256 for
      #                Local Archive / SHA256)
      #     event, transcript: use event_intrinsic / context_extrinsic
      #                respectively for their kind-specific metadata;
      #                document_intrinsic remains an optional metadata
      #                sidecar on these types but isn't rendered.
      #     organization: per-kind conventions (all key sets optional;
      #                populate what the primary source(s) attest):
      #       gov (agency/office): internal_name, full_name, statutory_authority,
      #                    established_date, terminated_date,
      #                    parent_organization_path, current_director_path,
      #                    office_type (agency|office|program|lab|commission),
      #                    jurisdiction
      #       gov (military-unit): designator, unit_class
      #                    (squadron|air-wing|ship-class|division), parent_unit_path,
      #                    home_station, commissioned_date, decommissioned_date,
      #                    mission
      #       gov (military-service): full_name, branch_type, founded_date
      #       gov-contractor: contracting_agency, period_of_performance,
      #                    primary_counterparty_path, registered_status,
      #                    cage_code
      #       private: founded_date, org_type
      #                    (501c3|LLC|Corp|academic|media|nonprofit),
      #                    headquarters, current_leadership_path, public_status
      #                (renders as `## Overview` fact table — rows emitted
      #                for whichever keys are populated; empty keys skipped.
      #                Labeled-synthesis narrative belongs in `description`.)
      #   Every key is a fact the primary source(s) attest to. Facts not
      #   attested in a primary source don't belong here — they belong in
      #   `description` (synthesis, labeled) or don't enter the record.
      - context_extrinsic     # dict — contextual metadata (hearing date, etc.)
      - quotes                # list — verbatim-quotable passages
      - claims                # list — atomic claims the sources establish
      - entities_referenced   # list — every named person/org/event/doc/location
      - naming_quirks         # list — source-specific oddities (typos, alt spellings)
      - research_gaps         # list — investigation threads, resolved or open
      - iterations            # list — audit log of updates since initial build

    # Type-conditional keys — present only on research artifacts whose
    # target_node type (or archetype, for person artifacts) matches the
    # condition. `required_when_target_node_type_in` gates by node type;
    # `required_when_target_node_archetype_in` gates by person archetype.
    # Lists are empty-but-present when scaffolded; entries populate
    # during Phase I investigation.
    conditional_keys:
      rumors:
        required_when_target_node_type_in: [person, organization, event, location]
        # Captures widely-reported claims circulating in public discourse
        # that lack primary-source support in this artifact
        # (fabrication-prevention mechanism).
      timeline:
        required_when_target_node_type_in: [person, organization, event, finding]
        # Aggregated chronological dated facts about the node's subject.
        # Entries carry `date`, `event`, `source`, and on person artifacts
        # `category` (affiliation / role / observation / testimony /
        # publication / clearance / incident / filing / other). Node
        # renderer emits in chronological order; validator check #15
        # confirms the rendered Timeline table is earliest-first.
      corroboration_items:
        required_when_target_node_archetype_in: [eyewitness]
        required_when_target_node_kind_in: [encounter]
        # Other observers of events this person witnessed (on eyewitness
        # person artifacts) OR observers of this encounter (on encounter
        # event artifacts). Same entry shape in both contexts. Cross-
        # reference surface; NOT a statement surface. Renders as
        # `## Corroboration`.
      program_involvement:
        required_when_target_node_archetype_in: [institutional-actor]
        # Programs / roles / evidentiary basis. Metadata surface;
        # NOT a statement surface. Renders as `## Program Involvement`.
      publication_record:
        required_when_target_node_archetype_in: [reporter]
        # Published works by this person. Cross-reference surface.
        # Renders as `## Publication Record`.
      vouching_chain:
        required_when_target_node_archetype_in: [whistleblower]
        # Named attestations supporting the whistleblower's credibility.
        # Cross-reference surface; renders inside `## Credibility Notes`.
      background:
        required_when_target_node_type_in: [person]
        # Prose string (1–2 paragraphs) describing who the person is and
        # their career. Renders as the `## Background` section.
      uap_relevance:
        required_when_target_node_type_in: [person]
        # Prose string (one paragraph) describing why this person is in
        # the repository. Renders as the `## UAP Relevance` section.
      affiliations:
        required_when_target_node_type_in: [person]
        # List of organizational affiliations with role/period. Renders as
        # the `## Affiliations` section (with Confirmed / Flagged subsections).
      relationships:
        required_when_target_node_type_in: [person]
        # List of inter-person relationships. Renders as the
        # `## Relationships` section (with Confirmed / Flagged subsections).
      credibility_notes:
        required_when_target_node_type_in: [person]
        # Prose string (short analytical paragraphs). Renders as the
        # `## Credibility Notes` section. For whistleblower archetypes,
        # the Vouching Chain subsection is rendered from `vouching_chain`
        # appended to this section's content.
      event_intrinsic:
        required_when_target_node_type_in: [event]
        # Dict of event-specific metadata. Per-kind conventions:
        #   hearing:   hearing_title, committee, session, congress_number,
        #              date, location, chair
        #   encounter: location_path, date, duration, weather,
        #              instruments_involved
        # Every entry is a fact the primary source(s) attest. Renders
        # into the `## Event Summary` table.
      participants:
        required_when_target_node_type_in: [event]
        # List of event participants. Each entry carries participant_path,
        # role, capacity (witness-eyewitness / witness-whistleblower /
        # witness-institutional / committee-member / observer / official /
        # other), source. Renders as the `## Participants` section with
        # hearing-kind sub-structure (Witnesses — Eyewitness Testimony /
        # Whistleblower Testimony / Institutional Testimony / Committee
        # Members) or flat Confirmed/Flagged table for encounters.
      witnesses_testimony:
        required_when_target_node_kind_in: [hearing]
        # List of hearing witnesses with cross-references to their
        # transcript and written-testimony nodes. Replaces the prior
        # `What The Hearing Established` prose section — same evidentiary
        # content via cross-reference. Renders as the `## Witnesses &
        # Testimony` table.
      material_differences:
        required_when_target_node_type_in: [transcript]
        required_when_target_node_kind_in: [hearing]
        # Per-divergence entries documenting analytically significant
        # differences between a witness's prepared written testimony and
        # their live oral testimony at a hearing. Each entry carries a
        # cross-artifact `written_ref` (pointing at a quote in the
        # companion written-testimony document artifact) and an
        # intra-artifact `oral_ref` (a quote_id within this transcript
        # artifact). Present only on hearing-kind transcript artifacts;
        # absent on `other`-kind transcripts and on all non-transcript
        # artifacts. Renders as the `## Material Differences` table.
      speakers:
        required_when_target_node_type_in: [transcript]
        # List of speakers in this transcript (witness, chair, committee
        # members, host, interviewer, etc.). Name + role + optional link
        # to a person node. Cross-reference surface (NOT a statement
        # surface — speakers' actual statements live in `quotes` and
        # render as `## Key Passages`). Required on every transcript
        # artifact regardless of kind; renders as `## Speakers`.
      media_versioning:
        required_when_target_node_type_in: [media]
        # Per-aspect entries documenting how a derivative media node
        # differs from its parent (per frontmatter `derivation_of`).
        # Always present on media artifacts (empty list when media is
        # canonical / original; populated when derivation_of is set on
        # the node). Renderer emits the `## Media Versioning` section
        # only when entries exist; canonical / original media node
        # bodies omit the section entirely. Entry shape:
        # media_versioning_entry below.
      key_personnel:
        required_when_target_node_type_in: [organization]
        # Named personnel at the organization with sourced role + period.
        # Cross-reference surface (NOT a statement surface — personnel
        # statements live on their own person nodes). Renderer sub-groups
        # by leadership_class (director / deputy / staff / advisor /
        # other) with Confirmed / Flagged split. Entry shape:
        # key_personnel_entry below.
      contracts:
        required_when_target_node_kind_in: [gov-contractor]
        # Structured contract records on gov-contractor organization
        # artifacts. Each entry: contract_number, contracting_agency,
        # period_start/end, counterparties, value, deliverables,
        # source. Shape influenced by the AAWSAP / DIRD corpus
        # (single large contract producing many technical deliverables
        # as referenced docs). Renders as the `## Primary Contracts`
        # table, chronologically ordered by period_start. Absent on
        # gov and private kinds. Entry shape: contract_entry below.
      org_relationships:
        required_when_target_node_type_in: [organization]
        # Organization-to-organization structured relationships
        # (parent, subsidiary, predecessor, successor, contractor,
        # contracting-agency, partner, other). Renders as the
        # `## Relationships` section with Confirmed / Flagged split.
        # Distinct from person `relationships` (person-to-person) and
        # from `key_personnel` (org-to-person). Entry shape:
        # org_relationship_entry below.

    # Primary-source list entries
    primary_sources_entry:
      required: [path, format]
      optional: [extracted_text_path, pdf_metadata, sha256_at_extraction]
      # path: relative to sources/, must appear in sources/manifest.yaml
      # sha256_at_extraction: captured SHA256 at extraction time (optional
      #   audit trail; separate from manifest's live sha256 field)

    # --- Entry shapes per top-level list section ---

    # Every entry across claims, quotes, entities_referenced, rumors,
    # naming_quirks, research_gaps carries the lifecycle fields below.
    entry_lifecycle_fields:
      required: [id, added_date, added_by_iteration]
      optional:
        - last_audited_date
        - last_audited_by
        - audit_status            # verified | flagged | superseded | contradicted | needs-reaudit
        - audit_cadence_days      # re-audit expected within this window; default 365
        - superseded_by           # entry id within this artifact, or external ref
        - contradicted_by         # same
        - corroborated_by         # list of entry ids or external refs
      default_audit_cadence_days: 365
      # Default cadence is uniform at 365 across all entry types. See
      # BACKLOG.md (audit-cadence defaults may need type-specific tuning)
      # for re-examination after research-artifact corpus accumulates.

    # Per-section entry shapes (each inherits lifecycle fields above):

    quote_entry:
      required: [text, source]
      optional: [significance, context, observation_type, category, statement_date]
      # text: verbatim quote, YAML literal block (|) preserves multi-line
      # source: object with path + location (single source per quote)
      # context: where / when / under what circumstances the speaker
      #   made the statement. Composed into the Attributed-to line of
      #   the rendered verification block. Required on person artifacts
      #   (enforced by validate-research.py check_quotes) — every
      #   person-statement needs to carry its venue. Optional on
      #   document / transcript / media artifacts where the source
      #   document itself carries the context.
      # observation_type: direct | relayed
      #   Required on every quote when target_node type is `person`.
      #   `direct`  — first-hand sensory observation by the person
      #               (Fravor's "I saw a Tic Tac-shaped object" — observed).
      #   `relayed` — anything else the person asserted (things heard,
      #               read, inferred, relayed from others, published).
      #   Default: relayed. Enforced by validate-research.py check_quotes.
      #   Ignored on non-person artifacts (documents, events, etc.).
      # category: free-text metadata tag (e.g., `filed-claim` on
      #   whistleblower artifacts so the Claim Inventory renderer can
      #   filter). Optional on all artifacts.
      # statement_date: YYYY-MM-DD; YYYY-MM or YYYY tolerated for imprecise
      #   events. On person artifacts, used by the Phase II renderer to
      #   sort Statements chronologically within each subsection
      #   (earliest first). Required on person-artifact quotes when the
      #   renderer needs to order them; optional otherwise.

    quote_source:
      required: [path, location]
      # path: appears in manifest.yaml
      # location: paragraph ref (¶N), line number (line N), page (p. N),
      #   timestamp, etc. Media artifacts accept flexible location forms
      #   on a SINGLE quote entry type — timestamp (e.g., "0:23-0:45" for
      #   audio/video speech), timestamp + in-frame coordinate (e.g.,
      #   "HUD bottom-right, 0:12" for visible text in a video frame),
      #   or spatial-only (e.g., "upper-right corner" for photo-visible
      #   text). Contributor chooses the shape that best anchors the
      #   passage; the renderer passes the string through verbatim and
      #   the quote-verbatim check substring-matches the extracted source
      #   text regardless.

    claim_entry:
      required: [statement, sources, evidentiary_type]
      optional: [independently_verifiable]
      # statement: prose sentence, one atomic claim
      # sources: list — a claim may draw on multiple sources
      # evidentiary_type: sworn-testimony | documented | cited | secondary
      # independently_verifiable: free-text note on corroboration status

    claim_source:
      required: [path, location]
      optional: [quote_ref]
      # quote_ref: links the claim to a specific quote entry's id.
      # Every claim must have quote_ref set on at least one of its sources
      # (enforced by validate-research.py check_claims). This is the
      # anchor that ties the contributor-written claim.statement text to
      # a mechanically-verified verbatim source passage. Without it,
      # claim-prose drift (fabricated facts, dropped qualifiers, rephrased
      # inferences) is invisible to the validator. If no existing quote
      # supports a claim, add the quote first, then reference its id here.

    entity_entry:
      required: [entity_type, name, wrap_path]
      optional: [context_summary, references]
      # entity_type: person | organization | document | event | location | finding
      # name: display name
      # wrap_path: canonical repo path (/people/..., /organizations/..., etc.)
      # references: list of {quote_id: X} or {claim_id: Y} — auto-populated
      #   by scaffolder/build-from-research.py; contributors don't hand-maintain

    rumor_entry:
      required: [claim, status]
      optional: [observed_sources, primary_source_search, note]
      # claim: the circulating claim as prose
      # status: not-primary-source-established | primary-source-identified | primary-source-disputed
      # observed_sources: list of descriptions — where the rumor circulates
      # primary_source_search: list — where we've looked or where to look

    timeline_entry:
      required: [date, event, source]
      optional: [category, node_link, end_date]
      # date: YYYY-MM-DD; YYYY-MM and YYYY tolerated for imprecise events
      # event: prose description of what happened on the date
      # source: object with path + location (same shape as quote_source)
      # category: on person artifacts, one of timeline_category_values
      #   listed on person type; free-text on other types
      # node_link: optional path to a related node (/people/..., etc.)
      # end_date: if the entry describes a period rather than a point

    corroboration_entry:
      required: [observer_path, observation_type, source]
      optional: [observed_event_ref, note]
      # observer_path: /people/... or /organizations/... — the corroborator
      # observation_type: testimonial | instrumented | government-statement |
      #                   documentary
      # source: object with path + location
      # observed_event_ref: optional event node path the corroboration concerns

    program_involvement_entry:
      required: [program, role, evidentiary_basis, confidence, source]
      optional: [start_date, end_date, note]
      # program: program name (free-text or /organizations/... path)
      # role: the person's role in the program
      # evidentiary_basis: primary-source / sworn-testimony / on-record /
      #                    self-attested / secondary
      # confidence: high | medium | low
      # source: object with path + location

    publication_record_entry:
      required: [publication, outlet, date, source]
      optional: [node_link, beat, note]
      # publication: title of the piece
      # outlet: publishing organization (free-text or /organizations/... path)
      # date: YYYY-MM-DD publication date
      # source: object with path + location
      # node_link: optional /documents/... path if the publication is
      #   also a document node in this repository

    vouching_chain_entry:
      required: [voucher_path, attestation, source]
      optional: [evidentiary_basis, confidence, note]
      # voucher_path: /people/... or /organizations/... of the voucher
      # attestation: verbatim or paraphrased statement of vouching
      #   (when verbatim, contributor may additionally register a quote
      #   entry and reference it via quote_ref)
      # source: object with path + location
      # evidentiary_basis / confidence: same vocabulary as program_involvement

    affiliation_entry:
      required: [organization_path, role, source]
      optional: [period_start, period_end, flagged, note]
      # organization_path: /organizations/... path
      # role: the person's role / title at the organization
      # period_start / period_end: YYYY-MM-DD or YYYY-MM or YYYY; used
      #   by renderer to compose a Period cell and by check #15 to
      #   sort rows chronologically
      # flagged: bool (default false) — routes the entry to the
      #   `### Flagged` subsection rather than `### Confirmed`
      # source: object with path + location

    relationship_entry:
      required: [person_path, relationship, source]
      optional: [flagged, note]
      # person_path: /people/... path
      # relationship: short description (flying partner, disclosure
      #   collaborator, advisor, superior, colleague, source, etc.)
      # flagged: bool (default false); routes to `### Flagged` subsection
      # source: object with path + location

    participant_entry:
      required: [participant_path, capacity, source]
      optional: [role, flagged, note]
      # participant_path: /people/... or /organizations/... path
      # capacity: one of [witness-eyewitness, witness-whistleblower,
      #   witness-institutional, committee-member, observer, official,
      #   other] — drives sub-section routing on hearing-kind events
      # role: free-text role description at this specific event
      # flagged: bool (default false); routes to `### Flagged`
      # source: object with path + location

    witnesses_testimony_entry:
      required: [witness_path, oath_status, source]
      optional: [transcript_node, written_testimony_node, note]
      # witness_path: /people/... of the witness
      # oath_status: sworn | unsworn | affirmation | unknown
      # transcript_node: /transcripts/... cross-reference (if built)
      # written_testimony_node: /documents/... cross-reference (if built)
      # source: object with path + location — typically the hearing
      #   transcript or witness record attesting the oath status

    speaker_entry:
      required: [name, source]
      optional: [role, node_link, note]
      # name: display name (e.g., "David Fravor", "Glenn Grothman")
      # role: the speaker's role at this transcript event. Free-text;
      #   common values: Witness, Chair, Committee Member, Host,
      #   Interviewer, Guest, Moderator, Presenter. Scanned by
      #   validate-research.py check #16 against the entry's
      #   source.path token pool.
      # node_link: optional /people/... path when the speaker has a
      #   repository node. Renders as backtick-bracket link in the
      #   Node Link column.
      # source: object with path + location — typically the transcript's
      #   own source page where the speaker is named/identified (cover
      #   sheet, speaker roster, intro Q&A)

    key_personnel_entry:
      required: [person_path, role, source]
      optional: [period_start, period_end, leadership_class, flagged, note]
      # person_path: /people/... path of the individual
      # role: free-text role title at this organization (e.g., "Director",
      #   "Founding Director", "Acting Director", "Deputy Secretary",
      #   "Commanding Officer"). Scanned by check #16 against the entry's
      #   source.path token pool.
      # leadership_class: optional enum
      #   [director, deputy, staff, advisor, other]. Drives renderer sub-
      #   grouping in the Key Personnel section (Directors / Deputy
      #   Leadership / Other Named Personnel). Absent entries render in
      #   the Other Named Personnel bucket.
      # period_start / period_end: YYYY-MM-DD or YYYY-MM or YYYY; used by
      #   renderer to sort entries within each leadership_class subsection
      #   and by check #15 to sort rows chronologically.
      # flagged: bool (default false) — routes to `### Flagged` subsection
      # source: object with path + location — primary source attesting the
      #   person's role at this organization (appointment announcement,
      #   press release, published bio, etc.)

    contract_entry:
      required: [contract_number, contracting_agency, period_start, source]
      optional:
        - period_end
        - primary_counterparty_path
        - subject
        - value
        - deliverables
        - note
      # contract_number: contract identifier as attested in the primary
      #   source (e.g., "HHM402-08-C-0072" for AAWSAP). Preserved verbatim
      #   from source.
      # contracting_agency: free-text (e.g., "DIA", "DARPA", "Navy OPNAV").
      #   Prefer the agency's /organizations/ wrap_path in contributor
      #   prose elsewhere; this field carries the agency's short form as
      #   it appears on the contract itself.
      # primary_counterparty_path: optional /organizations/... path of the
      #   contract recipient (typically the node this contract sits on, but
      #   explicit for sub-contract or joint-venture cases).
      # period_start / period_end: YYYY-MM-DD; period_end may be absent
      #   for ongoing or open-ended contracts.
      # subject: short descriptor of the contract's stated purpose (1-6
      #   words; e.g., "Advanced Aerospace Weapon System Applications",
      #   "Cockpit video system integration"). Scanned by check #16 against
      #   source.path token pool.
      # value: dollar amount attested in the primary source (string form
      #   preserves source formatting — "$22 million", "$22M", "22,000,000").
      # deliverables: optional list of document paths the contract produced
      #   (e.g., DIRD technical reports on AAWSAP). Each entry a
      #   /documents/... path; absent or empty list when deliverables are
      #   not publicly enumerated.
      # note: contributor synthesis (1-2 sentences; optional). Scanned by
      #   check #16 against source.path token pool.

    org_relationship_entry:
      required: [organization_path, relationship_type, source]
      optional: [flagged, note]
      # organization_path: /organizations/... path of the other org
      # relationship_type: enum — one of
      #   [parent, subsidiary, predecessor, successor, contractor,
      #    contracting-agency, partner, other]
      #     parent               — the other org is this org's parent
      #     subsidiary           — the other org is a subsidiary of this
      #     predecessor          — the other org preceded this one
      #                            (lineage / reorganization)
      #     successor            — the other org succeeded this one
      #     contractor           — the other org is a contractor to this
      #                            (this is the contracting agency)
      #     contracting-agency   — the other org is this org's contracting
      #                            agency (this is the contractor)
      #     partner              — joint venture / partnership
      #     other                — doesn't fit above; explain in note
      # flagged: bool (default false); routes to `### Flagged`
      # source: object with path + location attesting the relationship
      # note: contributor synthesis (1-2 sentences; optional). Scanned by
      #   check #16 against source.path token pool.

    media_versioning_entry:
      required: [id, aspect, parent_form, this_form, source]
      optional: [note]
      # aspect: one of [duration, encoding, metadata, content, provenance,
      #   other] — enum keeps the table's top-level structure scannable
      #   and enables future cross-node queries (e.g., "show all media
      #   with metadata scrubs"). `other` is an extensibility escape —
      #   validator warns on unknown values but does not error.
      #     duration   — clip length differences
      #     encoding   — codec, resolution, bitrate, container format
      #     metadata   — EXIF / container-level metadata (creation date,
      #                  camera/platform info, author fields, etc.)
      #     content    — visible/audible content differences — watermarks,
      #                  overlays, cropping, frames added/removed, audio
      #                  presence or absence
      #     provenance — chain-of-custody differences (known upload or
      #                  distribution paths, release venue, declassification
      #                  authority)
      #     other      — doesn't fit the above; explain in `note`
      # parent_form: free-text observation of the parent (derivation_of)
      #   media (1-2 lines). Accommodates per-aspect shape variance —
      #   numerical for duration, list-like for metadata, prose for content.
      # this_form: free-text observation of THIS derivative media (1-2
      #   lines). Same free-text shape.
      # source: object with path + location — the primary source attesting
      #   the difference (e.g., DoD press release confirming the 2020
      #   declassified cut; FOIA response with metadata inspection;
      #   side-by-side visual comparison noted in an archived article).
      # note: contributor synthesis of analytical significance (1-2
      #   sentences; optional). Scanned by check #16 against the entry's
      #   own source.path token pool.

    material_differences_entry:
      required: [id, topic, divergence_class, written_ref, oral_ref]
      optional: [note]
      # topic: short descriptor (1-6 words) naming what the divergence
      #   concerns — e.g., "Flight hours", "Top Gun attendance",
      #   "Post-encounter Navy investigation".
      # divergence_class: one of [elaboration, contradiction, omission,
      #   clarification, qa-addition]
      #     elaboration    — oral expands on a written claim with
      #                      additional detail
      #     contradiction  — oral directly contradicts the written claim
      #     omission       — written contains content not surfaced orally
      #                      (or vice versa)
      #     clarification  — oral refines ambiguous or imprecise written
      #                      wording without changing substance
      #     qa-addition    — material introduced only in Q&A that has no
      #                      written counterpart
      # written_ref: cross-artifact pointer, shape
      #   {artifact: <type>/<slug>, quote_id: <qN>}. Resolves against
      #   research/<slug>.yaml's quotes list. The contributor adds the
      #   referenced quote to the document artifact first if it doesn't
      #   already exist; don't duplicate the verbatim text onto this
      #   transcript artifact.
      # oral_ref: quote_id string (e.g., 'q7') resolving within THIS
      #   transcript artifact's quotes list.
      # note: contributor synthesis describing the analytical significance
      #   of the divergence. Scanned by check #16 against the pooled
      #   source texts of both referenced quotes (written_ref's artifact
      #   source + oral_ref's local source).

    naming_quirk_entry:
      required: [observed, canonical, location, source_path, resolution]
      optional: [note]
      # observed: as it appears in source (e.g., "Leslie Keane")
      # canonical: corrected form (e.g., "Leslie Kean")
      # resolution: preserve-as-sic-in-quotes | use-canonical | disputed | unresolved

    research_gap_entry:
      required: [statement, resolved]
      optional: [methodology, resolved_date, resolving_source, resolution_summary, retain_as_done]
      # statement: the question or gap
      # methodology: how to resolve
      # resolved: bool
      # resolved_* fields: required when resolved == true
      # retain_as_done: bool (default false) — when true, a resolved gap renders
      #   in the node's Open Questions section as "- [x] DONE YYYY-MM-DD: ...".
      #   When false (default), resolved gaps are omitted from node render —
      #   their resolution lives in the node body (as a new claim). Only set to
      #   true when the gap's closure is itself the primary record (null
      #   findings, methodology outcomes).

    iteration_entry:
      required: [id, date, trigger, summary]
      optional: [entries_added, entries_modified]
      # id: i0 (initial build), i1, i2, ... — sequential
      # trigger: initial-build | new-source | oq-resolution | cross-node-update | audit-correction | other
      # summary: short prose describing what changed
      # entries_added / entries_modified: lists of entry ids

    # --- Validation invariants (enforced by scripts/validate-research.py) ---

    invariants:
      # Frontmatter / top-level
      - "target_node field points to a file that exists (type/slug.md)"
      - "schema_version value appears in schema.compatible_with"
      - "status is one of [active, archived]"

      # Entry-level
      - "every entry id is unique within its section"
      - "every entry has required lifecycle fields (id, added_date, added_by_iteration)"

      # Cross-reference
      - "every sources[].path exists in sources/manifest.yaml"
      - "every quote_ref points to an existing quote.id"
      - "every claim has at least one sources[] entry with quote_ref set (anchor requirement — prevents unanchored claim drift)"
      - "every reference in entity.references points to an existing quote.id or claim.id"
      - "every superseded_by / contradicted_by / corroborated_by ref points to an existing entry id (or is a structured external ref)"

      # Enum values
      - "evidentiary_type (claims) in [sworn-testimony, documented, cited, secondary]"
      - "resolution (naming_quirks) in [preserve-as-sic-in-quotes, use-canonical, disputed, unresolved]"
      - "audit_status in [verified, flagged, superseded, contradicted, needs-reaudit]"
      - "rumor status in [not-primary-source-established, primary-source-identified, primary-source-disputed]"
      - "entity entity_type in [person, organization, document, event, transcript, media, location, finding]"
      - "observation_type (quotes, required on person artifacts) in [direct, relayed]"
      - "context (quotes) required on person artifacts; optional on document / transcript / media"
      - "corroboration_items[].observation_type in [testimonial, instrumented, government-statement, documentary]"
      - "program_involvement[].evidentiary_basis in [primary-source, sworn-testimony, on-record, self-attested, secondary]"
      - "program_involvement[].confidence in [high, medium, low]"
      - "participants[].capacity in [witness-eyewitness, witness-whistleblower, witness-institutional, committee-member, observer, official, other]"
      - "witnesses_testimony[].oath_status in [sworn, unsworn, affirmation, unknown]"
      - "material_differences[].divergence_class in [elaboration, contradiction, omission, clarification, qa-addition]"
      - "material_differences[].written_ref resolves to an existing quote in the referenced research/{slug}.yaml artifact"
      - "material_differences[].oral_ref matches a quote.id within this transcript artifact"
      - "media_versioning[].aspect in [duration, encoding, metadata, content, provenance, other] (warn on unknown; `other` permitted)"
      - "key_personnel[].leadership_class (when set) in [director, deputy, staff, advisor, other]"
      - "org_relationships[].relationship_type in [parent, subsidiary, predecessor, successor, contractor, contracting-agency, partner, other]"

      # Iterations log
      - "iterations[].id values are sequential (i0, i1, i2, ...) with no gaps"
      - "every entry's added_by_iteration refers to an existing iteration.id"

      # Conditional sections
      - "rumors section present if target_node type in [person, organization, event, location]; absent otherwise"
      - "timeline section present if target_node type in [person, organization, event, finding]; absent otherwise"
      - "corroboration_items section present iff target_node archetype == eyewitness"
      - "program_involvement section present iff target_node archetype == institutional-actor"
      - "publication_record section present iff target_node archetype == reporter"
      - "vouching_chain section present iff target_node archetype == whistleblower"
      - "background / uap_relevance / affiliations / relationships / credibility_notes sections present iff target_node type == person"
      - "event_intrinsic and participants sections present iff target_node type == event"
      - "witnesses_testimony section present iff target_node type == event AND kind == hearing"
      - "corroboration_items section present iff target_node archetype == eyewitness OR (type == event AND kind == encounter)"
      - "material_differences section present iff target_node type == transcript AND kind == hearing"
      - "speakers section present iff target_node type == transcript"
      - "media_versioning section present iff target_node type == media (empty list permitted when media is canonical / original; populated when derivation_of is set)"
      - "key_personnel and org_relationships sections present iff target_node type == organization"
      - "contracts section present iff target_node type == organization AND kind == gov-contractor"

# ---------------------------------------------------------------------------
# Manifest (sources/manifest.yaml) schema
# ---------------------------------------------------------------------------

manifest_entry:
  required: [url, format, status]
  optional: [path, sha256, archived_date, wayback_date, note, category]
  conditionally_required:
    path: "status == archived"       # must be set when the file is archived locally
    sha256: "status == archived"     # SHA256 of the archived file; integrity backstop
  status_values: [archived, 403-blocked, 402-blocked, pending]
  format_values: [pdf, html, txt, post, video, transcript]
  # `category` is derived from path prefix (government/, news/, etc.) unless overridden
  # `sha256` detects local file corruption, accidental overwrite, and silent
  # substitution. Computed at archive-time by manifest.py add; re-verified
  # by manifest.py verify-checksums.

# ---------------------------------------------------------------------------
# Addenda
# ---------------------------------------------------------------------------

addenda:
  # Corpus-specific addenda live at meta/topic/addenda/{name}.md and are
  # referenced from node frontmatter via the `corpus:` field on document
  # nodes. Addenda may declare additional required sections and additional
  # required frontmatter fields. Validator merges addendum rules with the
  # base type's rules.
  resolution: "Nodes with `corpus: X` in frontmatter inherit rules from meta/topic/addenda/X.md"
  # Addenda are topic-specific by definition. They live under meta/topic/
  # so they are deleted cleanly when the toolkit is forked to a different
  # topic. See meta/topic/overview.md for the topic scope of this instance.
