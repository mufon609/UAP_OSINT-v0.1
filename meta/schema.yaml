# Primary-source investigation knowledge-base — schema
#
# Single source of truth for node types, required sections, vocabularies,
# and structural rules. Read by scripts/build/validate.py and scripts/build/new.py.
# Human-readable rationale lives in meta/conventions.md.

schema:
  version: 1
  revision_date: 2026-04-17
  compatible_with: [1]
  # compatible_with lists which file-level schema_version values validate
  # cleanly against this spec. Expanded during migration windows; shrunk
  # when a version is retired.

# Every schema-governed file carries schema_version in its frontmatter
# (nodes, templates, research artifacts, governance docs under meta/).
# Version is checked at validation time against `schema.compatible_with`
# above. Mismatches surface as errors.

# ---------------------------------------------------------------------------
# Cross-cutting vocabularies
# ---------------------------------------------------------------------------

status_markers:
  confirmed: "✅ Confirmed"
  pending: "⏳ Pending"
  flagged: "⚠ Flagged"
  disputed: "⚠ Disputed — unknown"     # both sides assert; neither has primary-source evidence
  contradiction: "❌ Contradiction"     # positions directly contradict and at least one side is backed by primary-source evidence

limits:
  table_cell_words_soft: 55  # table cells exceeding this should promote to
                              # a ### subsection or a finding node

quote_verification_fields:
  required: [Attributed to, Source, Verified]
  optional: [Location, Note]

# Three-layer evidentiary architecture (see meta/conventions.md).
# Entity-layer types carry facts; the finding layer documents multi-source
# patterns over those facts; the investigation layer evaluates hypotheses
# over findings + entity facts. The flow is one-directional. Consumed by
# the directional-contract checks (entity_no_finding_or_investigation_refs,
# finding_no_investigation_refs, finding_source_in_entity_node) and by
# load_source_to_artifacts_index — adding a new content-node type only
# requires listing it here for the directional contract to extend to it.
architecture_layers:
  entity:        [person, organization, document, event, transcript, media, location]
  finding:       [finding]
  investigation: [investigation]

# ---------------------------------------------------------------------------
# Node types
# ---------------------------------------------------------------------------

types:

  # --- PERSON -------------------------------------------------------------
  # Person is the only node type with a claiming agent. Under the
  # statements-only discipline, every person node carries a universal
  # `## Statements` surface — verbatim quotes, speaker-attributed,
  # split by `observation_type` into Direct Observations (first-hand
  # sensory testimony) and Other Statements (anything else the person
  # asserted, including relayed / inferential / published / filed-
  # claim material). Archetype-specific sections (Corroboration /
  # Claim Inventory / Program Involvement / Publication Record) remain
  # distinct but are cross-reference or metadata surfaces, NOT statement
  # surfaces — they point at other observers, list filed claims (rendered
  # from statements tagged `category: filed-claim`), track institutional
  # access, or index publications respectively. Timeline is required on
  # every archetype: one aggregated chronological table of dated facts
  # (role transitions, clearances, affiliations, observations, testimony,
  # publications, incidents) with a Category column enabling scan-by-type
  # without losing the chronological view.
  person:
    path: people
    status_values: [active, in-progress]
    # Person artifacts don't render a top-level Description section (the
    # archetype-specific sections carry the narrative surface), so
    # description_required is absent (treated as false).
    prose_drift_fields:
      top_level: [background, top_relevance, credibility_notes]
      per_entry:
        - [vouching_chain, attestation]
    frontmatter:
      required: [id, type, schema_version, status, archetype, created]
      optional: [authored_works]  # list of /documents/... paths (doc_form: book)
    archetypes:
      eyewitness:
        description: "Someone who personally observed a documented event"
        required_sections:
          - Identity
          - Background
          - UAP Relevance
          - Affiliations
          - Statements
          - Timeline
          - Relationships
          - Corroboration
          - Credibility Notes
          - Associated Nodes
      whistleblower:
        description: "Someone who filed a formal complaint and makes structured claims"
        required_sections:
          - Identity
          - Background
          - UAP Relevance
          - Affiliations
          - Statements
          - Timeline
          - Relationships
          - Claim Inventory
          - Credibility Notes
          - Vouching Chain
          - Associated Nodes
      institutional-actor:
        description: "Significance rests on institutional access and role"
        required_sections:
          - Identity
          - Background
          - UAP Relevance
          - Affiliations
          - Statements
          - Timeline
          - Relationships
          - Program Involvement
          - Credibility Notes
          - Associated Nodes
      reporter:
        description: "Significance rests on published journalism"
        required_sections:
          - Identity
          - Background
          - UAP Relevance
          - Affiliations
          - Statements
          - Timeline
          - Relationships
          - Publication Record
          - Credibility Notes
          - Associated Nodes
    section_rules:
      Background: {prose_only: true}
      Affiliations: {split: [Confirmed, Flagged]}
      Relationships: {split: [Confirmed, Flagged]}
      Statements:
        requires_quote_attribution: true
        split: [Direct Observations, Other Statements]
      Timeline: {chronological: true}

  # --- ORGANIZATION -------------------------------------------------------
  # Under the statements-only discipline, orgs don't speak — officials
  # speak for them. The previous `What Is Confirmed` section was
  # contributor-prose synthesis anchored to sources; the renderer
  # redesign removed it across all three kinds. Factual content about
  # the org flows through:
  #   - Key Passages — verbatim excerpts from primary sources ABOUT the
  #     org (establishment press releases, statutory authority, director
  #     announcements, IG findings). Parallels document Key Passages but
  #     subject-about-org rather than doc-as-subject.
  #   - Timeline — dated events (founding, reorganization, leadership
  #     transition, contract, incident) with per-row source attribution.
  #   - Key Personnel — cross-reference surface (person_path + role +
  #     period + source), sub-grouped by leadership_class (director /
  #     deputy / staff / advisor / other) via renderer-side dispatch.
  #   - Primary Contracts (gov-contractor kind only) — contract metadata
  #     (number, period, value, counterparties, deliverables) with source
  #     attribution per row.
  #   - Description — labeled contributor synthesis (1-3 paragraphs);
  #     subject to prose-drift check scoping.
  organization:
    path: organizations
    status_values: [active, in-progress]
    description_required: true
    prose_drift_fields:
      top_level: [description]
      per_entry:
        - [key_personnel, note]
        - [contracts, note]
    frontmatter:
      required: [id, type, schema_version, status, kind, created]
    kinds:
      gov:
        description: "Government — federal department, agency, program office, federal lab, congressional body, military service, military unit"
        required_sections:
          - Overview
          - Description
          - Key Personnel
          - Key Passages
          - Timeline
          - Relationships
          - Associated Nodes
      gov-contractor:
        description: "Organization whose existence is a government contract (e.g., BAASS, EarthTech)"
        required_sections:
          - Overview
          - Description
          - Key Personnel
          - Key Passages
          - Primary Contracts
          - Timeline
          - Relationships
          - Associated Nodes
      private:
        description: "Private company, nonprofit, academic institution, media outlet"
        required_sections:
          - Overview
          - Description
          - Key Personnel
          - Key Passages
          - Timeline
          - Relationships
          - Associated Nodes
    section_rules:
      Relationships: {split: [Confirmed, Flagged]}
      Key Personnel: {split: [Confirmed, Flagged]}
      Timeline: {chronological: true}
      Key Passages: {requires_quote_attribution: true}
      Primary Contracts: {chronological: true}

  # --- DOCUMENT -----------------------------------------------------------
  document:
    path: documents
    status_values:
      - primary-source-confirmed
      - declassified-full
      - declassified-partial
      - classified
      - unverified-existence
    description_required: true
    prose_drift_fields:
      top_level: [description]
      per_entry: []
    frontmatter:
      required: [id, type, schema_version, status, kind, doc_form, created]
      optional: [corpus, archival_status]
      # corpus: e.g., "aawsap-dird" — loads meta/addenda/{corpus}.md
      # archival_status: applies to non-gov-doc doc_forms where the full
      #   text may not be archived locally. Required when doc_form is
      #   `book`; optional for `article` and other non-gov-doc forms.
    archival_status_values:
      - full-text-archived
      - excerpts-only
      - not-archived
    conditionally_required:
      archival_status: "doc_form == book"
    kinds:
      gov-doc:
        description: "Government-originated document"
        # A document node IS the fact record — its evidentiary content is
        # verbatim source passages (Key Passages), not contributor-summarized
        # "claims". Other nodes that reference facts from a document link to
        # the document and cite the specific passage. No contributor-prose
        # synthesis layer sits between the source and the reader; drift
        # surfaces cannot exist where contributor prose cannot rephrase.
        required_sections:
          - Document Summary
          - Description
          - Provenance
          - Key Passages
          - Associated Nodes
      non-gov-doc:
        description: "Non-government document — article, book, blog post, social-media post, private filing, personal correspondence"
        required_sections:
          - Document Summary
          - Description
          - Key Passages
          - Associated Nodes
    doc_form_values:
      # Extensible. Validator warns on unknown values but does not error.
      # Document nodes are text-native only — video/photo/audio primary
      # sources move to the `media` type. Transcriptions of speech from
      # media sources live on transcript nodes.
      - technical-report
      - testimony
      - memo
      - letter
      - contract
      - press-release
      - executive-order
      - assessment
      - bio
      - complaint
      - article
      - book
      - social-post
      - filing
      - database-extract
      - other
    section_rules:
      Key Passages: {requires_quote_attribution: true}
      Provenance: {chronological: true}

  # --- EVENT --------------------------------------------------------------
  # Events are venues / incidents — they don't speak. Witness statements
  # live on transcript nodes + witness person nodes; documentary evidence
  # lives on document + media nodes. An event node is a convergence
  # point tying those nodes together.
  #
  # Hearings carry a `Witnesses & Testimony` cross-reference table
  # (witness → oath status → transcript/document nodes) — no
  # contributor-prose synthesis at the event-node level. Synthesis
  # spanning multiple witnesses belongs on finding nodes.
  event:
    path: events
    status_values: [documented, in-progress]
    description_required: true
    prose_drift_fields:
      top_level: [description]
      per_entry: []
    frontmatter:
      required: [id, type, schema_version, status, kind, created]
    kinds:
      hearing:
        description: "Formal proceeding — congressional hearing, deposition"
        required_sections:
          - Event Summary
          - Description
          - Participants
          - Timeline
          - Key Testimony
          - Witnesses & Testimony
          - Associated Nodes
      encounter:
        description: "Observed event — UAP sighting, incident"
        required_sections:
          - Event Summary
          - Description
          - Participants
          - Timeline
          - Corroboration
          - Associated Nodes
    section_rules:
      Participants: {split: [Confirmed, Flagged]}
      Key Testimony: {requires_quote_attribution: true}
      Timeline: {chronological: true}

  # --- TRANSCRIPT ---------------------------------------------------------
  transcript:
    path: transcripts
    status_values: [primary-source-confirmed, partial]
    description_required: true
    prose_drift_fields:
      top_level: [description]
      per_entry: []
    frontmatter:
      required: [id, type, schema_version, status, kind, created]
      optional: [source_medium, derived_from]
      # source_medium: free-text metadata for the underlying source format
      #   (e.g., stenographic-pdf, youtube, podcast, broadcast, documentary,
      #   press-conference, conference-talk, deposition, radio, streaming).
      #   Not a controlled vocabulary — extensible as new formats appear.
      # derived_from: path to the underlying media or document node this
      #   transcript IS a text rendering OF (e.g., /media/gimbal-video for
      #   a transcript of a video file). Use ONLY when the transcript
      #   exists *because of* the linked source — i.e., the transcript is
      #   a derivative rendering, not an independent record. Most
      #   appropriate for `other`-kind transcripts (podcast → audio file;
      #   interview → video file; press conference → recording).
      #
      #   Hearing transcripts use
      #   context_extrinsic.companion_written_testimony for the
      #   cross-reference to their companion written testimony.
      #   Those are independent primary records of the same event,
      #   not derivations.
    kinds:
      hearing:
        description: "Verbatim record of a formal proceeding — congressional hearing, deposition. Written-vs-oral divergence analysis (when it applies) belongs on a finding node, not on the transcript."
        required_sections:
          - Publication Record
          - Summary
          - Speakers
          - Key Passages
          - Associated Nodes
      other:
        description: "Verbatim record of any non-hearing speech source — interview, podcast, broadcast, documentary, film, conference talk, press conference, radio, streaming"
        required_sections:
          - Publication Record
          - Summary
          - Speakers
          - Key Passages
          - Associated Nodes
    section_rules:
      Key Passages: {requires_quote_attribution: true}

  # --- MEDIA --------------------------------------------------------------
  # Non-text-primary primary sources — photos, videos, audio, imagery.
  # Media nodes hold file metadata + provenance + contributor-authored
  # Description (synthesis, labeled). They MAY have verbatim Key Passages
  # when the source contains extractable speech (audio/video) or visible
  # text (legible text in a photo, on-screen text in a video frame).
  # Heavy speech content (full interview, full cockpit audio) spins up a
  # separate transcript node that points to the media via `derived_from`.
  media:
    path: media
    status_values:
      - primary-source-confirmed
      - declassified-full
      - declassified-partial
      - classified
      - unverified-existence
    description_required: true
    prose_drift_fields:
      top_level: [description]
      per_entry:
        - [media_versioning, note]
    frontmatter:
      required: [id, type, schema_version, status, kind, created]
      optional: [corpus, derivation_of]
      # derivation_of: path to a parent media node when this media is an
      #   edited, cropped, re-encoded, or metadata-scrubbed derivative
      #   (e.g., DoD's official Gimbal release vs. a longer leaked
      #   version). When set, the Media Versioning section is required.
    kinds:
      photo:
        description: "Still photograph"
      video:
        description: "Motion video — with or without audio"
      audio:
        description: "Audio-only recording"
      imagery-other:
        description: "Satellite imagery, radar returns, infrared, maps, diagrams, document scans pre-OCR, screenshots"
    required_sections:
      - Media Summary
      - Description
      - Provenance
      - Key Passages
      - Associated Nodes
    # Media Versioning is conditionally required (per below) when
    # derivation_of is set; omitted when this is the canonical /
    # original. No separate ``optional_sections`` declaration — the
    # conditionally_required entry is the authoritative gate.
    conditionally_required:
      "Media Versioning": "derivation_of is set"
    section_rules:
      Provenance: {chronological: true}
      Key Passages:
        requires_quote_attribution: true
        # Key Passages on media capture verbatim speech (audio/video) or
        # verbatim visible text (text legible in photo or on-screen in
        # video). The Location field in the verification block uses
        # timestamp for audio/video and in-frame location (quadrant,
        # coordinate, element) for imagery. Empty sections are permitted
        # when the source has no extractable text or speech — the
        # requires_quote_attribution rule enforces the attribution-block
        # shape only when quotes are present, not existence of quotes.

  # --- LOCATION -----------------------------------------------------------
  location:
    path: locations
    status_values: [active, historical]
    description_required: true
    prose_drift_fields:
      top_level: [description]
      per_entry:
        - [ownership_timeline, note]
        - [top_scope_activity, note]
    frontmatter:
      required: [id, type, schema_version, status, created]
    required_sections:
      - Overview
      - Description
      - Ownership Timeline
      - UAP-Scope Activity
      - Key Passages
      - Relationships
      - Associated Nodes
    section_rules:
      Relationships: {split: [Confirmed, Flagged]}
      Ownership Timeline: {chronological: true}
      Key Passages: {requires_quote_attribution: true}

  # --- FINDING ------------------------------------------------------------
  # A finding documents a CROSS-SOURCE PATTERN that becomes visible only
  # when multiple primary sources are read together. The pattern is not
  # established by any single source; the synthesis-of-reading-together
  # produces information not present in any constituent attestation. A
  # finding is the canonical home for that pattern.
  #
  # Findings CITE PRIMARY SOURCES DIRECTLY via evidence[].source.path
  # (never entity-node markdown files). attestor_path on each evidence
  # row captures who attested; the citation itself goes to the source.
  #
  # Findings DUPLICATE primary-source content from entity nodes BY DESIGN.
  # If a finding cites material the relevant entity node doesn't yet
  # attest, the entity node is updated first (primary source confirmed +
  # archived) before the finding can use it.
  #
  # Findings DO NOT REFERENCE the investigations that consume them —
  # directional contract enforced by the finding_no_investigation_refs
  # check. Investigations link to findings; findings stay reusable.
  #
  # Findings are distinguished from FACTS (single-source attestations
  # naming another entity), which continue to live structurally on
  # entity nodes. See meta/conventions.md "Three-layer evidentiary
  # architecture" for the full bright line.
  finding:
    path: findings
    status_values: [documented, in-progress, superseded]
    description_required: true
    prose_drift_fields:
      top_level: [description]
      per_entry:
        - [contradictions, note]
    frontmatter:
      required: [id, type, schema_version, status, created, updated]
      optional: [superseded_by]
      # superseded_by: path of newer finding when status == superseded.
    required_sections:
      - Pattern Statement
      - Description
      - Evidence
      - What the Record Establishes
      - What the Record Doesn't Establish
      - Associated Nodes
    optional_sections:
      - Apparent Contradictions
      - Timeline
      - Source-Form Notes
    section_rules:
      Evidence:
        requires_quote_attribution: true
      Timeline: {chronological: true}
      "Apparent Contradictions":
        requires_quote_attribution: true
    # Apparent Contradictions / Timeline / Source-Form Notes are
    # rendered conditionally by the renderer based on artifact-side
    # content (populated contradictions[] / timeline[] / naming_quirks
    # entries with resolution preserve-as-sic-in-quotes). No frontmatter
    # gate, so no conditionally_required entry — section auto-suppressed
    # by renderer; optional_sections list above declares acceptability.

  # --- INVESTIGATION ------------------------------------------------------
  # An investigation pursues an OPEN QUESTION or hypothesis by consuming
  # findings and entity-node facts. Investigations are SPECULATION-
  # TOLERANT — the layer where hypotheses are evaluated against the
  # primary-source record. Per-hypothesis status verdicts capture the
  # current evidentiary standing (free-text: "Substantiated as allegation
  # on record"; "Not established by primary sources"; etc.).
  #
  # Investigations link to and summarize findings via cited_findings[]
  # and per-hypothesis sources[] rollups; findings DO NOT link back.
  # Investigations build cases — proving, disproving, or further
  # pursuing the question.
  #
  # Hypothesis Evaluation prose is NOT subject to the prose-drift check
  # (speculation by design). Instead, the investigation_hypothesis_citation
  # check requires each hypothesis subsection to carry a non-empty
  # sources[] rollup naming the findings or entity-node facts the
  # contributor drew on.
  investigation:
    path: investigations
    status_values: [open, paused, closed]
    frontmatter:
      required: [id, type, schema_version, status, question, created, updated]
      # question: free-text frontmatter — the open question this
      # investigation pursues. Grep-able for investigation indices;
      # mirrored as the rendered ## Question section body.
    required_sections:
      - Question
      - Description
      - Hypotheses
      - Cited Findings
      - Hypothesis Evaluation
      - Open Questions
      - Best-Current Answer
      - Associated Nodes
    optional_sections:
      - Counter-Evidence
      - Closure Path
      - Resolution History
    section_rules:
      "Hypothesis Evaluation":
        subsection_per_hypothesis: true
    conditionally_required:
      # Closure Path required on the rendered node body when the
      # investigation's frontmatter status == paused (externally
      # blocked). Counter-Evidence and Resolution History are
      # artifact-content-conditional — renderer auto-suppresses when
      # empty, no frontmatter gate, no conditionally_required entry.
      "Closure Path": "status == paused"

  # --- ATTESTATION TIER ---------------------------------------------------
  # Per-attestation evidentiary tier carried on finding evidence[] rows.
  # Renderer surfaces the tier in each evidence row's verification block
  # so readers see the evidentiary weight of each attestation when
  # convergence spans mixed tiers. Scoped to finding evidence[] only;
  # entity-node quotes[] do not adopt this enum.
  attestation_tier_values:
    - sworn-oath           # under-oath congressional testimony
    - sworn-perjury        # 18 U.S.C. § 1001 legal filing
    - dopsr-cleared        # DoD/IC pre-publication-reviewed
    - on-record            # interview, podcast, broadcast — no oath
    - self-attested        # subject asserts about themselves; no external corroboration
    - secondary-source     # journalistic reporting, third-party narration

  # --- META ---------------------------------------------------------------
  meta:
    description: "Governing documents (conventions.md, topic/research-queue.md, addenda, toolkit-notes) — no enforced node structure"
    frontmatter:
      required: [id, type, schema_version, created]

  # --- RESEARCH-ARTIFACT --------------------------------------------------
  # Structured-data layer backing every content node
  # (meta/research/{slug}.yaml). Spec lives in
  # meta/schema-research-artifact.yaml; merged into
  # types.research-artifact at parse time by
  # scripts/lib/_common.py::load_schema(). Cross-references use the
  # form schema-research-artifact.yaml::X.

# ---------------------------------------------------------------------------
# Manifest (sources/manifest.yaml) schema
# ---------------------------------------------------------------------------

manifest_entry:
  required: [url, format, status, archive_status]
  optional: [path, sha256, archived_date, wayback_date, wayback_skip, note, category, extraction_type, transcript_provenance]
  conditionally_required:
    path: "status == archived"       # must be set when the file is archived locally
    sha256: "status == archived"     # SHA256 of the archived file; integrity backstop
  status_values: [archived, 403-blocked, 402-blocked, pending]
  archive_status_values: [0, 1, 2, 3]
  # archive_status is a 2-bit presence indicator — bit 0 = locally archived
  # (status == archived AND path set), bit 1 = archived on the Internet
  # Archive Wayback Machine (wayback_date set). Combined values:
  #   0 = not in any archive (pending or blocked)
  #   1 = local only
  #   2 = Wayback only (rare — registered a URL we couldn't download
  #       locally but that Wayback has)
  #   3 = archived in both locations
  # Auto-maintained by manifest.py add (sets bit 0 on local archival)
  # and archive.py (sets bit 1 on Wayback find or successful SPN submit).
  # Validator enforces consistency against status / path / wayback_date.
  # Contributors don't hand-maintain this field; the scripts do.
  format_values: [pdf, html, txt, audio, image, video, transcript]
  extraction_type_values: [text-native, ocr-scan, extraction-lossy]
  # `extraction_type` classifies how the archived file yields text. Optional;
  # defaults to `text-native` when absent (legacy entries pre-field). The
  # three values distinguish source conditions by WHERE the extraction can
  # fail, not just by whether it can:
  #   text-native      — clean text layer (PDF authored with native text),
  #                      HTML, plain text, or any source whose extracted
  #                      bytes are a faithful rendering of the original.
  #                      pdftotext / direct read is sufficient.
  #   ocr-scan         — text layer absent or unreliable because the source
  #                      is a scanned image; OCR was needed to produce any
  #                      text at all. Failure mode: character-level
  #                      corruption introduced by the OCR process itself
  #                      (e.g. `UAP-telated` for `UAP-related`,
  #                      `compatrtmented` for `compartmented`). The PDF's
  #                      text layer IS the OCR output.
  #   extraction-lossy — text layer is present and was NOT produced by OCR
  #                      (author native or Acrobat Distiller from `.txt`,
  #                      etc.), but pdftotext extraction still produces
  #                      artifacts — Unicode mapping errors, font encoding
  #                      issues, character substitution at the PDF-
  #                      generation or extraction layer. Example: the 2023
  #                      House Oversight hearing transcript where
  #                      `11½ hours` renders as `11‡ hours` in pdftotext
  #                      output. Different root cause from ocr-scan (no
  #                      scan step involved); same operational consequence
  #                      (default extraction unreliable).
  # Operational handling (both ocr-scan and extraction-lossy): the validator
  # prefers a same-stem `.txt` sibling over pdftotext output when the field
  # is set to any non-text-native value. The sibling is a contributor-
  # produced clean transcription, visually verified against the source, with
  # its own manifest entry + sha256 for integrity tracking.
  # The field is ingestion-pipeline metadata, not reader-visible. Its purpose
  # is to drive heavier extraction handling (text-layer pull, modern OCR,
  # VLM on page images, or visual verification against the original) before
  # quotes derived from the source land in any node. Quotes in node bodies
  # are not flagged with the source's extraction_type — confirmation against
  # the underlying original is a precondition for inclusion, not a rendered
  # claim. See meta/conventions.md for the principle.
  transcript_provenance_values:
    - stenographic
    - published-transcript
    - human-corrected-caption
    - auto-caption
    - unknown
  # `transcript_provenance` classifies how a `format: transcript` source's
  # text was produced from the underlying audio/video. Optional; defaults
  # to `unknown` when absent. Parallel field to `extraction_type` (which
  # applies to static-text sources); same ingestion-pipeline-metadata role.
  # The five values distinguish how much human confirmation has already
  # been applied between the original audio signal and the archived text:
  #   stenographic            — court-reporting service (e.g., Alderson
  #                             Court Reporting) or other accredited
  #                             stenographic transcription. Human-attested
  #                             at audio-to-text capture. Equivalent
  #                             footing with text-native PDF — validator
  #                             substring match against transcript text
  #                             is substantively meaningful.
  #   published-transcript    — published transcript by an outlet whose
  #                             editorial process includes human review
  #                             against audio (e.g., NYTimes transcript
  #                             service, Federal News Network, 60
  #                             Minutes-published transcripts). Same
  #                             equivalent-footing as stenographic.
  #   human-corrected-caption — auto-caption (or other machine output)
  #                             that has been contributor-corrected
  #                             against the audio. Equivalent-footing
  #                             once the correction step is documented
  #                             in the manifest note.
  #   auto-caption            — machine-generated caption (YouTube auto-
  #                             caption, Otter.ai, Whisper output, etc.)
  #                             with no human correction. Failure mode:
  #                             character-level mis-transcription
  #                             (e.g. "Bigalow" for "Bigelow", "lockie
  #                             Martin" for "Lockheed Martin", "Kurpatre"
  #                             for "Kirkpatrick"). Same shape as
  #                             ocr-scan: machine rendering of an
  #                             underlying signal, with errors. The
  #                             caption file IS the machine output.
  #                             Validator substring match against the
  #                             caption file passes trivially when both
  #                             quote text and caption carry the same
  #                             machine artifact — the textbook auto-
  #                             caption blind spot the audit must catch.
  #   unknown                 — provenance not yet classified.
  # Operational handling for auto-caption: same workflow as ocr-scan.
  # The caption file is the machine extraction; the underlying audio /
  # video is the original source. Contributor discipline requires
  # registering known caption typos as `naming_quirks` entries with
  # resolution `preserve-as-sic-in-quotes`, mirroring the OCR-scan
  # discipline. Audio confirmation is required when programmatic /
  # contextual review surfaces anomalies — the exception case is when
  # the auto-caption happens to be clean enough that the validator's
  # substring match is substantively meaningful (analog to the
  # ocr-scan-with-clean-extract exception in meta/conventions.md).
  # See meta/conventions.md "Transcript provenance and audit discipline"
  # for the full discipline.
  # `category` is derived from path prefix (government/, news/, etc.) unless overridden
  # `sha256` detects local file corruption, accidental overwrite, and silent
  # substitution. Computed at archive-time by manifest.py add; re-verified
  # by manifest.py verify-checksums.
  # `wayback_skip: true` marks entries where Wayback archival is not
  # applicable — synthetic deep-link URLs that require session state
  # (e.g., the Uintah County parcel portal deep-links) and therefore
  # won't resolve cleanly at web-archive time. archive.py skips these
  # permanently; the local archive + sha256 remain the integrity
  # guarantee for such entries.

# ---------------------------------------------------------------------------
# Photo identity log manifest (sources/photo-identity-log/manifest.yaml)
# ---------------------------------------------------------------------------
#
# Separate-schema manifest tracking the persistent baseline crops produced by
# scripts/tools/detect-faces.py. Lives at sources/photo-identity-log/manifest.yaml
# (distinct from sources/manifest.yaml above, which tracks URL-archived primary
# sources). Each entry registers one baseline crop with sha256 integrity and
# provenance back to the source video + timestamp + bbox.
#
# Working-area crops (sources/photo-identity-log/crops/) are NOT manifest-
# tracked; only contributor-promoted baselines under
# sources/photo-identity-log/baselines/{identity}/ get manifest entries.

photo_identity_manifest_entry:
  required: [identity, path, sha256, source_video_path, source_timestamp, bbox, added_date]
  optional: [source_video_url, note]
  # identity: kebab-case slug — lowercase letters, digits, hyphens. Matches
  #   the baselines/{identity}/ subdirectory the crop lives in.
  # path: relative to sources/photo-identity-log/. Typically
  #   baselines/{identity}/ref_NN.jpg.
  # sha256: integrity hash of the baseline crop. Recomputed at
  #   register-time by detect-faces.py.
  # source_video_path: path to the source video relative to repo root.
  # source_timestamp: MM:SS or H:MM:SS within the source video the source
  #   frame was extracted from.
  # bbox: [x, y, w, h] face bounding box (in pixels) within the source
  #   frame the crop was derived from. Lets a future workflow re-derive the
  #   crop from the source video deterministically.
  # added_date: YYYY-MM-DD when the baseline was registered.
  # source_video_url: optional original URL for cross-reference.
  # note: optional contributor context (pose, lighting, framing notes).

# ---------------------------------------------------------------------------
# Addenda
# ---------------------------------------------------------------------------

addenda:
  # Corpus-specific addenda live at meta/topic/addenda/{name}.md and are
  # referenced from node frontmatter via the `corpus:` field on document
  # nodes. Addenda may declare additional required sections and additional
  # required frontmatter fields. Validator merges addendum rules with the
  # base type's rules.
  resolution: "Nodes with `corpus: X` in frontmatter inherit rules from meta/topic/addenda/X.md"
  # Addenda are topic-specific by definition. They live under meta/topic/
  # so they are deleted cleanly when the toolkit is forked to a different
  # topic. See meta/topic/overview.md for the topic scope of this instance.
