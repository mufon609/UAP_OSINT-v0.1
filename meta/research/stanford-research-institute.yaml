context_extrinsic:
  display_title: 'SRI International'

description: 'SRI International ([`/organizations/stanford-research-institute`]) is an independent nonprofit R&D institute with deep roots in Silicon Valley, at 333 Ravenswood Ave, Menlo Park, CA 94025. Founded in 1946 by Stanford University ([`/organizations/stanford-university`]) as the Stanford Research Institute, and independent since 1970, SRI has 1,500 researchers and professional staff who work with government and commercial customers and collaborators. In 1987, SRI acquired Sarnoff Corp. ([`/organizations/sarnoff-corp`]) (formerly RCA Labs); in 2023, it received as a donation the Palo Alto Research Center ([`/organizations/parc`]) (PARC). David Parekh ([`/people/david-parekh`]) is Chief Executive Officer. The institute reports 13,000+ patents filed, 50+ spin-off companies, and 500+ R&D projects per year. Research covers Advanced Technology & Systems, Biosciences, Education, Information & Computing Sciences, and Integrated Systems & Solutions; commercialization activities include Commercial R&D, Ventures, Center for Innovation, Strategy & Policy, and the Nomura-SRI Innovation Center.


  From 1972 through 1990, the SRI International parapsychology and remote viewing research program in Menlo Park, CA was funded by the Central Intelligence Agency and the Defense Intelligence Agency, with Russell Targ ([`/people/russell-targ`]) and Harold E. Puthoff ([`/people/hal-puthoff`]) — two physicists who re-awakened CIA research in parapsychology per Kress 1977. Per the 1977 Studies in Intelligence article [`/documents/kress-parapsychology-in-intelligence-1977`] by Kenneth A. Kress ([`/people/kenneth-kress`]) — a CIA ([`/organizations/cia`]) Operations Officer in the Office of Technical Service — Targ met with CIA personnel from the Office of Scientific Intelligence in April 1972 having "recently joined the Stanford Research Institute (SRI)"; an OTS project officer contracted for a demonstration with Targ and Puthoff at SRI in August 1972 for $874, the first action in the CIA work at SRI. Targ and Puthoff''s 1974 Nature paper [`/documents/nature-1974-targ-puthoff-information-transmission`] ''Information transmission under conditions of sensory shielding'' places the work at the Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California, 94025. Per the 1993 DIA ([`/organizations/dia`]) STAR GATE Project Overview [`/documents/dia-stargate-project-overview-1993`], the effort at SRI was discontinued in 1990 and Congressional direction in FY 1991 for DIA established new research at Systems Applications International Corporation (SAIC) ([`/organizations/saic`]) in Menlo Park, CA. The 1995 American Institutes for Research ([`/organizations/american-institutes-for-research`]) evaluation reviewed the 1973-1988 SRI experiments — 154 experiments and over 26,000 individual trials with 227 subjects — and described the program as headed for eleven years by Dr. H. Puthoff.

  '

quotes:

- id: q1
  added_date: '2026-05-15'
  text: |
    An independent nonprofit R&D institute with deep roots in Silicon Valley
  source:
    path: news/sri-international-about-20260515.html
    location: '¶1'
  context: 'SRI International ''About'' page (sri.com/about/), retrieved 2026-05-15 — institutional tagline'
  significance: 'SRI''s first-party self-characterization as an independent nonprofit R&D institute in Silicon Valley. The most concise statement of institutional identity available on the sri.com About page.'

- id: q2
  added_date: '2026-05-15'
  text: |
    Founded in 1946 as Stanford Research Institute, and independent since 1970, we acquired Sarnoff Corp. (formerly RCA Labs) in 1987 and the Palo Alto Research Center (PARC) in 2023. Today, our 1,500 researchers and professional staff work with government and commercial customers and collaborators to solve some of the world’s hardest problems.
  source:
    path: news/sri-international-about-20260515.html
    location: '¶4'
  context: 'SRI International ''About'' page (sri.com/about/), retrieved 2026-05-15 — institutional anchor paragraph'
  significance: 'Foundational SRI self-attestation establishing the four institutional milestones: 1946 founding (as Stanford Research Institute), 1970 independence, 1987 Sarnoff Corp. acquisition, 2023 PARC acquisition. Also attests current scale (1,500 researchers and professional staff) and customer base (government and commercial).'

- id: q3
  added_date: '2026-05-15'
  text: |
    Founded in 1946 by Stanford University as the Stanford Research Institute, and independent since 1970, we’ve created technologies, services, and ideas that have had a meaningful impact on every one of our lives throughout our history. In 1987, we acquired Sarnoff Corp. (formerly RCA Labs), and in 2023, we received as a donation the Palo Alto Research Center (PARC) — two iconic organizations with extraordinary legacies of their own.
  source:
    path: news/sri-international-timeline-of-innovation-20260515.html
    location: '¶2'
  context: 'SRI International ''Interactive Timeline of Innovation'' page (sri.com/timeline-of-innovation/), retrieved 2026-05-15 — anchor paragraph'
  significance: 'Tightens the sri.com About-page founding attestation (q2) by explicitly naming "Stanford University" as the 1946 founder. Also tightens the PARC acquisition to "received as a donation" (PARC was a 2023 donation, not a purchase). Independent corroboration of the 1987 Sarnoff acquisition and 1970 independence facts attested in q2.'

- id: q4
  added_date: '2026-05-15'
  text: |
    Russell Targ is a physicist and author who was a pioneer in the development of the laser and cofounder of the Stanford Research Institute’s investigation into psychic abilities in the 1970s and 1980s.
  source:
    path: news/espresearch-russell-targ-snapshot.html
    location: '¶2'
  context: 'Russell Targ''s ESP Research website (espresearch.com homepage), retrieved 2026-05-07 — Targ self-attestation'
  significance: 'Targ''s first-party self-attestation of the Stanford Research Institute parapsychology investigation in the 1970s and 1980s, cofounded by Targ. Co-cofounder Harold E. Puthoff established via the 1974 Nature paper byline (q6).'

- id: q5
  added_date: '2026-05-15'
  text: |
    Russell Targ is a physicist and author, a pioneer in the development of the laser and laser applications, and a cofounder of the Stanford Research Institute (SRI) investigation of psychic abilities in the 1970s and 1980s. SRI is a research and development think tank in Menlo Park, California. Called remote viewing, his work in the psychic area has been published in Nature, The Proceedings of the Institute of Electronic and Electrical Engineers (IEEE), and the Proceedings of the American Association the Advancement of Science (AAAS).
  source:
    path: news/irva-targ-russell-wayback-20250123.html
    location: '¶1'
  context: 'International Remote Viewing Association speaker biography for Russell Targ, irva.org/speaker/targ-russell (live URL is currently HTTP 404; archived from Wayback Machine snapshot 20250123205703)'
  significance: 'Third-party (IRVA) biographical attestation that characterizes SRI as "a research and development think tank in Menlo Park, California" — independent corroboration of the sri.com institutional-shape attestation (q1, q2) and frames the SRI investigation explicitly as "remote viewing". Names three peer-reviewed publication venues for the SRI program''s output (Nature, IEEE Proceedings, AAAS Proceedings).'

- id: q6
  added_date: '2026-05-15'
  text: |
    Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California, 94025  RUSSELL TARG & HAROLD PUTHOFF
  source:
    path: news/nature-1974-targ-puthoff-information-transmission-abstract.html
    location: '¶1'
  context: 'Targ and Puthoff, ''Information transmission under conditions of sensory shielding'', Nature 251, 602–607 (18 October 1974), DOI 10.1038/251602a0 — author affiliation block from the Nature article landing page'
  statement_date: '1974-10-18'
  significance: 'Peer-reviewed Nature author-affiliation block establishing that the SRI parapsychology investigation operated out of the Electronics and Bioengineering Laboratory at Stanford Research Institute, Menlo Park, California, 94025 — the specific sub-unit and address at SRI. The Nature byline names both Russell Targ and Harold E. Puthoff at SRI, establishing the two-person co-author structure (Targ self-attests his cofounder role at SRI on espresearch.com per q4; the Nature byline corroborates Puthoff at SRI alongside Targ).'

- id: q7
  added_date: '2026-05-15'
  text: |
    Two lasqr physicists, Dr. Russell Targ and Dr. Harold E. Puthoff, re-awakened CIA research in parapsychology. Targ had been avocationally interested in parapsv- chology for most of his adult life. As an experimentalist, he was interested in scientir'ic observations of parapsychology. Puthoff became interested in the field in the early 1970s. He was a theoretician who was exploring new fields of research after extensive work in quantum electronics.
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 8, ¶1'
  context: 'Kenneth A. Kress, ''Parapsychology in Intelligence: A Personal Review and Conclusions,'' Studies in Intelligence (CIA in-house journal) Vol. 21 No. 4, Winter 1977 (declassified 2011/06/23, document ID CIA-RDP88G01116R000600690003-8)'
  statement_date: '1977'
  significance: 'Foundational CIA primary-source attestation that Targ and Puthoff (the two laser physicists) re-awakened CIA research in parapsychology — the institutional inception of the CIA-funded SRI investigation. Source carries OCR-scan artifacts (Adobe Acrobat Paper Capture Plug-in): "lasqr" for "laser"; "parapsv- chology" for "parapsychology" (PDF line-wrap rendering); "scientir''ic" for "scientific" — preserved as-source per OCR-scan discipline; see naming_quirks nq2-nq4.'

- id: q8
  added_date: '2026-05-15'
  text: |
    In April of 1972, Targ met with CIA personnel from the Office of Scientific Intelligence (OSI) and discussed the subject of paranormal abilities. Targ revealed that he had contacts with people who purported to have seen and documented some Soviet investigations of psychokinesis. Films of Soviets moving inanimate objects by "mental powers" were made available to analysts from OSI. They, in tum, contacted personnel from the Office of Research and Development (ORO) and OTS. An ORO Project Officer then visited Targ who had recently joined the Stanford Research Institute (SRI). Targ proposed that some psychokinetic verification investigations could be done at SRI in conjunction with Puthoff.
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 8, ¶2'
  context: 'Kenneth A. Kress, ''Parapsychology in Intelligence: A Personal Review and Conclusions,'' Studies in Intelligence Vol. 21 No. 4, Winter 1977'
  statement_date: '1977'
  significance: 'CIA primary-source attestation of the April 1972 Targ-CIA OSI meeting and of Targ as having "recently joined the Stanford Research Institute (SRI)" as of that meeting — the earliest archived attestation of the CIA-SRI parapsychology engagement. Source carries OCR artifacts: "tum" for "turn"; "ORO" for "ORD" (recurring) — preserved as-source; see naming_quirks nq5, nq7.'

- id: q9
  added_date: '2026-05-15'
  text: |
    The Office of Technical Services took the first action. With the approval of the same manager who supported the ESP studies a decade previously, an OTS project officer contracted for a demonstration with the previously described subject at SRI For a cost of $874, one OTS and one ORO representative worked with Targ and Puthoff and the previously mentioned man for a few days in August, 19i2.
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 8, ¶4'
  context: 'Kenneth A. Kress, ''Parapsychology in Intelligence: A Personal Review and Conclusions,'' Studies in Intelligence Vol. 21 No. 4, Winter 1977'
  statement_date: '1977'
  significance: 'CIA primary-source attestation of the first formal CIA contract at SRI: an August 1972 $874 OTS project-officer demonstration contract with Targ and Puthoff. Source carries OCR artifacts: "ORO" for "ORD"; "19i2" for "1972" — preserved as-source; see naming_quirks nq5, nq6.'

- id: q10
  added_date: '2026-05-15'
  text: |
    During November of 1976, Director George Bush became aware that official Soviets were visiting and questioning Puthoff and Targ at SRI about their work in parapsychology. Mr. Bush requested and received a briefing on CIA's investigations into parapsychology.
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 15, ¶1'
  context: 'Kenneth A. Kress, ''Parapsychology in Intelligence: A Personal Review and Conclusions,'' Studies in Intelligence Vol. 21 No. 4, Winter 1977'
  statement_date: '1977'
  significance: 'CIA primary-source attestation that the SRI parapsychology investigation had drawn sufficient attention from the Soviet intelligence community by November 1976 to prompt DCI George Bush to request a briefing on CIA''s parapsychology investigations. Anchors a lower-bound for the SRI program''s active period (continued at least through Nov 1976).'

- id: q11
  added_date: '2026-05-15'
  text: |
    In the early 1970's, U.S. researchers at SRI-International, Menlo Park, CA, also initiated research into phenomena understanding and application pursuits. This work, centering on "remote viewing (RV)" came to the attention of the CIA. CIA then provided funding to SRI for continuing RV research.
  source:
    path: government/cia-rdp96-00789r002800180001-2-stargate-project-an-overview-19930430.pdf
    location: 'p. 10, ¶1'
  context: 'Defense Intelligence Agency Directorate for Scientific and Technical Intelligence, ''STAR GATE PROJECT: AN OVERVIEW'' (Short Title DTI-S-1056-SL), 30 April 1993; CIA Reading Room document CIA-RDP96-00789R002800180001-2'
  statement_date: '1993-04-30'
  significance: 'DIA institutional primary-source attestation of the early-1970s SRI International remote viewing research and the initial CIA funding to SRI. Source-form artifact: the hyphenated form "SRI-International" appears here (DIA''s own document) where the canonical form is "SRI International" — preserved as-source; see naming_quirks nq8.'

- id: q12
  added_date: '2026-05-15'
  text: |
    The effort at SRI was discontinued in 1990. However, as a result of Congressional direction in FY 1991 for DIA, new research in this area was established with the Systems Applications International Corporation (SAIC), in Menlo Park, CA.
  source:
    path: government/cia-rdp96-00789r002800180001-2-stargate-project-an-overview-19930430.pdf
    location: 'p. 10, ¶3'
  context: 'Defense Intelligence Agency Directorate for Scientific and Technical Intelligence, ''STAR GATE PROJECT: AN OVERVIEW'' (DTI-S-1056-SL), 30 April 1993'
  statement_date: '1993-04-30'
  significance: 'DIA institutional attestation of the 1990 termination of the SRI International parapsychology investigation and the immediate FY 1991 Congressional re-establishment of the research at Systems Applications International Corporation (SAIC) in Menlo Park, CA. Anchors the outer bound of the SRI program window (1970-1990 per Figure 1 of the same document).'

- id: q13
  added_date: '2026-05-15'
  text: |
    For the past eleven years, a small group headed by Dr. H. Puthoff has sought evidence that would support the case for extrasensory perception.
  source:
    path: government/cia-rdp96-00789r002800180001-2-stargate-project-an-overview-19930430.pdf
    location: 'p. 22, ¶1'
  context: 'Defense Intelligence Agency Directorate for Scientific and Technical Intelligence, ''STAR GATE PROJECT: AN OVERVIEW'' (DTI-S-1056-SL), 30 April 1993 — Section on SRI Studies in Remote Viewing: A Program Review'
  statement_date: '1993-04-30'
  significance: 'DIA characterization of the SRI program leadership: "headed by Dr. H. Puthoff" over the eleven-year window referenced. The OCR-scan PDF preserves the typewriter-source spacing artifacts (extra whitespace between words consistent with typewriter-rendered text on the original 1993 document). Independent corroboration of Puthoff''s leadership role attested by Kress 1977 (q7) and AIR 1995 (q15).'

- id: q14
  added_date: '2026-05-15'
  text: |
    During 1974 and early 1975 a number of controlled experiments were conducted to see if various types of target material could be successfully described with remote viewing. The results reported by Puthoff and Targ (1975) indicated success with a wide range of material, from "technical" targets like a Xerox machine to natural settings, like a swimming pool.
  source:
    path: government/air-mumford-evaluation-remote-viewing-stargate-19950929.pdf
    location: 'p. 3-13, ¶1'
  context: 'Michael D. Mumford, Andrew M. Rose, and David A. Goslin, ''An Evaluation of Remote Viewing: Research and Applications,'' American Institutes for Research, 29 September 1995, Section 3.2 (The Early Scientific Effort at SRI)'
  statement_date: '1995-09-29'
  significance: 'Independent government-commissioned AIR evaluation (prepared at CIA''s request at the end of the Stargate Project) describes the 1974-1975 SRI controlled experiments and cites Puthoff and Targ (1975) "Perceptual Augmentation Techniques: Part Two—Research Report, Stanford Research Institute Final Report, Dec. 1, 1975" — the foundational SRI internal report from the parapsychology investigation.'

- id: q15
  added_date: '2026-05-15'
  text: |
    In 1988 an analysis was made of all of the experiments conducted at SRI from 1973 until that time (May et al, 1988). The analysis was based on all 154 experiments conducted during that era, consisting of over 26,000 individual trials. Of those, almost 20,000 were of the forced choice type and just over a thousand were laboratory remote viewings. There were a total of 227 subjects in all experiments.
  source:
    path: government/air-mumford-evaluation-remote-viewing-stargate-19950929.pdf
    location: 'p. 3-14, ¶1'
  context: 'Michael D. Mumford, Andrew M. Rose, and David A. Goslin, ''An Evaluation of Remote Viewing: Research and Applications,'' American Institutes for Research, 29 September 1995, Section 3.3 (An Overall Analysis of the SRI Experiments: 1973-1988)'
  statement_date: '1995-09-29'
  significance: 'AIR review of the 1988 SRI internal program analysis (May, Utts, Trask, Luke, Frivold, Humphrey 1988 "Review of the psychoenergetic research conducted at SRI International (1973-1988)") establishes the institutional shape of the SRI parapsychology program over its 1973-1988 documented span: 154 experiments, over 26,000 individual trials, 227 total subjects. Direction of Dr. Edwin May from mid-1970s per AIR Section 3 preamble.'

- id: q16
  added_date: '2026-05-15'
  text: |
    Interest was translated into action when ORD requested an increase in the scope of the effort and transferred funds to OTS. S About this time. a third sensitive subject. Pat Price. became a~ailable at SRI. and the remote viewing experiments in which a subject describes his impressions of remote objects or locations began in earnest.
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 9, ¶1'
  context: 'Kenneth A. Kress, ''Parapsychology in Intelligence: A Personal Review and Conclusions,'' Studies in Intelligence Vol. 21 No. 4, Winter 1977'
  statement_date: '1977'
  significance: 'CIA primary-source attestation of Pat Price as the third sensitive subject at SRI (February–May 1973 window per the surrounding Kress narrative — ORD sent new Project Officers to SRI in February 1973; Price became available "About this time"), and of the inception of "the remote viewing experiments in which a subject describes his impressions of remote objects or locations" in earnest. Source-form artifacts: "a~ailable" for "available" (OCR tilde-for-v misread); "ORO" recurring (already nq5); "tum" recurring (already nq7); hanging "S" footnote marker. See naming_quirks nq5, nq7, nq9.'

- id: q17
  added_date: '2026-05-15'
  text: |
    At Stanford Research Institute (SRI), in 1972, New York artist, and psychic, Ingo Swann taught us how to experience remote viewing in the laboratory. The following year, retired police commissioner, Pat Price showed us how to do this with great reliability and accuracy. With these data, and the education provided by Pat and Ingo, we were able to initiate a twenty-million dollar program in research and applications of remote viewing that lasted more than twenty years – a paranormal feat in itself.
  source:
    path: news/irva-targ-russell-wayback-20250123.html
    location: 'Presentations, IRVA 2002 talk abstract'
  context: 'Russell Targ, IRVA 2002 talk abstract "The Real ''Real X-Files'': Remote viewing at Stanford Research Institute" (archived on the IRVA speaker biography page)'
  significance: 'Targ first-person retrospective naming Ingo Swann (1972) and Pat Price (1973) as the foundational SRI remote-viewing subjects. Adds the "twenty-million dollar" program scale claim over "more than twenty years" — Targ-self-attestation, not independently quantified in the archived corpus. Combined with Kress 1977 (q16) on Price, this passage graduates the earlier rumor r2 (Price/Swann as foundational SRI subjects) by anchoring both names to a primary-source attestation. Source-priority hierarchy applies: Targ retrospective on his own collaborators ranks below Kress contemporaneous CIA primary source for Price; uniquely names Swann (Kress 1977 describes the magnetometer subject only as "the previously described subject"/"the previously mentioned man" without naming him).'

- id: q18
  added_date: '2026-05-15'
  text: |
    In 1974 Hal Puthoff and I were then two years into our remote viewing program at SRI, and our sponsors from the CIA wanted us to find an inexperienced “control” subject to supplement Pat Price and Ingo Swann who were life-long practitioners of remote viewing. Hella, who had just moved to Los Angeles thought it would be very entertaining to be part of a government sponsored ESP program, and she promised us that she had no previous experience in that area. In her ten years with the program, she became our most reliable viewer.
  source:
    path: news/irva-targ-russell-wayback-20250123.html
    location: 'Presentations, IRVA 2009 (Hella Hammid Tribute) talk abstract'
  context: 'Russell Targ, IRVA 2009 talk abstract "A Tribute to Hella Hammid: The First Woman Remote Viewer, Part 2" (archived on the IRVA speaker biography page)'
  significance: 'Targ first-person retrospective attesting Hella Hammid''s ten-year SRI tenure (1974–1984) as the CIA-requested "control" subject brought in to supplement Pat Price and Ingo Swann. Anchors Hammid''s SRI involvement to 1974 (two years after the program''s 1972 start). Independent corroboration of the Swann + Price foundational-subject pair attested by q17.'

- id: q19
  added_date: '2026-05-15'
  text: |
    By October, 1972, I was the Project Officer. I was chosen because of my physics background to work with the physicists from SRI. The Office of Technical Service funded a $50,000 expanded effort in parapsychology.
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 8, ¶6'
  context: 'Kenneth A. Kress, ''Parapsychology in Intelligence: A Personal Review and Conclusions,'' Studies in Intelligence Vol. 21 No. 4, Winter 1977; footnote 4 cites the contract: "Office of Technical Service Contract 8473, 1 October 1972 (CONFIDENTIAL)"'
  statement_date: '1977'
  significance: 'CIA primary-source attestation of the formalization of the August 1972 $874 demonstration contract (q9) into OTS Contract 8473 — a $50,000 expanded effort dated 1 October 1972 — and of Kress himself becoming Project Officer by October 1972 due to his physics background. Footnote 4 of the Kress paper carries the contract citation: "Office of Technical Service Contract 8473, 1 October 1972 (CONFIDENTIAL)". Anchors timeline tl5 with primary-source citation rather than the prior summary-only reference.'

- id: q20
  added_date: '2026-05-15'
  text: |
    WE present results of experiments suggesting the existence of one or more perceptual modalities through which individuals obtain information about their environment, although this information is not presented to any known sense. The literature1–3 and our observations lead us to conclude that such abilities can be studied under laboratory conditions.
  source:
    path: news/nature-1974-targ-puthoff-information-transmission-abstract.html
    location: 'Abstract, ¶1'
  context: 'Targ and Puthoff, ''Information transmission under conditions of sensory shielding'', Nature 251, 602–607 (18 October 1974), DOI 10.1038/251602a0 — abstract body'
  statement_date: '1974-10-18'
  significance: 'Peer-reviewed Targ + Puthoff statement of the SRI parapsychology investigation''s evidentiary claim — the existence of perceptual modalities through which individuals obtain environmental information not presented to any known sense, studyable under laboratory conditions. Adds methodological framing to the existing author-affiliation attestation (q6).'

- id: q21
  added_date: '2026-05-15'
  text: |
    One of the apparent successes concerned the "West Virginia Site" in which two remote viewers purportedly identified an underground secret facility. One of them apparently named codewords and personnel in this facility accurately enough that it set off a security investigation to determine how that information could have been leaked. Based only on the coordinates of the site, the viewer first described the above ground terrain, then proceeded to describe details of the hidden underground site.
  source:
    path: government/air-mumford-evaluation-remote-viewing-stargate-19950929.pdf
    location: 'p. 3-12, ¶2'
  context: 'Michael D. Mumford, Andrew M. Rose, and David A. Goslin, ''An Evaluation of Remote Viewing: Research and Applications,'' American Institutes for Research, 29 September 1995, Section 3.1 (Early Operational Successes and Evaluation)'
  statement_date: '1995-09-29'
  significance: 'AIR independent evaluation describing one of the three apparent operational successes in the early days of the SRI parapsychology program — the "West Virginia Site" remote-viewing identification of an underground secret facility that set off a security investigation to determine the source of the leaked codewords and personnel names. AIR Section 3.1 cites Puthoff and Targ (1975) as the source; methodological caveats are discussed in the same section.'

- id: q22
  added_date: '2026-05-15'
  text: |
    The statistical results were so overwhelming that results that extreme or more so would occur only about once in every 1020 such instances if chance alone is the explanation (i.e., the p-value was less than 10-20). Obviously some explanation other than chance must be found.
  source:
    path: government/air-mumford-evaluation-remote-viewing-stargate-19950929.pdf
    location: 'p. 3-14, ¶2'
  context: 'Michael D. Mumford, Andrew M. Rose, and David A. Goslin, ''An Evaluation of Remote Viewing: Research and Applications,'' American Institutes for Research, 29 September 1995, Section 3.3 (An Overall Analysis of the SRI Experiments: 1973-1988)'
  statement_date: '1995-09-29'
  significance: 'AIR independent evaluation''s headline statistical finding from the 1988 SRI internal analysis of 1973-1988 experiments (q15): the overall p-value was less than 10-20, motivating the conclusion that "some explanation other than chance must be found." AIR Section 3.3 notes that methodological problems in early experiments cannot account for the result because the same level of functioning persisted in later, methodologically-improved experiments.'

- id: q23
  added_date: '2026-05-15'
  text: |
    In our 80-year history, SRI innovations have won numerous awards and accolades, including nine IEEE Milestones, that celebrate human ingenuity and honor the transformative technologies that have shaped our world and inspired generations of innovators.
  source:
    path: news/sri-international-timeline-of-innovation-20260515.html
    location: '¶3'
  context: 'SRI International ''Interactive Timeline of Innovation'' page (sri.com/timeline-of-innovation/), retrieved 2026-05-15 — framing paragraph for the decade-by-decade index'
  significance: 'SRI''s first-party framing of its institutional R&D legacy — nine IEEE Milestones (industry-standard third-party recognition of historically-significant technical contributions) anchor the breadth claim. Frames the pages 1-7 decade index of SRI projects spanning 1940s-2020s.'

- id: q24
  added_date: '2026-05-15'
  text: |
    Tax-exempt since March 1949
