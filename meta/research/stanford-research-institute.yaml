  context: 'SRI International ''About'' page (sri.com/about/), retrieved 2026-05-15 — institutional-scale stat block following the David Parekh CEO quote'
  significance: 'SRI''s first-party attestation of three institutional-scale metrics — 13,000+ patents filed, 50+ spin-off companies, and 500+ R&D projects per year. Anchors the description''s reference to these figures (previously sourced to the page in token-pool only).'

