org_relationships:

- id: or1
  added_date: '2026-05-15'
  organization_path: /organizations/stanford-university
  relationship_type: parent
  source:
    path: news/sri-international-timeline-of-innovation-20260515.html
    location: '¶2'
  note: 'Stanford University founded SRI as the Stanford Research Institute in 1946 (q3); SRI became independent from Stanford in 1970 (q2, q3). Specific circumstances of the 1970 severance are not attested by the archived sri.com sources.'

- id: or2
  added_date: '2026-05-15'
  organization_path: /organizations/sarnoff-corp
  relationship_type: subsidiary
  source:
    path: news/sri-international-about-20260515.html
    location: '¶4'
  note: 'SRI acquired Sarnoff Corp. (formerly RCA Labs) in 1987 per q2 and q3. Sarnoff Corp. was originally a research arm of RCA; the corporate-history details of the Sarnoff acquisition are not attested by archived sources.'

- id: or3
  added_date: '2026-05-15'
  organization_path: /organizations/parc
  relationship_type: subsidiary
  source:
    path: news/sri-international-timeline-of-innovation-20260515.html
    location: '¶2'
  note: 'In 2023 SRI received the Palo Alto Research Center (PARC) "as a donation" per q3. Donating party not attested in the archived sri.com sources (PARC was a subsidiary of Xerox prior to the donation per public record but Xerox is not named on the sri.com pages).'

- id: or4
  added_date: '2026-05-15'
  organization_path: /organizations/cia
  relationship_type: contracting-agency
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 8, ¶4'
  note: 'Per Kress 1977, the inception of the CIA-SRI parapsychology investigation was an $874 OTS demonstration contract in August 1972. Per the 1993 DIA STAR GATE Project Overview, CIA funding to SRI was for "continuing RV research" and was subsequently discontinued in 1975, after which DIA assumed funding.'

- id: or5
  added_date: '2026-05-15'
  organization_path: /organizations/dia
  relationship_type: contracting-agency
  source:
    path: government/cia-rdp96-00789r002800180001-2-stargate-project-an-overview-19930430.pdf
    location: 'p. 10, ¶3'
  note: 'Per the 1993 DIA STAR GATE Project Overview, DIA funded the SRI parapsychology investigation following CIA''s 1975 funding discontinuation through the 1990 program termination at SRI. FY 1991 Congressional direction for DIA established successor research at SAIC.'

- id: or6
  added_date: '2026-05-15'
  organization_path: /organizations/saic
  relationship_type: successor
  source:
    path: government/cia-rdp96-00789r002800180001-2-stargate-project-an-overview-19930430.pdf
    location: 'p. 10, ¶3'
  note: 'Per the 1993 DIA STAR GATE Project Overview, Congressional direction in FY 1991 for DIA established new remote-viewing research at Systems Applications International Corporation (SAIC), Menlo Park, CA, after the SRI program was discontinued in 1990. SAIC was the institutional successor for the remote-viewing program, not a peer or partner of SRI.'

