naming_quirks:

- id: nq1
  added_date: '2026-05-15'
  observed: 'Stanford Research Institute'
  canonical: 'SRI International'
  location: 'multiple'
  source_path: news/sri-international-about-20260515.html
  resolution: use-canonical
  note: 'The institution was founded in 1946 as "Stanford Research Institute" (per sri.com About q2 and Timeline q3) and is now "SRI International" (per the sri.com page footer "© 2026 SRI INTERNATIONAL" and the Schema.org Organization block on the timeline page). The specific date of the rebrand from "Stanford Research Institute" to "SRI International" is NOT attested by archived primary sources. The two forms are observable across the corpus: pre-1990 government documents (1974 Nature paper q6; 1977 Kress paper q7-q10) use "Stanford Research Institute" or "SRI"; the 1993 DIA STAR GATE Project Overview (q11, q13) uses "SRI International" and "SRI-International"; the 1995 AIR evaluation alternates between "Stanford Research Institute, later known as SRI International" (line 763 of extracted text) and "what was then the Stanford Research Institute, now called SRI International" (line 818). Canonical form for prose use is "SRI International"; the pre-rename form "Stanford Research Institute" is preserved verbatim in quoted text. The repo slug stays /organizations/stanford-research-institute to match the existing wrap_path references in built nodes (russell-targ, james-ryder).'

- id: nq2
  added_date: '2026-05-15'
  observed: 'lasqr'
  canonical: 'laser'
  location: 'p. 8, ¶1'
  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper (declassified scan of typewritten 1977 original; Adobe Acrobat Paper Capture Plug-in producer). The source extract reads "Two lasqr physicists, Dr. Russell Targ and Dr. Harold E. Puthoff" where the canonical form is "Two laser physicists". The OCR engine read "e" as "q" — common typewritten-font OCR misread. Preserved verbatim in q7 quote text per OCR-scan source-form-preservation discipline.'

- id: nq3
  added_date: '2026-05-15'
  observed: 'parapsv- chology'
  canonical: 'parapsychology'
  location: 'p. 8, ¶1'
  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper. The PDF renders "parapsychology" with a typewritten-font OCR misread "v" for "y" yielding "parapsvchology", further fragmented by PDF end-of-line word-wrap into "parapsv-" / "chology" across two source lines. The pdftotext output and the verbatim-quote check normalize the newline to a space, yielding "parapsv- chology" as the comparison form. Preserved verbatim in q7 quote text per OCR-scan source-form-preservation discipline.'

- id: nq4
  added_date: '2026-05-15'
  observed: 'scientir''ic'
  canonical: 'scientific'
  location: 'p. 8, ¶1'
  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper. The OCR engine read "fi" ligature as "r''i" (apostrophe-i sequence) yielding "scientir''ic" where the canonical form is "scientific". Preserved verbatim in q7 quote text per OCR-scan source-form-preservation discipline.'

- id: nq5
  added_date: '2026-05-15'
  observed: 'ORO'
  canonical: 'ORD'
  location: 'p. 8, ¶2-4'
  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper. The OCR engine consistently reads CIA Office of Research and Development abbreviation "ORD" as "ORO" — typewritten-font OCR misread of "D" as "O". The source paper expands the abbreviation explicitly in q8: "Office of Research and Development (ORO)" — the parenthetical expansion confirms the misread. Recurring across q8 and q9. Preserved verbatim per OCR-scan source-form-preservation discipline.'

- id: nq6
  added_date: '2026-05-15'
  observed: '19i2'
  canonical: '1972'
  location: 'p. 8, ¶4'
  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper. The OCR engine read "7" as "i" in the year "1972" yielding "19i2" — typewritten-font OCR misread on the digit-7 glyph. Preserved verbatim in q9 quote text per OCR-scan source-form-preservation discipline.'

- id: nq7
  added_date: '2026-05-15'
  observed: 'tum'
  canonical: 'turn'
  location: 'p. 8, ¶2'
  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper. The OCR engine read "rn" as "m" yielding "tum" where the canonical form is "turn" — common typewritten-font OCR cluster misread (rn↔m is documented in meta/conventions.md as a typical OCR confusion). Preserved verbatim in q8 quote text per OCR-scan source-form-preservation discipline.'

- id: nq8
  added_date: '2026-05-15'
  observed: 'SRI-International'
  canonical: 'SRI International'
  location: 'p. 10, ¶1'
  source_path: government/cia-rdp96-00789r002800180001-2-stargate-project-an-overview-19930430.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'The 1993 DIA STAR GATE Project Overview uses the hyphenated form "SRI-International" in one passage (q11) where the canonical form is "SRI International" (no hyphen). DIA''s own document varies: Figure 1 of the same document lists "1970-1990 — SRI INTERNATIONAL, MENLO PARK, CA" (no hyphen). Preserved verbatim in q11 quote text.'

- id: nq9
  added_date: '2026-05-15'
  observed: 'a~ailable'
  canonical: 'available'
  location: 'p. 9, ¶1'
  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper. The OCR engine read "v" as "~" (tilde) in "available" yielding "a~ailable" — typewritten-font OCR misread on the lowercase v glyph. Preserved verbatim in q16 quote text per OCR-scan source-form-preservation discipline.'

- id: nq10
  added_date: '2026-05-15'
  observed: '1020'
  canonical: '10^20'
  location: 'p. 3-14, ¶2'
  source_path: government/air-mumford-evaluation-remote-viewing-stargate-19950929.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'Superscript loss during pdftotext extraction of the AIR 1995 PDF. The source PDF renders "10^20" as the digit 10 with a superscript 20; pdftotext flattens this to baseline "1020" without preserving the superscript relationship. Preserved verbatim in q22 quote text. The same phenomenon affects "10^-20" → "10-20" in the next clause of q22 (see nq11).'

- id: nq11
  added_date: '2026-05-15'
  observed: '10-20'
  canonical: '10^-20'
  location: 'p. 3-14, ¶2'
  source_path: government/air-mumford-evaluation-remote-viewing-stargate-19950929.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'Superscript loss during pdftotext extraction of the AIR 1995 PDF. The source PDF renders "10^-20" as the digit 10 with a superscript -20; pdftotext flattens this to baseline "10-20" without preserving the superscript relationship. Preserved verbatim in q22 quote text. Companion to nq10 ("1020" for "10^20") in the same passage.'

