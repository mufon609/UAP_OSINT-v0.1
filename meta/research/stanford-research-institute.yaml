  significance: 'IRS-sourced attestation that SRI became tax-exempt in March 1949 — three years after the 1946 founding. Tightens the founding-to-tax-exempt-status timeline beyond the sri.com self-attestation. ProPublica aggregates from IRS Form 990 data.'

