- id: q28
  added_date: '2026-05-15'
  text: |
    1970: Stanford Research Institute becomes independent from Stanford University.
  source:
    path: news/sri-com-about-history-1970s-wayback-2004.html
    location: '1970 entry'
  context: 'SRI International''s 2004-era ''History of SRI International, 1970s'' page (sri.com/about/history/1970.html), retrieved via Wayback Machine snapshot from 2004. Live URL has been removed from the modern sri.com site.'
  statement_date: '1970'
  significance: 'SRI''s own first-party attestation of the 1970 Stanford severance — the specific event marking SRI''s transition from Stanford-University-affiliated subsidiary to independent nonprofit. Closes prior gap-list item #8 (1970 Stanford severance circumstances): the live sri.com About / Timeline pages attest the year but not the discrete event; the 2004-era History page does. Specific date within 1970 still not attested in the archived corpus.'

- id: q29
  added_date: '2026-05-15'
  text: |
    1977: Stanford Research Institute officially becomes SRI International, with a new logo to reflect the change.
  source:
    path: news/sri-com-about-history-1970s-wayback-2004.html
    location: '1977 entry (rename)'
  context: 'SRI International''s 2004-era ''History of SRI International, 1970s'' page (sri.com/about/history/1970.html), retrieved via Wayback Machine snapshot from 2004'
  statement_date: '1977'
  significance: 'SRI''s own first-party attestation of the specific 1977 rename event — closes prior gap-list item #7 and graduates rumor r1 (1977 rename date previously not-primary-source-established). The full year-only date is attested; specific within-1977 date not attested.'

- id: q30
  added_date: '2026-05-15'
  text: |
    1946: Stanford University trustees approve the proposal for a research institute in principle. Articles of incorporation for Stanford Research Institute are signed and filed with the state of California. SRI is granted a nonprofit status, and Stanford University trustees elect eleven SRI directors.
  source:
    path: news/sri-com-about-history-1940s-wayback-2004.html
    location: '1946 entry'
  context: 'SRI International''s 2004-era ''History of SRI International, 1940s'' page (sri.com/about/history/1940.html), retrieved via Wayback Machine snapshot from 2004'
  statement_date: '1946'
  significance: 'SRI''s own first-party attestation of the 1946 founding events: Stanford trustees approve the institute proposal "in principle"; Articles of incorporation for Stanford Research Institute signed and filed with the state of California; nonprofit status granted; eleven SRI directors elected by Stanford trustees. Tightens the prior founding-year-only attestation (q2, q3) with specific institutional steps. Specific within-1946 date for incorporation not attested.'

- id: q31
  added_date: '2026-05-15'
  text: |
    1968: Douglas Engelbart and his SRI team give the first demonstration ever of personal computing at the Fall Joint Computer Conference in San Francisco.
  source:
    path: news/sri-com-about-history-1960s-wayback-2004.html
    location: '1968 entry (Engelbart)'
  context: 'SRI International''s 2004-era ''History of SRI International, 1960s'' page (sri.com/about/history/1960.html), retrieved via Wayback Machine snapshot from 2004'
  statement_date: '1968'
  significance: 'SRI''s own first-party attestation of Douglas Engelbart''s December 1968 personal computing demonstration at the Fall Joint Computer Conference — historically known as the "Mother of All Demos" and the foundational moment for interactive computing (computer mouse, hypertext, video conferencing, etc.). Anchors the computer-mouse SRI claim already in tl2b. Specific December date not attested on this page.'

- id: q32
  added_date: '2026-05-15'
  text: |
    1969: SRI receives the first login on the ARPANET, the world's first computer network with flexible routing, and the predecessor to today's Internet.
  source:
    path: news/sri-com-about-history-1960s-wayback-2004.html
    location: '1969 entry (ARPANET)'
  context: 'SRI International''s 2004-era ''History of SRI International, 1960s'' page (sri.com/about/history/1960.html), retrieved via Wayback Machine snapshot from 2004'
  statement_date: '1969'
  significance: 'SRI''s own first-party attestation that SRI was the recipient of the first ARPANET login — the first message from UCLA to SRI in October 1969, foundational to the Internet. Anchors prior rumor r3 (ARPANET) at a more specific institutional event than the timeline-page entry tl2c. The famous "LO" first ARPANET message (incomplete "LOGIN") from UCLA to SRI is the event in question, though the page does not state the date precision.'

- id: q33
  added_date: '2026-05-15'
  text: |
    13,000+ Patents filed
    50+ Spin-off companies
    500+ R&D projects per year
  source:
    path: news/sri-international-about-20260515.html
