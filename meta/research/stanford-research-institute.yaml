key_personnel:

- id: kp1
  added_date: '2026-05-15'
  person_path: /people/david-parekh
  role: 'Chief Executive Officer'
  leadership_class: director
  source:
    path: news/sri-international-about-20260515.html
    location: '¶3'
  note: 'David Parekh is named Chief Executive Officer, SRI on the Our People page with a listing date of December 2, 2021 (in both the Executive Team and Board of Directors sections). A specific Parekh start date for the CEO role is not stated on either sri.com page.'

- id: kp2
  added_date: '2026-05-15'
  person_path: /people/russell-targ
  role: 'Cofounder of the SRI investigation of psychic abilities (with Harold E. Puthoff)'
  leadership_class: other
  period_start: '1972-04'
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 8, ¶2'
  note: 'Targ had recently joined the Stanford Research Institute (SRI) as of the April 1972 meeting with CIA personnel from the Office of Scientific Intelligence. Targ is cofounder of the Stanford Research Institute investigation of psychic abilities in the 1970s and 1980s.'

- id: kp3
  added_date: '2026-05-15'
  person_path: /people/hal-puthoff
  role: 'Cofounder of the SRI investigation of psychic abilities (with Russell Targ); program head per DIA STAR GATE Project Overview'
  leadership_class: other
  period_start: '1972'
  period_end: '1990'
  source:
    path: government/cia-rdp96-00789r002800180001-2-stargate-project-an-overview-19930430.pdf
    location: 'p. 22, ¶1'
  note: 'The SRI program was headed by Dr. H. Puthoff for eleven years per the 1993 DIA STAR GATE Project Overview. Puthoff was a theoretician who became interested in the field in the early 1970s after extensive work in quantum electronics.'

- id: kp4
  added_date: '2026-05-15'
  person_path: /people/edwin-may
  role: 'Researcher in the SRI program (mid-1970s onward); led 1988 internal SRI analysis of 1973-1988 experiments'
  leadership_class: other
  period_start: '1975'
  period_end: '1990'
  source:
    path: government/air-mumford-evaluation-remote-viewing-stargate-19950929.pdf
    location: 'p. 3-2'
  note: 'Dr. Edwin May had been employed in the SRI program since the mid 1970s per AIR 1995. Led the 1988 internal SRI analysis of all 154 experiments conducted at SRI from 1973 until that time. period_start ''1975'' is a single year within the mid 1970s the source says; a specific year is not stated.'

- id: kp5
  added_date: '2026-05-15'
  person_path: /people/ingo-swann
  role: 'Foundational SRI remote-viewing subject (1972); New York artist and psychic'
  leadership_class: other
  period_start: '1972'
  source:
    path: news/irva-targ-russell-wayback-20250123.html
    location: 'Presentations, IRVA 2002 talk abstract'
  note: 'Per Targ IRVA 2002 talk abstract: "in 1972, New York artist, and psychic, Ingo Swann taught us how to experience remote viewing in the laboratory" at SRI.'

- id: kp6
  added_date: '2026-05-15'
  person_path: /people/pat-price
  role: 'Foundational SRI remote-viewing subject (1973); retired police commissioner'
  leadership_class: other
  period_start: '1973'
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 9, ¶1'
  note: 'Per Kress 1977, Pat Price was the third sensitive subject at SRI; per Targ IRVA 2002 talk abstract, Price was a "retired police commissioner" who "showed us how to do this with great reliability and accuracy".'

- id: kp7
  added_date: '2026-05-15'
  person_path: /people/hella-hammid
  role: 'SRI remote-viewing "control" subject (1974-1984); LIFE magazine photographer'
  leadership_class: other
  period_start: '1974'
  period_end: '1984'
  source:
    path: news/irva-targ-russell-wayback-20250123.html
    location: 'Presentations, IRVA 2009 (Hella Hammid Tribute) talk abstract'
  note: 'Per Targ IRVA 2009 Hella Hammid tribute talk abstract, Hammid was a LIFE magazine photographer brought into the SRI remote-viewing program in 1974 as a "control" subject our sponsors from the CIA wanted to supplement Pat Price and Ingo Swann. In her ten years with the program, she became our most reliable viewer.'

