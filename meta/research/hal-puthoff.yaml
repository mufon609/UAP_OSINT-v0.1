relationships:
- id: r1
  added_date: '2026-05-16'
  person_path: '/people/russell-targ'
  relationship: 'Stanford Research Institute investigation into psychic abilities co-investigator; 1974 Nature paper co-author; 1975 SRI Final Report ''Perceptual Augmentation Techniques: Part Two'' co-author; 1977 Mind Reach: Scientists Look at Psychic Ability co-author'
  source:
    path: news/nature-1974-targ-puthoff-information-transmission-abstract.html
    location: '¶3'
  note: 'Targ and Puthoff co-authored ''Information transmission under conditions of sensory shielding'' (Nature 251, 602–607, 18 October 1974, DOI 10.1038/251602a0); shared affiliation: Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California, 94025. The 1977 CIA Kress paper names Targ and Puthoff as the two laser physicists who re-awakened CIA research in parapsychology and characterizes Targ as the experimentalist counterpart to Puthoff''s theoretician role. The 1995 American Institutes for Research evaluation cites Puthoff and Targ (1975) ''Perceptual Augmentation Techniques: Part Two — Research Report'' as the SRI Final Report; the IRVA Targ speaker bio lists Mind Reach (with E. Harold Puthoff, 1977, 2005) among Targ''s co-authored works.'

- id: r2
  added_date: '2026-05-16'
  person_path: '/people/eric-davis'
  relationship: 'Co-author of the September 27, 2024 memorandum to the TTSA Board of Directors counter-analyzing the ORNL Magnesium-Zinc-Bismuth (Art''s Parts) material analysis; SAFIRE Project science review team co-member (Davis as Chief Science Officer, IASA; Puthoff as Director, IASA)'
  source:
    path: news/ttsa-puthoff-davis-ornl-analysis-memo-20250228.html
    location: '¶ on Puthoff/Davis September 27 memorandum'
  note: 'Davis and Puthoff are institutionally co-located at the Institute for Advanced Studies at Austin (Davis as Chief Science Officer; Puthoff as Director — per the SAFIRE Project team snapshot and the April 17, 2025 TTSA SEC Form 1-K Part II filing). The TTSA 2025-02-28 press-and-news post quotes the Puthoff/Davis analysis conclusion: ''did not reveal any form of proof of exotic (Extraterrestrial, Ultra-terrestrial, or inter-dimensional) origin, but it did not absolutely rule it out either.'' Davis is currently an unbuilt stub.'

