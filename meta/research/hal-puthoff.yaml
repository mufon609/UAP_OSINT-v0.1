naming_quirks:
- id: nq1
  added_date: '2026-05-16'
  observed: 'lasqr'
  canonical: 'laser'
  location: 'p. 8, ¶1'
  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper (declassified scan of typewritten 1977 original; Adobe Acrobat Paper Capture Plug-in producer). The source extract reads ''Two lasqr physicists, Dr. Russell Targ and Dr. Harold E. Puthoff'' where the canonical form is ''Two laser physicists''. The OCR engine read ''e'' as ''q'' — common typewritten-font OCR misread. Cross-referenced from /people/russell-targ artifact (naming_quirks nq2) where the same phrase is preserved verbatim in Targ-q9. Preserved as-source per OCR-scan source-form-preservation discipline.'

- id: nq2
  added_date: '2026-05-16'
  observed: 'put off'
  canonical: 'Puthoff'
  location: '[59:05]'
  source_path: transcripts/lucistrust-soul-is-light-ryder-2015-youtube-transcript.txt
  resolution: preserve-as-sic-in-quotes
  note: 'Auto-caption artifact in the 2015 Lucis Trust ''Soul is Light'' YouTube transcript (transcript_provenance: auto-caption). James Ryder''s spoken reference ''my friend Dr. Puthoff'' is rendered by the YouTube auto-caption system as ''my friend dr put off''. Same artifact appears in the 2018 ''Garment of God'' transcript (see nq3). Preserved as-source per auto-caption source-form-preservation discipline.'

