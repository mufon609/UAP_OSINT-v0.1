  added_date: '2026-05-16'
  observed: 'hal put off'
  canonical: 'Hal Puthoff'
  location: '[39:24]'
  source_path: transcripts/lucistrust-garment-of-god-ryder-2018-youtube-transcript.txt
  resolution: preserve-as-sic-in-quotes
  note: 'Auto-caption artifact in the 2018 Lucis Trust ''Garment of God'' YouTube transcript (transcript_provenance: auto-caption). James Ryder''s spoken reference ''Dr. Hal Puthoff'' is rendered by the YouTube auto-caption system as ''dr hal put off as a physicist in austin''. Recurrent variant of nq2. Preserved as-source per auto-caption source-form-preservation discipline.'

- id: nq4
  added_date: '2026-05-16'
  observed: 'pothos'
  canonical: 'Puthoff'
  location: '[1:08:10]'
  source_path: transcripts/lucistrust-garment-of-god-ryder-2018-youtube-transcript.txt
  resolution: preserve-as-sic-in-quotes
  note: 'Auto-caption artifact in the 2018 Lucis Trust ''Garment of God'' YouTube transcript. The phoneme sequence in ''Dr. Puthoff'' is rendered by the YouTube auto-caption system as ''dr pothos one'' (one = part of next utterance ''one Dr. Targ''). Phoneme-substitution drift on the uncommon surname. Preserved as-source per auto-caption source-form-preservation discipline.'

- id: nq5
  added_date: '2026-05-16'
  observed: 'Hal Putoff'
  canonical: 'Hal Puthoff'
  location: 'tag list at end of page'
  source_path: news/safireproject-team-snapshot.html
  resolution: preserve-as-sic-in-quotes
  note: 'Single-character spelling typo in the SAFIRE Project team page tag list, dropping one ''h'' from ''Puthoff''. The same page renders the canonical ''Harold Puthoff'' in the science review team listing immediately above the tag list. Preserved as-source per source-form-preservation discipline; not adjudicated against the canonical form because the source itself uses both forms in the same page.'

- id: nq6
  added_date: '2026-05-16'
  observed: 'E. Harold Puthoff'
  canonical: 'Harold E. Puthoff'
  location: '¶3'
  source_path: news/irva-targ-russell-wayback-20250123.html
  resolution: disputed
  note: 'The IRVA speaker bio for Russell Targ lists the Mind Reach co-author as ''E. Harold Puthoff'' (initial-then-middle-name form), while the 1977 Kress paper renders the name as ''Dr. Harold E. Puthoff'' (first-name-middle-initial form) — the two substantively-different orderings of the middle initial. The 1974 Nature paper byline renders the name as ''HAROLD PUTHOFF'' (no middle initial, all-caps), which is journal typography rather than a third substantive variant — Nature consistently capitalizes all bylines in the same period. The repository canonical /people/hal-puthoff slug uses the informal short form. Source-priority hierarchy (per feedback_source_priority_hierarchy.md): the subject (Puthoff) has not self-attested in this artifact''s archived sources, so primary documentary attestation falls to the Nature paper byline (Puthoff''s own peer-reviewed publication, same first-name-then-surname order as Kress) and the Kress paper (CIA-side institutional record). Flagged as ''disputed'' so future contributors evaluating the Mind Reach book co-author byline can see the divergence. Mirrors naming_quirks nq8 on the Russell Targ artifact.'

