document_intrinsic:
  full_name: 'Harold E. Puthoff'
  aliases: ['Hal Puthoff', 'Dr. H. Puthoff', 'Harold Puthoff']
  nationality: ''
  profession: 'physicist'

context_extrinsic: {}

background: 'Harold E. Puthoff is a physicist. The To The Stars Academy of Arts & Science page (January 8, 2018) reports that Puthoff earned his Ph.D. from Stanford University in 1967 and that his professional background spans more than five decades of research at General Electric, Sperry, the National Security Agency ([`/organizations/nsa`]), Stanford University and SRI International, with patents issued in the laser, communications, and energy fields. The TTSA SEC Form 1-K Part II annual reports (May 2, 2022 and April 17, 2025 filings) state that Dr. Puthoff has served as President and CEO of EarthTech International, Inc. (ETI) and Director of the Institute for Advanced Studies at Austin (IASA) since 1985. The 1974 Nature paper ''Information transmission under conditions of sensory shielding'' (Targ and Puthoff) describes experiments at the Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California. The 1977 CIA Studies in Intelligence paper by Kenneth A. Kress names Targ and Puthoff as the two laser physicists who re-awakened CIA research in parapsychology and describes Puthoff as a theoretician who was exploring new fields of research after extensive work in quantum electronics and who became interested in the field in the early 1970s.'

top_relevance: 'Puthoff is a co-founder, former Director, and current Advisory Board member of [`/organizations/ttsa`] To The Stars Academy of Arts & Science (per the TTSA SEC Form 1-A Part II preliminary offering circular dated July 10, 2017 and the TTSA SEC Form 1-K Part II annual reports filed May 2, 2022 and April 17, 2025). The TTSA announcement (July 26, 2018) of the ADAM Research Project (Acquisition and Data Analysis of Materials) names Dr. Harold E. Puthoff as ''a former Senior Advisor and Subcontractor to the Pentagon''s AATIP program (Advanced Aerospace Threat Identification Program) and current VP of Technology for TTS Academy'', with EarthTech International, Inc. — under Puthoff''s leadership — contracted to evaluate the material samples. The New York Times article ''Glowing Auras and Black Money: The Pentagon''s Mysterious U.F.O. Program'' (Helene Cooper, Ralph Blumenthal, and Leslie Kean, December 16, 2017) names Harold E. Puthoff as a contractor for the program who had earlier conducted research on extrasensory perception for the C.I.A., and reports that Elizondo joined Puthoff and Christopher K. Mellon in the new commercial venture called To the Stars Academy of Arts and Science. The TTSA press release on the ORNL Report (February 28, 2025) reports that Dr. Hal Puthoff and Dr. Eric Davis''s analysis of the Magnesium-Zinc-Bismuth (MgZn/Bi) ''Art''s Parts'' sample was completed and submitted to the TTSA Board of Directors on the 27th of September 2024. Puthoff is the Author of Defense Intelligence Reference Document DIA-08-1003-015, ''Advanced Space Propulsion Based on Vacuum (Spacetime Metric) Engineering'' (29 March 2010; ICOD 1 December 2009; UNCLASSIFIED//FOR OFFICIAL USE ONLY) — one in a series of advanced technology reports produced in FY 2009 under the [`/organizations/dia`] Defense Intelligence Agency, Defense Warning Office''s Advanced Aerospace Weapon System Applications ([`/organizations/aawsap`]) Program; AAWSA Program Manager James T. Lacatski ([`/people/james-lacatski`]), D.Eng. The document names Puthoff''s author affiliation as EarthTech International, Inc., 11855 Research Blvd., Austin, Texas 78759 — a direct primary source on Puthoff''s author contribution to the AAWSA Program''s advanced technology reports. Puthoff''s SRI institutional context is documented by the 1977 Kress paper, the 1993 DIA STAR GATE Project Overview (which describes the SRI International program at Menlo Park from 1970 to 1990 as a small group headed by Dr. H. Puthoff), and the 1995 American Institutes for Research evaluation (which reviews the 1973-1988 SRI experiments and cites Puthoff and Targ (1975) ''Perceptual Augmentation Techniques: Part Two — Research Report'' as the SRI Final Report).'

credibility_notes: 'Puthoff''s professional record is documented across primary sources spanning more than five decades. The 1977 CIA Studies in Intelligence paper by Kenneth A. Kress ([`/people/kenneth-kress`]) — declassified June 23, 2011 (CIA-RDP88G01116R000600690003-8) — names Targ and Puthoff as the two laser physicists who re-awakened CIA ([`/organizations/cia`]) research in parapsychology, describes Puthoff as a theoretician who was exploring new fields of research after extensive work in quantum electronics, and documents the August 1972 Office of Technical Service contract with Targ and Puthoff at SRI ($874 for a few days of work with the magnetometer subject), the October 1, 1972 OTS Contract 8473 expanded effort, the February 1, 1974 jointly funded ORD and OTS program at SRI, and the November 1976 briefing of Director George Bush on CIA''s investigations into parapsychology after he became aware that official Soviets were visiting and questioning Puthoff and Targ at SRI. The 1993 DIA ([`/organizations/dia`]) STAR GATE Project Overview describes the SRI International program at Menlo Park as a small group headed by Dr. H. Puthoff and reports the program discontinued in 1990. The 1995 American Institutes for Research ([`/organizations/american-institutes-for-research`]) evaluation reviews the 1973-1988 SRI experiments and cites Puthoff, Harold E. and Russell Targ (1975) ''Perceptual Augmentation Techniques: Part Two — Research Report'' as the SRI Final Report (December 1, 1975).


  The TTSA page (January 8, 2018) is the most comprehensive single source on Puthoff''s career: it states that Puthoff earned his Ph.D. from Stanford University in 1967, that his professional background spans more than five decades of research at General Electric, Sperry, the National Security Agency, Stanford University and SRI International, that he has served as President and CEO of EarthTech International, Inc. (ETI) and Director of the Institute for Advanced Studies at Austin (IASA) since 1985, that he holds patents issued in the laser, communications, and energy fields, and that he won a Who''s Who Lifetime Achievement in 2017. The TTSA SEC Form 1-A Part II (July 10, 2017) and SEC Form 1-K Part II (filed May 2, 2022 and April 17, 2025) corroborate the EarthTech President and IASA Director roles since 1985 and the TTSA co-founder role; the May 2, 2022 filing reports that Puthoff recently left his position on the Company''s board of directors to serve on the Advisory Board, and the April 17, 2025 filing records the September 27, 2024 Puthoff/Davis memorandum to the Board of Directors on the ORNL ([`/organizations/ornl`]) Art''s Parts material analysis. The December 16, 2017 New York Times article describes Puthoff as ''an engineer who has conducted research on extrasensory perception for the C.I.A. and later worked as a contractor for the program''; other primary sources describe Puthoff as a physicist (Kress 1977: ''Two lasqr physicists, Dr. Russell Targ and Dr. Harold E. Puthoff''; the 2018 TTSA page: ''DR. HAL PUTHOFF, PhD''; SAFIRE Project team page: ''Harold Puthoff, PhD'').


  The 29 March 2010 Defense Intelligence Reference Document DIA-08-1003-015 (DIA AAWSA Program) is a direct primary source on Puthoff''s author contribution to the AAWSA Program''s advanced technology reports. The document''s references list names three prior peer-reviewed publications by Puthoff on vacuum engineering and Alcubierre warp drive analysis: H. E. Puthoff, ''SETI, the velocity-of-light limitation, and the Alcubierre warp drive: An integrating overview'' (Physics Essays 9, 156, 1996; Reference 3 of the document); H. E. Puthoff, ''Polarizable-vacuum (PV) approach to general relativity'' (Found. Phys. 32, 927, 2002; Reference 16); and H. E. Puthoff, E. W. Davis and C. Maccone, ''Levi-Civita effect in the polarizable vacuum (PV) representation of general relativity'' (Gen. Relativ. Grav. 37, 483, 2005; Reference 19). The references show that Puthoff''s 2010 analysis is based on a prior list of his own peer-reviewed publications on the same subject matter.

  '

quotes:
- id: q1
  added_date: '2026-05-16'
  text: |
    WE present results of experiments suggesting the existence of one or more perceptual modalities through which individuals obtain information about their environment, although this information is not presented to any known sense. The literature1–3 and our observations lead us to conclude that such abilities can be studied under laboratory conditions.
  source:
    path: news/nature-1974-targ-puthoff-information-transmission-abstract.html
    location: '¶1'
  context: 'Abstract of Targ and Puthoff, ''Information transmission under conditions of sensory shielding'', Nature 251, 602–607 (18 October 1974), DOI 10.1038/251602a0 — Targ and Puthoff author affiliation: Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California, 94025'
  observation_type: relayed
  statement_date: '1974-10-18'
  significance: 'Co-authored Targ + Puthoff peer-reviewed report on the SRI investigation into psychic abilities. Foundational primary-source anchor for Puthoff''s Stanford Research Institute affiliation at the Electronics and Bioengineering Laboratory in 1974, and for the published peer-reviewed primary-source attestation of the SRI parapsychology research the CIA was sponsoring at the time. Substantively the subject''s own research and therefore registered as a Puthoff Statement per the conventions on co-authored academic publications.'

- id: q2
  added_date: '2026-05-16'
  text: |
    We’re sort of in the position of what would happen if you gave Leonardo da Vinci a garage-door opener,
  source:
    path: news/nyt-glowing-auras-pentagon-ufo-20171216.html
    location: '¶ on AATIP material-analysis program research'
  context: 'New York Times article ''Glowing Auras and Black Money: The Pentagon''s Mysterious U.F.O. Program'' by Helene Cooper, Ralph Blumenthal, and Leslie Kean, published 2017-12-16. Puthoff quoted in his capacity as a contractor for the Advanced Aerospace Threat Identification Program who had earlier conducted research on extrasensory perception for the C.I.A.'
  observation_type: relayed
  statement_date: '2017-12-16'
  significance: 'Foundational disclosure-era statement framing AATIP material analysis as a knowledge-asymmetry problem (the implicit framing: the materials may carry advanced technology whose function the recipient lacks the conceptual vocabulary to recognize). Quoted in the same NYT article that publicly named Luis Elizondo as the AATIP director and identified Puthoff, Elizondo, and Christopher K. Mellon as principals in the new commercial venture To the Stars Academy of Arts and Science.'

- id: q3
  added_date: '2026-05-16'
  text: |
    We have a chance at making progress, because we will follow where the data leads us.
  source:
    path: news/tothestarsacademy-home-20220120.html
    location: '¶ in ADAM Research Project / Material Science Research section'
  context: 'To The Stars Academy of Arts & Science homepage, snapshot 2022-01-20 (Wayback Machine). Attribution on the page: ''Dr. Hal Puthoff, Co-Founder of TTSA''. The quote appears in the ADAM Research Project / Material Science Research section describing TTSA''s materials-analysis research stance.'
  observation_type: relayed
  statement_date: '2022-01-20'
  significance: 'TTSA homepage self-attestation framing the ADAM Research Project''s investigative stance — empirical (follow the data) rather than hypothesis-driven. Anchors Puthoff''s continuing TTSA co-founder role as of the 2022-01-20 snapshot, alongside the May 2, 2022 SEC Form 1-K Part II attestation that he had recently moved from the Board of Directors to the Advisory Board.'

- id: q4
  added_date: '2026-05-16'
  text: |
    A theme that has come to the fore in advanced planning for long-range space exploration in the future is the concept that empty space itself (the quantum vacuum, or spacetime metric) might be engineered to provide energy/thrust for future space vehicles. Although far reaching, such a proposal is solidly grounded in modern physical theory, and therefore the possibility that matter/vacuum interactions might be engineered for spaceflight applications is not a priori ruled out (Reference 1). Given the current development of mainstream theoretical physics on such topics as warp drives and traversable wormholes that provides for such vacuum engineering possibilities (References 2-6), provided in this paper is a broad perspective of the physics and consequences of the engineering of the spacetime metric.
  source:
    path: government/dia-advancedspacepropulsion-puthoff-dird-20100329.pdf
    location: 'p. iii, ¶1'
  context: 'Preface and Introduction opening paragraph of Defense Intelligence Reference Document DIA-08-1003-015, ''Advanced Space Propulsion Based on Vacuum (Spacetime Metric) Engineering'' (29 March 2010; ICOD 1 December 2009; U//FOUO). Author: H.E. Puthoff, EarthTech International, Austin, Texas. DIA AAWSA Program Manager: James T. Lacatski, D.Eng.'
  observation_type: relayed
  statement_date: '2010-03-29'
  significance: 'Thesis statement of the DIA-commissioned DIRD authored by Puthoff. First-paragraph framing of the paper''s subject matter — vacuum/spacetime-metric engineering as a candidate technical basis for long-range space exploration, grounded in mainstream physical theory and not a priori ruled out for spaceflight applications. The author and Defense Intelligence Agency program affiliation establish the AAWSAP technical-substrate context for the framing.'

- id: q5
  added_date: '2026-05-16'
  text: |
    This paper has considered the possibility—even likelihood—that future developments with regard to advanced aerospace technologies will trend in the direction of manipulating the underlying spacetime structure of the vacuum of space itself by processes that can be called vacuum engineering or metric engineering. Far from being simply a fanciful concept, a significant literature exists in peer-reviewed, Tier 1 physics publications in which the topic is explored in detail.
  source:
    path: government/dia-advancedspacepropulsion-puthoff-dird-20100329.pdf
    location: 'p. 11, ¶1'
  context: 'Section IV (Discussion) opening paragraph of Defense Intelligence Reference Document DIA-08-1003-015 — Puthoff''s restatement of the thesis after Sections I-III. Footnote (^3) directs to Reference 1, Frontiers of Propulsion Science (Eds. M. G. Millis and E. W. Davis, AIAA Press, 2009)'
  observation_type: relayed
  statement_date: '2010-03-29'
  significance: 'Puthoff''s authorial Discussion-section restatement of the DIRD thesis — possibility-even-likelihood framing of vacuum/metric engineering as the trend direction for advanced aerospace technologies, with peer-reviewed Tier 1 physics literature cited as the conceptual substrate. The framing is stronger than the Preface opening (q4): Discussion characterizes the trajectory as ''possibility—even likelihood'', not merely ''not a priori ruled out''.'

- id: q6
  added_date: '2026-05-16'
  text: |
    Despite the challenges, sample calculations as presented herein indicate the direction of potentially useful trends derivable on the basis of the application of GR principles as embodied in a metric engineering approach, with the results constrained only by what is achievable practically in an engineering sense. The latter is, however, a daunting constraint. At this point in the consideration of such nascent concepts, given our present level of technological evolution, it is premature to even guess about an optimum strategy, let alone attempt to form a critical path for the engineering development of such technologies. Nonetheless, only through rigorous inquiry into such concepts can one hope to arrive at a proper assessment of the possibilities inherent in the evolution of advanced spaceflight technologies.
  source:
    path: government/dia-advancedspacepropulsion-puthoff-dird-20100329.pdf
    location: 'p. 12, ¶1'
  context: 'Section IV (Discussion) closing paragraph of Defense Intelligence Reference Document DIA-08-1003-015 — Puthoff''s methodological conclusion framing the analysis as direction-of-trend identification rather than near-term technological prescription'
  observation_type: relayed
  statement_date: '2010-03-29'
  significance: 'Methodological conclusion of the DIRD. Puthoff explicitly characterizes the engineering implementability of vacuum/metric engineering as ''premature'' to even guess about a critical path for development at the technological evolution level of 2010, while arguing that ''only through rigorous inquiry'' can the possibilities be properly assessed. The hedge frames the DIRD as a basic-research substrate document for the AAWSAP program, not an implementation roadmap.'

