background: 'Russell Targ is a physicist and author. Per Targ''s ESP Research site, Targ was a pioneer in the development of the laser and cofounder of the Stanford Research Institute''s investigation into psychic abilities in the 1970s and 1980s, and retired from Lockheed Martin as a senior staff scientist where he developed laser technology for peaceful applications. The 1974 Nature paper ''Information transmission under conditions of sensory shielding'' (Targ and Puthoff) reports experiments at the Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California. Applied Optics author affiliations show Lockheed Missiles & Space Company (1991) and Advanced Technology Center, Lockheed Martin (1996), both at 3251 Hanover Street, Palo Alto, California.'

top_relevance: 'Targ is the cofounder of the Stanford Research Institute investigation into psychic abilities in the 1970s and 1980s — the institutional context for the remote viewing research later cited across government materials. Targ''s Lockheed Martin senior staff scientist role places him at the Palo Alto site at 3251 Hanover Street.'

credibility_notes: 'Targ''s ESP Research site (his own publication) names him as a pioneer in the development of the laser and cofounder of the Stanford Research Institute investigation into psychic abilities. The 1974 Nature paper (Targ and Puthoff) places Targ at the Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California. The 1991 and 1996 Applied Optics author affiliations show Targ at Lockheed Missiles & Space Company (1991) and Advanced Technology Center, Lockheed Martin (1996) — same Palo Alto site at 3251 Hanover Street. A separate 2018 talk [`/transcripts/lucistrust-garment-of-god-ryder-2018`] also names Targ as having worked at Lockheed for years.'

quotes:
- id: q1
  added_date: '2026-05-14'
  text: |
    Russell Targ is a physicist and author who was a pioneer in the development of the laser and cofounder of the Stanford Research Institute’s investigation into psychic abilities in the 1970s and 1980s.
  source:
    path: news/espresearch-russell-targ-snapshot.html
    location: '¶2'
  context: 'Self-attestation on Russell Targ''s ESP Research website (espresearch.com homepage), undated'
  observation_type: relayed
  significance: 'Targ''s own self-attestation of three roles: laser pioneer, Stanford Research Institute psychic-abilities investigation cofounder, and active period 1970s-1980s. Primary-source anchor for Targ''s SRI Stargate-precursor cofounder role (the 1974 Nature paper provides peer-reviewed corroboration via the Targ + Puthoff byline).'

- id: q2
  added_date: '2026-05-14'
  text: |
    Targ retired from Lockheed Martin as a senior staff scientist, where he developed laser technology for peaceful applications.
  source:
    path: news/espresearch-russell-targ-snapshot.html
    location: '¶2'
  context: 'Self-attestation on Russell Targ''s ESP Research website (espresearch.com homepage), undated'
  observation_type: relayed
  significance: 'Targ''s own self-attestation of his Lockheed Martin career outcome (retirement as senior staff scientist) and characterization of his Lockheed-era work (laser technology for peaceful applications). Independent peer-reviewed corroboration of the Lockheed Martin role from the 1991 and 1996 Applied Optics author affiliations; the retirement date itself is not attested in archived sources.'

- id: q3
  added_date: '2026-05-14'
  text: |
    WE present results of experiments suggesting the existence of one or more perceptual modalities through which individuals obtain information about their environment, although this information is not presented to any known sense. The literature1–3 and our observations lead us to conclude that such abilities can be studied under laboratory conditions.
  source:
    path: news/nature-1974-targ-puthoff-information-transmission-abstract.html
    location: '¶1'
  context: 'Abstract of Targ and Puthoff, ''Information transmission under conditions of sensory shielding'', Nature 251, 602–607 (18 October 1974), DOI 10.1038/251602a0 — Targ and Puthoff author affiliation: Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California, 94025'
  observation_type: relayed
  statement_date: '1974-10-18'
  significance: 'Co-authored Targ + Puthoff peer-reviewed report on the SRI investigation into psychic abilities. Foundational primary-source anchor for Targ''s Stanford Research Institute cofounder role (the role Targ self-attests on his ESP Research site). The paper''s author affiliation places Targ at the Electronics and Bioengineering Laboratory, SRI, Menlo Park as of the 11 March 1974 manuscript receipt date.'

- id: q4
  added_date: '2026-05-15'
  text: |
    He most recently authored Third Eye Spies: A Guide to Remote Viewing and Transformation of Consciousness and Do You See What I See? Memoirs of a Blind Biker: Lasers and Love, ESP and the CIA, and the Meaning of Life. He is co-author of Mind Reach: Scientists Look at Psychic Abilities; The Mind Race: Understanding and Using Psychic Abilities; Miracles of Mind: Remote Viewing and Spiritual Healing; The Heart of the Mind: How to Experience God Without Belief; and The End of Suffering: Fearless Living in Troubled Times.He is also an editor, publisher, songwriter, producer, teacher, and more.
  source:
    path: news/espresearch-russell-targ-snapshot.html
    location: '¶2'
  context: 'Self-attestation on Russell Targ''s ESP Research website (espresearch.com homepage), undated'
  observation_type: relayed
  significance: 'Targ''s own self-attestation of his authored and co-authored book catalogue (two recent solo / lead-authored works and five co-authored works), and his broader self-described roles beyond physicist and author (editor, publisher, songwriter, producer, teacher). Primary-source anchor for the book catalogue; specific publication years are not attested on the espresearch homepage.'

