  source_path: news/irva-targ-russell-wayback-20250123.html
  resolution: disputed
  note: 'The IRVA speaker bio (q7) lists the Mind Reach co-author as ''E. Harold Puthoff'' (initial-then-middle-name form), while two other archived primary sources attest different forms: the 1974 Nature paper byline (q3) renders the name as ''HAROLD PUTHOFF'' (no middle initial), and the 1977 Kress paper (q9) renders it as ''Dr. Harold E. Puthoff'' (first-name-middle-initial form). The repository canonical /people/hal-puthoff slug uses the informal short form by which Puthoff is widely identified. Source-priority hierarchy (per feedback_source_priority_hierarchy.md): the subject (Puthoff) has not self-attested in this Targ artifact''s archived sources, so primary documentary attestation falls to the Nature paper byline (subject''s own peer-reviewed publication) and the Kress paper (CIA-side institutional record) — both of which use first-name-middle-initial form. Preserved as-source in q7 quote text per source-form preservation discipline; flagged here as ''disputed'' so future contributors evaluating the Mind Reach book co-author byline can see the divergence.'

