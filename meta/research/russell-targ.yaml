  note: 'period_start 1972-08 anchors on the $874 OTS demonstration contract (q11). period_end 1975 anchors on the 1993 DIA STAR GATE Project Overview (q13): "Then funding was discontinued in 1975; subsequent funding for RV investigation at SRI was provided by DIA". Targ''s broader SRI cofounder role continued beyond the CIA-sponsorship window — see p1 for the umbrella SRI investigation. This entry isolates the specific CIA-funded sub-program documented in the Kress paper. Three additional CIA primary sources archived in the 2026-05-16 archival sweep further attest Targ as author or co-author of the program''s working documents: (a) the contract 1471(S)73 progress report (CIA-RDP96-00787R000100180001-3, dated 22 February 1973) co-authored by Puthoff and Targ — the working-document side of the August 1972 OTS demonstration contract that became Task 3 with Geller; (b) the Nature 1974 paper [`/documents/nature-1974-targ-puthoff-information-transmission`] (CIA mirror RDP96-00787R000100220001-8) co-authored by Puthoff and Targ — the public-record summation of the CIA-funded Geller and Pat Price ([`/people/pat-price`]) experiments; (c) the Aug 1973 SRI Geller report [`/documents/cia-sri-geller-aug1973`] (CIA-RDP79-00999A000300030027-0) — Targ sole-authored cover memo dated August 13, 1973 summarizing the Aug 4-11, 1973 eight-day Geller picture-drawing session with the load-bearing conclusion that Geller "demonstrated his paranormal perceptual ability in a convincing and unambiguous manner". The three documents anchor Targ as the principal experimenter recording the program''s public-record claims. Targ''s 2007 retrospective comment in the Brendan Burton article on urigeller.com — "Uri was at our laboratory at SRI for six weeks in 1973" — exceeds the contemporaneous Targ-authored records by approximately four weeks (~17 days documented in total: 9 days late 1972 per contract progress (q21) + 8 days Aug 1973 per Targ-sole-authored Aug 1973 SRI report (q17-q20) vs 6 weeks recalled in 2007). The recollection-versus-record divergence is documented as the F.SRI finding-node candidate in meta/topic/research-queue.md.'


