affiliations:
- id: a1
  added_date: '2026-05-14'
  organization_path: '/organizations/stanford-research-institute'
  role: 'Cofounder of the Stanford Research Institute investigation into psychic abilities (per Targ''s ESP Research site); Senior Research Physicist at SRI''s Electronics and Bioengineering Laboratory per the February 1973 contract 1471(S)73 progress report co-author line [`/sources/government/cia-rdp96-00787r000100180001-3-contract-1471s73-progress-dec1972.pdf`] — earliest primary-source attestation of Targ''s SRI title; affiliation continuing through the 1974 Nature paper byline'
  period_start: '1972'
  source:
    path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
    location: 'p. 8, ¶2'
  note: 'Targ''s own ESP Research site reports the SRI cofounder role for the 1970s and 1980s; the 1977 Kress paper (q10) attests Targ as having "recently joined the Stanford Research Institute (SRI)" as of the April 1972 Targ-CIA Office of Scientific Intelligence meeting — the earliest primary-source attestation of Targ''s SRI affiliation tenure. The contract 1471(S)73 progress report (CIA-RDP96-00787R000100180001-3, dated 22 February 1973) co-authored by H.E. Puthoff and Russell Targ attests Targ at the Senior Research Physicist title level at SRI — page 1 byline: "Dr. H.E. Puthoff / Mr. Russell Targ / Senior Research Physicist / Electronics and Bioengineering Laboratory" — the earliest primary-source attestation placing Targ at this title at SRI (the singular "Senior Research Physicist" line below both names is ambiguous: typewriter convention permits either the shared-title-for-both-prepared-by-authors read or the title-immediately-below-Targ''s-name read; either way, Targ is at the title level as of 22 February 1973). The 1974 Nature paper byline cites the lab but not any title. The 1974 Nature paper (q3) byline confirms continuing SRI Electronics and Bioengineering Laboratory affiliation. period_end intentionally absent — no archived primary source attests a specific SRI departure date; the SRI parapsychology investigation itself was discontinued in 1990 per the 1993 DIA STAR GATE Project Overview (q14, t14), and Targ''s 1991 Applied Optics paper byline (a2 at Lockheed Missiles & Space Company) provides an outer bound on his SRI tenure. Program Involvement p1 mirrors the same open-ended representation; the bare period_start + prose hedge is the working stop-gap per meta/topic/research-queue.md "known start, unknown end (but not ongoing)" pending convention question.'

- id: a2
  added_date: '2026-05-14'
  organization_path: '/organizations/lockheed-missiles-and-space-company'
  role: 'Senior staff scientist (per the 1991 Applied Optics paper byline at the Hanover Street Palo Alto site)'
  period_start: '1991'
  period_end: '1995'
  source:
    path: news/opg.optica.org-targ-coherent-lidar-airborne-windshear-sensor-1991.html
    location: 'p. 1'
  note: 'period_start 1991 is the earliest archived primary-source attestation of Targ at LMSC (1991 Applied Optics paper byline). period_end set at 1995 (the year the Lockheed Martin merger renamed the entity); see a3 for the post-1995 Lockheed Martin Advanced Technology Center role at the same Palo Alto address.'

- id: a3
  added_date: '2026-05-14'
  organization_path: '/organizations/lockheed-martin'
  role: 'Senior staff scientist at the Advanced Technology Center, Lockheed Martin (per the 1996 Applied Optics paper byline, Targ''s ESP Research site retirement self-attestation, and the IRVA speaker bio''s 1997-retirement attestation)'
  period_start: '1996'
  period_end: '1997'
  source:
    path: news/irva-targ-russell-wayback-20250123.html
    location: '¶4'
  note: 'period_start 1996 is the earliest archived primary-source attestation of Targ at the post-1995 Lockheed Martin entity at the 3251 Hanover Street Palo Alto site (1996 Applied Optics paper byline). period_end 1997 anchors on the IRVA speaker bio (q8): ''Having retired in 1997''. The IRVA bio uses the pre-1995 corporate name ''Lockheed Missiles and Space Company'' in its prose even when describing the late-career period; the corporate-name transition at the same Palo Alto site is reflected here by a2 (LMSC 1991-1995) + a3 (Lockheed Martin 1996-1997). Targ''s espresearch.com self-attestation (q2) reports retirement as a senior staff scientist but does not name the year.'

