background: 'Russell Targ is a physicist and author. Per the IRVA page, Targ has a bachelor''s degree in physics from Queens College and did graduate work in physics at Columbia University. He has received two National Aeronautics and Space-Administration awards for inventions and contributions to lasers and laser communications. Per Targ''s ESP Research site, Targ was a pioneer in the development of the laser and cofounder of the Stanford Research Institute''s investigation into psychic abilities in the 1970s and 1980s. The 1974 Nature paper ''Information transmission under conditions of sensory shielding'' (Targ and Puthoff) reports experiments at the Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California. Applied Optics author affiliations show Lockheed Missiles & Space Company (1991) and Advanced Technology Center, Lockheed Martin (1996), both at 3251 Hanover Street, Palo Alto, California. Per the IRVA page, Targ presented remote-viewing demonstrations to the USSR Academy of Sciences in 1983 and 1984, and retired from Lockheed Martin in 1997 after he developed airborne laser systems for the detection of windshear and air turbulence.'

top_relevance: 'Targ is the cofounder of the Stanford Research Institute investigation into psychic abilities in the 1970s and 1980s — the institutional context for the remote viewing research that the 1977 CIA Kress paper, the 1993 DIA STAR GATE Project Overview, and the 1995 American Institutes for Research evaluation document at SRI International, Menlo Park. The Kress paper places Targ''s April 1972 meeting with the CIA Office of Scientific Intelligence as the first documented CIA contact and the August 1972 Office of Technical Service contract with Targ and Puthoff at SRI as the first contract funded by CIA. The STAR GATE Project Overview describes the SRI program at Menlo Park from 1970 to 1990 with CIA funding to SRI for continuing remote viewing research, discontinued in 1975, and subsequent funding provided by DIA. The AIR evaluation reviews the 1973-1988 SRI experiments and includes Puthoff and Targ (1975) "Perceptual Augmentation Techniques: Part Two — Research Report" — the Stanford Research Institute Final Report. Targ''s Lockheed Martin senior staff scientist role places him at the Palo Alto site at 3251 Hanover Street; he retired in 1997 after work on airborne laser systems for windshear and air turbulence detection.'

credibility_notes: 'Targ''s ESP Research site (his own publication) names him as a pioneer in the development of the laser and cofounder of the Stanford Research Institute investigation into psychic abilities. The 1974 Nature paper (Targ and Puthoff) places Targ at the Electronics and Bioengineering Laboratory, Stanford Research Institute, Menlo Park, California. The IRVA page states two National Aeronautics and Space-Administration ([`/organizations/nasa`]) awards for laser inventions, a Queens College bachelor''s degree and Columbia University graduate work in physics, 1983 and 1984 invitations to the USSR Academy of Sciences for remote-viewing demonstrations, and that Targ retired from Lockheed Martin in 1997. The IRVA page also names Jane Katra ([`/people/jane-katra`]) as Targ''s co-author on Miracles of Mind (1998). The 1991 and 1996 Applied Optics author affiliations show Targ at Lockheed Missiles & Space Company (1991) and Advanced Technology Center, Lockheed Martin (1996) — same Palo Alto site at 3251 Hanover Street. A separate 2018 talk [`/transcripts/lucistrust-garment-of-god-ryder-2018`] also names Targ as having worked at Lockheed for years.


  The 1977 CIA Studies in Intelligence paper by Kenneth A. Kress ([`/people/kenneth-kress`]) — declassified 2011 (CIA-RDP88G01116R000600690003-8) — names Targ and Puthoff as the two laser physicists who re-awakened CIA ([`/organizations/cia`]) research in parapsychology, documents Targ''s April 1972 meeting with the Office of Scientific Intelligence, places Targ as having recently joined the Stanford Research Institute in 1972, and describes the August 1972 Office of Technical Service contract with Targ and Puthoff at SRI ($874 for a few days of work with the magnetometer subject) followed by the February 1974 jointly funded ORD and OTS program. The Kress paper also describes the November 1976 briefing of Director George Bush on CIA''s investigations into parapsychology after he became aware that official Soviets were visiting and questioning Puthoff and Targ at SRI. The 1993 DIA ([`/organizations/dia`]) STAR GATE Project Overview describes the SRI International program at Menlo Park from 1970 to 1990 with CIA funding to SRI for continuing remote viewing research discontinued in 1975 and subsequent funding provided by DIA, the SRI effort discontinued in 1990, and Systems Applications International Corporation ([`/organizations/saic`]) at Menlo Park established under the FY 1991 Defense Authorization Act. The 1995 American Institutes for Research ([`/organizations/american-institutes-for-research`]) evaluation reviews the 1973-1988 SRI experiments (154 experiments, over 26,000 individual trials, 227 subjects per May et al. 1988) and includes Puthoff and Targ (1975) "Perceptual Augmentation Techniques: Part Two — Research Report" as the Stanford Research Institute Final Report.


  Targ''s later retrospective comment in the Burton article — "Uri was at our laboratory at SRI for six weeks in 1973" — differs from Targ''s concurrent CIA records of the SRI Geller sessions: the 22 February 1973 contract progress report Targ authored with Puthoff records a nine-day Geller field measurement program in November-December 1972, and the 13 August 1973 SRI Geller report Targ sole authored records an eight day session 4-11 August 1973 — approximately 17 days documented across both periods, not six weeks.

  '

