naming_quirks:
- id: nq1
  added_date: '2026-05-15'
  observed: 'Scientists Look at Psychic Ability'
  canonical: 'Scientists Look at Psychic Abilities'
  location: '¶3'
  source_path: news/irva-targ-russell-wayback-20250123.html
  resolution: disputed
  note: 'The IRVA speaker bio (q7) renders Mind Reach''s subtitle in singular form (''Scientists Look at Psychic Ability''), while Targ''s own espresearch.com homepage (q4) renders the same book''s subtitle in plural form (''Scientists Look at Psychic Abilities''). Both are primary attestations by parties close to the source. Source-priority hierarchy (per feedback_source_priority_hierarchy.md): subject''s own words rank above third-party. The plural form (espresearch.com) is treated as canonical per Targ-self-attestation precedence; the IRVA-attested singular form is preserved as-source in the q7 quote text and flagged here as ''disputed'' so future contributors evaluating the book entity name can see the divergence. Note that ''Psychic Abilities'' (plural) also matches the typical published edition cover.'

- id: nq2
  added_date: '2026-05-15'
  observed: 'lasqr'
  canonical: 'laser'
  location: 'p. 8, ¶1'
  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper (declassified scan of typewritten 1977 original; Adobe Acrobat Paper Capture Plug-in producer). The source extract reads "Two lasqr physicists, Dr. Russell Targ and Dr. Harold E. Puthoff" where the canonical form is "Two laser physicists". The OCR engine read "e" as "q" — common typewritten-font OCR misread. Preserved verbatim in q9 quote text per OCR-scan source-form-preservation discipline.'

- id: nq3
