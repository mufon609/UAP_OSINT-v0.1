naming_quirks:
- id: nq1
  added_date: '2026-05-15'
  observed: 'Scientists Look at Psychic Ability'
  canonical: 'Scientists Look at Psychic Abilities'
  location: '¶3'
  source_path: news/irva-targ-russell-wayback-20250123.html
  resolution: disputed
  note: 'The IRVA speaker bio (q7) renders Mind Reach''s subtitle in singular form (''Scientists Look at Psychic Ability''), while Targ''s own espresearch.com homepage (q4) renders the same book''s subtitle in plural form (''Scientists Look at Psychic Abilities''). Both are primary attestations by parties close to the source. Source-priority hierarchy (per feedback_source_priority_hierarchy.md): subject''s own words rank above third-party. The plural form (espresearch.com) is treated as canonical per Targ-self-attestation precedence; the IRVA-attested singular form is preserved as-source in the q7 quote text and flagged here as ''disputed'' so future contributors evaluating the book entity name can see the divergence. Note that ''Psychic Abilities'' (plural) also matches the typical published edition cover.'

rumors:
- id: r1
  added_date: '2026-05-15'
  claim: 'Russell Targ was born April 11, 1934 in Chicago, Illinois.'
  status: not-primary-source-established
  observed_sources:
  - 'Wikipedia (Russell Targ article)'
  - 'IRVA speaker biography page at irva.org/speaker/targ-russell (currently HTTP 404; the Internet Archive Wayback Machine retains snapshots but retrieval is blocked from this toolkit environment per sources/manifest.yaml manifest note)'
  note: 'Targ''s birth date and place are widely repeated in third-party biographical sources but no primary attestation has been archived in this repository. The espresearch.com homepage does not state birth-date or place. When a primary-source attestation is archived (e.g., birth-record image, Wayback retrieval of the IRVA bio, an interview transcript where Targ states his birth date on the record), graduate this rumor to a quote entry.'

- id: r2
  added_date: '2026-05-15'
  claim: 'Targ worked at Sperry Gyroscope (1956-1958), Technical Research Group (late 1950s), and Sylvania Electronic Defense Laboratories (1960s) prior to joining Stanford Research Institute around 1972.'
  status: not-primary-source-established
  observed_sources:
  - 'Wikipedia (Russell Targ article)'
  - 'IRVA speaker biography page (currently 404)'
  - 'Targ-authored memoir Do You See What I See? Memoirs of a Blind Biker (cited in espresearch.com q4 but the book itself is not archived in this repository)'
  note: 'Pre-SRI career details circulate widely in biographical writeups about Targ. The espresearch.com homepage attests Targ as ''a pioneer in the development of the laser'' (q1) but does not name pre-SRI employers. When Sperry / Technical Research Group / Sylvania employment is primary-source-attested (e.g., archived patents listing those employers, archived obituary, archived memoir excerpts), graduate to affiliation entries and quote entries with the specific source path.'

- id: r4
  added_date: '2026-05-15'
  claim: 'The Stanford Research Institute psychic-abilities investigation that Targ and Puthoff cofounded was funded by the U.S. Central Intelligence Agency and the Defense Intelligence Agency, and became known as the Stargate Project (1972-1995).'
  status: not-primary-source-established
  observed_sources:
  - 'Declassified CIA records released ~1995 (CIA CREST FOIA reading room contains hundreds of Stargate-program documents)'
  - 'Wikipedia (Stargate Project article)'
  - 'Targ-authored memoir Do You See What I See? Memoirs of a Blind Biker (the book''s subtitle explicitly references "ESP and the CIA"; not archived in this repository)'
  note: 'The CIA / DIA funding chain for the SRI psychic-abilities investigation is extensively primary-source-documented in the declassified CIA records released after the Stargate Project was terminated in 1995. None of those documents are archived in this repository yet. The espresearch.com homepage (q1) attests Targ as ''cofounder of the Stanford Research Institute''s investigation into psychic abilities in the 1970s and 1980s'' but does not name CIA / DIA or the Stargate Project as the funder. When CIA CREST Stargate documents are archived in /sources/government/, graduate this rumor to quote entries + a program_involvement entry that supersedes p1 with the named CIA / DIA sponsorship and the formal Stargate program designation.'

