  source_path: government/cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'OCR-scan artifact in the Kress 1977 paper. The PDF renders the word "parapsychology" with a typewritten-font OCR misread "v" for "y" yielding "parapsvchology", further fragmented by PDF end-of-line word-wrap into "parapsv-" / "chology" across two source lines. The source extract preserves the hyphen-and-newline; pdftotext output and the verbatim-quote check normalize the newline to a space, yielding "parapsv- chology" as the comparison form. Preserved verbatim in q9 quote text per OCR-scan source-form-preservation discipline. The clean form "parapsychology" appears elsewhere in the same Kress paper (e.g., q9 second sentence: "observations of parapsychology"), confirming the misread is artifact-localized rather than systematic.'

