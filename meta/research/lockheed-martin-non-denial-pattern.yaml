description: 'Christopher Sharp ([`/people/christopher-sharp`]) at Liberation Times ([`/organizations/liberation-times`]) ([`/documents/liberationtimes-burlison-grusch-recruitment-20250327`]) reported: "Lockheed Martin ([`/organizations/lockheed-martin`]) has refused on multiple occasions to comment on allegations that its executives, including former Vice President of Space Systems, James Ryder ([`/people/james-ryder`]), were involved in the attempted transfer of materials." In November 2023 Liberation Times asked Lockheed Martin whether it could deny allegations that it possesses materials of unknown or non-human origin; a company spokesperson stated: "Questions about UAPs are best addressed by the U.S. government." On 3 March 2025 Liberation Times contacted Lockheed Martin''s media relations office with the following inquiries: the company''s involvement in the proposed material divestment plan, whether Lockheed Martin currently possesses or has previously handled advanced non-human materials linked to historical crash retrieval operations, and whether the company holds any records of Ryder''s alleged role. "Despite repeated requests for comment, Lockheed Martin has refused to respond." Sharp had earlier reported on 8 November 2024 ([`/documents/liberationtimes-witnesses-announced-landmark-ufo-hearing-20241108`]) that the alleged non-human materials "Lockheed Martin may still possess to this day"; no Lockheed Martin denial followed.

  '

pattern_statement: 'Three discrete Liberation Times-documented moments (November 2023, multiple occasions across 2024 and early 2025, March 3 2025) of Lockheed Martin refusing to issue categorical denials of allegations that it possesses or has handled UAP / non-human material.'

