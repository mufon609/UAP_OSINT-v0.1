context_extrinsic: {}

background: 'Karl E. Nell is a recently retired United States Army ([`/organizations/us-army`]) colonel and aerospace executive. The Sol Foundation policy paper "The UFO Enigma: A Call for US Government Disclosure" (Spring 2025), in its About the Author section, states that Nell served as advisor to the Vice Chief of Staff of the Army, deputy chief of staff for United States Africa Command ([`/organizations/africom`]), commander of the 336th Expeditionary Military Intelligence Brigade, and Technical Intelligence operations officer (C/J-2) for the Combined Joint Captured Materiel Exploitation Center in Iraq, and that his last active-duty assignment was as Army director supporting the UAP Task Force ([`/organizations/uaptf`]). The same source states that Nell has held positions with Bell Laboratories ([`/organizations/bell-laboratories`]), Lockheed Martin ([`/organizations/lockheed-martin`]), and Northrop Grumman TASC ([`/organizations/northrop-grumman`]), among others, and is the Chief Executive Officer of StarDustX Materials, Inc. ([`/organizations/stardustx-materials`]), a VC-backed startup focused on metamaterial analysis and design. At SALT iConnections NY on May 21, 2024, Nell stated he had a four-year scholarship to Penn, a degree in electrical engineering, was sent overseas by the Army to do engineering projects in Europe, worked in Army space command, commanded a satellite ground station, spent time at Wright Patterson Air Force Base, received a Master in mechanical engineering, a Master in strategic studies, and graduate work in computer science. He further stated he was vice president and general manager of a Northern Virginia firm, commanded at every grade level through Brigade in the Reserve, and was fortunate to stand up the Army''s newest Expeditionary Military Intelligence Brigade.'

top_relevance: 'Karl Nell served as the Army''s liaison for the UAP Task Force from 2021 to 2022 and worked with David Grusch ([`/people/david-grusch`]) there per The Debrief ([`/organizations/the-debrief`]) article "Intelligence Officials Say U.S. Has Retrieved Craft of Non-Human Origin" by Leslie Kean ([`/people/leslie-kean`]) and Ralph Blumenthal ([`/people/ralph-blumenthal`]) of June 5, 2023. The Sol Foundation ([`/organizations/sol-foundation`]) policy paper About the Author section states his last active-duty assignment was as Army director supporting the UAP Task Force. Nell characterizes Grusch as "beyond reproach" and states that Grusch''s assertion concerning the existence of a terrestrial arms race occurring sub-rosa over the past eighty years focused on reverse engineering technologies of unknown origin is fundamentally correct, as is the indisputable realization that at least some of these technologies of unknown origin derive from non-human intelligence — both statements published in The Debrief on June 5, 2023. Nell is the author of the Sol Foundation policy paper "The UFO Enigma: A Call for US Government Disclosure" (Spring 2025), which states the rationale for the Unidentified Anomalous Phenomena Disclosure Act ([`/documents/uap-disclosure-act-2024`]) reintroduced in 2024 by Senators Mike Rounds ([`/people/mike-rounds`]) and Chuck Schumer ([`/people/chuck-schumer`]), the proposed Review Board of nine distinguished citizens, eminent domain over technology of unknown origin, and a benchmark-driven controlled disclosure plan. Nell spoke at the Sol Foundation Symposium at Stanford in 2023 on the Schumer Amendment and controlled disclosure (transcript [`/transcripts/nell-sol-foundation-2023`]); and at SALT iConnections NY on May 21, 2024, where he stated there is zero doubt that non-human intelligence exists and has been interacting with humanity (transcript [`/transcripts/nell-salt-2024`]).'

credibility_notes: 'The Debrief article by Leslie Kean and Ralph Blumenthal of June 5, 2023 reports that in a 2022 performance evaluation, Laura A. Potter, Deputy Chief of Staff for Intelligence, Headquarters, Department of the Army, described Nell as "an officer with the strongest possible moral compass." This is the only third party Army Intelligence performance evaluation on Nell in the primary sources here. Nell stated at SALT iConnections NY on May 21, 2024 that non-human intelligence exists, has been interacting with humanity, that this interaction is not new and is ongoing, and that there are unelected people in the government who are aware of that. Nell stated "zero doubt" as the confidence level for that claim. The underlying NHI claim is not corroborated by other primary sources here; Nell''s institutional access (UAP Task Force, 2021 to 2022) is corroborated by The Debrief article and the Sol Foundation policy paper About the Author, but the NHI claim itself is based on Nell''s on the record assertion alone.


  Nell vouched for David Grusch ([`/people/david-grusch`]) in The Debrief: he characterizes Grusch as "beyond reproach" (a personal claim) and states that Grusch''s assertion concerning a sub-rosa arms race for reverse engineering technologies of unknown origin is fundamentally correct, with at least some derived from non-human intelligence (a claim on the core point of the Grusch disclosure). Both statements appear in the same Debrief article.


  Nell is the author of the Sol Foundation policy paper "The UFO Enigma" (Spring 2025), published as Volume 2, Number 2 of the Sol Foundation Policy Papers series. The paper addresses the rationale for the UAP Disclosure Act, the proposed Review Board of nine distinguished citizens, eminent domain over technology of unknown origin, and benchmark-driven controlled disclosure. Nell''s current commercial position is Chief Executive Officer of StarDustX Materials, Inc., a VC-backed startup focused on metamaterial analysis and design, per the Spring 2025 Sol Foundation policy paper About the Author.

  '

