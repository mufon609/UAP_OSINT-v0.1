quotes:
- id: q1
  added_date: '2026-05-05'
  text: |-
    1. (U) Purpose: This classification guide is issued for the purpose of identifYing specific topics
    of information associated with the Office of Naval Intelligence, Unidentified Aerial Phenomenon
    (UAP) Task Force that meet the standards and criteria for classification and protection in
    accordance with Executive Order (E.O.) 13526, "Classified National Security Information," as
    amended, and its implementing directives.
  source:
    path: government/blackvault-uap-security-classification-guide-20200416.pdf
    location: p. 2, ¶1 (Purpose)
  significance: NIA's UAP Security Classification Guide names the Office of Naval Intelligence, UAP Task Force as the subject of its classification authority — four months before the Department of Defense's public announcement of UAPTF's establishment
  context: Naval Intelligence Activity, UAP Security Classification Guide ID# 04-030, signed by Director NIA Scott Bray
  statement_date: '2020-04-16'
- id: q2
  added_date: '2026-05-05'
  text: |-
    UAPTF and the ODNI National Intelligence Manager for Aviation drafted this report, with input from USD(I&S), DIA, FBI, NRO, NGA, NSA, Air Force, Army, Navy, Navy/ONI, DARPA, FAA, NOAA, NGA, ODNI/NIM-Emerging and Disruptive Technology, ODNI/National Counterintelligence and Security Center, and ODNI/National Intelligence Council.
  source:
    path: government/dni-gov-odni-preliminary-assessment-20210625.pdf
    location: p. 2, Scope and Assumptions
  significance: ODNI Preliminary Assessment lists "Navy/ONI" among the agencies that provided input to the report — distinct from the "Navy" entry preceding it
  context: ODNI Preliminary Assessment, Scope and Assumptions
  statement_date: '2021-06-25'
- id: q3
  added_date: '2026-05-05'
  text: |-
    The Senate Report specifically requested that the report include:
           1. A detailed analysis of UAP data and intelligence reporting collected or held by the
              Office of Naval Intelligence, including data and intelligence reporting held by the
              UAPTF;
  source:
    path: government/dni-gov-odni-preliminary-assessment-20210625.pdf
    location: Appendix B (Senate Report Accompanying the Intelligence Authorization Act for Fiscal Year 2021)
  significance: ODNI's Preliminary Assessment cites the Senate's directive that its analysis include data and intelligence reporting held by ONI — naming ONI as a UAP-data holder distinct from UAPTF
  context: ODNI Preliminary Assessment, Appendix B
  statement_date: '2021-06-25'
- id: q4
  added_date: '2026-05-05'
  text: |-
    The Committee supports the efforts of the Unidentified Aerial
    Phenomenon Task Force at the Office of Naval Intelligence to
    standardize collection and reporting on unidentified aerial phe-
    nomenon, any links they have to adversarial foreign governments,
    and the threat they pose to U.S. military assets and installations.
  source:
    path: government/govinfo-senate-report-116-233-iaa-fy2021.pdf
    location: p. 12, Advanced Aerial Threats
  significance: Senate Select Committee on Intelligence on-record acknowledgment of "the Unidentified Aerial Phenomenon Task Force at the Office of Naval Intelligence" in the FY2021 Intelligence Authorization Act accompanying report
  context: Senate Report 116-233, Advanced Aerial Threats section
  statement_date: '2020-06-17'
- id: q5
  added_date: '2026-05-05'
  text: |-
    At the time of Dr. Taylor's initial work with the UAPTF, former Office of Naval Intelligence senior civilian John Stratton was leading the effort and informally referred to Dr. Taylor as his chief scientist as efforts to assemble a larger team were underway.
  source:
    path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
    location: A1 response from DoD Spokesperson Susan Gough
  significance: Department of Defense Public Affairs statement names Stratton as "former Office of Naval Intelligence senior civilian" who was leading UAPTF — the strongest archived government source attesting ONI in the lineage of UAPTF leadership
  context: DoD Public Affairs written statement to The Black Vault, via Spokesperson Susan Gough
  statement_date: '2022-06-29'
- id: q6
  added_date: '2026-05-05'
  text: |-
    [5:32] uh trying to figure it out or anything until um you know several years later when uh the Office of Naval intelligence folks contacted me and they  were doing their investigation and their followup
  source:
