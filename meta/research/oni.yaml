description: 'The Office of Naval Intelligence (ONI) appears in the UAP record primarily through its role with the Unidentified Aerial Phenomena Task Force ([`/organizations/uaptf`]). The Naval Intelligence Activity ([`/organizations/nia`]) UAP Security Classification Guide, issued 16 April 2020 under the signature of NIA Director Mr. Scott Bray ([`/people/scott-bray`]), names "the Office of Naval Intelligence, Unidentified Aerial Phenomenon (UAP) Task Force" as the subject of its classification authority. Senate Report 116-233 (June 17, 2020), accompanying the Intelligence Authorization Act for Fiscal Year 2021, supports "the Unidentified Aerial Phenomenon Task Force at the Office of Naval Intelligence" and directs the Director of National Intelligence ([`/organizations/odni`]) to submit an intelligence assessment of the threat posed by UAP, including "a detailed analysis of UAP data and intelligence reporting collected or held by the Office of Naval Intelligence". The 25 June 2021 ODNI Preliminary Assessment ([`/documents/odni-preliminary-assessment-2021`]) was submitted in response to that direction; ONI is listed as "Navy/ONI" among the agencies that provided input to the report, with USD(I&S) ([`/organizations/ousd-is`]), DIA, FBI, NRO, NGA, NSA, and other Intelligence Community input.


  Department of Defense Spokesperson Susan Gough ([`/people/sue-gough`]), in a written statement to The Black Vault dated June 29, 2022, confirmed that "former Office of Naval Intelligence senior civilian John Stratton was leading the effort" — UAPTF — at the time of Dr. Travis Taylor''s initial work with the Task Force; Stratton ([`/people/jay-stratton`]) and Taylor ([`/people/travis-taylor`]) are named in the same Gough statement. ONI is named as Stratton''s prior senior civilian role; his subsequent role leading UAPTF was under the direction of the Director of NIA.


  Outside the UAPTF arrangement, ONI is named by Navy pilot Alex Dietrich ([`/people/alex-dietrich`]) as the entity that contacted her several years after the 2004 encounter ([`/events/2004-nimitz-encounter`]). On the Somewhere in the Skies podcast ([`/transcripts/somewhere-in-the-skies-dietrich-2023`], recorded 2023), Dietrich described "the Office of Naval intelligence folks contacted me and they were doing their investigation and their followup".

  '
