background: 'James T. Ryder served 38 years in management and technical positions at the Lockheed Martin Corporation [`/organizations/lockheed-martin`], holding roles of Vice President, Director, Manager, Program Manager, Principal Investigator, and scientist and engineer across aircraft (L1011, F22, Skunk Works), rockets and missiles (space shuttle main engines, FBM, THAAD), and spacecraft (classified and unclassified defense systems and for NASA). From May 2005 until his retirement in February 2011, Ryder served as Vice President of Lockheed Martin Space Systems Company [`/organizations/lockheed-martin-space-systems-company`] in Palo Alto, CA, leading the Advanced Technology Center for Lockheed Martin Space Systems Company and the Lockheed Martin Corporation. Ryder holds a PhD in theoretical and applied mechanics, an MS in engineering mechanics, and a BS in theoretical and applied mechanics, all from the University of Illinois [`/organizations/university-of-illinois`]; his technical contributions and publications include structural durability and damage-tolerance analysis, optical materials, development and analysis of materials, and sensor instrumentation. He has been an adjunct professor, has taught graduate courses, has served on numerous advisory panels, review boards, committees, and conference committees, and served as Chairman of the Board at the Institute for Venture Science [`/organizations/institute-for-venture-science`].


  Ryder''s early career at the Lockheed-California Company [`/organizations/lockheed-california-company`] is documented in Air Force Materials Laboratory technical reports archived at the Defense Technical Information Center: he presented "Effect of Load History on Fatigue Life" at the Sixth Annual Mechanics of Composites Review (October 1980, Wright-Patterson AFB) and co-authored "Stiffness, Strength and Fatigue Life Relationships for Composite Laminates" with T. Kevin O''Brien (NASA Langley Research Center) and Frank W. Crossman (Lockheed Palo Alto Research Laboratory) at the Seventh Annual Mechanics of Composites Review (October 1981, Wright-Patterson AFB, Dayton, Ohio); the 1981 proceedings list Ryder under his Rye Canyon Research Laboratory. His May 2005 promotion to LMSSC Vice President was independently named in three Lockheed Martin Corporation press releases between March 2008 and November 2009 that quote him on the DARPA F6 satellite contract, the Forum on Earth Observations III, and the STS-125 carbon nanotube memory experiment.


  After his February 2011 retirement, Ryder founded the International Science Foundation [`/organizations/international-science-foundation`] and served as its Chairman of the Board until his death in May 2018; per Dr. William A. Gardner [`/people/william-gardner`]''s biography, the founding occurred during their five-year collaboration that began in 2013. ISF funded the SAFIRE Project [`/organizations/safire-project`] plasma physics research line for several years; the project''s commercial successor is Aureon Energy Ltd. [`/organizations/aureon-energy`]. The SAFIRE Project team page lists Ryder on the Science Review Team alongside Hal Puthoff [`/people/hal-puthoff`] (Director, Institute for Advanced Studies at Austin), Eric W. Davis [`/people/eric-davis`] (Chief Science Officer, Institute for Advanced Studies at Austin), and Gardner (Professor Emeritus, University of California). The IVS Ryder chaired was founded by Professor Gerald Pollack [`/people/gerald-pollack`] of the University of Washington. Ryder''s 2018 Lucis Trust talk names Russell Targ [`/people/russell-targ`] as having "worked for me for years" at Lockheed; Targ''s Lockheed tenure is independently documented in the 1991 and 1996 Applied Optics author affiliations (Lockheed Missiles & Space Company, then Lockheed Martin Advanced Technology Center, both at the same Palo Alto address).


  In January 2012, Ryder presented at the Thunderbolts/Electric Universe conference in Las Vegas on the surprising results of the IBEX experiment, per Mintze Van der Velde''s Lucis Trust report. At the Lucis Trust [`/organizations/lucis-trust`] Arcane School Conference London in June 2017, Ryder gave the discussion "The Rending of the Veils, Part 1: Fairies, Devas and Unidentified Aerial Phenomena". Dr. Lee Blackburn [`/people/lee-blackburn`] gave the Part 2 discussion on the violet force and health. Ryder also presented at the Lucis Trust Arcane School Conference in May 2015 ("The Soul Is Light. What Then Is Light?", London) and at the New York conference of April 2018 ("The Garment of God: Esoterically and Scientifically") — the latter approximately one month before his death. An edited transcript of the 2018 talk was published under his name as "Science is our meditation on the nature of the universe" in a Lucis Trust Bi annual letter.'
top_relevance: 'Multiple documented statements name Ryder as a Lockheed Martin Space Systems Vice President involved in the alleged 2011 attempted transfer of UAP materials. Luis Elizondo [`/people/luis-elizondo`]''s December 19, 2024 Question for the Record (QFR) response to the House Oversight Committee names Dr. James Lacatski [`/people/james-lacatski`] as the author of the underlying SD004 page-1 statement that names Ryder. George Knapp [`/people/george-knapp`] under oath at the September 9, 2025 House Oversight UAP hearing also named Ryder at Lockheed when asked to identify specific gatekeepers within the root cell of the UAP SAP Federation. The Patuxent River Naval Air Station hangar Hoyer is alleged to have requested funding for is also named in a Hoyer congressional press release dated July 28, 2010 announcing the fiscal year 2011 Military Construction line item, a 2025 interview in which Hoyer did not deny the same appropriation, and a 2026 White House-approved site visit by Rep. Eric Burlison [`/people/eric-burlison`] that verified the hangar exists but is empty.


  The 21-page SD004 [`/documents/docs-house-gov-hhrg-118-go12-20241113-sd004`] was entered into the 13 November 2024 House Committee on Oversight and Accountability [`/organizations/house-oversight`] UAP hearing record. Page 1 is a Q&A DOPSR-cleared on September 6, 2023. The Q&A states the $22M allocated for DIA AAWSAP [`/organizations/aawsap`], after the author spoke to multiple individuals on the program, was originally intended to SCIF-out Bigelow Aerospace [`/organizations/bigelow-aerospace`] Facilities in Las Vegas due to a UAP material divestment plan proposed to AAWSAP leadership by Lockheed Martin Space Systems Vice President Dr. James Ryder (now deceased). A specific facility was described as having crash retrieval material from the 1950s and other historical operations. The proposed Technology Transfer Agreement was into the Waived PSAP that Senator Harry Reid [`/people/harry-reid`] was championing. The transfer was disapproved at a meeting with the original government custodian, the CIA Directorate of Science and Technology [`/organizations/cia-ds-and-t`], while Glenn Gaffney [`/people/glenn-gaffney`] was in that position.


  The author of the SD004 page-1 statement was named in Elizondo''s December 19, 2024 QFR response [`/documents/elizondo-qfr-burlison-20241219`] to the same House Oversight subcommittees. Responding to Rep. Eric Burlison''s December 9, 2024 letter, Elizondo''s Q1 response named Lacatski, former Director of AAWSAP, as the author of the DOPSR-cleared statement (dated September 6, 2023) and quoted the Lockheed Ryder verbatim text as Attachment 2. Q6 confirmed that "the CIA opposed the transfer of materials of advanced, non-human origin from Lockheed Martin to Bigelow Aerospace." Q7 said that specific facilities were named to enable Bigelow Aerospace to acquire and securely store the materials following transfer from Lockheed Martin — locations in the Las Vegas area, and a newly built hangar at the Patuxent River Naval Air Station [`/locations/patuxent-river-nas`] funded with approximately $10 million allocated at the request of then-Representative Steny Hoyer [`/people/steny-hoyer`]; the PAX River hangar was purpose-built to meet Special Access Program Facility (SAP-F) requirements at any classification level. Elizondo said he visited the PAX River facility but no materials had been transferred at the time of his visit.


  Hoyer''s congressional office press release dated July 28, 2010 [`/documents/hoyer-fy2011-milcon-southern-maryland-20100728`] — 14 years before any UAP allegation — announces the fiscal year 2011 Military Construction and Veterans Affairs Appropriations Act and includes a Pax River line item: "Atlantic Test Range Addition, Naval Air Station, Patuxent River – $10,160,000" to construct "Sensitive Compartmented Information Facility areas" alongside "control rooms for Unmanned Air Vehicles" and "intelligence data acquisition laboratory spaces." The dollar figure, fiscal year, location, and Sensitive Compartmented Information Facility correspond to the Pax River SAP-F hangar that Elizondo''s December 2024 QFR Q7 described as requested by Hoyer. The press release describes the funding as an addition to the existing Atlantic Test Range rather than a separate hangar.


  The 27 March 2025 Liberation Times article [`/documents/liberationtimes-burlison-grusch-recruitment-20250327`] by reporter Christopher Sharp [`/people/christopher-sharp`] states Lockheed Martin has refused on multiple occasions to comment on allegations that its executives, including former Vice President of Space Systems James Ryder, were involved in the attempted transfer of materials. Sharp states that the final authority to block the transfer ultimately rested with Robert Cardillo [`/people/robert-cardillo`], then Deputy Director of National Intelligence for Intelligence Integration, and that the effort to gain Special Access Program status for AAWSAP was blocked by Deputy Secretary of Defense William Lynn [`/people/william-lynn-iii`] due to pressure from individuals within the intelligence community. Asked in November 2023 whether it could deny that it possesses materials of unknown or non-human origin, a Lockheed Martin company spokesperson declined to issue a denial, stating "Questions about UAPs are best addressed by the U.S. government." Sharp''s earlier Liberation Times article on November 8, 2024 [`/documents/liberationtimes-witnesses-announced-landmark-ufo-hearing-20241108`] — published five days before the November 13 hearing where SD004 was entered into the record — was the first archived public source to name Ryder, and described those involved including Ryder as "feeling threatened due to the harshness of exchanges with CIA officials."


  On October 16, 2025, journalist Matt Laslo [`/people/matt-laslo`] (Ask a Pol UAP [`/organizations/ask-a-pol`]) questioned Hoyer at the Capitol Visitors Center about the same $10 million Pax River appropriation [`/documents/askapoluaps-laslo-hoyer-20251022`]. Laslo''s question described the appropriation as "for Lockheed Martin"; Hoyer changed from "private" to "public partner" — terminology used in public private partnership construction — and did not deny the appropriation. He responded "I don''t remember the specifics" and, when asked if the appropriation related to new technology, "It may well be. Let me check on it, though." Asked separately whether he was familiar with non-human intelligence, Hoyer answered: "No. I''m not. I''m sort of a human intelligence person." Hoyer himself made no statements about Elizondo or the QFR by name in the interview.


  In February 2026, Rep. Eric Burlison conducted a White House-approved site visit to Naval Air Station Patuxent River to investigate the facility Elizondo described. Per Liberation Times reporting on March 6, 2026 [`/documents/liberationtimes-white-house-approved-trip-pax-river-20260306`], Burlison verified the hangar exists but is empty; sources said Burlison saw a "private runway said to have been built for Bigelow" and "a crane allegedly intended to support the transfer of materials by air and by river"; the findings were reported back to the White House. The same article was updated on March 12, 2026 with three sources telling Liberation Times the hangar Burlison visited may not have been the one Elizondo named, and the runway said to have been built for Bigelow was not confirmed; the update keeps the broader allegation that UAP-related materials may be stored in different facilities within Pax River.'
credibility_notes: 'None of the documented Lockheed transfer statements that name Ryder are by Ryder. Ryder is deceased. The SD004 page 1 Q&A states "(now deceased)" without giving a date; the only named primary record of the death is note 1 of Dr. William A. Gardner''s biography page, which says the International Science Foundation "closed down at the time of its Founder/COB, Dr. James T. Ryder''s, death in May 2018." The day of the death is reported as May 28 in secondary sources but no primary source on this record states the day; only the month and the year.


  The page 1 Q&A author of SD004 is not named in the document itself. The author was named in Luis Elizondo''s December 19, 2024 Question for the Record response: Elizondo says the DOPSR document (dated September 6, 2023) was a statement by Dr. James Lacatski, former Director of AAWSAP, and quoted the Lockheed Ryder text as Attachment 2 of his response. The Q&A was DOPSR cleared for open publication on September 6, 2023 — DOPSR clearance is addressed at prior classification and similar limits, not at the truth of the statements made. The 27 March 2025 Liberation Times article by Christopher Sharp says "Liberation Times now understands" when stating its sources. Lockheed Martin has refused to issue a denial when asked to address the allegations.


  Christopher Sharp''s November 8, 2024 Liberation Times article [`/documents/liberationtimes-witnesses-announced-landmark-ufo-hearing-20241108`] and his March 27, 2025 X post [`/documents/sharp-x-cardillo-blocked-transfer-20250327`] name the same Lockheed Martin transfer story but state different recipient agencies: the November 2024 article says the recipient was DIA AAWSAP / Bigelow Aerospace facilities; the March 2025 X post says "efforts in 2011 to transfer materials between Lockheed Martin and the Department of Homeland Security (DHS) were allegedly thwarted through actions coordinated by the CIA''s Directorate of Science & Technology, then led by Glenn Gaffney." Both forms of the story are recorded on this page; the primary sources currently archived do not resolve whether DHS is an added involved agency or a difference in how the reporter named the recipient.


  Four primary records on this page document the Patuxent River hangar narrative. (1) Hoyer''s July 28, 2010 press release announces "Atlantic Test Range Addition, Naval Air Station, Patuxent River – $10,160,000" to construct "Sensitive Compartmented Information Facility areas" as an addition to the existing Atlantic Test Range. (2) Elizondo''s December 19, 2024 QFR Q7 describes "a newly built hangar at the Patuxent River Naval Air Station", purpose-built to meet the requirements of a Special Access Program Facility (SAP-F), with funding "approximately $10 million" allocated "at the request of then-Representative Steny Hoyer". (3) Per Liberation Times reporting on Burlison''s February 2026 White House-approved trip (March 6, 2026), Burlison was able to verify the hangar exists, but that it remains empty. (4) The same article''s March 12, 2026 update reports "three separate sources familiar with the trip said the hangar visited by Burlison was not the one allegedly built to facilitate the proposed transfer of materials" and that Burlison "did not see a runway built specifically for Bigelow". The 2010 press release and the 2024 QFR cite the same $10 million dollar figure, the same FY 2011 fiscal year, and the same Sensitive Compartmented Information Facility reference. The 2010 press release calls the appropriation an "addition" to the existing Atlantic Test Range; the 2024 QFR calls the structure a "newly built hangar". The primary sources currently archived do not resolve which facility within Pax River the allegation actually concerns.


  AARO [`/organizations/aaro`]''s "Report on the Historical Record of U.S. Government Involvement with Unidentified Anomalous Phenomena (UAP), Volume I" [`/documents/aaro-historical-record-report-vol-i`] (DOPSR-cleared March 8, 2024) addresses the Lockheed Martin to AAWSAP allegation cluster on Executive Summary page 8 in three on the record findings: the named, former CIA official "was not involved in the movement of extraterrestrial technology" and "signed a memo rejecting a claim made by interviewees that he managed the movement of and experimentation on off-world technology"; "AARO confirmed the [2004 to 2007 disclosure] study was conducted, but it was not requested by the White House"; and "executives, scientists, and chief technology officers of the companies named by interviewees met with the Director of AARO and denied on the record that they have ever recovered, possessed, or engaged in reverse-engineering of extraterrestrial technology." AARO''s named companies denial does not single out Lockheed Martin, addresses current executives'' statements rather than custody chain prior to current tenure, and was published before the Sharp Liberation Times reporting that documents Lockheed Martin''s repeated refusal to deny the allegations when asked. The memo cited in the AARO report is described as rejecting the claim that the CIA official "managed" the movement of off-world technology; Lacatski''s DOPSR-cleared statement and the Liberation Times reporting use "disapproved" — opposed during a meeting, not managed — so the AARO denial and the Lacatski description address different actions even when they appear to address the same allegation. The AARO Historical Record Report Volume I findings and the Lacatski / Elizondo / Knapp testimony chain remain on the record from named officials in opposite directions; the repository documents both.


  Ryder''s 2015 Lucis Trust talk statement that IBEX "was built in my lab" is matched by a Lockheed Martin Corporation press release dated February 17, 2005 [`/documents/lm-ibex-lo-press-release-20050217`] announcing that the Lockheed Martin Advanced Technology Center "will lead the development of the Interstellar Boundary Explorer (IBEX)-Lo sensor for the recently selected NASA Small Explorer mission" with "the Southwest Research Institute (SwRI)" having awarded the contract to the ATC. The press release names Stephen A. Fuselier as IBEX-Lo lead investigator and Eric Hertzberg as lead engineer, both members of the ATC''s Space Physics Department, with the overall project under SwRI''s Dr. Dave McComas as Principal Investigator. The contract was awarded to the ATC three months before Ryder''s May 2005 promotion to LMSSC Vice President and head of the ATC; the build then proceeded under Ryder''s supervision through the October 2008 IBEX launch. A second Lockheed Martin press release dated October 8, 2008 [`/documents/lm-ibex-mission-launch-press-release-20081008`] states: "The IBEX-Lo sensor was built by a team of scientists and engineers at the ATC in Palo Alto, Calif., the University of New Hampshire in Durham, N.H., SwRI in San Antonio, Texas, the NASA Goddard Space Flight Center in Greenbelt, Md, and the University of Bern in Bern, Switzerland." The ATC was one of five building institutions, not the only one; the team integrated and calibrated the sensor at the University of Bern. The peer-reviewed McComas et al. paper in Space Science Reviews 146 (October 2009) [`/documents/mccomas-ibex-space-science-reviews-2009`] also lists "Lockheed Martin Advanced Technology Center, Palo Alto, CA, 94304, USA" as a co-author institution tied to S. A. Fuselier — peer-reviewed independent statement of the ATC''s IBEX role.


  Ryder gave the Lucis Trust 2017 London discussion "The Rending of the Veils, Part 1: Fairies, Devas and Unidentified Aerial Phenomena" — the video is preserved as a primary source on this page but is not yet rendered as text. Ryder''s 2015 ("The Soul Is Light") and 2018 ("The Garment of God") Lucis Trust talks each have a YouTube video whose transcript was pulled into this page (see Statements). The published edited Ryder text from the 2018 talk is archived separately as the Lucis Trust Bi annual letter publication [`/documents/lucistrust-ryder-science-meditation-letter-2018`]. The 2015 and 2018 talk transcript files were transcribed by YouTube''s tool and contain a number of different forms of proper names (''put off'' / ''pothos'' / ''thought of'' for Puthoff; ''leprosy'' for telepathy; ''ibx'' for IBEX; ''wall thornhill'' for Wal Thornhill); these are preserved as sic in the Statements quotes and listed for the reader on this page.'
