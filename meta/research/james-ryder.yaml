background: 'James T. Ryder served 38 years in management and technical positions at the Lockheed Martin Corporation [`/organizations/lockheed-martin`], holding roles of Vice President, Director, Manager, Program Manager, Principal Investigator, and scientist and engineer across aircraft (L1011, F22, Skunk Works), rockets and missiles (space shuttle main engines, FBM, THAAD), and spacecraft (classified and unclassified defense systems and for NASA). From May 2005 until his retirement in February 2011, Ryder served as Vice President of Lockheed Martin Space Systems Company [`/organizations/lockheed-martin-space-systems-company`] in Palo Alto, CA, leading the Advanced Technology Center for Lockheed Martin Space Systems Company and the Lockheed Martin Corporation. Ryder holds a PhD in theoretical and applied mechanics, an MS in engineering mechanics, and a BS in theoretical and applied mechanics, all from the University of Illinois [`/organizations/university-of-illinois`]; his technical contributions and publications include structural durability and damage-tolerance analysis, optical materials, development and analysis of materials, and sensor instrumentation. He has been an adjunct professor, has taught graduate courses, has served on numerous advisory panels, review boards, committees, and conference committees, and serves as Chairman of the Board at the Institute for Venture Science [`/organizations/institute-for-venture-science`].


  At the Lucis Trust [`/organizations/lucis-trust`] Arcane School Conference London in June 2017, Ryder gave the discussion "The Rending of the Veils, Part 1: Fairies, Devas and Unidentified Aerial Phenomena". Dr. Lee Blackburn [`/people/lee-blackburn`] gave the Part 2 discussion on the violet force and health.'
top_relevance: 'Three documented statements name Ryder as a Lockheed Martin Space Systems Vice President involved in the alleged 2011 attempted transfer of UAP materials.


  The 21-page SD004 [`/documents/docs-house-gov-hhrg-118-go12-20241113-sd004`] was entered into the 13 November 2024 House Committee on Oversight and Accountability [`/organizations/house-oversight`] UAP hearing record. Page 1 is an unnamed Q&A DOPSR-cleared on Sep 06, 2023. The Q&A states the $22M allocated for DIA AAWSAP [`/organizations/aawsap`], after the unnamed author spoke to multiple individuals on the program, was originally intended to SCIF-out Bigelow Aerospace [`/organizations/bigelow-aerospace`] Facilities in Las Vegas due to a UAP material divestment plan proposed to AAWSAP leadership by Lockheed Martin Space Systems Vice President Dr. James Ryder (now deceased). A specific facility was described as having crash retrieval material from the 1950s and other historical operations, and the Technology Transfer Agreement was a Waived PSAP championing by Senator Harry Reid [`/people/harry-reid`]. The transfer was disapproved at a meeting with the original government custodian, the CIA Directorate of Science and Technology [`/organizations/cia-ds-and-t`], while Glenn Gaffney [`/people/glenn-gaffney`] was in that position.


  The 27 March 2025 Liberation Times article [`/documents/liberationtimes-burlison-grusch-recruitment-20250327`] by reporter Christopher Sharp [`/people/christopher-sharp`] states Lockheed Martin has refused on multiple occasions to comment on allegations that its executives, including former Vice President of Space Systems James Ryder, were involved in the attempted transfer of materials. Sharp states that the final authority to block the transfer ultimately rested with Robert Cardillo [`/people/robert-cardillo`], then Deputy Director of National Intelligence for Intelligence Integration, and that the effort to gain Special Access Program status for AAWSAP was blocked by Deputy Secretary of Defense William Lynn [`/people/william-lynn-iii`] due to pressure from individuals within the intelligence community. Asked in November 2023 whether it could deny that it possesses materials of unknown or non-human origin, a Lockheed Martin company spokesperson declined to issue a denial, stating "Questions about UAPs are best addressed by the U.S. government."


  At the 2025 House Oversight UAP hearing, when asked under oath to name specific gatekeepers within the root cell of the UAP SAP Federation, George Knapp [`/people/george-knapp`] named Dr. James Ryder at Lockheed.'
credibility_notes: 'None of the documented statements that name Ryder are by Ryder. Ryder is deceased; the SD004 page-1 Q&A states "(now deceased)". A primary-source date for the death is not yet archived; the widely reported death date is noted as a claim that has no primary source archived.


  The page-1 Q&A author of SD004 is unnamed in the document. The 13 November 2024 House Oversight UAP hearing oral record does not name a person who entered the document. The Q&A was DOPSR-cleared for open publication on Sep 06, 2023 — DOPSR clearance is addressed at prior classification and similar limits, not at the truth of the statements made. The 27 March 2025 Liberation Times article by Christopher Sharp states "Liberation Times now understands" when stating its sources. Lockheed Martin has refused to issue a denial when asked to address the allegations.


  Ryder gave the Lucis Trust 2017 London discussion "The Rending of the Veils, Part 1: Fairies, Devas and Unidentified Aerial Phenomena" — Ryder''s own video is preserved as a primary source on this record but is not yet rendered as text. Statements from that video may update this record when the video is rendered as a separate primary source.'
