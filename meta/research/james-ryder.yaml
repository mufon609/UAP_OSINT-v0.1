    context_summary: 'Lockheed Martin Corporation press release, February 17, 2005, "Lockheed Martin to Develop Sensor for Interstellar Boundary Explorer Mission". Announces that the Lockheed Martin Advanced Technology Center will lead development of the IBEX-Lo sensor for NASA''s Small Explorer mission; the Southwest Research Institute (SwRI) awarded the contract to the ATC; Stephen A. Fuselier named lead investigator, Eric Hertzberg named lead engineer, both members of the ATC''s Space Physics Department; overall project under SwRI''s Dr. Dave McComas as Principal Investigator. Independent institutional corroboration of Ryder''s 2015 Lucis Trust talk attestation that IBEX "was built in my lab"; the contract was awarded to the ATC three months before Ryder''s May 2005 promotion to LMSSC Vice President and head of the ATC.'
