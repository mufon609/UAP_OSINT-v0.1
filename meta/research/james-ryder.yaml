    added_date: '2026-05-09'
    entity_type: document
    name: 'Lockheed Martin IBEX mission launch press release (October 8, 2008)'
    wrap_path: '/documents/lm-ibex-mission-launch-press-release-20081008'
    context_summary: 'Lockheed Martin Corporation press release, October 8, 2008, "Lockheed Martin Sensor Aboard for Interstellar Boundary Explorer (IBEX) Mission Launch". Coincident with the October 19, 2008 IBEX launch. Adds important nuance to the 2005 IBEX-Lo press release: the IBEX-Lo sensor was built by a team of scientists and engineers at the ATC in Palo Alto, CA, the University of New Hampshire in Durham, NH, SwRI in San Antonio, TX, the NASA Goddard Space Flight Center in Greenbelt, MD, and the University of Bern in Bern, Switzerland; the team integrated and calibrated the sensor at the University of Bern. The ATC was one of five building institutions, not the only one. Refines Ryder''s 2015 "built in my lab" attestation from ATC-exclusive build to ATC-led multi-institution build.'
  - id: e52
    added_date: '2026-05-09'
    entity_type: document
    name: 'McComas et al. — IBEX-Interstellar Boundary Explorer (Space Science Reviews 2009)'
    wrap_path: '/documents/mccomas-ibex-space-science-reviews-2009'
    context_summary: 'McComas, D.J., et al., "IBEX-Interstellar Boundary Explorer", Space Science Reviews vol. 146, Issue 1-4, October 2009, pp. 11-33 (DOI 10.1007/s11214-009-9499-4). Peer-reviewed institutional attestation. Author-affiliation byline lists "Lockheed Martin Advanced Technology Center, Palo Alto, CA, 94304, USA" tied to S. A. Fuselier as a co-author institution. First author McComas (SwRI). Multi-institution author list (UNH, NASA Goddard, U. Bern, JHU/APL, LANL, USC, Boston U., Orbital Sciences, etc.). Independent peer-reviewed corroboration of the LM ATC''s IBEX role under Ryder''s ATC tenure (May 2005-February 2011). Abstract page open access; full text paywalled.'
  - id: e53
    added_date: '2026-05-09'
    entity_type: document
    name: 'Targ et al. — Coherent lidar airborne windshear sensor (Applied Optics 1991)'
    wrap_path: '/documents/targ-coherent-lidar-airborne-windshear-sensor-1991'
    context_summary: 'Targ, R.; Kavaya, M.J.; Huffaker, R.M.; Bowles, R.L., "Coherent lidar airborne windshear sensor: performance evaluation", Applied Optics vol. 30 (15), pp. 2013-2026, 20 May 1991 (DOI 10.1364/AO.30.002013). Russell Targ author byline lists his affiliation as "Lockheed Missiles & Space Company, 3251 Hanover Street, Palo Alto, California 94304-1191 USA" — peer-reviewed primary attestation of Targ at LMSC in 1991. Bowles affiliated NASA Langley; Kavaya & Huffaker at Coherent Technologies, Boulder. Replaces earlier secondary biographical sources (Wikipedia, Contact in the Desert speaker bio) for the Targ-Lockheed tenure claim. Abstract page open access; full text paywalled.'
  - id: e54
    added_date: '2026-05-09'
    entity_type: document
    name: 'Targ et al. — Coherent lidar airborne wind sensor II (Applied Optics 1996)'
    wrap_path: '/documents/targ-coherent-lidar-airborne-wind-sensor-ii-1996'
    context_summary: 'Targ, R.; Steakley, B.C.; Hawley, J.G.; Ames, L.L., et al., "Coherent lidar airborne wind sensor II: flight-test results at 2 and 10 µm", Applied Optics vol. 35 (36), pp. 7117-7127, 20 December 1996 (DOI 10.1364/AO.35.007117). Russell Targ author byline lists his affiliation as "Advanced Technology Center, Lockheed Martin, 3251 Hanover Street, Palo Alto, California 94304-1191" — same physical address as the 1991 LMSC byline. Documents the LMSC to Lockheed Martin ATC institutional continuity at one site across the 1995 Lockheed Martin merger. Co-authors include LM ATC staff (Forney, Swanson, Stone, Otto, Zarifis), NASA Langley (Brockman, Calloway, Robinson), and MIT Lincoln Lab (Klein). Abstract page open access; full text paywalled.'
