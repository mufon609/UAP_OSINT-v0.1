- id: q1
  added_date: '2026-05-02'
  text: 'Informal views on S. 2226 Division G: Unidentified Anomalous Phenomena Disclosure.'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 1, document title'
  significance: 'Document title — establishes the markup as OUSD(I&S) "Informal views" on Division G of S. 2226 (the FY24 NDAA Senate bill which carried the Schumer-Rounds UAPDA as Division G). The "informal views" framing positions the document as an executive-branch review submitted to congressional negotiators, not a formal legislative response.'
  context: 'OUSD(I&S) markup of S. 2226 Division G — UAPDA — cover page'
  statement_date: '2023-11'
- id: q2
  added_date: '2026-05-02'
  text: 'Reviewed by: Office of the Under Secretary of Defense for Intelligence and Security (OUSD(I&S))'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 1, "Reviewed by" attribution line'
  significance: 'Author attribution — establishes OUSD(I&S) as the reviewing office. The same office that established IPMO (March 1, 2022) and AARO (July 15, 2022) is the authorial body for this UAPDA review.'
  context: 'OUSD(I&S) markup cover page, author attribution'
  statement_date: '2023-11'
- id: q3
  added_date: '2026-05-02'
  text: 'DoD Position: After conferring with NARA/ISOO the Department strongly urges consideration of the following revisions identified below.'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 1, "DoD Position" statement'
  significance: 'Formal DoD Position statement on the cover page — establishes the markup as a formal Departmental position urging adoption of the listed revisions, with NARA/ISOO consultation referenced as the inter-agency basis for the proposed changes.'
  context: 'OUSD(I&S) markup cover page, formal DoD Position statement'
  statement_date: '2023-11'
- id: q4
  added_date: '2026-05-02'
  text: '(13) NON-HUMAN INTELLIGENCE.—The term ''''non-human intelligence'''' means any sentient intelligent non-human lifeform regardless of nature or ultimate origin that may be presumed responsible for unidentified anomalous phenomena or of which the Federal Government has become aware.'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 5, §9003(13) NON-HUMAN INTELLIGENCE definition'
  significance: 'NHI statutory definition at §9003(13) — preserved verbatim from the Schumer-Rounds Senate-passed text without strikethrough or insertion markup. OUSD(I&S) did not narrow the NHI legal scope; the rewrite restructures the disclosure mechanism (Review Board → AARO; senior-agency withdrawal authority; unclassified-only restriction) while leaving the origin-agnostic NHI definition intact. Structural anchor for the legal-scope-preservation observation in the IPMO/AARO structural-coupling investigation.'
  context: 'OUSD(I&S) markup of S. 2226 Division G §9003 DEFINITIONS — NHI definition preserved without markup'
  statement_date: '2023-11'
- id: q5
  added_date: '2026-05-02'
  text: '(1) All Federal Government records related to confirmed unidentified anomalous phenomena should be preserved and centralized for historical and Federal Government purposes.'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 1, §9002(a) FINDINGS AND DECLARATIONS — first finding with "confirmed" insertion'
  significance: '§9002(a)(1) Findings declaration — "confirmed" inserted before "unidentified anomalous phenomena" gates the entire framework to AARO-confirmed records (since AARO is the entity that does the confirming per the rewrite''s downstream substitutions). The original Schumer-Rounds finding read "All Federal Government records related to unidentified anomalous phenomena"; the OUSD(I&S) markup adds "confirmed" — narrowing the disclosure scope while preserving the surface declarative text. Same insertion pattern repeats throughout the markup.'
  context: 'OUSD(I&S) markup of S. 2226 Division G §9002(a) — "confirmed" insertion at first finding'
  statement_date: '2023-11'
- id: q6
  added_date: '2026-05-02'
  text: '(C) The Collection shall consist of record copies of all unclassified U.S. Government, Government provided, or Government funded agency records following their transfer to the National Archives relating to unidentified anomalous phenomena, or technologies of unknown origin, and non-human intelligence'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 7, §9004(a)(1)(C) Collection scope restriction'
  significance: '§9004(a)(1)(C) Collection scope — "all unclassified" inserted to restrict the UAP Records Collection to unclassified U.S. Government, Government-provided, or Government-funded agency records. The original Schumer-Rounds text covered the full Collection without classification restriction; the OUSD(I&S) markup excludes classified records from the disclosure framework entirely. Combined with the §9006(3) Senior Agency Official withdrawal authority (q9), classified UAP records exit the framework at two points.'
  context: 'OUSD(I&S) markup of S. 2226 Division G §9004(a)(1)(C) — "all unclassified" restriction'
  statement_date: '2023-11'
- id: q7
  added_date: '2026-05-02'
  text: 'the physical transfer of the records for purposes of conducting an independent and impartial review and such transfer is approved by the head of the Government office with custody;'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 9, §9005(b)(1) — verbatim post-overlap continuation; full source line and track-changes context in significance below'
  significance: '§9005(b)(1) Custody and review — typical track-changes substitution pattern visible across the markup. The §9005(b)(1) head reads (verbatim): "(1) the Review Board All-domain Anomaly Resolution Office requires requests the physical transfer of the records..." — "Review Board" struck through, "All-domain Anomaly Resolution Office" inserted; "requires" struck through, "requests" inserted. Routes review-and-transfer authority through AARO instead of the independent UAP Records Review Board, and weakens the imperative ("requires" → "requests") on physical transfer of records. The Review Board → AARO substitution recurs at §9005(c)(2)(H) and elsewhere throughout the markup; AARO becomes the gatekeeper for disclosure decisions.'
  context: 'OUSD(I&S) markup of S. 2226 Division G §9005(b)(1) — Review Board → AARO substitution'
  statement_date: '2023-11'
- id: q8
  added_date: '2026-05-02'
  text: 'Director of National Intelligence via the All-domain Anomaly Resolution Office any additional information and records'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 11, §9005(c)(2)(H) — intermediating layer insertion'
  significance: '§9005(c)(2)(H) Intermediating layer — "via the All-domain Anomaly Resolution Office" inserted to route agency transmissions to ODNI through AARO. The original Schumer-Rounds text had agencies serve the Review Board directly; the OUSD(I&S) markup inserts AARO as the intermediating layer between any originating agency and the disclosure framework. Combined with the §9005(b)(1) Review Board → AARO substitution (q7), AARO sits both as the gatekeeper and as the routing intermediary.'
  context: 'OUSD(I&S) markup of S. 2226 Division G §9005(c)(2)(H) — AARO intermediating-layer insertion'
  statement_date: '2023-11'
- id: q9
  added_date: '2026-05-02'
  text: '(2) the public disclosure of the unidentified anomalous phenomena record would violate the Privacy Act of 1974, as amended, 5 U.S.C. § 552a.'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 14, §9006(2) — Privacy Act replacement of original personal-privacy language'
  significance: '§9006(2) Privacy exemption — replaces the Schumer-Rounds personal-privacy postponement language ("reveal the name or identity of a living person who provided confidential information to the Federal Government and would pose a substantial risk of harm to that person") with the broader Privacy Act of 1974 (5 U.S.C. § 552a). The Privacy Act provides considerably broader privacy exemption authority than the original "named-source-with-substantial-risk-of-harm" standard — broadening the privacy exemption considerably.'
  context: 'OUSD(I&S) markup of S. 2226 Division G §9006(2) — Privacy Act broadening'
  statement_date: '2023-11'
- id: q10
  added_date: '2026-05-02'
  text: '(3) WITHDRAWAL OF RECORDS – Senior Agency Officials designated in accordance with E.O. 13526 or any successor Orders may withdraw records in the collection that are determined to be both not related to unidentified anomalous phenomena and properly classified. The Senior Agency Official must notify the congressional defense and intelligence committees 60 days before each record is withdrawn.'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 14, §9006(3) — newly-inserted Senior Agency Official withdrawal authority'
  significance: '§9006(3) Senior Agency Official withdrawal authority — newly-inserted section with no counterpart in the Schumer-Rounds Senate-passed text. Allows Senior Agency Officials designated under E.O. 13526 or successor Orders to withdraw records from the disclosure framework upon a determination that the record is "both not related to unidentified anomalous phenomena and properly classified". Single largest structural carveout in the markup — combined with §9004(a)(1)(C) "all unclassified" restriction (q6), classified UAP records can exit the framework either by exclusion (Collection scope) or by senior-official withdrawal.'
  context: 'OUSD(I&S) markup of S. 2226 Division G §9006(3) — Senior Agency Official withdrawal insertion'
  statement_date: '2023-11'
- id: q11
  added_date: '2026-05-02'
  text: 'exercise eminent domain appropriately over any and all recovered technologies of unknown origin and biological evidence of non-human intelligence that may be controlled by private persons or entities in the territory of the United States in the interests of the public good.'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 25, §9010(a) — verbatim post-overlap continuation; full source line and track-changes context in significance below'
  significance: '§9010(a) Eminent domain provision — track-changes weakening of the federal authority over private non-human intelligence material. The §9010(a) head reads (verbatim): "EXERCISE OF EMINENT DOMAIN.—The It is the sense of Congress that the Federal Government shall should exercise eminent domain appropriately over any and all recovered..." — "The" struck through, "It is the sense of Congress that the" inserted (changes substantive directive to non-binding sense-of-Congress framing); "shall" struck through, "should" inserted (changes mandatory to advisory). The original Schumer-Rounds text directed federal eminent domain over non-human intelligence material as a binding provision; the OUSD(I&S) markup demotes it to advisory sense-of-Congress language.'
  context: 'OUSD(I&S) markup of S. 2226 Division G §9010(a) — eminent domain weakening'
  statement_date: '2023-11'
- id: q12
  added_date: '2026-05-02'
  text: '(e) TRANSMISSION TO THE NATIONAL ARCHIVES.— Each head of a Government office shall should—'
  source:
    path: government/pentagon-uapda-proposed-revisions-202311.pdf
    location: 'p. 13, §9005(e) TRANSMISSION TO THE NATIONAL ARCHIVES — shall→should weakening on transmission requirement'
  significance: '§9005(e) Transmission requirement — track-changes weakening of the agency-head transmission obligation to the National Archives. "shall" struck through, "should" inserted in the head of the provision applying to "Each head of a Government office". The original Schumer-Rounds text required ("shall") agency heads to transmit unidentified anomalous phenomena records to the Archivist; the OUSD(I&S) markup demotes the obligation to advisory ("should"). Same shall→should weakening pattern as §9010(a) eminent domain (q11) — both lower the imperative on disclosure-pipeline transmission.'
  context: 'OUSD(I&S) markup of S. 2226 Division G §9005(e) — transmission shall→should weakening'
  statement_date: '2023-11'
