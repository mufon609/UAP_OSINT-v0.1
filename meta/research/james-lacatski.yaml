credibility_notes: 'Lacatski is named in the Puthoff vacuum metric engineering report ([`/documents/dird-puthoff-vacuum-metric-engineering-2010`]) as "AAWSA Program Manager" at DIA ([`/organizations/dia`]). Elizondo''s ([`/people/luis-elizondo`]) Question for the Record response ([`/documents/elizondo-qfr-burlison-20241219`]) names him as "the former Director of the Advanced Aerospace Weapon System Application Program (AAWSAP)." Lacatski said in WEAPONIZED Episode 38 that the program was "basically created between myself and Senator Reed at the defense intelligence agency."


  Lacatski has not appeared before Congress under oath in the record here. His public statements are the books with kellerer and knap and the WEAPONIZED interview. The September 6, 2023 DOPSR document covered the open publication of a statement by Lacatski; that statement was not made under oath.


  Lacatski said in WEAPONIZED Episode 38 he is "not going out there ... interviewing with everybody to say what I really feel" and he is "not going to say anything more than what''s been approved." He said "am I a disclosure Advocate the answer is no" and that the difference between him and disclosure Advocate is security.


  Lacatski wrote two books with kellerer ([`/people/colm-kelleher`]) and knap ([`/people/george-knapp`]) — "Skinwalkers at the Pentagon" and "Inside the US Government Covert UFO Program." Lacatski said in the Mystery interview that it took 14 months to get the stamp of approval from the DoD for public release of the book.


  Lacatski as author of the page 1 statement about Lockheed Martin Space Systems Vice President Dr. James Ryder is documented in ([`/findings/lacatski-authorship-chain`]).


  In WEAPONIZED Episode 38 ([`/organizations/weaponized-podcast`]) Corbell read from chapter 9 of the 2023 book ([`/documents/inside-us-gov-covert-ufo-2023`]) about the 2011 Capitol building meeting where Lacatski posed a question that the United States was in possession of a craft of unknown origin and had successfully gained access to its interior. Lacatski said "the wording that you read is correct" and confirmed the meeting happened and it is "true yes." Lacatski said "you see I''m not speaking at all I''m not going beyond what it was what you read from the book."


  Mystery Wire ([`/organizations/klas-tv`]) was the Las Vegas venue for the 2021 book launch interview. Lacatski distinguished the program ([`/organizations/aatip`]) at the Pentagon ([`/organizations/dod`]) from his program at DIA. He named Bob Bigelow''s bass ([`/organizations/baass`]) at Bigelow Aerospace ([`/organizations/bigelow-aerospace`]) as the program contractor. Lacatski''s SD004 page 1 statement named Lockheed Martin ([`/organizations/lockheed-martin`]) Space Systems Vice President Dr. James Ryder ([`/people/james-ryder`]) as the proposer of a UAP material divestment plan to program leadership.'
