background: 'Dr. James T. Lacatski, D.Eng., is named as "AAWSA Program Manager, Defense Intelligence Agency, ATTN: CLAR/DWO-3, Bldg 6000, Washington, DC 20340-5100" — addressed by the page 1 Administrative Note of the Puthoff ([`/people/hal-puthoff`]) vacuum metric engineering report ([`/documents/dird-puthoff-vacuum-metric-engineering-2010`]) as the contact for the FY 2009 Advanced Aerospace Weapon System Applications (AAWSA) Program reports prepared by the Acquisition Support Division (DWO-3), Defense Warning Office, Directorate for Analysis, Defense Intelligence Agency ([`/organizations/dia`]).


  Lacatski said in WEAPONIZED Episode 38 with george knap ([`/people/george-knapp`]) and jeremy corbell ([`/people/jeremy-corbell`]) that the program was "basically created between myself and Senator Reed" ([`/people/harry-reid`]) at DIA — a $22 million program with the capability of going five years, completed in two years. Lacatski said he retired in 2016 and came "from the contractor world in the first half of my career" before DIA. In WEAPONIZED PART 1 ([`/transcripts/weaponized-096-lacatski-part1-2025`]) Lacatski said he was "the creator and DIA program manager of AASAP ... and of the follow-on Kona Blue program ([`/organizations/kona-blue`]), KBP. Both classified programs, regardless of what the internet has said in the past. Both classified." In WEAPONIZED PART 2 ([`/transcripts/weaponized-097-lacatski-part2-2025`]) Lacatski said his only other clearance was "a Q clearance at deal" — and said "I can''t speak to that" when asked whether he was read into a legacy UAP program before AAWSAP.'
top_relevance: 'Lacatski said he directed the $22 million ([`/organizations/aawsap`]) program at DIA ([`/organizations/dia`]) from september 2008; said the program was over after a 90-day no cost extension by december of 2010. The Puthoff vacuum metric engineering report ([`/documents/dird-puthoff-vacuum-metric-engineering-2010`]) names him "AAWSA Program Manager" on page 1. Elizondo''s ([`/people/luis-elizondo`]) Question for the Record response ([`/documents/elizondo-qfr-burlison-20241219`]) names Lacatski as "the former Director of the Advanced Aerospace Weapon System Application Program (AAWSAP)" and names him as author of a DOPSR document (September 6, 2023) about a UAP material divestment plan proposed to AAWSAP leadership by Lockheed Martin ([`/organizations/lockheed-martin`]) Space Systems Vice President Dr. James Ryder ([`/people/james-ryder`]).


  Lacatski also said in WEAPONIZED PART 1 ([`/transcripts/weaponized-096-lacatski-part1-2025`]) he was "the creator and DIA program manager" of "the follow-on Kona Blue program ([`/organizations/kona-blue`]), KBP. Both classified programs." In WEAPONIZED PART 2 ([`/transcripts/weaponized-097-lacatski-part2-2025`]) Lacatski said Kona Blue was "a compartment reputed to be for recovered technology" and also a program; said "you can''t kill Kona Blue" and that Kona Blue "is much more than going and getting what some have described as 60 year old parts" — he knows "what the exchange parameters were and what was promised on all sides."


  Lacatski wrote four books with colum kellerer ([`/people/colm-kelleher`]) and george knap ([`/people/george-knapp`]) — "Skinwalkers at the Pentagon," "Inside the US Government Covert UFO Program: Initial Revelations," the new "New Insights," and the approved future book "Future Visions." He gave the Mystery interview with Knap and kellerer ([`/transcripts/mysterywire-lacatski-kelleher-knapp-2021`]), the WEAPONIZED Episode 38 interview ([`/transcripts/weaponized-038-lacatski-kelleher-2023`]), and the WEAPONIZED series PART 1 and PART 2. In WEAPONIZED EP 38 corbell read from chapter 9 of the 2023 book about a 2011 meeting in the Capitol building with a US senator and an agency under secretary, at which Lacatski (the only one of the books authors present) posed a question that the United States was in possession of a craft of unknown origin and had successfully gained access to its interior. Lacatski said "the wording that you read is correct" and "yes you I was allowed to tell you," but said he was "not going beyond what it was what you read from the book."


  '
