description: 'In November 2004, Commander [`/people/david-fravor`] — Commanding Officer of Strike Fighter Squadron Forty-One, the "Black Aces" ([`/organizations/vfa-41`]) — was scheduled to lead a 2 V 2 Air to Air training exercise from [`/organizations/uss-nimitz`] (CVN-68). His flight of 2 F/A-18Fs was the Blue Air, controlled by [`/organizations/uss-princeton`] (CG-59). The Red Air was flown by Marine squadron VMFA-232 ([`/organizations/vmfa-232`]). [`/organizations/vfa-41`] was at the beginning of a workup cycle that would prepare the squadron for a combat deployment to the Persian Gulf for operations supporting the ground forces in Iraq; the squadron was attached to Carrier Airwing Eleven ([`/organizations/carrier-airwing-eleven`]) and stationed onboard [`/organizations/uss-nimitz`].


  On launch, the air controller on the Princeton told the flight training was going to be suspended for real world tasking. The flight proceeded towards a contact to the west of their CAP point, roughly 40 miles South of the ship. The air controller on the ship had been observing these objects on their Aegis combat system for the previous 2 weeks — descending from above 80,000ft down to 20,000ft, would stay for hours, then going straight back up. At 20,000 ft the controller called Merge Plot. The weather on the day of the incident was clear skies, light winds, calm seas. All 4 looked down and saw a small white Tic Tac shaped object with the longitudinal axis pointing N/S and moving very abruptly over white water. There were no Rotors, no Rotor wash, and no visible flight control surfaces like wings. Fravor and his WSO decided to go down to get closer while the other aircraft stayed in High cover. The object suddenly shifted its longitudinal axis, aligned it with Fravor''s aircraft, and began to climb in a clockwise climbing turn. As Fravor pulled nose onto the object at approximately ½ of a mile, it rapidly accelerated and disappeared right in front of the aircraft. Fravor''s wingman [`/people/alex-dietrich`], roughly 8,000ft above, also lost visual; the white water was also gone.


  As the flight turned back towards the CAP point, the air controller let them know the object had reappeared on the Princeton''s Aegis SPY 1 radar — the Tic Tac Object had traveled 60 miles in a very short period of time (less than a minute). Fravor returned to Nimitz and mentioned what the flight had witnessed to one of his crews who were getting ready to launch. It was that crew that took the now famous approximately 90 second video that was released by the USG in 2017 ([`/media/flir1-video`]). Fravor''s Statement for the House Oversight Committee ([`/documents/written-testimony-fravor-2023`]) states that the incident was never investigated, none of his crew were ever questioned, and tapes were never taken. Not until 2009 did [`/people/jay-stratton`] contact Fravor to investigate what was observed; Stratton was part of the ATIP (Anomalous Threat Identification Program) program led by Lue Elizondo ([`/people/luis-elizondo`]) out of the [`/organizations/dod`].

  '
