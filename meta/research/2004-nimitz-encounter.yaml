naming_quirks:
- id: nq1
  added_date: '2026-04-19'
  observed: Lue
  canonical: Luis
  location: lines 68, 78
  source_path: government/oversight-house-gov-fravor-written-testimony-20230726.pdf
  resolution: preserve-as-sic-in-quotes
  note: 'Source renders Luis Elizondo''s first name as "Lue" — TWO instances in sworn congressional testimony (lines 68 and 78), not one. The 2-instance pattern is evidentiary: "Lue" is Fravor''s alias-of-record for Elizondo in this submission, not a typo. When the Elizondo person node is built, this should surface as a `document_intrinsic.aliases: ["Lue"]` entry on that node, attributed to the Fravor-testimony source.


    Resolution handling on this artifact: source form preserved in prose ("Lue Elizondo" in the description and in the relevant timeline cell) rather than substituted with canonical "Luis". Wrap paths to `[`/people/luis-elizondo`]` use the canonical slug so cross-references still resolve; display text in prose uses source form. The schema resolution enum (`preserve-as-sic-in-quotes`) nominally assumes quote-block contexts — on this encounter-event artifact there are no quote blocks, so the spirit of the rule is extended: preserve source form wherever it is the evidentiary referent of record.


    Fravor''s person artifact (i1) does not track this quirk for the same source — an inconsistency to resolve when that artifact is next audited.

    '
