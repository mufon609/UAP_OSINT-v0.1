  statement_date: '2017-06-10'
  text: |
    [00:00] Right, so, we're very pleased to have with us somebody to talk about fairies, devas, and unidentified aerial phenomena. We had to go for either a Druid from Glastonbury or a Lockheed guy. And we've gone for the latter.
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[00:00]–[00:21]'
  significance: 'Lucis Trust moderator opens the talk by stating its topic verbatim — "fairies, devas, and unidentified aerial phenomena" — and pointedly contrasting the speaker''s available framings ("a Druid from Glastonbury or a Lockheed guy"). Establishes Ryder''s Lockheed Martin Space Systems VP institutional identity as the talk''s framing from second 15; the talk is a venue where a Lockheed-credentialled physicist speaks publicly on UAP through theosophical lenses.'
  context: Opening of the Lucis Trust Arcane School Conference London 2017 session; the moderator (Lawrence) introduces the speaker and the talk topic.
- id: q2
  speaker_id: s1
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [03:26] So, to start off with, we want to go into the fact that as the veils are now starting to be rendered or dissipated, I think you prefer that term, don't you, the dissipation of the etheric veils, and astral phenomena and etheric phenomena is becoming more and more prevalent, and of course, with the aid of current technology, we're starting to capture some of this.
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[03:26]–[03:47]'
  significance: 'The moderator establishes the talk''s theosophical framework — "the dissipation of the etheric veils, and astral phenomena and etheric phenomena is becoming more and more prevalent" — explicitly Alice Bailey / Ageless Wisdom terminology. Ryder is named as preferring "dissipation" over "rending" as the descriptor of what is happening to the veils between physical and subtle planes.'
  context: Moderator (Lawrence) framing the talk''s theosophical premise before handing off to Ryder.
- id: q3
  speaker_id: s2
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [05:47] And what I mean by that, from apparitions to what people call fairies, to angels, the little people, the violin, and so forth, and now, of course, we have the traditional term almost of UFOs. I use UAPs because a UFO is an unexplained flying object. But a UAP is unexplained aerial phenomena. And they're definitely aerial in that we see them above the ground. And they're phenomena because, hm, what's that? But I don't like UFOs so much. Because it assumes that they're manned by some creatures from a different planet or star. So I feel like we've already made the question before we actually ask the question.
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[05:47]–[06:36]'
  significance: 'Ryder distinguishes UFO from UAP terminology and explains his preference for UAP — "I feel like we''ve already made the question before we actually ask the question." Notable for Ryder using "UAP" terminology in June 2017 — predating mainstream public adoption of the Pentagon-coined term (the 2021 ODNI preliminary assessment and 2022 HPSCI hearing were the public-adoption events). Bridges the phenomena named in the talk title — fairies, angels, the little people — with modern UAP discourse.'
  context: Ryder responding to the moderator's question about whether there is a rise in unexplained phenomena.
- id: q4
  speaker_id: s2
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [06:50] But Vail, if you look it up in a good dictionary, is a deceptive appearance. Or a masking layer. If you think about much that's been talked about the last two days, you can most certainly think of that. It's related to the word cloak. A cloak is an encompassing veil to exclude interruption or interference between levels of energy. And rending means to disintegrate that veil of separation. And a question, of course, in history, and especially now, as we search the sciences and what they're learning, are we in fact seeing the disintegration of that? And is that veil between what we call devas and fairies and mankind separating to be more clear?
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[06:50]–[07:42]'
  significance: 'Ryder explicates the talk title — "rending means to disintegrate that veil of separation" — and frames the central question as whether the veil between "devas and fairies and mankind" is dissipating in the contemporary period. The veil-between-planes framework is core Alice Bailey terminology operationalised on UAP discourse. "Vail" is Ryder''s own spelling pronunciation captured by whisper.'
  context: Ryder explaining the rending-of-the-veils thesis after the moderator's framing.
- id: q5
  speaker_id: s2
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [11:01] In the lower, the top there, there are lots of beings. I don't know what to call them. I can't call them humans. There's lots of beings, things, look like alive. They have eyes and noses. They sure look like some of the space people you see in UFOs sometimes. You'll see more of those. And below that, there are all these drawings, and if you're a UFO enthusiast of that type, there's your first UFO 42,000 years ago. Lights and all.
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[11:01]–[11:29]'
  significance: 'Ryder''s prehistoric-cave-art-as-UAP-record claim — Chauvet and Dordogne cave paintings depict "beings ... they sure look like some of the space people you see in UFOs sometimes" and "your first UFO 42,000 years ago. Lights and all." Establishes the temporal-continuity argument: same entities and phenomena recorded for ~40,000 years across cultures.'
  context: Ryder narrating his cave-art slide presentation showing Chauvet, Dordogne, and Feshman cave drawings 30,000-40,000 years old.
- id: q6
  speaker_id: s2
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [35:55] So when we actually look at fractal patterns, which are very common in nature, then you would expect the same electrical occurrences to follow the same kind of geometry in nature as, for instance, the snowflake, which is beautifully geometrical. And remembering that earlier, as we discussed that electricity is alive, that still makes it a very exciting prospect because we see the crop circles, possibly being created by divas of some kind, in some instances maybe trying to make some kind of communication with humanity. But on the whole, because they have an inherent geometrical pattern, they are building divas and carry within them the geometrical pattern for the part of the plan that they're working with under various guiding forces. As they pass through the Earth and have effects on the physical plane, they are electrical in nature, so they are going to cause burning patterns, perhaps.
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[35:55]–[36:40]'
  significance: 'The moderator''s explicit devic-causation framing of crop circles — "the crop circles, possibly being created by divas of some kind, in some instances maybe trying to make some kind of communication with humanity" and "building divas ... carry within them the geometrical pattern for the part of the plan." A core Alice Bailey-tradition reading of crop circles as nature-spirit communication overlaid on electromagnetic physics. The moderator''s ontology, framed for Ryder to evaluate.'
  context: Moderator (Lawrence) framing crop circles as devic activity and asking Ryder to evaluate; the conversation has moved through earthquake lights and electromagnetic vortices.
