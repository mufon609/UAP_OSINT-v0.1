  context: Moderator framing Ryder's prior orb-observation attestation in Alice Bailey terms.
- id: q8
  speaker_id: s2
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [50:00] Interestingly enough, people who have been moved out of their rooms and flown out the window, women who've gone through that, have actually been investigated in sealed rooms where they go to bed and sleep and the room is locked from the outside. There are no windows in it. There are no doors in it. And they have cameras on them all the time. And those people do experience what I just described while in the room and the cameras and all of the sound pickups show nothing happened in the room except she snored or he snored that night. So whatever's happening is not happening physically. And it's also been shown that those same descriptions go back 25 to 30,000 years, certainly back to Roman times.
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[50:00]–[50:44]'
  significance: 'Ryder''s most direct non-physical-phenomenon claim — abductions occur under continuous camera surveillance in locked rooms with no detected physical movement. "Whatever''s happening is not happening physically." Couples the contemporary observation with the temporal-continuity claim — "those same descriptions go back 25 to 30,000 years, certainly back to Roman times."'
  context: Ryder presenting the alien-abduction phenomenon as evidence that UAP-class events are not physical in conventional sense.
- id: q9
  speaker_id: s2
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [50:46] In fact, if I could summarize on UFOs a few comments that one of the great explorers in this field is Jacques Vallee, who is actually an American. He's actually an astrophysicist and he studied this for a long time. And some of the senior leaders in this field are actually astrophysicists. So they do know a lot about stars and planets. And as he summarized, the UFOs are not objects nor flying. It's an unidentified flying object. But they're not an object and it's not flying because an object is something that I can hit. You know, the light beam is not an object. But you can't do that. And they're not flying because you never actually see them flying. They appear. So you go, you have a... That's why I use UAPs. It's an aerial, it's a phenomena, and it's unexplained. But it isn't flying and it's not an object.
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[50:46]–[51:36]'
  significance: 'Ryder''s explicit Vallée Magonia framing — names Jacques Vallée as "one of the great explorers in this field" and summarises his thesis on record: "the UFOs are not objects nor flying ... they appear." Establishes Ryder''s ontological commitment that the UAP phenomenon is not a fly-through-the-air physical-object class. The off-record-feeling "senior leaders in this field are actually astrophysicists. So they do know a lot about stars and planets" sentence is notable for naming senior UAP researchers in a way Ryder appears familiar with from inside the field.'
  context: Ryder summarising the UFO phenomenon by citing Jacques Vallée.
- id: q10
  speaker_id: s2
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [53:28] Another example is Russian and American jets scrambling to the air, chasing objects on what was perhaps classified information, which is now released. It was classified. I wouldn't say it was or wasn't. But the very aerial dynamics that they displayed was not really possible within our... It is not. What he's referring to, there is an incident some years ago where the US fighters and the Russian fighters chased after the same object from different directions. And when they got close by, it wasn't there except the other plane showed up, which was not a good day. Unfortunately, nobody was hurt. There have been many, many chases of these objects, which when you get close, they're just not there.
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[53:28]–[54:14]'
  significance: 'Ryder''s on-record sidestep of an incident the moderator describes as "classified information, which is now released" — "I wouldn''t say it was or wasn''t." Followed by Ryder''s own apparent-firsthand framing of the UAP behavioural signature: "there have been many, many chases of these objects, which when you get close, they''re just not there." The classification non-denial is notable structurally — the moderator''s framing is "now released"; Ryder declines to confirm or deny the classification of the incident.'
  context: Ryder discussing a Russian-American jet encounter with a UAP that disappeared on approach.
- id: q11
  speaker_id: s2
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [54:21] Well, anyway, they've started to discover these sprites and dwarves and flashes of light above thunderstorms from fighter pilots. Do you think that's a recent phenomena that's happening because of the widening of the rents or do you think it's always happened? I mean, it's clearly DIVA activity. Or EM, if you're a hard-nosed physicist. Well, same difference, yeah.
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[54:21]–[54:46]'
  significance: 'Moderator and Ryder agreeing that upper-atmosphere sprites and dwarves discovered by fighter pilots are "clearly DIVA activity. Or EM, if you''re a hard-nosed physicist. Well, same difference, yeah." Frames the equivalence of theosophical and electromagnetic readings of the same phenomena — the talk''s core ontological move. Ryder affirms "same difference" rather than choosing one frame over the other.'
  context: Moderator and Ryder discussing the recently-discovered upper-atmosphere sprites / dwarves; Ryder confirms the discovery context.
- id: q12
  speaker_id: s2
  added_date: '2026-05-17'
  statement_date: '2017-06-10'
  text: |
    [60:00] The top one is a drawing by a person who specializes in drawing pictures of devas and fairies. And he studied the history of it and realized they're always drawn with narrow eyes, slightly angled, and a narrow chin. And that goes back 30,000, 40,000 years in the Roman times and so forth. And this is a drawing by a person who went through Dr. Hancock, a drug-induced dream with the South American peoples, to see devas. And to his shock, this is what he saw. And he says, excuse my penmanship, I'm not an artist. But he drew the same thing. And this one is from another artist who has spent their life studying the devas. And this is what they see, that same kind of shape. So it's certainly bringing up the question, what are we really dealing with when we see these kinds of things?
  source:
    path: transcripts/lucistrust-rending-veils-ryder-2017-vimeo-whisper-transcript.txt
    location: '[60:00]–[60:57]'
  significance: 'The closing synthesis — Ryder bridges ancient deva and fairy iconography (narrow eyes, slightly angled, narrow chin; 30,000-40,000 years old + Roman times) with modern Graham Hancock-style ayahuasca-induced visions in South America and contemporary "grey alien" archetypes. The Vallée Magonia thesis applied to the canonical grey-alien iconography. Closing question — "what are we really dealing with when we see these kinds of things?" — is the talk''s thesis question.'
  context: Closing slide of Ryder's talk before the meditation break — three drawings (an artist of devas/fairies, a Hancock-ayahuasca participant, a lifelong deva researcher) compared.
