hypotheses:

- id: h1
  added_date: '2026-05-13'
  statement: 'Lockheed Martin custodied UAP material as of ~2011 and attempted divestment to Bigelow Aerospace under an AAWSAP Technology Transfer Agreement, blocked by the CIA Directorate of Science & Technology and ultimately by the Deputy Director of National Intelligence and the Deputy Secretary of Defense.'

- id: h2
  added_date: '2026-05-13'
  statement: 'Lockheed Martin currently houses UAP material (post-2011, through the time of writing).'

- id: h3
  added_date: '2026-05-13'
  statement: 'The Patuxent River SAP-F hangar (FY2011 appropriation, approximately $10 million, requested by then-Representative Steny Hoyer) was purpose-built to receive the proposed Lockheed-Bigelow material transfer.'

- id: h0
  added_date: '2026-05-13'
  statement: 'The Lockheed Martin / Bigelow Aerospace transfer allegation chain is fabricated, mistaken, or a coordinated information operation across independent witnesses.'

cited_findings:

- id: cf1
  added_date: '2026-05-13'
  finding_path: /findings/pax-river-scif-fiscal-triangulation
  pattern_statement: 'Three independent primary sources converge on the fiscal data for a Sensitive Compartmented Information Facility / Special Access Program Facility at Naval Air Station Patuxent River (Fiscal Year 2011 Military Construction appropriation, approximately $10 million, requested by then-Representative Steny Hoyer).'
  relevance: 'The fiscal-data triangulation across Hoyer 2010, Elizondo 2024, and Liberation Times 2026 grounds H3 directly. Hoyer''s 2010 appropriation predates UAP framing by fourteen years; the convergence rules out coordinated late-framing. The contradictions preserved in F2 (Hoyer''s "addition" vs Elizondo''s "newly built hangar"; the 2026-03-12 Liberation Times distinguishing update) define the unresolved residue.'

- id: cf2
  added_date: '2026-05-13'
  finding_path: /findings/lacatski-authorship-chain
  pattern_statement: 'Three-source attestation chain (SD004 anonymous page-1 statement + Elizondo QFR Q1 naming Lacatski as the author + entry into House Oversight hearing record) establishing James Lacatski as the author of the DOPSR-cleared (2023-09-06) statement that named Ryder.'
  relevance: 'Establishes the chain-of-custody for the original allegation document — who authored, when it cleared DOPSR, and how it entered the public record. Grounds H1 (the allegation is on the record at primary-source level) and H0 (the chain spans named officials with direct access, not anonymous claims).'

- id: cf3
  added_date: '2026-05-13'
  finding_path: /findings/lockheed-martin-non-denial-pattern
  pattern_statement: 'Three independent Liberation Times moments (2023-11, 2024-11-08, 2025-03-27) documenting Lockheed Martin''s consistent refusal to issue categorical denials when asked about possession of UAP / non-human material.'
  relevance: 'Bears directly on H2 (current possession). Pattern over sixteen months of refusal to deny when given multiple opportunities to do so. Suggestive but not affirmative — refusing to deny is consistent with either continued custody or corporate-policy non-engagement with UAP allegations.'

- id: cf4
  added_date: '2026-05-13'
  finding_path: /findings/aaro-denial-action-mismatch
  pattern_statement: 'AARO HRR Vol I institutional denial frame is structurally asymmetric with the Lockheed-Bigelow allegation chain — current-executive on-record statements about "ever recovered, possessed, or engaged in reverse-engineering" vs an alleged 2011 disapproved-transfer-proposal.'
  relevance: 'Bears on H1 and H2. AARO''s finding is the most-cited institutional counter to the allegation chain, but addresses a different action than the allegation describes (ever-possessed vs disapproved-transfer-proposal) and rests on current-executive denials that do not reach the alleged 2011 timeframe.'

hypothesis_evaluation:

- hypothesis_id: h1
  status: 'Substantiated as allegation on record; not established as physical fact.'
  text: 'The primary-source record converges across independent sources naming Lockheed Martin as a 2011 custodian with an attempted divestment to Bigelow Aerospace via the AAWSAP-PSAP route, blocked by the CIA Directorate of Science & Technology under Glenn Gaffney and ultimately by Deputy DNI Robert Cardillo and Deputy SecDef William Lynn III. The chain spans multiple evidentiary tiers: Lacatski''s SD004 page-1 statement (DOPSR-cleared 2023-09-06), Elizondo''s QFR Q7 response to Burlison (signed congressional record, 2024-12-19), Grusch''s on-camera attestation that he provided Lockheed Martin specifically to the ICIG (Joe Rogan Experience 2023-11-21), Knapp''s sworn 2025-09-09 House Oversight testimony naming Ryder at Lockheed, and Christopher Sharp''s Liberation Times reporting across 2023-2026. Independence across witness types — DIA program leadership (Lacatski), DoD/AAWSAP (Elizondo), NGA/UAPTF (Grusch), investigative journalism (Knapp, Sharp) — distinguishes the convergence from a coordinated information operation. F2 (Pax River fiscal-data triangulation) provides structural corroboration: Hoyer''s 2010 appropriation predates the UAP framing by fourteen years and was a routine Military Construction announcement at the time. The record does not establish that the proposed transfer actually involved physical material; it establishes that the allegation is on record at multiple primary-source tiers.'
  sources:
  - finding_path: /findings/lacatski-authorship-chain
    description: 'Three-source attestation chain (SD004 + Elizondo QFR Q1 + House Oversight record) establishing Lacatski as the DOPSR-cleared statement author.'
  - finding_path: /findings/pax-river-scif-fiscal-triangulation
    description: 'Fiscal-data triangulation grounding the Pax River SAP-F hangar narrative across 2010, 2024, and 2026 primary sources.'
  - entity_path: /people/james-ryder
    anchor: 'Credibility Notes'
    description: 'James Ryder''s person node documents the SD004 page-1 Q&A naming Ryder, Elizondo''s QFR attestation, Knapp''s 2025-09-09 sworn testimony, and Sharp''s Liberation Times reporting on Lockheed Martin''s refusal to deny.'
  - entity_path: /people/david-grusch
    anchor: q36
    description: 'Grusch on the Joe Rogan Experience: "lockie Martin wanted to divest itself from this material at a specific facility that''s known to me that I provided to the Inspector General" — sworn-testimony-adjacent attestation naming Lockheed Martin to the ICIG.'

- hypothesis_id: h2
  status: 'Not established by primary sources; non-denial pattern is suggestive but not affirmative.'
  text: 'No primary source attests Lockheed Martin currently holds UAP material in the post-2011 timeframe. The strongest indirect signal is the documented pattern of Lockheed Martin refusing to issue categorical denials across multiple journalistic venues — Sharp reports the company "refused on multiple occasions to comment" (2024-11-08) and that a Lockheed Martin spokesperson responded to a direct November 2023 query about possessing materials of unknown or non-human origin with "Questions about UAPs are best addressed by the U.S. government" rather than a denial. The pattern is consistent with either continued custody or corporate-policy non-engagement with UAP allegations; primary sources do not distinguish between these readings. AARO''s Historical Record Report Volume I institutional finding addresses a different action — "ever recovered, possessed, or engaged in reverse-engineering" — than the allegation describes (a 2011 disapproved-transfer-proposal), and rests on current-executive on-record statements that do not reach the alleged 2011-or-earlier custody chain. The denial publication (2024-03-08) also predates Sharp''s subsequent documentation of Lockheed Martin''s own non-denial responses to the same allegation cluster.'
  sources:
  - finding_path: /findings/lockheed-martin-non-denial-pattern
    description: 'Three independent Liberation Times moments documenting Lockheed Martin''s consistent refusal to issue categorical denials when asked about UAP / non-human material possession.'
  - finding_path: /findings/aaro-denial-action-mismatch
    description: 'AARO HRR Vol I current-executive denials frame a different action than the 2011 disapproved-transfer allegation.'
  - entity_path: /organizations/aaro
    anchor: 'Key Passages'
    description: 'AARO HRR Vol I institutional finding: "AARO found no empirical evidence for claims that the USG and private companies have been reverse-engineering extraterrestrial technology" — the most-cited institutional counter, scoped to current-executive on-record statements.'

- hypothesis_id: h3
  status: 'Fiscal-data convergence established; intended use of the SAP-F hangar contested.'
  text: 'F2 (Pax River SCIF / SAP-F Fiscal-Data Triangulation) establishes three-source convergence on the Patuxent River SAP-F hangar''s fiscal data: Hoyer''s 2010-07-28 announcement of a $10,160,000 Atlantic Test Range Addition including Sensitive Compartmented Information Facility areas; Elizondo''s 2024-12-19 QFR Q7 naming the same Pax River hangar as a SAP-F with approximately $10 million in funding allocated at Hoyer''s request; and Liberation Times'' 2026-03-06 reporting of Burlison''s White House-approved site visit verifying the hangar exists. What the convergence does not resolve is whether the structure was built to accommodate the alleged Lockheed-Bigelow transfer (Elizondo''s framing) or for the routine SCIF / UAV ISR operations Hoyer''s 2010 press release describes. The 2026-03-12 Liberation Times update (per F2''s c2 contradiction) reports three subsequent sources telling the outlet the hangar Burlison visited was not the structure allegedly built for the transfer — preserving the broader allegation that UAP-related materials may be stored within different facilities at Pax River. Burlison''s own subsequent statement on The Resilient Show — "I had information that there was no material there, but there is enough evidence of infrastructure on the property to indicate that there was" — frames the visit as evidence of infrastructure-for-purpose, not of contents.'
  sources:
  - finding_path: /findings/pax-river-scif-fiscal-triangulation
    description: 'Three-source fiscal-data convergence on the Pax River SAP-F hangar (Hoyer 2010 + Elizondo 2024 + Liberation Times 2026) with two preserved contradictions (Hoyer "addition" vs Elizondo "newly built"; 2026-03-06 framing vs 2026-03-12 distinguishing update).'

- hypothesis_id: h0
  status: 'Not established; convergence across independent witness types makes coordinated fabrication low-probability but not ruled out.'
  text: 'No primary source establishes fabrication. The Lacatski / Elizondo / Grusch / Knapp / Sharp convergence spans independent witness types (DIA program leadership, DoD/AAWSAP, NGA/UAPTF, investigative journalism), distinct time periods (2011-event-attestation in 2023 SD004 through 2025-09-09 sworn testimony), and venues (DOPSR-cleared statement, signed QFR, Joe Rogan Experience podcast, House Oversight hearing, Liberation Times reporting). Coordinated information operation across these witness types and venues is structurally low-probability — each witness has independent professional standing and independent channels to attest. The structural Pax River fiscal-data triangulation (F2) further weights against fabrication: Hoyer''s 2010 appropriation is independent of any UAP framing and predates the allegation chain by twelve years. The record does not, however, foreclose H0 — convergence across independent witnesses does not constitute primary-source evidence of the underlying physical-fact claim, only of the claim''s presence in the public record at multiple tiers.'
  sources:
  - finding_path: /findings/lacatski-authorship-chain
    description: 'Independence of the attestation chain (named officials with direct program access, not anonymous claims) weights against coordinated fabrication.'
  - entity_path: /people/james-ryder
    anchor: 'Credibility Notes'
    description: 'James Ryder''s person node documents the convergence across independent witness types — DOPSR-cleared statement (Lacatski), signed QFR (Elizondo), sworn testimony (Knapp), on-camera attestation (Grusch), and contemporaneous journalism (Sharp).'

open_questions:

- id: oq1
  added_date: '2026-05-13'
  question: 'Does Lacatski''s SD004 page-1 statement constitute primary-source evidence that the proposed Lockheed-Bigelow transfer event actually occurred, or only that the claim was made by Lacatski to DOPSR review?'
  what_would_resolve: 'Direct primary-source documentation of the disapproved-transfer meeting itself — CIA DS&T memo recording the disapproval, AAWSAP program minutes referencing the proposal, contemporaneous Lockheed Martin internal correspondence, or sworn first-hand testimony from a participant in the meeting (Glenn Gaffney, James Ryder, or the unnamed AAWSAP leadership attendees).'

- id: oq2
  added_date: '2026-05-13'
  question: 'Why does Lockheed Martin decline to issue a categorical denial across multiple venues and sixteen months of journalistic inquiry, given that competitive corporate-communications practice typically issues unequivocal denials of false material allegations?'
  what_would_resolve: 'A categorical denial under oath or via formal SEC filing; sworn deposition testimony from current Lockheed Martin executives; primary-source documentation of Lockheed Martin''s internal corporate-communications policy on UAP allegations explaining the non-denial posture.'

- id: oq3
  added_date: '2026-05-13'
  question: 'Is the hangar Rep. Eric Burlison visited in February 2026 the same structure Elizondo''s QFR Q7 describes as having been purpose-built for the alleged transfer? (Per the 2026-03-12 Liberation Times update reporting three subsequent sources who distinguish the two.)'
  what_would_resolve: 'Primary-source documentation of DoD construction records identifying which specific structure within Pax River corresponds to the FY2011 appropriation; Burlison-Elizondo joint statement clarifying which structure each describes; or Naval Air Systems Command (NAVAIR) facility-identification records.'

- id: oq4
  added_date: '2026-05-13'
  question: 'What is the full text of Christopher Mellon''s ([`/people/christopher-mellon`]) redacted Signal-message reply to Kirkpatrick in the June 11-13, 2023 exchange released under FOIA 24-F-0266 — visible portions documented Mellon framing Grusch''s allegations as "warrant[ing] investigation" but the reply remains partially redacted?'
  what_would_resolve: 'BlackVault FOIA appeal resolution on FOIA case 24-F-0266 releasing the redacted portion of Mellon''s reply; or direct Mellon attestation to the full text of his reply. The pending FOIA appeal is documented in meta/topic/research-queue.md "Externally blocked".'

best_current_answer:
  text: 'The primary-source record establishes an allegation chain at multiple evidentiary tiers (DOPSR-cleared SD004 page-1 statement; signed Elizondo QFR Q7 response; on-camera Grusch attestation of an ICIG filing naming Lockheed Martin; sworn Knapp 2025-09-09 House Oversight testimony naming Ryder at Lockheed; sixteen months of Christopher Sharp Liberation Times reporting). The chain names Lockheed Martin as a 2011 custodian with an attempted divestment to Bigelow Aerospace under an AAWSAP-PSAP Technology Transfer Agreement, blocked by the CIA Directorate of Science & Technology under Glenn Gaffney and ultimately by Deputy DNI Robert Cardillo and Deputy SecDef William Lynn III. The Patuxent River fiscal-data triangulation (F2) provides structural corroboration: Hoyer''s 2010 appropriation pre-dates UAP framing by fourteen years, and the convergence across Hoyer / Elizondo / Liberation Times rules out coordinated late-framing. The record does NOT establish whether the underlying material physically exists, whether Lockheed Martin currently holds such material, or whether the structure Burlison visited in February 2026 matches the structure Elizondo''s QFR describes. AARO''s institutional denial (HRR Vol I) addresses a different action than the allegation chain (ever-recovered vs disapproved-transfer-proposal) and rests on current-executive on-record statements that do not reach the alleged 2011-or-earlier custody chain. Lockheed Martin''s consistent refusal to issue categorical denials across multiple venues is documented but not legally probative. The investigation remains open; primary-source path-to-closure runs through direct documentation of the alleged 2011 disapproved-transfer meeting, formal Lockheed Martin sworn denial or admission, and resolution of the Pax River structure-identification question.'
  sources:
  - finding_path: /findings/pax-river-scif-fiscal-triangulation
    description: 'Fiscal-data triangulation across three independent primary sources grounding the Pax River SAP-F hangar narrative.'
  - finding_path: /findings/lacatski-authorship-chain
    description: 'Three-source attestation chain establishing the allegation''s entry to the public record.'
  - finding_path: /findings/lockheed-martin-non-denial-pattern
    description: 'Documented sixteen-month pattern of Lockheed Martin refusal to issue categorical denials.'
  - finding_path: /findings/aaro-denial-action-mismatch
    description: 'AARO''s institutional denial addresses a different action than the allegation chain describes.'
  - entity_path: /people/james-ryder
    anchor: 'Credibility Notes'
    description: 'The Ryder person node assembles the full allegation chain from named primary sources.'

counter_evidence:

- id: ce1
  added_date: '2026-05-13'
  against_hypothesis_id: h1
  text: 'AARO''s ([`/organizations/aaro`]) Historical Record Report Volume I (2024-03-08) carries an institutional finding directly contesting the allegation cluster on Executive Summary p. 8: "executives, scientists, and chief technology officers of the companies named by interviewees met with the Director of AARO and denied on the record that they have ever recovered, possessed, or engaged in reverse-engineering of extraterrestrial technology." The named, former CIA official also "signed a memo rejecting a claim made by interviewees that he managed the movement of and experimentation on off-world technology". Per F4 (broken-link), the denial frames a different action than the allegation chain describes (ever-recovered/possessed vs the alleged 2011 disapproved-transfer-proposal) and rests on current-executive on-record statements that do not reach the alleged 2011-or-earlier timeframe. The denial is on the record nonetheless and is counted here for evidentiary symmetry.'
  sources:
  - finding_path: /findings/aaro-denial-action-mismatch
    description: 'AARO HRR Vol I current-executive denials — counter-evidence whose action-scope does not reach the alleged 2011 disapproved-transfer timeframe per F4.'
  - entity_path: /organizations/aaro
    anchor: 'Key Passages'
    description: 'AARO HRR Vol I Executive Summary p. 8 denials: current-executive statements about ever-recovered/possessed/reverse-engineered extraterrestrial technology.'

