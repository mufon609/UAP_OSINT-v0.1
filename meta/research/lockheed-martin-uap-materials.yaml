status: active
created: '2026-05-13'

description: 'This investigation evaluates whether Lockheed Martin ([`/organizations/lockheed-martin`]) owns or houses UAP material against the primary-source record. The question is on the public record through a multi-source allegation chain naming Lockheed Martin Space Systems Vice President Dr. James Ryder ([`/people/james-ryder`]) as having proposed a 2011 divestment of recovered material to Bigelow Aerospace ([`/organizations/bigelow-aerospace`]) under an AAWSAP-PSAP ([`/organizations/aawsap`]) Technology Transfer Agreement. The chain spans James Lacatski''s ([`/people/james-lacatski`]) SD004 page-1 statement (DOPSR-cleared), Luis Elizondo''s ([`/people/luis-elizondo`]) QFR Q7 response (signed congressional record), David Grusch''s ([`/people/david-grusch`]) on-camera attestation that he provided Lockheed Martin to the ICIG (Joe Rogan Experience), George Knapp''s ([`/people/george-knapp`]) sworn 2025-09-09 House Oversight testimony naming Ryder at Lockheed, and Christopher Sharp''s ([`/people/christopher-sharp`]) Liberation Times reporting across 2023-2026. The alleged transfer was blocked by Glenn Gaffney ([`/people/glenn-gaffney`]) at the CIA Directorate of Science & Technology and ultimately by Deputy DNI Robert Cardillo ([`/people/robert-cardillo`]) and Deputy SecDef William Lynn III ([`/people/william-lynn-iii`]) per Sharp''s reporting. AARO''s ([`/organizations/aaro`]) Historical Record Report Volume I institutional finding states "AARO found no empirical evidence for claims that the USG and private companies have been reverse-engineering extraterrestrial technology" — a current-executive on-record denial that does not reach the alleged 2011 timeframe. Lockheed Martin has documented a consistent refusal to issue categorical denials across multiple journalistic venues over sixteen months. F2 ([`/findings/pax-river-scif-fiscal-triangulation`]) grounds the alleged transfer-receiving Patuxent River SAP-F hangar through three-source fiscal-data convergence (Steny Hoyer''s ([`/people/steny-hoyer`]) 2010 Fiscal Year 2011 Military Construction appropriation; Elizondo''s 2024 QFR Q7; Liberation Times reporting on Rep. Eric Burlison''s ([`/people/eric-burlison`]) February 2026 White House-approved site visit). The investigation consumes the F.7 findings layer to evaluate four competing hypotheses against the structural state of the primary-source record.

  '

