quotes:

- id: q1
  added_date: '2026-05-16'
  observation_type: relayed
  text: 'Uri Geller is one of the world’s most investigated and celebrated mystifiers. Famous around the globe for his mind-bending abilities, he has led a unique life shrouded in debate, controversy and mystery. He is also related to Sigmund Freud.'
  source:
    path: news/urigeller-com-biography-20260516.html
    location: "¶1"
  significance: Headline self-attestation on Geller's own biography page — the canonical one-line self-characterization
  context: Lead paragraph of Uri Geller's biography page on urigeller.com (his own publishing presence)

- id: q2
  added_date: '2026-05-16'
  observation_type: relayed
  statement_date: '1946-12-20'
  text: 'Uri Geller was born in Israel on December 20, 1946. His parents were of Hungarian and Austrian descent, and he is distantly related on his mother’s side to Sigmund Freud. At the age of four he had a mysterious encounter with a sphere of light while in a garden near his house. A retired Israeli air force officer, who was an eyewitness to this encounter, validated this mystifying event decades later.'
  source:
    path: news/urigeller-com-biography-20260516.html
    location: "¶2"
  significance: Foundational biographical self-attestation — birth date / place, Hungarian-Austrian parentage, Sigmund Freud lineage claim, and the age-four sphere-of-light encounter with the later (unnamed) retired Israeli air force officer eyewitness validation
  context: Uri Geller's biography page on urigeller.com, ¶2

- id: q3
  added_date: '2026-05-16'
  observation_type: direct
  statement_date: c. 1951
  text: 'He first became aware of his unusual powers when he was about five. One day, during a meal, his spoon curled up in his hand and broke, although he had applied no physical pressure to it. His parents were somewhat shocked and Uri did not mention the incident to anyone else at that time. He developed these powers in school by demonstrating them to pupils. His mother thought he inherited them from Sigmund Freud.'
  source:
    path: news/urigeller-com-biography-20260516.html
    location: "¶3"
  significance: Self-attested origin of the spoon-bending / psychokinesis claim — the founding observation of Geller's adult career
  context: Uri Geller's biography page on urigeller.com, ¶3

- id: q4
  added_date: '2026-05-16'
  observation_type: relayed
  statement_date: '1971'
  text: 'In 1969 he began to demonstrate his powers of telepathy and psychokinesis to small audiences. By the end of 1971, he was a household name throughout Israel, thanks to his numerous stage appearances. He was given a huge boost by the then Prime Minister, Golda Meir when asked on a national radio programme what she predicted for the future of Israel, she replied, “Don’t ask me – ask Uri Geller!”'
  source:
    path: news/urigeller-com-biography-20260516.html
    location: "¶7"
  significance: Golda Meir 1971 national-radio endorsement — the inflection point that established Geller as a household name in Israel before his US engagement
  context: Uri Geller's biography page on urigeller.com, ¶7

- id: q5
  added_date: '2026-05-16'
  observation_type: relayed
  statement_date: '1974'
  text: 'The world’s most prestigious scientific magazine, Nature, published a paper on Uri’s work at the Stanford Research Institute in the U.S.A – a unique endorsement, and an irrefutable proof that his skills are genuine. His work with the FBI and the CIA has ranged from using Mind Power to erase KGB computer files and track serial killers, to attending nuclear disarmament negotiations to bombard and influence the Russian chief negotiator with positive thought waves so that the Soviet delegation would sign the Nuclear Arms Reduction Treaty.'
  source:
    path: news/urigeller-com-biography-20260516.html
    location: "¶9"
  significance: Geller's self-attestation of the Nature / Stanford Research Institute publication AND of his subsequent FBI / CIA collaboration claims (KGB computer-file erasure, serial-killer tracking, Russian chief negotiator influence at nuclear disarmament negotiations). The most-cited single statement of his post-SRI national-security work
  context: Uri Geller's biography page on urigeller.com, ¶9

- id: q6
  added_date: '2026-05-16'
  observation_type: relayed
  text: 'Uri also addressed a group of US Senators and National Security Executives at the high-security room in the Capitol Building in Washington. For decades this aspect of his career was too confidential and controversial to discuss.'
  source:
    path: news/urigeller-com-biography-20260516.html
    location: "¶10"
  significance: Self-attestation of the Capitol Building briefing of US Senators and National Security Executives — anchors the about-uri Mind Over Missile teaser (q7) and the 1987 US News & World Report "Washington Whispers" item
  context: Uri Geller's biography page on urigeller.com, ¶10

- id: q7
  added_date: '2026-05-16'
  observation_type: direct
  statement_date: '1987-05-04'
  text: 'I was as surprised as anybody else to open the 4 May 1987 issue of US News & World Report and read the following on the ‘Washington Whispers’ page:'
  source:
    path: news/urigeller-com-about-uri-20260516.html
    location: "¶ Mind Over Missile? teaser"
  significance: First-person Geller voice — opens the Mind Over Missile teaser that documents the 1987 US News & World Report "Washington Whispers" disclosure of Senator Claiborne Pell's Capitol attic vault assembly to hear Geller on Soviet strategic intentions
  context: 'About index page, Mind Over Missile? teaser block (first-person Geller voice introducing the linked sub-page)'

- id: q8
  added_date: '2026-05-16'
  observation_type: relayed
  statement_date: '1999'
  text: 'I believe it represents a deep wisdom that we all inherit form our forebears and which, once harnessed, can effectively give every one of us much greater knowledge and insight into out lives. I believe that with such awareness comes healthier minds and bodies. Some of us learn how to tap into this energy earlier than others; some come upon it through trial and error. Others cannot explain it but trust it totally. Its power is formidable and this frightens those who have not yet reached the point of understanding the potency of such an invisible force.'
  source:
    path: news/urigeller-com-scientific-paranormal-ufos-metal-bending-psi-war-20260516.html
    location: "¶25"
  significance: Geller's first-person book quote from Mind Medicine (Element Books, 1999) transcribed by Brendan Burton in his November 24, 2007 article — Geller's own framing of "mindpower" as inherited wisdom. Source-form artifacts "form" (for "from") and "out" (for "our") preserved as-source per Brendan Burton's transcription; see naming_quirks nq8, nq9
  context: 'Brendan Burton article "Uri Geller – UFOs, metal-bending and the PSI war" (November 24, 2007) ¶25 — transcription of Geller''s Mind Medicine (Element Books, 1999)'

- id: q9
  added_date: '2026-05-16'
  observation_type: relayed
  statement_date: '2017'
  text: 'In 2017 the CIA released a large volume of previously top secret data, including documents and memos about the tests that were performed on Uri Geller.'
  source:
    path: news/urigeller-com-biography-20260516.html
    location: "¶31"
  significance: Self-attestation of the 2017 CIA Reading Room declassification event — Geller's reference to the previously-top-secret CIA tests on him
  context: Uri Geller's biography page on urigeller.com, ¶31

- id: q10
  added_date: '2026-05-16'
  observation_type: relayed
  text: 'The CIA concluded that Uri “demonstrated his paranormal perception ability in a convincing and unambiguous manner.” Click here for more information.'
  source:
    path: news/urigeller-com-biography-20260516.html
    location: "¶32"
  significance: Geller's biography page quoting the CIA's verdict from the 2017 declassified release — "convincing and unambiguous". The underlying CIA document carrying this verdict is not currently archived in this repository; this quote is the citation chain entry point
  context: Uri Geller's biography page on urigeller.com, ¶32 — biography page's quotation of the declassified CIA verdict

