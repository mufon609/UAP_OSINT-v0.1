background: 'Per urigeller.com, Uri Geller is one of the world’s most investigated and celebrated mystifiers, famous around the globe for his mind-bending abilities. Uri Geller was born in Israel on December 20, 1946. His parents were of Hungarian and Austrian descent, and he is distantly related on his mother’s side to Sigmund Freud ([`/people/sigmund-freud`]). At the age of four he had a mysterious encounter with a sphere of light while in a garden near his house; a retired Israeli air force officer, who was an eyewitness to this encounter, validated this mystifying event decades later per the biography page. He first became aware of his unusual powers when he was about five, when during a meal his spoon curled up in his hand and broke although he had applied no physical pressure to it. His parents were somewhat shocked and Uri did not mention the incident to anyone else at that time. He developed these powers in school by demonstrating them to pupils.


  When he was eleven, he went to live in Cyprus, where he remained until he was seventeen. He then returned to Israel, served as a paratrooper in the Israeli army and fought in the Six-Day War of 1967 during which he was wounded in action. From 1968 to 1969 Uri worked as a model, being photographed for many different ad campaigns. In 1969 he began to demonstrate his powers of telepathy and psychokinesis to small audiences. By the end of 1971, he was a household name throughout Israel, thanks to his numerous stage appearances. He was given a huge boost by the then Prime Minister, Golda Meir ([`/people/golda-meir`]) when asked on a national radio programme what she predicted for the future of Israel, she replied, "Don’t ask me – ask Uri Geller!"


  Per the November 24, 2007 piece "Uri Geller – UFOs, metal-bending and the PSI war" by Brendan Burton ([`/people/brendan-burton`]) on urigeller.com, after getting wounded during the Six Day War, Uri left the Israeli Army, and worked as a fashion model by day, and at night started to give displays of his mind-power with the support of his brother-in-law, Shimson (Shipi) ([`/people/shimson-shtrang`]). His extraordinary demonstrations quickly became well known and he soon developed a professional stage show. Word had spread far enough to warrant the mysterious Andrija Puharich ([`/people/andrija-puharich`]) to enter the scene. Puharich had been working previously with the equally mysterious, Dr Vinod, drawing together "channelled" information on the principles of "The Nine" and was a pivotal figure in the "contactee" movement. Under the wing of Puharich, Uri was flown to the USA, where he was introduced to astronaut Edgar Mitchell ([`/people/edgar-mitchell`]), and physicists Hal Puthof ([`/people/hal-puthoff`]) and Russel Targ ([`/people/russell-targ`]). In December 1972 he allowed himself to become the subject of a scientific study undertaken at the prestigious Stanford Research Institute ([`/organizations/stanford-research-institute`]) at Menlo Park, California.

  '

top_relevance: 'Per urigeller.com, Uri Geller is the known subject of the Stanford Research Institute ([`/organizations/stanford-research-institute`]) parapsychology study: "The world’s most prestigious scientific magazine, Nature, published a paper on Uri’s work at the Stanford Research Institute in the U.S.A – a unique endorsement, and an irrefutable proof that his skills are genuine." The same biography states his work with the FBI ([`/organizations/fbi`]) and the CIA ([`/organizations/cia`]) has ranged from using Mind Power to erase KGB computer files and track serial killers, to attending nuclear disarmament negotiations to bombard and influence the Russian chief negotiator with positive thought waves so that the Soviet delegation would sign the Nuclear Arms Reduction Treaty. The biography further states that Uri also addressed a group of US Senators and National Security Executives at the high-security room in the Capitol Building in Washington; for decades this aspect of his career was too confidential and controversial to discuss. In 2017 the CIA released a large volume of previously top secret data, including documents and memos about the tests that were performed on Uri Geller, and per the biography the CIA concluded that Uri "demonstrated his paranormal perception ability in a convincing and unambiguous manner."


  Per the November 24, 2007 Brendan Burton piece on urigeller.com, Russell Targ ([`/people/russell-targ`])’s comment on his experiences resulting from the SRI experiments: "Uri was at our laboratory at SRI for six weeks in 1973. He showed remarkable ESP perceptual ability to describe and draw hidden pictures. He was by no means the best person to visit our lab and carry out this type of remote viewing, but he was certainly better than the average bear in this capability. He did not bend any metal under acceptably controlled conditions, but I have since that time seen and done paranormal bending under excellent conditions." Per the same piece, the results of the experiments and studies, which presented an "existence of one or more perceptual modalities through which individuals obtain information about their environment" were written up in Nature magazine. Hal Puthoff ([`/people/hal-puthoff`]) said of the SRI experiments: "Our publications make our statement, and our personal feelings are congruent with what we’ve published. And in the intervening years of listening to the criticisms of the skeptics we have yet to be shown any viable reason to reassess our position."

  '

credibility_notes: 'Per urigeller.com, Uri Geller has led a unique life shrouded in debate, controversy and mystery. Per the November 24, 2007 Brendan Burton ([`/people/brendan-burton`]) piece on urigeller.com, Russell Targ ([`/people/russell-targ`]) gave the following comment on his experiences resulting from the SRI experiments: "Uri was at our laboratory at SRI for six weeks in 1973. He showed remarkable ESP perceptual ability to describe and draw hidden pictures... He did not bend any metal under acceptably controlled conditions." Hal Puthoff ([`/people/hal-puthoff`]) said of the same SRI experiments: "Our publications make our statement, and our personal feelings are congruent with what we’ve published. And in the intervening years of listening to the criticisms of the skeptics we have yet to be shown any viable reason to reassess our position." Per Burton, the results were written up in Nature magazine. Per the biography page, Uri’s work with the FBI ([`/organizations/fbi`]) and the CIA ([`/organizations/cia`]) has ranged from using Mind Power to erase KGB computer files and track serial killers, to attending nuclear disarmament negotiations to bombard and influence the Russian chief negotiator with positive thought waves so that the Soviet delegation would sign the Nuclear Arms Reduction Treaty. Per the same biography Uri also addressed a group of US Senators and National Security Executives at the high-security room in the Capitol Building in Washington; for decades this aspect of his career was too confidential and controversial to discuss. In 2017 the CIA released a large volume of previously top secret data, including documents and memos about the tests that were performed on Uri Geller, and per the biography the CIA concluded that Uri "demonstrated his paranormal perception ability in a convincing and unambiguous manner". The Burton piece further names Dr Werner von Braun ([`/people/wernher-von-braun`]), Dr EW Bastin, and Dr Edgar Mitchell ([`/people/edgar-mitchell`]) as credible academics who have witnessed both the bending phenomena up close and first hand.


  Per the biography page ¶3, Geller’s mother thought he inherited his unusual powers from Sigmund Freud ([`/people/sigmund-freud`]); this distantly related Sigmund Freud claim has its evidence only in Geller’s own biography page.


  Per biography ¶17, Uri provided a drawing for Michael Jackson ([`/people/michael-jackson`])’s album Invincible, and Uri’s drawings are featured on Michael Jackson’s latest albums; the latest claim in the biography page is from years before Michael Jackson’s death in 2009, when Invincible became Michael Jackson’s last released album.

  '

