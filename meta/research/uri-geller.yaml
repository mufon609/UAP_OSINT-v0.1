- id: nq11
  added_date: '2026-05-16'
  observed: 'Israel'
  canonical: 'British Mandate of Palestine'
  location: "¶2 (biography page; in re Geller's December 20, 1946 birthplace attestation)"
  source_path: news/urigeller-com-biography-20260516.html
  resolution: preserve-as-sic-in-quotes
  note: 'Geographic-anachronism source-form variant. Geller''s biography page attests his birthplace as "Israel" on December 20, 1946. The State of Israel was declared on May 14, 1948 — 17 months after Geller''s birth — and what is now Tel Aviv was, at the time of his birth, part of the British Mandate of Palestine (1920-1948). Modern usage of "Israel" can refer to either the State of Israel (post-1948) or the Land of Israel (the territory, ahistorical); the biography uses it in the second sense. Wikipedia, Haaretz, and IMDb biographical entries on Geller all qualify the birthplace as Tel Aviv-within-Palestine; only Geller''s own biography page elides the distinction. Source-form preserved as-source in quotes q2 and timeline t1 per the source-priority hierarchy (subject''s own framing for a fact about himself). The resolution preserve-as-sic-in-quotes is the closest existing fit in the naming_quirks enum but does not perfectly capture the geographic-vs-temporal anachronism shape — see meta/topic/research-queue.md Pending Convention Questions for the broader naming_quirks resolution-enum extension question (potential `geographic-anachronism` resolution category).'

rumors:

- id: r1
  added_date: '2026-05-16'
  claim: 'Geller''s tenure at the Stanford Research Institute spans two separate visits — a five-week period in late 1972 and an eight-day visit in August 1973 — per Puthoff-Targ''s own SRI-internal daily log "The Record" (not archived in this repository). Russell Targ''s 2007 retrospective comment in the Brendan Burton article of "six weeks in 1973" may collapse the two visits into one period.'
  status: not-primary-source-established
  observed_sources:
  - Puthoff-Targ "The Record" daily log — SRI-internal primary source, not currently archived in this repository (see meta/topic/research-queue.md Cluster F pre-builds)
  - Puthoff-Targ SRI film narration (published with consent of the SRI researchers; surfaces the late-1972 visit predating the film's March 1973 Columbia University screening)
  - urigeller.com/project-stargate-the-cias-human-experiments-with-mind-control/ (third-party syndicated article on Geller's site; not in the archived source set for this node; carries the "eight days in August 1973" framing)
  - Multiple public-record secondary sources (Wikipedia, Project Stargate biographies, Geller's own books)
  note: 'The archived corpus for this node currently carries only Russell Targ''s 2007 retrospective comment in the Brendan Burton article (¶7) — "Uri was at our laboratory at SRI for six weeks in 1973" — captured in this node''s top_relevance, credibility_notes, and relationships r5. Web-research audit (2026-05-16) surfaced that the SRI-internal primary record ("The Record" daily log, published by Puthoff and Targ themselves) documents two distinct Geller visits: a five-week period in late 1972 (predating the SRI film''s March 1973 Columbia University screening) and an eight-day August 4-11 1973 visit. If "The Record" is accurate, Targ''s 2007 recollection of "six weeks in 1973" likely collapses the two visits — the five weeks belonging to late 1972 rather than 1973, and the second visit being the eight-day August 1973 window often cited in third-party syndicated accounts of Project Stargate. The eight-day framing previously treated as competing secondary-source against Targ''s primary-witness recollection may in fact have the better primary-source backing — pending archival of "The Record". Closure requires archival of "The Record" daily log as an SRI Cluster F pre-build; once archived, the SRI chronology resolves consistently across the Stanford Research Institute, Hal Puthoff, Russell Targ, and Geller nodes, and Targ''s 2007 retrospective becomes one secondary-source data point rather than the dispositive primary witness. Until archived, this entry preserves both framings as plausible without adjudicating between them, per the repository''s no-adjudication principle. Affiliation a2 and program_involvement pi1 currently anchor SRI tenure to the December 1972 entry per Burton ¶5 and the "six weeks in 1973" per Targ ¶7 — those entries remain as-is per source-read-first until "The Record" is archived; the revised two-visit chronology would land via versioned superseded_by entries at that time.'

- id: r2
  added_date: '2026-05-16'
  claim: 'A retired Israeli air force officer eyewitness validated Geller''s age-four sphere-of-light encounter in a garden near his house, decades after the event.'
  status: not-primary-source-established
  observed_sources:
  - urigeller.com/uri-gellers-biography/ ¶2 (the claim itself, attested by Geller's biography)
  note: 'The claim is attested by Geller''s own biography as a self-account (registered as q2). The retired Israeli air force officer who allegedly validated the event is not named, no validation document is cited, and no primary record of the officer''s attestation is archived in this repository. The age-four encounter itself is captured in q2 as Geller''s self-attestation; the third-party-validation portion is the unattested element here.'

- id: r4
  added_date: '2026-05-16'
  claim: 'The Uri Geller Museum at 7 Mazal Arieh Street, Old Jaffa, opened in 2021 (not 2016, which is Geller''s return-to-Israel year).'
  status: not-primary-source-established
  observed_sources:
  - Wikipedia (Uri Geller Museum entry)
  - urigellermuseum.com (the museum's own website)
  - JNS (Jewish News Syndicate) November 2021 coverage of the museum opening
  - Jewish Virtual Library
  note: 'The archived urigeller.com biography page ¶35 attests only that "Uri lives in Old Jaffa and runs the Uri Geller Museum" — no opening date is given in any of the three archived primary sources for this node. The 2021 opening date is widely attested in external secondary sources but no primary source has been archived in this repository. When a primary source naming the museum opening date is archived (the museum''s own website, a JNS-published interview, a municipal record, or similar), graduate this rumor to a quotes[] entry and populate affiliations a9 period_start. Recorded here to prevent future contributor sessions from re-introducing the conflated 2016 return-to-Israel anchor that this entry replaces (the prior period_start: 2016 was removed during the 2026-05-16 web-audit review; see a9 note).'

- id: r3
  added_date: '2026-05-16'
  claim: 'Uri Geller is widely reported as a subject of the CIA-sponsored Stanford Research Institute parapsychology investigation 1972-1973, including as the foundational subject in popular accounts of the program''s origin.'
  status: not-primary-source-established
  observed_sources:
  - Multiple public-record secondary sources (Wikipedia, Project Stargate syndicated pieces, biographies)
  - Russell Targ's verbatim quote in the Brendan Burton article (¶7) — primary-witness corroboration of SRI tenure ("six weeks in 1973") but the Targ quote is republished on urigeller.com, not extracted from a CIA/SRI institutional record
  note: 'Corpus gap acknowledged. No primary source archived in this repository names Uri Geller as a subject of the CIA-sponsored SRI parapsychology investigation. The three CIA / DIA institutional records of the SRI program already cited by the Stanford Research Institute, Hal Puthoff, and Russell Targ nodes — the 1977 Kenneth A. Kress Studies in Intelligence paper, the 1993 DIA STAR GATE Project Overview, and the 1995 American Institutes for Research evaluation — refer to early SRI subjects only by descriptors ("the magnetometer subject", "previously described subject", "third sensitive subject") and do not name Geller. The Russell Targ artifact''s q17 IRVA 2002 retrospective names Ingo Swann (1972 magnetometer subject) and Pat Price (1973 "third sensitive subject"); the Stanford Research Institute artifact explicitly flags an unattested "second sensitive subject" gap between Swann and Price in the Kress 1977 narrative ordering. Geller is the leading public-record candidate for that gap. Anchoring the SRI / CIA cross-reference in this Geller node currently rests on (a) Geller''s own biographical self-attestation that Nature published a paper on Uri''s work at the Stanford Research Institute, and (b) the Russell Targ verbatim quote in the Brendan Burton article attesting six weeks at SRI in 1973 (registered indirectly via relationships r5 and program_involvement pi1). Closing the corpus gap requires archival of a primary source naming Geller — candidates include the full body of the Targ-Puthoff 1974 Nature paper (currently archived as paywall HTML only on the Stanford Research Institute node), the Targ-Puthoff 1975 SRI Final Report "Perceptual Augmentation Techniques: Part Two" (cited by the 1995 American Institutes for Research evaluation but not archived), or one of the CIA SCANATE-era documents released to the CIA Reading Room since 2017. The biography page''s "convincing and unambiguous" verdict (q10) is a real CIA Reading Room declassification reference; the specific CIA document carrying that verdict is not currently archived in this repository.

    The CIA / FBI / Capitol Building claims registered as Statements (q5, q6) appear only as Geller''s self-attestation on his own biography page; no primary-source corroboration is archived in this repository. The biography itself states "For decades this aspect of his career was too confidential and controversial to discuss" (q6).

    The Burton article carries multiple spelling variants preserved as-source per the source-form-preservation discipline: "Puthof" (¶5), "Russel" (¶5), "psychokenesis" (¶15), "pheomena" (¶16), "Brasil" (¶17), "Brasilian" (¶17), "statisical" (¶21), "form" (¶25 — Geller book quote transcription), "out" (¶25 — same Geller book quote). See naming_quirks nq1-nq9 for per-variant detail.'
