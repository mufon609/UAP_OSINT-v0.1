description: 'Luis D. Elizondo ([`/people/luis-elizondo`]) Question for the Record response to Rep. Eric Burlison ([`/people/eric-burlison`]) dated December 19, 2024, following the November 13, 2024 joint subcommittee hearing "Unidentified Anomalous Phenomena: Exposing the Truth" before the House Committee on Oversight and Accountability ([`/events/2024-11-13-house-oversight-uap-hearing`]). Elizondo responses to 11 questions are presented at the UNCLASSIFIED level. Question 1: Yes — possession by U.S. government or defense contractors of recovered material. The response reads in part a DOPSR cleared statement by Dr. James Lacatski ([`/people/james-lacatski`]) — former Director of AAWSAP ([`/organizations/aawsap`]) — that identified Lockheed Martin ([`/organizations/lockheed-martin`]) Space Systems Vice President Dr. James Ryder ([`/people/james-ryder`]). Question 6: Yes — the CIA ([`/organizations/cia`]) opposed the transfer of materials of advanced, non-human origin from Lockheed Martin to Bigelow Aerospace ([`/organizations/bigelow-aerospace`]). Question 7: a newly built hangar at the Patuxent River Naval Air Station ([`/locations/patuxent-river-nas`]) — purpose-built to meet the requirements of a Special Access Program Facility — with approximately $10 million funding allocated at the request of then-Representative Steny Hoyer ([`/people/steny-hoyer`]); Elizondo has visited this facility. Question 11: the $22 million funding AAWSAP / AATIP ([`/organizations/aatip`]) was directed to programmatic needs including thirty-seven Defense Intelligence Reference Documents.

  '

quotes:
- id: q1
  added_date: '2026-05-18'
  text: |-
    SUBJECT: Responses to Questions for the Record at the Hearing “Unidentified
             Anomalous Phenomena: “Exposing the Truth”

    Dear Chairwoman Nancy Mace and Chairman Glenn Grothman:

    It was an honor to testify on November 13, 2024, at the hearing titled “Unidentified Anomalous
    Phenomena: Exposing the Truth,” convened by your subcommittees of the House Committee on
    Oversight and Accountability (the “Committee”). I have responded to each question for the
    record (“QFR”) posed by Representative Eric Burlison on December 9, 2024, following the
    hearing. See Attachment 1. The responses below are presented at the UNCLASSIFIED level.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 1, opening of response letter'
  significance: 'Opening of Elizondo''s response letter — establishes the document as Elizondo''s response to the November 13, 2024 hearing QFR posed by Rep. Eric Burlison on December 9, 2024. UNCLASSIFIED-level responses; Attachment 1 is the eleven-question response.'
  statement_date: '2024-12-19'
- id: q2
  added_date: '2026-05-18'
  text: |-
    1. Question: “Does any branch of the United States government, or defense contractors
       (aerospace and otherwise), possess technology derived from a non-human source?”

       Response: Yes. I served as the senior ranking person of the Advanced Aerospace Threat
       Identification Program (“AATIP”) within the Department of Defense (“DoD”). AATIP
       investigated unidentified anomalous phenomena (“UAP”). AATIP engaged senior
       executives at DoD Defense aerospace companies who claimed they possessed recovered
       “exotic material” not made by any U.S. or foreign source. Because these executives
       indicated that they could no longer glean additional insight from such material, they initially
       agreed to allow AATIP/AAWSAP to take custody of the material.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 1, Q1 opening response'
  significance: 'Q1 — Elizondo confirms recovered non-human-origin material is held by U.S. government or defense contractors. Frames his AATIP role and attests AATIP/AAWSAP engaged senior aerospace-company executives who claimed recovered "exotic material" not made by any U.S. or foreign source, and initially agreed to transfer custody.'
  statement_date: '2024-12-19'
- id: q3
  added_date: '2026-05-18'
  text: |-
    Confirmation of this may be inferred from an official DoD Office of Prepublication and
       Security Review (“DOPSR”) document, dated September 6, 2023. This document authorized
       the release of a statement by Dr. James Lacatski, the former Director of the Advanced
       Aerospace Weapon System Application Program (“AAWSAP”). The statement, marked
       ‘Cleared for Open Publication,’ reads in part:

               The 22M allocated for DIA AAWSAP, after speaking to multiple individuals
               on the program, was originally intended to SCIF-out Bigelow Aerospace
               facilities in Las Vegas due to a UAP material divestment plan proposed to
               AAWSAP leadership by Lockheed Martin Space Systems Vice President, Dr.
               James Ryder, (now deceased).
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 1, Q1 response — DOPSR / Lacatski attribution + verbatim Lacatski quotation'
  significance: 'Q1 response — names Dr. James Lacatski, former Director of AAWSAP, as the author of the September 6, 2023 DOPSR-cleared statement and quotes the verbatim Lacatski text identifying Dr. James Ryder as proposer of the UAP material divestment plan. Source for the lacatski-authorship-chain finding ([`/findings/lacatski-authorship-chain`]) — closes the authorship loop from anonymous SD004 page-1 to named author Lacatski.'
  statement_date: '2024-12-19'
- id: q4
  added_date: '2026-05-18'
  text: |-
    4. Question: “Are you aware of any evidence or indication that the United States military, or
       defense contractors, have recovered craft of non-human origin?”

       a. “(If yes) – Were there non-human entities associated with these craft?”
       b. “(If yes) – Were the non-human entities recovered alive?”

       Response:

       (a) Yes. I am aware of several incidents where the U.S. military and certain Defense
       Contract companies recovered craft/vehicles of non-human origin. In some cases, biological
       specimens were recovered from such crashes.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 2, Q4 response part (a)'
  significance: 'Q4 (a) — Elizondo confirms awareness of "several incidents" where U.S. military and Defense Contract companies recovered craft/vehicles of non-human origin, including biological specimens recovered from such crashes. The strongest single statement on the craft-and-biologics record in this QFR; Elizondo''s sworn response to a written congressional question.'
  statement_date: '2024-12-19'
- id: q5
  added_date: '2026-05-18'
  text: |-
    Several key scientists associated with both AAWSAP and AATIP were part of a
       conversation, sponsored by the White House in approximately 2004, to determine if the U.S.
       public was prepared for the acknowledgement of UAP by the U.S. Government. After
       approximately one week of deliberations, the decision was made that the U.S. Government
       should not disclose any UAP-related information to the public.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 2, Q4 response, paragraph following part (b)'
  significance: 'Q4 closing paragraph — Elizondo attests a ~2004 White House-sponsored conversation involving AAWSAP and AATIP scientists deliberating whether the U.S. public was prepared for UAP acknowledgement. The decision was reportedly made — after ~one week — not to disclose. Single-source attestation of a 2004-era pre-disclosure deliberation by White House-sponsored UAP scientists.'
  statement_date: '2024-12-19'
- id: q6
  added_date: '2026-05-18'
  text: |-
    6. Question: “Are you aware of the recent claim made by journalist Christopher Sharp
       regarding Bigelow Aerospace, Lockheed Martin, and the CIA allegedly blocking the transfer
       of materials of advanced, non-human origin?

       Response: Yes. The CIA opposed the transfer of materials of advanced, non-human origin
       from Lockheed Martin to Bigelow Aerospace.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 2, Q6 response'
  significance: 'Q6 — Elizondo confirms the CIA opposed the transfer of materials of advanced, non-human origin from Lockheed Martin to Bigelow Aerospace. The Q6 question text names journalist Christopher Sharp ([`/people/christopher-sharp`]) as the source of the underlying claim Burlison was asking Elizondo to confirm or deny. The shortest substantive Yes in the QFR; the action-scope attested ("opposed the transfer") is the foundation for the aaro-denial-action-mismatch finding ([`/findings/aaro-denial-action-mismatch`]) and for the H1 evaluation in the Lockheed Martin investigation ([`/investigations/lockheed-martin-uap-materials`]).'
  statement_date: '2024-12-19'
- id: q7
  added_date: '2026-05-18'
  text: |-
    Response: Yes. I can confirm that specific facilities were identified to enable Bigelow
       Aerospace to acquire and securely store recovered UAP materials as the new custodian,
       following their transfer from Lockheed Martin. These facilities included locations in the Las
       Vegas area and a newly built hangar at the Patuxent River Naval Air Station (“PAX”).
       Specifically, the PAX River hangar was designed to facilitate the transfer of future materials
       via air and river. The hangar was purpose-built to meet the requirements of a Special Access
       Program Facility (“SAP-F”) and was capable of accommodating materials at any
       classification level.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 2, Q7 response opening (before p. 2/p. 3 page-break interruption)'
  significance: 'Q7 — Elizondo names the Patuxent River SAP-F hangar specifically: purpose-built to meet Special Access Program Facility requirements at any classification level. Foundational source for the pax-river-scif-fiscal-triangulation finding ([`/findings/pax-river-scif-fiscal-triangulation`]). The Q7 response continues after a p. 2 / p. 3 page-break: "$10 million" funding allocated at Hoyer''s request, and "I have visited this facility." That continuation is quoted on the Pax River finding as q2b per pdftotext page-footer artifact discipline.'
  statement_date: '2024-12-19'
- id: q8
  added_date: '2026-05-18'
  text: |-
    9. Question: “Were you aware of any efforts by the CIA to block the transfer of UAP-related
       materials or information during tenure at AATIP?

       Response: Yes, and similar obstructionist efforts were also made by the U.S. Air Force.
       There seemed to be passive resistance from certain elements within the Central Intelligence
       Agency and a more active campaign by specific factions within the U.S. Air Force to
       suppress inquiries and investigations into the UAP topic
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 3, Q9 response'
  significance: 'Q9 — Elizondo confirms CIA passive resistance and U.S. Air Force ([`/organizations/us-air-force`]) active suppression campaigns against UAP inquiries during his AATIP tenure. Narrows the institutional opposition the Lockheed-to-Bigelow transfer encountered (q6) to two specific agencies and characterizes each: CIA passive, Air Force active.'
  statement_date: '2024-12-19'
- id: q9
  added_date: '2026-05-18'
  text: |-
    Response: Yes. Many of my former colleagues and I have faced retaliation for our public
       advocacy for UAP transparency. This has included efforts to suspend or revoke our security
       clearances, as well as direct threats to our safety and that of our families. Some elements
       within the DoD and the Intelligence Community (“IC”) have engaged in what can only be
       described as 'administrative terrorism' to deter individuals with security clearances from
       raising this issue.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 3, Q10 response opening'
  significance: 'Q10 opening — Elizondo''s sworn attestation of retaliation against UAP-transparency advocates: security-clearance suspension/revocation efforts, direct threats to safety and to family safety, "administrative terrorism" framing. Establishes on-the-record context for the broader institutional resistance pattern Elizondo and others have described.'
  statement_date: '2024-12-19'
- id: q10
  added_date: '2026-05-18'
  text: |-
    Response: The $22 million dollars that funded AAWSAP/AATIP was directed to a variety
       of programmatic needs, including commissioning academic studies on advanced physics
       concepts, funding civilian personnel and contractors, and conducting field research. As a
       result, thirty-seven of these academic studies were published as Defense Intelligence Agency
       Defense Intelligence Reference Documents (“DIRDs”). See Attachment 3 for a complete
       list of published DIRDs.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 4, Q11 response'
  significance: 'Q11 — Elizondo states the $22M AAWSAP/AATIP funding was directed to programmatic needs: academic studies on advanced physics concepts, civilian personnel and contractors, field research. Thirty-seven academic studies were published as Defense Intelligence Reference Documents (DIRDs). Distinguishes the $22M programmatic envelope from any earmark for the alleged Lockheed-to-Bigelow transfer; the transfer narrative in q3 / q7 names the program as the destination context but not as the funding source for the transfer itself.'
  statement_date: '2024-12-19'

