  text: |-
    Appropriations Bill Includes Funding for Projects at Pax, Indian Head  WASHINGTON, DC – Congressman Steny H. Hoyer (MD-5) announced that the Fiscal Year 2011  Military Construction and Veterans Affairs Appropriations Act approved today by the House contains significant investments for projects and programs that will benefit military facilities in Southern Maryland.
  source:
    path: government/hoyer-house-gov-investments-southern-maryland-milcon-fy2011-20100728.html
    location: 'press release opening, ¶1'
  significance: 'Opening sentence — anchors the press release as Hoyer''s public announcement of FY2011 Military Construction and Veterans Affairs Appropriations Act passage by the House on July 28, 2010, with the four Southern Maryland line items that follow.'
  statement_date: '2010-07-28'
- id: q2
  added_date: '2026-05-18'
  text: |-
    The  Atlantic Test Range Addition at Pax was included in this bill at Rep. Hoyer's request.
  source:
    path: government/hoyer-house-gov-investments-southern-maryland-milcon-fy2011-20100728.html
    location: 'press release body, ¶ following Hoyer pull-quote'
  significance: 'Hoyer''s own attestation that the Atlantic Test Range Addition line item — the SCIF-bearing structure at Pax River the Pax River SAP-F finding triangulates — was included in the bill at his request. Primary-source corroboration of Elizondo''s December 2024 QFR Q7 statement that hangar funding was "allocated at the request of then-Representative Steny Hoyer".'
  statement_date: '2010-07-28'
- id: q3
  added_date: '2026-05-18'
  text: |-
    Atlantic Test Range Addition,  Naval Air Station, Patuxent River  – $10,160,000 Funding will be used to construct an addition to the existing Atlantic Test Range, which is the only Naval Test and Evaluation Range on the East Coast, to house new control rooms for Unmanned Air Vehicles, intelligence data acquisition laboratory spaces, as well as Sensitive Compartmented Information Facility areas.
  source:
    path: government/hoyer-house-gov-investments-southern-maryland-milcon-fy2011-20100728.html
    location: 'press release body, MILITARY CONSTRUCTION line item'
  significance: 'The canonical Atlantic Test Range Addition line item — $10,160,000 — at Naval Air Station, Patuxent River. Authorizes construction of an addition to the existing Atlantic Test Range to house Unmanned Air Vehicle control rooms, intelligence data acquisition laboratory spaces, and Sensitive Compartmented Information Facility areas. The fiscal year, dollar figure, location, and SCIF specification triangulate against Elizondo''s December 2024 QFR Q7 description of a ~$10M Pax River SAP-F hangar Hoyer requested — fourteen years earlier, before any UAP framing of the appropriation.'
  statement_date: '2010-07-28'
- id: q4
  added_date: '2026-05-18'
  text: |-
    BAMS Test and Evaluation Facility,  Naval Air Station, Patuxent River – $42,211,000 Funding will be used to construct a hangar that will house Unmanned Air Vehicles and provide administrative space, communications rooms, lab spaces, and a mission control system.  This facility will directly support the Navy's Broad Area Maritime Surveillance Program which is critical to ensuring the Navy has persistent maritime Intelligence, Surveillance, and Reconnaissance data collection and dissemination capability.
  source:
    path: government/hoyer-house-gov-investments-southern-maryland-milcon-fy2011-20100728.html
    location: 'press release body, MILITARY CONSTRUCTION line item'
  significance: 'BAMS Test and Evaluation Facility line item — a $42,211,000 hangar at Naval Air Station, Patuxent River for the Navy ([`/organizations/us-navy`])''s Broad Area Maritime Surveillance Program. Source-attested context distinguishing the Atlantic Test Range Addition ($10,160,000, q3, SCIF areas) from the BAMS hangar (q4, $42,211,000, Unmanned Air Vehicle hangar) — the press release announces both in the same bill but they are distinct line items at distinct dollar magnitudes.'
  statement_date: '2010-07-28'
- id: q5
  added_date: '2026-05-18'
  text: |-
    "The work done at Pax and Indian Head is highly valued by the military, and the continued investment in the facilities reflect that," stated Rep. Hoyer.
  source:
    path: government/hoyer-house-gov-investments-southern-maryland-milcon-fy2011-20100728.html
    location: 'press release body, Hoyer pull-quote'
  significance: 'Hoyer''s own pull-quote framing the four line items as continued military investment in Pax River and Indian Head. The general framing — military investment in highly valued facilities — gives no UAP-specific or SCIF-specific motivation; the press release attests the SCIF specification in q3 as a routine Atlantic Test Range addition feature.'
  statement_date: '2010-07-28'

