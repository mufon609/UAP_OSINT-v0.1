description: 'News story with George ([`/people/george-knapp`]) and Dr. James Lacatski ([`/people/james-lacatski`]).


  George: "A US intelligence official who designed and directed the largest UFO investigation in American history has confirmed at least one UFO type craft of unknown origin is being studied in absolute secrecy. But Dr. James Lacatski adds the fact that our government has stashed away one of these craft is just a small part of a much bigger mystery."


  Lacatski: "Reducing 30,000 pages of analyst photos and information and logs and and sightings, etc., and investigations, that was a tough job." Lacatski: "to investigate the paranormal as being the umbrella over UFOs right from the get-go. And your bosses knew that from the beginning." Lacatski: "they were concerned from the beginning about the the leak, but we never had a a leak." Lacatski: "the purpose of the government effort was to look into is there is there something really there, especially in the paranormal umbrella. And the answer is absolutely yes."


  Lacatski on the new book ([`/documents/future-visions-2026`]): "You could have craft, you could have bodies, it wouldn''t necessarily tell you where they''re from, why they''re here, what their their plan is." Lacatski: "if there was an alien intelligence, which some people think is behind all of this, they must be shaking their heads in frustration cuz we move like a snail. And maybe at times we even go backwards."


  George: "This is Dr. Lacatski''s fourth and final book based on the AATIP files. I was co-author on two of those along with Dr. Colm Kelleher ([`/people/colm-kelleher`]). Future Visions contains many new details about dramatic UFO incidents and cases, weird events at Skinwalker Ranch ([`/locations/skinwalker-ranch`]) and similar locations, and hints about another program that grew out of AATIP."


