  profession: Senior intelligence and strategic engagement advisor; former USAF intelligence officer (Major) and NGA Senior Geospatial Intelligence Officer; Whistleblower
context_extrinsic:
  display_title: David Grusch
background: 'David Charles Grusch was an intelligence officer for 14 years, in the [`/organizations/us-air-force`] (USAF) at the rank of Major and, from 2021-2023, at the [`/organizations/nga`] at the GS-15 civilian level. USAF Active Duty: Officer in Charge, Space Control Intelligence Cell, 21st Operations Group, Peterson AFB (June 2009 – September 2011); Intelligence Flight Commander, 3d Space Experimentation Squadron, Schriever AFB (September 2011 – December 2013); Chief, Intelligence Integration Division, Space Security and Defense Program (SSDP), Reston, VA (December 2013 – March 2016). April 2016 – November 2021: Senior Intelligence Officer, [`/organizations/nro`] (USAF Reserve, O-4/Maj in a O-5/Lt Col Billet). March 2016 – November 2021: Corporate Security Officer (CSO) / DoD-Contracted Science and Engineering Technical Advisor (SETA) at Blue Sky Innovators Inc. November 2021 – April 2023: Senior GEOINT Capabilities Requirements Officer, NGA, Colorado Springs, CO. May 2023-Present: Chief Operating
  Officer (COO), The Sol Foundation. Education: Bachelor of Science Degree, Physics, Minor in German, University of Pittsburgh (2009); Master of Arts Degree with Honors, Intelligence Studies, American Military University (2012); Master of Public Administration (MPA) Degree, University of Colorado (In-Progress, 2023). Security Clearance: Active TOP SECRET//SCI with CI & LS Polygraph.

  '
top_relevance: 'From 2019 to 2021, in his [`/organizations/nro`] reservist capacity, Grusch was a member of the [`/organizations/uaptf`]. From 2021 to 2023, as [`/organizations/nga`] co-lead in Unidentified Anomalous Phenomena (UAP) and trans-medium object analysis, he reported to UAPTF and eventually the [`/organizations/aaro`]. In 2019 the UAPTF director tasked Grusch to identify all Special Access Programs & Controlled Access Programs (SAPs/CAPs) the task force needed to satisfy its congressionally mandated mission. He was informed, in the course of his official duties, of a "multi-decade UAP crash retrieval and reverse engineering program" to which he was denied access. He became a Whistleblower through a PPD-19 ([`/documents/ppd-19`]) Urgent Concern filing with the [`/organizations/icig`], and he has suffered retaliation for that decision. At [`/events/2023-07-26-house-uap-hearing`], Grusch''s testimony ([`/documents/written-testimony-grusch-2023`]) is based on information he has been given
  by individuals with a longstanding track record of legitimacy and service to this country.

  '
credibility_notes: 'Grusch testified under oath that he is "speaking to the facts as I have been told them," that his testimony is "based on information I have been given by individuals with a longstanding track record of legitimacy and service to this country — many of whom also shared compelling evidence in the form of photography, official documentation, and classified oral testimony," and that he "has taken every step I can to corroborate this evidence over a period of 4 years." Claims about the multi-decade UAP crash retrieval and reverse engineering program — including that private defense contractors hold physical material — are information Grusch was "informed" of "in the course of my official duties"; he was "denied access to those additional read-on’s." Grusch became a whistleblower through the PPD-19 ([`/documents/ppd-19`]) Urgent Concern filing with the Intelligence Community Inspector General ([`/organizations/icig`]); the formal filing [`/documents/grusch-ppd-19-procedural-filing`]. Per the Debrief ([`/documents/debrief-grusch-2023`]): "The Intelligence Community Inspector General found his complaint *credible and urgent* in July 2022"; per the same article, "a summary was immediately submitted to the Director of National Intelligence, Avril Haines; the Senate Select Committee on Intelligence; and the House Permanent Select Committee on Intelligence" ([`/organizations/hpsci`]). Grusch''s July 26, 2023 written testimony received Department of Defense pre-publication review under DOPSR case 23-F-0946 ([`/documents/grusch-dopsr-request-2023`]). Grusch has "suffered retaliation" for his decision and under oath described it: "I call it administrative terrorism" — career threats against himself and colleagues who corroborated the allegations.


  Context. Under oath on July 26, 2023, Grusch testified that he "asked my information to be sent to the House and Senate Armed Services Committee because there are Title 10 equities at play" — House Armed Services Committee ([`/organizations/hasc`]) and Senate Armed Services Committee ([`/organizations/sasc`]) — but that "there was no smooth process to do so," a separate reporting channel from the ICIG intelligence committee channel described above. His UAPTF role began in 2019 when the UAPTF director tasked him to "identify all Special Access Programs & Controlled Access Programs (SAPs/CAPs) we needed to satisfy our congressionally mandated mission." On the Joe Rogan Experience ([`/organizations/joe-rogan-experience`]) podcast ([`/transcripts/jre-2065-grusch-2023`]), Grusch described a Spring 2021 meeting in Las Vegas with former Senate Majority Leader Harry Reid ([`/people/harry-reid`]) in which Reid said "yeah I knew we had UFO material I was denied access for decades"; in the same conversation, Grusch described the "$21 million" Reid had given "to DIA and Bigalow Aerospace" [`/organizations/bigelow-aerospace`] [`/people/robert-bigelow`] as funding for the "assap" program — said to be run by "Jim laty" [`/people/james-lacatski`], a retired DIA officer with a PhD in engineering, who "made this disclosure in his book skinwalkers at the Pentagon" (page 152 to 153). On the same podcast, Grusch described his first encounter with "Lou alzando" [`/people/luis-elizondo`] through a 2017 CIA briefing in which a "senior person" at the agency said the person was "running some UFO program at the Pentagon" — "we all think he''s crazy"; Grusch later realized this was the leader of the ATIP program named in the sworn hearing testimony as "Lue Elizondo." Also on the podcast, Grusch named a specific private defense contractor — "lockie Martin" [`/organizations/lockheed-martin`] — saying the company "wanted to divest itself from this material at a specific facility that''s known to me that I provided to the Inspector General." The contractor was not named in the sworn congressional testimony.


  AARO position. Under former director Sean Kirkpatrick ([`/people/sean-kirkpatrick`]), AARO ([`/organizations/aaro`]) correspondence with Grusch is documented via FOIA 24-F-0266 ([`/documents/aaro-invitations-to-grusch-2024`]); Kirkpatrick wrote he was "not judging the claims" and was "not taking a position on ... the underlying claim of recovered materials," stating of Grusch that "he is sincere and credible and his and other claims, which I expressly called ''allegations,'' warrant investigation." Grusch declined AARO interview invitations. Christopher Mellon ([`/people/christopher-mellon`]) described in the Debrief that "a number of potential sources do not trust the leadership of the All-Domain Anomaly Resolution Office established by Congress." In November 2023, OUSD(I&S) ([`/organizations/ousd-is`]) reviewed the UAP Disclosure Act of 2023 and submitted proposed revisions to Congress ([`/documents/pentagon-uapda-revisions-2023-11`]). Per Douglas Johnson''s analysis (July 24, 2024) of a July 17, 2024 Marik von Rennenkampff interview, Kirkpatrick said of the revisions, "we convinced Congress last year not to go down that road."


  Public reporting. On Aug 10, 2023, NewsNation ([`/organizations/newsnation`]) reported on The Intercept''s story on Grusch''s military service mental health records; Rep. Tim Burchett ([`/people/tim-burchett`]) publicly called the story "sickening" and said "this man served his country." In the American Alchemy documentary ([`/transcripts/american-alchemy-grusch-72hrs-2023`]), Grusch described post-traumatic stress disorder diagnosis and treatment after combat in Afghanistan (2013): "saw treatment and I got help good to go." See vouching chain below for voucher statements by Karl Nell ([`/people/karl-nell`]) as the Army liaison who worked with Grusch on the UAP Task Force, plus House UAP Caucus members Burchett, Burlison ([`/people/eric-burlison`]), Luna ([`/people/anna-paulina-luna`]), and Sen. Rubio ([`/people/marco-rubio`]).


  [`/documents/grusch-bio-2023`] — SECURITY CLEARANCE: Active TOP SECRET//SCI with CI & LS Polygraph.

  '
