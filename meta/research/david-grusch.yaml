- id: q156
  added_date: '2026-04-22'
  text: 'Please give me a call to discuss conditions and admin items:'
  source:
    path: government/blackvault-aaro-invitations-to-grusch-24-F-0266.pdf
    location: Email dated 2023-11-10 11:05 AM from David Grusch, Subject "Contact Request"
  significance: Grusch's initial contact to AARO after sustained refusal — contradicts Kirkpatrick's public framing that Grusch "refused to speak." Documents that Grusch did reach out to discuss "conditions and admin items" for an interview.
  context: Grusch-AARO correspondence, 2023-11-10
  observation_type: relayed
  statement_date: '2023-11-10'
- id: q157
  added_date: '2026-04-22'
  text: 'Thank you for sending these items. As a former agency-level SAPMO and CAPCO I take security policies very seriously. In the DoD SAPCO memo, the term "UAP-related" is not defined. FY23 NDAA Sec. 1673 Subsection B defines it as the following: "any activity or program by a department or agency of the Federal Government or a contractor of such a department or agency relating to unidentified anomalous phenomena, including with respect to material retrieval, material analysis, reverse engineering, research and development, detection and tracking, developmental or operational testing, and security protections and enforcement." The key issue here is that many of these activities have conventional classified and compartmented Security Classification Guides that also cover non-UAP activities as well. To discuss the UAP-related activities would also expose these conventional SAP mission areas. An oral history interview subject must also be absolved of this obligation to protect this information
    as well, some of it may be bigoted or WAIVED (lAW DODI 5205.11 and 10 USC Sec 119). Furthermore, as discussed Friday, I am seeking a ODNI CAPCO determination to absolve an oral history interview subject of any NDA''s relating to UAP-related and adjacent (as stated above) IC CAP information. Additionally, in my particular case, in order to horizontally protect a portion of my oral history testimony previously provided to ICIG and the intelligence committees, we would need to conduct the interview at the HCS-Operations (0) Restricted Handling (RH) level (lAW DNI CAPCO manual Sec. 4). Has the CIA Office of Security (OS) or Directorate of Operations (DO) provided a memo in this regard for oral history interview subjects? Has the OS provided a memo to also cover managed-need-to-know (MNTK) projects not directly reported to ODNI CAPCO? Lastly, what signed policy does AARO have to receive non-title-10 SAPs (ie, DOE and NSC)? Has the EOP NSC Security Director, Director National Program Management
    Staff OUSD(I&S), or DOE SAPCO/SAPOC provided a memo similar to the DoD SAPCO memo you provided? v/r, DG'
  source:
    path: government/blackvault-aaro-invitations-to-grusch-24-F-0266.pdf
    location: 'Email dated 2023-11-13 12:24 PM from David Grusch (Subject: "Re: Contact Request")'
  significance: KEY substantive Grusch signed letter — his detailed technical objections to AARO interview terms. Names specific security frameworks (DODI 5205.11, 10 USC 119, DNI CAPCO manual Sec. 4, HCS-Operations Restricted Handling) and asks whether AARO has secured memos from CIA OS/DO for oral-history subjects, from EOP NSC Security Director, OUSD(I&S), and DOE SAPCO/SAPOC. Implies he has testimony that reaches DOE and NSC-level SAPs.
  context: Grusch-AARO correspondence, 2023-11-13 — technical objection to AARO's SAPCO-only memo coverage
  observation_type: relayed
  statement_date: '2023-11-13'
- id: q158
  added_date: '2026-04-22'
  text: Thank you. I apologize for the confusion this morning about my whereabouts. I should been more clear in my email on Monday. DG
  source:
    path: government/blackvault-aaro-invitations-to-grusch-24-F-0266.pdf
    location: 'Email dated 2023-11-14 4:35 PM from David Grusch (Subject:

      "Re: Contact Request")'
  significance: Grusch's brief acknowledgment of the no-show at AARO's Arlington facility on 2023-11-14 — does not elaborate on reason.
  context: Grusch-AARO correspondence, 2023-11-14
  observation_type: relayed
  statement_date: '2023-11-14'
- id: q159
  added_date: '2026-04-22'
  text: AARO Staff, With due respect, I will need answers to my questions before I will be comfortable meeting. Please provide responses so that we can hopefully move forward and schedule a meeting. The law may grant your office need-to-know, but does not establish policies and procedures with various data owners. I have managed multi-compartmented activities throughout my entire career and have multiple DCSA security professional certifications. I did not ask these questions for mere curiosity. DG
  source:
    path: government/blackvault-aaro-invitations-to-grusch-24-F-0266.pdf
    location: 'Email dated 2023-11-14 10:36 AM from David Grusch (Subject:

      "Re: Contact Request")'
  significance: Grusch's signed statement of the structural objection that "the law may grant your office need-to-know, but does not establish policies and procedures with various data owners" — asserts he holds multiple DCSA security-professional certifications.
  context: Grusch-AARO correspondence, 2023-11-14 (morning of the no-show)
  observation_type: relayed
  statement_date: '2023-11-14'
- id: q160
  added_date: '2026-04-22'
  text: Good Evening, Thank you for your email. I had expressed specific concerns, both directly via email and through counsel, and those specific concerns have not yet been addressed in writing. Please reference those emails in this chain. DG
  source:
    path: government/blackvault-aaro-invitations-to-grusch-24-F-0266.pdf
    location: 'Email dated 2023-11-19 6:03 PM from David Grusch (Subject:

      "Re: Contact Request")'
  significance: Grusch's signed response to AARO's renewed invitation — states his specific concerns (via email and counsel) remain unaddressed in writing.
  context: Grusch-AARO correspondence, 2023-11-19
  observation_type: relayed
  statement_date: '2023-11-19'
- id: q161
  added_date: '2026-04-22'
  text: Good Afternoon, Thank you will review. Please address my specific concerns that I sent via email on 19 Nov 23. DG
  source:
    path: government/blackvault-aaro-invitations-to-grusch-24-F-0266.pdf
    location: 'Email dated 2024-01-08 from David Grusch (Subject: "Re:

      Contact Request")'
  significance: Grusch's final-in-release signed response to AARO, continuing to defer interview pending written response to his 19 Nov 23 concerns. Establishes the impasse position through January 2024.
  context: Grusch-AARO correspondence, 2024-01-08
  observation_type: relayed
  statement_date: '2024-01-08'
- id: q162
  added_date: '2026-04-22'
  text: I have read the disclosure drafted by my attorneys, Irvin Charles McCullough, III, and Andrew P. Bakaj, and I hereby adopt the statements as if they were my own and do solemnly affirm under the penalties of perjury that the contents of the foregoing paper are true and correct to the best of my knowledge.
  source:
    path: government/grusch-ppd-19-procedural-filing.pdf
    location: Sworn affirmation block at filing conclusion, dated 2022-05-25
  significance: KEY — Grusch's under-penalty-of-perjury adoption of the entire PPD-19 disclosure body as his own statement. Legally binds every attorney-drafted claim in the filing to Grusch as his sworn statement. Foundational source document for all filed-claim categorization.
  context: Sworn affirmation, PPD-19 Disclosure of Urgent Concern(s) / Complaint of Reprisal, ICIG, dated 2022-05-25
  observation_type: relayed
  category: filed-claim
  statement_date: '2022-05-25'
- id: q163
  added_date: '2026-04-22'
  text: Mr. Grusch previously served as a fully cleared member of the United States (US) Government’s UAP Task Force. He has direct knowledge that certain IC elements have purposely and intentionally withheld and/or concealed UAP-related classified information from the US Congress. He has direct knowledge that this classified information has been withheld and/or concealed by the involved IC elements to purposely and intentionally thwart legitimate Congressional oversight of the UAP Program.
  source:
    path: government/grusch-ppd-19-procedural-filing.pdf
    location: PPD-19 filing ¶3, adopted under oath by Grusch
  significance: Core filed claim — Grusch (via his counsel-drafted and then sworn-adopted filing) asserts direct knowledge that IC elements purposely withheld UAP-related classified info from Congress to thwart oversight.
  context: PPD-19 Disclosure of Urgent Concern(s), ICIG, dated 2022-05-25 (drafted by counsel, sworn-adopted by Grusch)
  observation_type: relayed
  category: filed-claim
  statement_date: '2022-05-25'
- id: q164
  added_date: '2026-04-22'
  text: In July 2021, Mr. Grusch confidentially provided UAP-related classified information to the Department of Defense Inspector General (DoD IG). At that time, Mr. Grusch communicated classified information about the improper withholding and/or concealment of classified material from the US Congress by certain IC elements. Mr. Grusch believes that his identity and the fact of his UAP-related communication(s) with the DoD IG have been disclosed to individuals and/or entities outside the DoD IG, and that he has suffered retaliation and reprisal(s) related thereto.
  source:
    path: government/grusch-ppd-19-procedural-filing.pdf
    location: PPD-19 filing ¶4, adopted under oath by Grusch
  significance: Sworn filed claim — establishes the July 2021 DoD IG disclosure, alleges outside-IG disclosure of his identity, and alleges retaliation causally tied.
  context: PPD-19 Disclosure of Urgent Concern(s), ICIG, dated 2022-05-25
  observation_type: relayed
  category: filed-claim
  statement_date: '2022-05-25'
- id: q165
  added_date: '2026-04-22'
  text: Since his protected disclosure(s) to the DoD IG, Mr. Grusch has been subjected to numerous adverse security clearance actions. These actions have unfairly and unjustifiably impugned his integrity, character, judgment, professionalism, and mental health. While he remains security-cleared by the NGA, his compartmented accesses at numerous other IC elements have been — mysteriously and apparently without plausible explanation — canceled, delayed, denied, and/or improperly obstructed.
  source:
    path: government/grusch-ppd-19-procedural-filing.pdf
    location: PPD-19 filing ¶5, adopted under oath by Grusch
  significance: Sworn filed claim documenting the specific retaliation pattern — "numerous adverse security clearance actions" impugning integrity/character/judgment/professionalism/mental health. Names compartmented-access cancellation/delay/denial at multiple IC elements.
  context: PPD-19 Disclosure of Urgent Concern(s), ICIG, dated 2022-05-25
  observation_type: relayed
  category: filed-claim
  statement_date: '2022-05-25'
