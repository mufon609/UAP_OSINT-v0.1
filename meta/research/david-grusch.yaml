  added_date: '2026-04-22'
  voucher_path: /people/eric-burlison
  attestation: '"The American people deserve answers about UAPs," said Rep. Burlison. "David Grusch has risked his career to expose critical information. His expertise will be vital as we work to uncover the truth and hold the government accountable."

