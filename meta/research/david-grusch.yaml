- id: q153
  added_date: '2026-04-22'
  text: The public is rightfully demanding to know the truth and it is my true privilege for me to serve the people of this country once again. I will use all my expertise to support Rep. Burlison and help the US Congress restore full oversight while enabling the Legislative Branch’s ability to investigate and hold those accountable who have broken the law and lied not only to our Congress, but also to the Executive Office of the President, Director of National Intelligence, and Department of Justice
  source:
