- id: vc5
  added_date: '2026-04-22'
  voucher_path: /people/tim-burchett
  attestation: '"This man served his country," Burchett said. "Dadgummit, we’ve got to do better than this. I’m so disgusted about this. When I knew about it last night, I woke up at 3 o’clock this morning. Hell, I couldn’t get back to sleep."

