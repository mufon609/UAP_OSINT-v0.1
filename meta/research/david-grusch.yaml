  added_date: '2026-04-22'
  voucher_path: /people/marco-rubio
  attestation: '"There are people that have come forward to share information with our committee over the last couple of years. … I want to be very protective of these people. A lot of these people came to us even before protections were in the law for whistleblowers to come forward," Rubio told NewsNation''s Joe Khalil during an exclusive interview.

