  added_date: '2026-04-22'
  voucher_path: /people/tim-burchett
  attestation: '"It doesn’t matter," Rep. Tim Burchett, R-Tenn., said of the story. "What matters is the fact that this man served his country and is suffering for it. And now, we’re stigmatizing this further," Burchett said.

