- id: q4
  added_date: '2026-05-16'
  text: |-
    After his parents divorced and his mother remarried, he moved to Cyprus where his new stepfather ran a bed-and-breakfast. "It was a Mossad safe house," Geller said in a hushed tone, "from which agents would go to Damascus, Jordan, Egypt, all of those countries. When I was 12 or 13, I confronted one of the agents. His name was Yoav Shaham. I told him: 'You're a spy, Yoav!' I felt it. He freaked out. He told me never to dare say that again."
  source:
    path: news/tablet-spy-who-bent-a-million-spoons-20260516.html
    location: ¶ Mossad-safe-house
  significance: 'Geller''s account of his stepfather''s Cyprus bed-and-breakfast as a Mossad safe house and his teenage encounter with Yoav Shaham — primary self-attestation of the entry point into the Israeli-intelligence recruitment chain'
  statement_date: '2015-06-03'
- id: q5
  added_date: '2026-05-16'
  text: |-
    Shaham gave Geller a job as a courier. He would collect letters that would arrive at the hotel from Arab countries and deliver them to the Israeli ambassador in Nicosia.
  source:
    path: news/tablet-spy-who-bent-a-million-spoons-20260516.html
    location: ¶ Mossad-safe-house+1
  significance: Tal Kra-Oz reconstruction of Geller's account — courier role for Shaham delivering Arab-country letters to the Israeli ambassador in Nicosia
  statement_date: '2015-06-03'
- id: q6
  added_date: '2026-05-16'
  text: |-
    And Shaham promised more, but before Geller finished his IDF service, Shaham, a commander in the paratroopers, was killed in the West Bank. "That shattered me," Geller said. "I knew that I had lost my chance. But what I didn't know was that he had spoken with intelligence chiefs Meir Amit and Aharon Yariv about me. Yariv summoned me to a meeting in Tel Aviv. I went through all the biggest intelligence guys. And then that's it—no comment from that point on."
  source:
    path: news/tablet-spy-who-bent-a-million-spoons-20260516.html
    location: ¶ Mossad-safe-house+2
  significance: 'Geller''s account of Shaham''s death in the West Bank and the subsequent summons to a Tel Aviv meeting by Aharon Yariv (Aman chief 1964-1972) — primary self-attestation of the recruitment chain Shaham → Meir Amit → Aharon Yariv that Web''s handoff identified as the load-bearing Israeli-intelligence claim from this source'
  statement_date: '2015-06-03'
- id: q7
  added_date: '2026-05-16'
  text: |-
    The BBC documentary details the extensive tests Geller underwent at Stanford Research Institute in the 1970s, research that was sponsored by the CIA during the years that were profiled in the book Men Who Stare at Goats, later made into a film starring George Clooney.
  source:
    path: news/tablet-spy-who-bent-a-million-spoons-20260516.html
    location: ¶ BBC-documentary
  significance: Article framing of the SRI / CIA testing era — Tal Kra-Oz description of the BBC documentary's account of Geller's SRI tests
  statement_date: '2015-06-03'
- id: q8
  added_date: '2026-05-16'
  text: |-
    The documentary suggests that after Geller's handlers tried to harness his psychic powers to doing everything from knocking out radar stations ahead of the Israel Air Force's fateful flight to Entebbe, Uganda, to influencing the Russians to sign the 1987 Nuclear Reduction Treaty. He told me he was never paid for his efforts, and that he always refused to do negative things.
  source:
    path: news/tablet-spy-who-bent-a-million-spoons-20260516.html
    location: ¶ BBC-documentary+1
  significance: 'Article reporting of the BBC-documentary claims about Geller''s claimed operational uses — Entebbe radar and 1987 Nuclear Reduction Treaty Russians; Geller''s never-paid and never-do-negative claims to Kra-Oz'
  statement_date: '2015-06-03'
- id: q9
  added_date: '2026-05-16'
  text: |-
    I can tell you that the FBI asked me to convince Russian diplomats to defect. They made whole parties in Long Island, I mingled there, I beamed my mind,
  source:
    path: news/tablet-spy-who-bent-a-million-spoons-20260516.html
    location: ¶ FBI-defection
  significance: Geller's account of the FBI asking him — Long Island parties, mingled with Russian diplomats, claimed beaming-of-mind to influence defection
  statement_date: '2015-06-03'
- id: q10
  added_date: '2026-05-16'
  text: |-
    I walked up to her and handed her a marker. I told her 'Golda, go to the restroom, close the door, draw something, don't show it to anyone, get out, look in my eyes, and I'll draw it.' I'm the only person who ever sent the prime minister to the toilet!
  source:
    path: news/tablet-spy-who-bent-a-million-spoons-20260516.html
    location: ¶ Golda-Meir-party
