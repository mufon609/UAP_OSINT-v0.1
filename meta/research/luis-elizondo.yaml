quotes:
- id: q1
  added_date: '2026-05-19'
  text: |
    Yes. I served as the senior ranking person of the Advanced Aerospace Threat
    Identification Program ("AATIP") within the Department of Defense ("DoD"). AATIP
    investigated unidentified anomalous phenomena ("UAP"). AATIP engaged senior
    executives at DoD Defense aerospace companies who claimed they possessed recovered
    "exotic material" not made by any U.S. or foreign source. Because these executives
    indicated that they could no longer glean additional insight from such material, they initially
    agreed to allow AATIP/AAWSAP to take custody of the material.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'Response to Q1, ¶1'
  context: 'Sworn Question-for-the-Record response to Rep. Eric Burlison, December 19, 2024; submitted under penalty of 18 U.S.C. § 1001 following the November 13, 2024 House Oversight hearing.'
  observation_type: relayed
  statement_date: '2024-12-19'
  significance: 'Elizondo''s sworn self-attestation of his AATIP role ("senior ranking person") and the foundational AATIP institutional claim — that DoD aerospace company executives claimed possession of recovered "exotic material" not made by U.S. or foreign sources, and that they initially agreed to allow AATIP/AAWSAP to take custody. The 18 U.S.C. § 1001 perjury basis is the highest evidentiary tier available in this artifact.'

- id: q2
  added_date: '2026-05-19'
  text: |
    Yes. The U.S. Government (or a defense contractor) has in its possession exotic
    materials of nonhuman origin.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'Response to Q2, ¶1'
  context: 'Sworn QFR response, December 19, 2024; direct answer to Burlison Q2 asking whether U.S. military or defense contractors employ exotic materials of non-human or non-terrestrial origin.'
  observation_type: relayed
  statement_date: '2024-12-19'
  significance: 'Single-sentence sworn affirmation of nonhuman-origin material possession by the U.S. Government or a defense contractor. The brevity is itself load-bearing — the response carries no hedge, no scope-limitation, and no source attribution; Elizondo is asserting the fact under penalty of perjury without qualifying language.'

- id: q3
  added_date: '2026-05-19'
  text: |
    (a) Yes. I am aware of several incidents where the U.S. military and certain Defense
    Contract companies recovered craft/vehicles of non-human origin. In some cases, biological
    specimens were recovered from such crashes.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'Response to Q4(a), ¶1'
  context: 'Sworn QFR response, December 19, 2024; direct answer to Burlison Q4(a) asking whether the U.S. military or defense contractors have recovered craft of non-human origin and whether non-human entities were associated with these craft.'
  observation_type: relayed
  statement_date: '2024-12-19'
  significance: 'Sworn affirmation that the U.S. military and "certain Defense Contract companies" recovered craft of non-human origin in multiple incidents and that biological specimens were recovered in some cases. The "several incidents" framing introduces multiplicity into the institutional record; the "biological specimens" claim is the most direct sworn statement on non-human biology in the disclosure-era public record.'

- id: q4
  added_date: '2026-05-19'
  text: |
    Several key scientists associated with both AAWSAP and AATIP were part of a
    conversation, sponsored by the White House in approximately 2004, to determine if the U.S.
    public was prepared for the acknowledgement of UAP by the U.S. Government. After
    approximately one week of deliberations, the decision was made that the U.S. Government
    should not disclose any UAP-related information to the public.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'Response to Q4, closing paragraph'
  context: 'Sworn QFR response, December 19, 2024; appended to the Q4 (recovered craft / biological specimens) response.'
  observation_type: relayed
  statement_date: '2024-12-19'
  significance: 'Attests a 2004 White House–sponsored conversation about whether to disclose UAP information to the public — with the named participation of "Several key scientists associated with both AAWSAP and AATIP" and a stated week-long deliberation ending in a decision against disclosure. The stated week-long deliberation constrains the institutional-decision-against-disclosure narrative; the named participation of AAWSAP/AATIP key scientists constrains the date attribution of the roster to 2004 or earlier in this specific institutional context.'

- id: q5
  added_date: '2026-05-19'
  text: |
    Yes. The CIA opposed the transfer of materials of advanced, non-human origin
    from Lockheed Martin to Bigelow Aerospace.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'Response to Q6, ¶1'
  context: 'Sworn QFR response, December 19, 2024; direct answer to Burlison Q6 asking about the journalist Christopher Sharp claim regarding Bigelow Aerospace, Lockheed Martin, and CIA blocking of materials transfer.'
  observation_type: relayed
  statement_date: '2024-12-19'
  significance: 'Sworn affirmation of the CIA''s opposition to a Lockheed Martin → Bigelow Aerospace materials transfer of "advanced, non-human origin." The named-entity specificity (CIA, Lockheed Martin, Bigelow Aerospace) and the brevity of the answer make this one of the most concrete institutional attestations in the disclosure-era sworn record.'

- id: q6
  added_date: '2026-05-19'
  text: |
    Yes. I can confirm that specific facilities were identified to enable Bigelow
    Aerospace to acquire and securely store recovered UAP materials as the new custodian,
    following their transfer from Lockheed Martin. These facilities included locations in the Las
    Vegas area and a newly built hangar at the Patuxent River Naval Air Station (“PAX”).
    Specifically, the PAX River hangar was designed to facilitate the transfer of future materials
    via air and river. The hangar was purpose-built to meet the requirements of a Special Access
    Program Facility (“SAP-F”) and was capable of accommodating materials at any
    classification level. I was informed that funding for the hangar, approximately $10 million,
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'Response to Q7, ¶1 (first half — pre-page-break)'
  context: 'Sworn QFR response, December 19, 2024; direct answer to Burlison Q7 asking about the attempt to transfer non-human technology to Bigelow Aerospace from Lockheed Martin during Elizondo''s time at AATIP. First half of Q7 response (the response splits across a PDF page break; second half captured in q16).'
  observation_type: relayed
  statement_date: '2024-12-19'
  significance: 'Sworn affirmation that specific facilities — Las Vegas locations and a newly built Patuxent River Naval Air Station hangar — were identified to enable Bigelow Aerospace to receive UAP materials transferred from Lockheed Martin. The PAX River hangar is described as purpose-built to meet Special Access Program Facility (SAP-F) requirements and capable of accommodating materials at any classification level. The hangar funding is stated as approximately $10 million.'

- id: q16
  added_date: '2026-05-19'
  text: |
    was allocated at the request of then-Representative Steny Hoyer. I have visited this facility;
    however, as it was a new construction at the time, no materials had yet been transferred.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'Response to Q7, ¶1 (second half — post-page-break)'
  context: 'Sworn QFR response, December 19, 2024; direct answer to Burlison Q7. Second half of the Q7 response (splits across a PDF page break from q6) — names Hoyer as the source of the $10M funding allocation and attests Elizondo''s personal visit to the facility.'
  observation_type: direct
  statement_date: '2024-12-19'
  significance: 'Direct first-hand testimony — Elizondo states "I have visited this facility" — naming then-Representative Steny Hoyer ([`/people/steny-hoyer`]) as the source of the funding-allocation request for the Patuxent River SAP-F hangar described in q6. The "no materials had yet been transferred" closing clause constrains the historical material-custody question to "facility ready, no materials in custody at time of visit."'

- id: q7
  added_date: '2026-05-19'
  text: |
    Yes, and similar obstructionist efforts were also made by the U.S. Air Force.
    There seemed to be passive resistance from certain elements within the Central Intelligence
    Agency and a more active campaign by specific factions within the U.S. Air Force to
    suppress inquiries and investigations into the UAP topic
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'Response to Q9, ¶1'
  context: 'Sworn QFR response, December 19, 2024; direct answer to Burlison Q9 asking about CIA efforts to block UAP-related materials or information transfer during Elizondo''s tenure at AATIP.'
  observation_type: relayed
  statement_date: '2024-12-19'
  significance: 'Differentiates CIA "passive resistance" from U.S. Air Force "more active campaign" to suppress UAP inquiries — institutional-actor characterization of two distinct obstructionist patterns rather than a single monolithic blockage. The framing constrains any future analysis that proposes a unified suppression model.'

- id: q8
  added_date: '2026-05-19'
  text: |
    Yes. Many of my former colleagues and I have faced retaliation for our public
    advocacy for UAP transparency. This has included efforts to suspend or revoke our security
    clearances, as well as direct threats to our safety and that of our families. Some elements
    within the DoD and the Intelligence Community ("IC") have engaged in what can only be
    described as 'administrative terrorism' to deter individuals with security clearances from
    raising this issue.
  source:
