rumors: []

credibility_notes: 'Elizondo''s evidentiary posture is anchored by the December 19, 2024 sworn Question-for-the-Record response to Rep. Burlison ([`/people/eric-burlison`]), which is made under penalty of 18 U.S.C. § 1001. This is the highest evidentiary tier in this artifact set — eight quotes (q1–q8) are drawn from that document. The sworn QFR framing of materials-related claims (Q1: AATIP custody, Q2: nonhuman-origin materials possession, Q4a: craft and biological-specimen recovery, Q6: CIA opposition to Lockheed→Bigelow transfer, Q7: PAX River SAP-F hangar) is the highest-evidentiary-tier institutional-actor attestation in the disclosure-era public record on these topics.


  The 2017 New York Times reporting by Helene Cooper, Ralph Blumenthal and Leslie Kean (December 16, 2017) provides third-party institutional confirmation of Elizondo''s AATIP role at the moment of program disclosure ("It was run by a military intelligence official, Luis Elizondo, on the fifth floor of the Pentagon''s C Ring") and contemporaneous on-record characterization of his resignation rationale ("excessive secrecy and internal opposition"). The resignation letter itself dated October 4, 2017 to Defense Secretary Jim Mattis ([`/people/jim-mattis`]) is currently not archived in this repository ([`/documents/elizondo-resignation-letter-2017`] is a flagged stub per the corpus convention); NYT-mediated quotation (q11, q12) is the proximate verbatim source.


  The Joe Rogan Experience #2194 of August 23, 2024 is an on-record (non-sworn) long-form interview source. Elizondo''s narrative of his 2009 recruitment by Dr. James Lacatski ([`/people/james-lacatski`]) (q13, q14) is self-attested and uncorroborated by other primary sources in this artifact set. The auto-caption typos for "Lacatski" ("latky", "latsky") are preserved in quote text per the transcript-provenance auto-caption discipline; the naming_quirks entries record the source-form → canonical mapping.


  No commercial or financial UAP-related affiliation is documented in the primary sources here other than Elizondo''s 2017 co-founding role at To the Stars Academy of Arts and Science ([`/organizations/ttsa`]) per NYT 2017. His current Buffalo, Wyoming P.O. Box 337 mailing address per the QFR cover letter constrains his geographic posture post-resignation; subsequent commercial engagement (book authorship, media appearances) is not catalogued in this artifact set.'

