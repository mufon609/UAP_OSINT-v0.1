background: 'Luis D. Elizondo is a former United States Army ([`/organizations/us-army`]) Counter Intelligence Special Agent and Department of Defense civilian intelligence official who served as the senior ranking person of the Advanced Aerospace Threat Identification Program ([`/organizations/aatip`]) ("AATIP") within the Department of Defense ([`/organizations/dod`]), per his sworn Question-for-the-Record response to Rep. Eric Burlison ([`/people/eric-burlison`]) dated December 19, 2024 (Q1). The New York Times ([`/organizations/the-new-york-times`]) article "Glowing Auras and ‘Black Money’: The Pentagon’s Mysterious U.F.O. Program" by Helene Cooper ([`/people/helene-cooper`]), Ralph Blumenthal ([`/people/ralph-blumenthal`]) and Leslie Kean ([`/people/leslie-kean`]), published December 16, 2017, reported that the program "was run by a military intelligence official, Luis Elizondo, on the fifth floor of the Pentagon’s C Ring, deep within the building’s maze," and identified Elizondo in a photograph caption as the person "who led the Pentagon effort to investigate U.F.O.s until October" 2017, when he resigned. On the Joe Rogan Experience #2194 ([`/transcripts/jre-2194-elizondo-2024`]) of August 23, 2024, Elizondo described his pre-AATIP career as "a special agent in Counter Intelligence" who was "protecting Technologies critical Technologies critical avionic Technologies" before being recruited in early 2009 to run "The Counter Intelligence and security aspect for a particular program" by Dr. James Lacatski ([`/people/james-lacatski`]).


  Following his October 2017 resignation, Elizondo joined the To the Stars Academy of Arts and Science ([`/organizations/ttsa`]) alongside Hal Puthoff ([`/people/hal-puthoff`]) and Christopher Mellon ([`/people/christopher-mellon`]) per the NYT 2017 article. He testified before the joint House Oversight subcommittee hearing on November 13, 2024 ([`/events/2024-11-13-house-oversight-uap-hearing`]) titled "Unidentified Anomalous Phenomena: Exposing the Truth," convened by Subcommittee Chairs Nancy Mace ([`/people/nancy-mace`]) and Glenn Grothman ([`/people/glenn-grothman`]), and submitted sworn written Question-for-the-Record responses to Rep. Eric Burlison on December 19, 2024, addressed from a P.O. Box in Buffalo, Wyoming. The QFR responses, made under penalty of 18 U.S.C. § 1001, attest a series of institutional claims including the existence of recovered non-human technology, a 2004 White House conversation about public UAP disclosure, the Central Intelligence Agency ([`/organizations/cia`]) opposing a Lockheed Martin ([`/organizations/lockheed-martin`])-to-Bigelow Aerospace ([`/organizations/bigelow-aerospace`]) materials transfer, and the Patuxent River Naval Air Station Special Access Program Facility (SAP-F) hangar funded at the request of then-Representative Steny Hoyer. The QFR Q9 response further attributes UAP-inquiry suppression to both the CIA ("passive resistance") and the United States Air Force ([`/organizations/us-air-force`]) ("more active campaign"); per the NYT 2017 reporting, in the post-2012 funding-cessation phase of the program Elizondo "worked with officials from the [United States] Navy ([`/organizations/us-navy`]) and the C.I.A."'

top_relevance: 'Elizondo is a primary disclosure-era institutional actor whose significance rests on his attested role as the senior ranking person of AATIP and on the specific institutional claims he has placed on the public record under penalty of perjury. The December 19, 2024 sworn QFR responses to Rep. Burlison ([`/people/eric-burlison`]) confirm — at the UNCLASSIFIED level — that AATIP engaged senior aerospace-company executives who claimed possession of recovered "exotic material" not made by U.S. or foreign sources (Q1); that the U.S. Government or a defense contractor possesses "exotic materials of nonhuman origin" (Q2); that he is aware of "several incidents where the U.S. military and certain Defense Contract companies recovered craft/vehicles of non-human origin" and in some cases "biological specimens were recovered" (Q4a); that the CIA opposed a Lockheed Martin → Bigelow Aerospace materials transfer (Q6); that a Patuxent River Naval Air Station SAP-F hangar (~$10M, funding at the request of then-Representative Steny Hoyer ([`/people/steny-hoyer`])) was purpose-built to receive future UAP materials transferred via air and river but no materials had been transferred at the time of his visit (Q7); and that retaliation against UAP advocates within the DoD and IC has included security-clearance actions, harassment, surveillance, and death threats (Q10). The QFR Q1 response also identifies Dr. James Lacatski ([`/people/james-lacatski`]) as author of a DOPSR-cleared statement (September 6, 2023) addressing crash retrieval of UAP material from the 1950s and naming the AAWSAP funding redirection. The QFR is the load-bearing sworn-record artifact in Elizondo''s public attestation chain; his earlier 2017 disclosure to Cooper, Blumenthal and Kean of The New York Times established AATIP''s existence in the public record. His 2024 long-form Joe Rogan Experience #2194 interview (August 23, 2024) places the same institutional claims on a non-sworn on-record footing and adds first-hand narrative about his 2009 recruitment by Dr. James Lacatski.'

