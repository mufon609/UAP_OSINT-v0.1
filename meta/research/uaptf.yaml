  added_date: '2026-04-20'
  date: '2020-04-16'
  event: UAP Security Classification Guide issued by Naval Intelligence Activity (ID# 04-030) — identifies the Office of Naval Intelligence, Unidentified Aerial Phenomenon (UAP) Task Force as scope subject
  category: other
  source:
    path: government/blackvault-uap-security-classification-guide-20200416.pdf
    location: p.1
- id: t2
  added_date: '2026-04-20'
  date: '2020-08-04'
  event: Deputy Secretary of Defense David L. Norquist approved the establishment of an Unidentified Aerial Phenomena (UAP) Task Force (UAPTF)
  category: founding
  source:
    path: government/defense-gov-uaptf-establishment-20200814.html
    location: article body ¶1
- id: t3
  added_date: '2026-04-20'
  date: '2020-08-14'
  event: DoD publicly announces establishment of the Unidentified Aerial Phenomena Task Force
  category: founding
  source:
    path: government/defense-gov-uaptf-establishment-20200814.html
    location: article body ¶1
- id: t4
  added_date: '2026-04-20'
  date: '2020-09-01'
  event: UAPTF Charter signed by the Director, Naval Intelligence Activity (Scott Bray per Black Vault FOIA release, April 22, 2025)
  category: other
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: p.1
- id: t4b
  added_date: '2026-04-22'
  date: '2020-09-23'
  event: NIA Director Scott Bray issues two cross-service outreach memoranda to senior intelligence officials in the U.S. Army and U.S. Air Force, establishing UAPTF cross-service structure. Both memos included in the April 22, 2025 FOIA release package (DON-NAVY-2021-003140).
  category: other
  source:
    path: news/blackvault-uaptf-charter-foia-release-20250422.html
    location: The Black Vault article body
- id: t5
  added_date: '2026-04-20'
  date: '2021-06-25'
  event: ODNI Preliminary Assessment, Unidentified Aerial Phenomena published — drafted by UAPTF and the ODNI National Intelligence Manager for Aviation
  category: other
  source:
    path: government/dni-gov-odni-preliminary-assessment-20210625.pdf
    location: p.1
  node_link: /documents/odni-preliminary-assessment-2021
- id: t6
  added_date: '2026-04-20'
  date: '2021-11-23'
  event: "Airborne Object Identification and Management Synchronization Group (AOIMSG) established by Hicks memorandum to succeed the U.S. Navy's Unidentified Aerial Phenomena Task Force. Per AARO HRR Volume I this is the functional end of UAPTF's lifecycle (August 2020 – November 2021); formal disestablishment directive followed in the second Hicks memorandum on July 15, 2022."
  category: leadership-transition
  source:
    path: government/defense-gov-aoimsg-establishment-20211123.html
    location: article body ¶1
  node_link: /organizations/aoimsg
- id: t6b
  added_date: '2026-05-19'
  date: '2022-05-17'
  event: 'House Permanent Select Committee on Intelligence Subcommittee on Counterterrorism, Counterintelligence, and Counterproliferation holds the first public congressional UAP hearing in 50+ years [`/events/2022-05-17-hpsci-uap-hearing`] — DepUSDI&S Ronald Moultrie [`/people/ronald-moultrie`] [`/transcripts/2022-05-17-hpsci-moultrie`] and Deputy Director of Naval Intelligence Scott Bray [`/transcripts/2022-05-17-hpsci-bray`] testify on the UAP Task Force and its planned transition to AARO.'
  category: other
  source:
    path: government/congress-gov-hpsci-uap-transcript-20220517.pdf
    location: p. 1
- id: t7
  added_date: '2026-04-20'
  date: '2022-06-29'
  event: DoD Public Affairs statement (via spokesperson Susan Gough) names former Office of Naval Intelligence senior civilian John Stratton as UAPTF lead; Dr. Travis Taylor identified as informal Chief Scientist
  category: other
  source:
    path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
    location: A1 response from DoD spokesperson Susan Gough
- id: t8
  added_date: '2026-04-20'
  date: '2022-07-15'
  event: Deputy Secretary of Defense memorandum directs the Secretary of the Navy to disestablish UAPTF no later than the date the AARO is established, and to transfer data, analysis, or other relevant material to the AARO
  category: leadership-transition
  source:
    path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
    location: p.1
- id: t9
  added_date: '2026-04-20'
  date: '2022-07-20'
  event: DoD press release publicly announces AARO establishment. Per AARO HRR Volume I (March 2024) the formal AARO establishment date is July 15, 2022 (Hicks memorandum signature date); July 20, 2022 is the public-announcement date.
  category: leadership-transition
  source:
    path: government/defense-gov-aaro-establishment-20220720.html
    location: article body ¶1
  node_link: /organizations/aaro
