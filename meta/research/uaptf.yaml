  entity_type: event
  name: '2022-05-17 HPSCI UAP hearing'
  wrap_path: /events/2022-05-17-hpsci-uap-hearing
  context_summary: 'The May 17, 2022 House Permanent Select Committee on Intelligence Subcommittee on Counterterrorism, Counterintelligence, and Counterproliferation UAP hearing — the first public congressional UAP hearing in over 50 years. The hearing covered the just-stood-up UAP Task Force (this artifact) → AARO transition. Two witnesses: DepUSDI&S Ronald Moultrie (`/people/ronald-moultrie`) and Deputy Director of Naval Intelligence Scott Bray. Open-session stenographic transcript at `government/congress-gov-hpsci-uap-transcript-20220517.pdf`. Event node unbuilt in this repository.'
- id: e13
  added_date: '2026-05-19'
  entity_type: transcript
  name: '2022-05-17 HPSCI hearing — Bray oral testimony'
  wrap_path: /transcripts/2022-05-17-hpsci-bray
  context_summary: 'Scott Bray''s portion of the May 17, 2022 HPSCI UAP hearing. Bray as Deputy Director of Naval Intelligence testified on the just-established UAP Task Force operations and the categorization framework being applied to UAP incidents. The Bray "no material we have recovered" testimony on the open-session record is load-bearing for subsequent Grusch (`/people/david-grusch`) disclosure framing. Transcript node unbuilt in this repository.'
- id: e14
  added_date: '2026-05-19'
  entity_type: transcript
  name: '2022-05-17 HPSCI hearing — Moultrie oral testimony'
  wrap_path: /transcripts/2022-05-17-hpsci-moultrie
  context_summary: 'Ronald Moultrie''s (`/people/ronald-moultrie`) portion of the May 17, 2022 HPSCI UAP hearing. Moultrie as Under Secretary of Defense for Intelligence and Security testified on the UAP Task Force → AARO institutional transition and DoD oversight structure. Transcript node unbuilt in this repository; companion to the Bray transcript node above.'
naming_quirks:
- id: nq1
  added_date: '2026-04-20'
  observed: John Stratton
  canonical: Jay Stratton
  location: Gough DoD PA statement (Q1 answer)
  source_path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
  resolution: preserve-as-sic-in-quotes
  note: The DoD Public Affairs statement uses Stratton's legal first name "John"; the canonical form used in secondary sources (memoir announcement, podcast appearances, Americans for Safe Aerospace advisor listing) is the nickname "Jay". Both forms are source-attested; quoted passages preserve the "John" form verbatim.
- id: nq2
  added_date: '2026-04-20'
  observed: Unidentified Aerial Phenomena
  canonical: Unidentified Aerial Phenomena
  location: UAPTF name across all primary sources
  source_path: government/defense-gov-uaptf-establishment-20200814.html
  resolution: use-canonical
  note: UAPTF era uses "Unidentified Aerial Phenomena" (plural); later AARO-era documents use "Unidentified Anomalous Phenomena". The terminology shift tracks with the AARO scope expansion to include space, submerged, and transmedium objects per the Hicks memorandum. UAPTF's own naming remains "Unidentified Aerial Phenomena Task Force" in all of its primary sources.
- id: nq3
  added_date: '2026-04-22'
  observed: identifYing
  canonical: identifying
  location: UAP Security Classification Guide (ID# 04-030), p.1 Purpose statement
  source_path: government/blackvault-uap-security-classification-guide-20200416.pdf
  resolution: preserve-as-sic-in-quotes
  note: OCR artifact in the FOIA-released text-extraction of the UAP Security Classification Guide — the "Y" is capitalized mid-word ("identifYing" instead of "identifying"). Parallels the "chaner" / "Unidenlified" OCR artifacts preserved in the UAPTF Charter quotes. Key Passage q3 preserves the as-scanned form.
- id: nq4
  added_date: '2026-04-22'
  observed: NGA (duplicated in the contributor list)
  canonical: NGA
  location: ODNI Preliminary Assessment, p.3 SCOPE AND ASSUMPTIONS, contributor list
  source_path: government/dni-gov-odni-preliminary-assessment-20210625.pdf
  resolution: preserve-as-sic-in-quotes
  note: The ODNI Preliminary Assessment's cross-agency contributor list as published contains a duplicate "NGA" entry (once between NRO and NSA, once between NOAA and ODNI/NIM-Emerging and Disruptive Technology). Preserved verbatim in Key Passage q8 as the primary source-attested form rather than deduplicated.
rumors:
- id: r1
  added_date: '2026-04-20'
  claim: Karl Nell served as Army Director / Army liaison supporting the UAPTF from 2021 to 2022
  status: not-primary-source-established
  observed_sources:
  - Americans for Safe Aerospace advisor listing (non-.gov; Stratton is a listed advisor to the same organization)
  - SALT speaker bio (salt.org); The Debrief Kean/Blumenthal coverage
  note: Widely attested across secondary sources but not in the primary sources this artifact has cited. Logged here while the primary-source gap remains open.
- id: r2
  added_date: '2026-04-20'
  claim: UAPTF was deliberately under-resourced and denied access to pre-existing compartmented UAP programs within the U.S. Government
  status: not-primary-source-established
  observed_sources:
  - Grusch sworn testimony at 2023-07-26 House Oversight hearing (archived as /documents/written-testimony-grusch-2023) claims denial of access to a "multi-decade UAP crash retrieval and reverse engineering program"
  - Widely circulating in UAP-related public discourse
  note: The allegation is a cross-node analytical finding rather than a UAPTF-internal record. UAPTF's own primary sources do not substantiate or refute the scope-constraint framing
