document_intrinsic:
  full_name: Unidentified Aerial Phenomena Task Force
  internal_name: UAPTF
  statutory_authority: Congressionally mandated (Intelligence Authorization Act for Fiscal Year 2021, Senate Report 116-233 "Advanced Aerial Threats" section) and Deputy Secretary of Defense directed (Norquist approval of establishment, August 4, 2020)
  established_date: '2020-08-04'
  terminated_date: 2021-11-23 (functional transfer to AOIMSG via Hicks AOIMSG-establishment memorandum); 2022-07-15 (formal disestablishment directive via Hicks AARO-establishment memorandum)
  parent_organization_path: /organizations/nia
  office_type: DoD task force
  jurisdiction: Three-way governance — chartered by the Naval Intelligence Activity (NIA); Department of the Navy lead department; under the cognizance of the Office of the Under Secretary of Defense for Intelligence and Security (USD(I&S))
context_extrinsic:
  display_title: UAPTF — Unidentified Aerial Phenomena Task Force
quotes:
- id: q1
  added_date: '2026-04-20'
  text: "On Aug. 4, 2020, Deputy Secretary of Defense David L. Norquist approved the establishment of an Unidentified Aerial Phenomena (UAP) Task Force (UAPTF). \xA0The Department of the Navy, under the cognizance of the Office of the Under Secretary of Defense for Intelligence and Security, will lead the UAPTF."
  source:
    path: government/defense-gov-uaptf-establishment-20200814.html
    location: article body ¶1
  significance: Establishment — Norquist approval + Navy/USD(I&S) placement
  context: DoD press release, August 14, 2020
  statement_date: '2020-08-14'
- id: q2
  added_date: '2026-04-20'
  text: "The Department of Defense established the UAPTF to improve its understanding of, and gain insight into, the nature and origins of UAPs. \xA0The mission of the task force is to detect, analyze and catalog UAPs that could potentially pose a threat to U.S. national security."
  source:
    path: government/defense-gov-uaptf-establishment-20200814.html
    location: article body ¶2
  significance: Mission statement — detect, analyze, catalog UAPs
  context: DoD press release, August 14, 2020
  statement_date: '2020-08-14'
- id: q3
  added_date: '2026-04-20'
  text: 'This classification guide is issued for the purpose of identifYing specific topics

    of information associated with the Office of Naval Intelligence, Unidentified Aerial Phenomenon

    (UAP) Task Force that meet the standards and criteria for classification and protection in

    accordance with Executive Order (E.O.) 13526, "Classified National Security Information," as

    amended, and its implementing directives.'
  source:
    path: government/blackvault-uap-security-classification-guide-20200416.pdf
    location: p.1, Purpose
  significance: UAP Security Classification Guide identifies UAPTF at Office of Naval Intelligence — April 16, 2020 (four months before public establishment announcement)
  context: UAP Security Classification Guide (ID# 04-030), Naval Intelligence Activity, April 16, 2020 (OCR preserves "identifYing" for "identifying")
  statement_date: '2020-04-16'
- id: q4
  added_date: '2026-04-20'
  text: This chaner establishes the Congressionally mandated, Deputy Secretary of Defense directed Unidentified Aerial Phenomenon Task Force.
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: p.1, introductory paragraph
  significance: UAPTF Charter attests Congressional mandate + DSD direction as joint authority
  context: UAPTF Charter, Naval Intelligence Activity, signed September 1, 2020 (OCR preserves "chaner" for "charter")
  statement_date: '2020-09-01'
- id: q5
  added_date: '2026-04-20'
  text: The purpose of the Task Force is to create a single entity tasked with working across the Department of Defense, and with the Intelligence Community (IC) and the Interagency, to develop and execute plans to collect, exploit, and analyze operational and scientific and technical data on unexplained Unidenlified Aerial Phenomenon (UAP). currently posing a threat to U.S. National Security.
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: p.1, Purpose
  significance: UAPTF Charter Purpose — single cross-DoD/IC/Interagency entity for UAP data
  context: UAPTF Charter, Naval Intelligence Activity, signed September 1, 2020 (OCR preserves "Unidenlified" for "Unidentified")
  statement_date: '2020-09-01'
- id: q6
  added_date: '2026-04-20'
  text: Leadership of the Task Force will be designated by the Director of the Naval Intelligence Activity.
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: p.3, Roles and Responsibilities
  significance: UAPTF Charter — Director of the Naval Intelligence Activity designates UAPTF leadership
  context: UAPTF Charter, Naval Intelligence Activity, signed September 1, 2020
  statement_date: '2020-09-01'
- id: q7
  added_date: '2026-04-20'
  text: The Director, UAPTF, is the accountable official for ensuring the timely collection and consolidation of data on UAP.
  source:
    path: government/dni-gov-odni-preliminary-assessment-20210625.pdf
    location: p.3, SCOPE AND ASSUMPTIONS
  significance: ODNI Preliminary Assessment — accountability framing for the Director of UAPTF
  context: ODNI Preliminary Assessment, June 25, 2021
  statement_date: '2021-06-25'
- id: q8
  added_date: '2026-04-20'
  text: UAPTF and the ODNI National Intelligence Manager for Aviation drafted this report, with input from USD(I&S), DIA, FBI, NRO, NGA, NSA, Air Force, Army, Navy, Navy/ONI, DARPA, FAA, NOAA, NGA, ODNI/NIM-Emerging and Disruptive Technology, ODNI/National Counterintelligence and Security Center, and ODNI/National Intelligence Council.
  source:
    path: government/dni-gov-odni-preliminary-assessment-20210625.pdf
    location: p.3, SCOPE AND ASSUMPTIONS
  significance: ODNI Preliminary Assessment — UAPTF as drafting body plus the cross-agency contributor list (source lists "NGA" twice; preserved as-attested)
  context: ODNI Preliminary Assessment, June 25, 2021
  statement_date: '2021-06-25'
- id: q9
  added_date: '2026-04-20'
  text: 'The Committee supports the efforts of the Unidentified Aerial

    Phenomenon Task Force at the Office of Naval Intelligence to

    standardize collection and reporting on unidentified aerial phe-

    nomenon, any links they have to adversarial foreign governments,

    and the threat they pose to U.S. military assets and installations.'
  source:
    path: government/govinfo-senate-report-116-233-iaa-fy2021.pdf
    location: Advanced Aerial Threats section
  significance: Senate Select Committee on Intelligence on-record acknowledgment of UAPTF at ONI
  context: Senate Report 116-233 (Intelligence Authorization Act for Fiscal Year 2021)
  statement_date: '2020-06-17'
- id: q10
  added_date: '2026-04-20'
  text: At the time of Dr. Taylor’s initial work with the UAPTF, former Office of Naval Intelligence senior civilian John Stratton was leading the effort and informally referred to Dr. Taylor as his chief scientist as efforts to assemble a larger team were underway.
  source:
    path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
    location: A1 response from DoD spokesperson Susan Gough
  significance: DoD Public Affairs statement naming John (Jay) Stratton as UAPTF lead and Dr. Travis Taylor as informal Chief Scientist
  context: DoD Public Affairs statement via DoD spokesperson Susan Gough, released to The Black Vault, June 29, 2022
  statement_date: '2022-06-29'
- id: q11
  added_date: '2026-04-20'
  text: I also direct the Secretary of the Navy to disestablish the Unidentified Aerial Phenomena Task Force (UAPTF) no later than the date the AARO is established, and to support the orderly transition of the UAPTF, including the transfer of any data, analysis, or other relevant material, to the AARO.
  source:
    path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
    location: p.1
  significance: UAPTF disestablishment directive — Secretary of the Navy to disestablish UAPTF and transfer data to AARO
  context: Hicks AARO establishment memorandum, July 15, 2022
  statement_date: '2022-07-15'
- id: q12
  added_date: '2026-04-22'
  text: |
    Unidentified Aerial Phenomena Task Force (UAPTF) (August 2020-November 2021)
  source:
    path: government/aaro-hrr-volume-1-20240308.pdf
    location: AARO HRR Volume I, Section IV header (p. 24)
  significance: AARO HRR Volume I — UAPTF lifecycle August 2020 to November 2021 (section header)
  context: AARO Historical Record Report Volume I (March 8, 2024)
  statement_date: '2024-03-08'
- id: q13
  added_date: '2026-04-22'
  text: |
    The UAPTF helped standardize, destigmatize, and increase the volume of UAP reporting. Its work also helped calibrate sensors to improve the quality of data collected. Its methods and processes directly led to the identification of the People's Republic of China's (PRC) high altitude balloons that traversed over the continental United States.
  source:
    path: government/aaro-hrr-volume-1-20240308.pdf
    location: AARO HRR Volume I, Section IV UAPTF Results
  significance: AARO HRR — UAPTF results (standardize, destigmatize reporting; PRC high-altitude-balloon identification)
  context: AARO Historical Record Report Volume I (March 8, 2024)
  statement_date: '2024-03-08'
- id: q14
  added_date: '2026-04-22'
  text: |
    The Deputy Secretary of Defense, in consultation with the Director of National Intelligence (DNI), directed USD(I&S) to establish AOIMSG to succeed the USN's UAPTF.
  source:
    path: government/aaro-hrr-volume-1-20240308.pdf
    location: AARO HRR Volume I, Section IV AOIMSG / AOIMEXEC subsection
  significance: AARO HRR — AOIMSG established to succeed UAPTF (direct successor, not intended-framework)
  context: AARO Historical Record Report Volume I (March 8, 2024)
  statement_date: '2024-03-08'
- id: q15
  added_date: '2026-04-22'
  text: |
    AOIMSG had not achieved initial operating capability before subsequent legislation in the FY2022 NDAA resulted in it being renamed to AARO and given an expanded mission set.
  source:
    path: government/aaro-hrr-volume-1-20240308.pdf
    location: AARO HRR Volume I, Section IV AOIMSG / AOIMEXEC subsection
  significance: AARO HRR — AOIMSG never achieved initial operating capability before FY2022 NDAA rename to AARO
  context: AARO Historical Record Report Volume I (March 8, 2024)
  statement_date: '2024-03-08'
- id: q16
  added_date: '2026-04-22'
  text: |
    All-domain Anomaly Resolution Office (AARO) (Established July 15, 2022)
  source:
    path: government/aaro-hrr-volume-1-20240308.pdf
    location: AARO HRR Volume I, Section IV AARO subsection header
  significance: AARO HRR — AARO establishment date July 15, 2022 (matches Hicks memo signature, not July 20 announcement)
  context: AARO Historical Record Report Volume I (March 8, 2024)
  statement_date: '2024-03-08'
- id: q17
  added_date: '2026-04-22'
  text: |
    Two additional memoranda included in the FOIA release, both dated September 23, 2020, offer additional insight into the early coordination efforts behind the establishment of the UAPTF. Though less revealing than the charter itself, these memos document formal outreach by the Director of the Naval Intelligence Activity (NIA), Scott Bray, to senior intelligence officials within the U.S. Army and Air Force, emphasizing the cross-service structure envisioned for the task force.
  source:
    path: news/blackvault-uaptf-charter-foia-release-20250422.html
    location: The Black Vault article, April 22, 2025, body
  significance: Black Vault FOIA release — Scott Bray (NIA Director) signed two additional September 23, 2020 cross-service NIA memoranda
  context: The Black Vault article on FOIA case DON-NAVY-2021-003140, April 22, 2025
  statement_date: '2025-04-22'
- id: q18
  added_date: '2026-04-22'
  text: |
    Provide periodic updates, via the chain of command, to the UAP Executive Steering Committee (EXCOM), and to the committee's designated representatives. to support the EXCOMs oversight mission.
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: UAPTF Charter, p.2, UAP Task Force Director responsibilities section
  significance: UAPTF Charter — UAP Executive Steering Committee (EXCOM) as senior oversight body above UAPTF
  context: UAPTF Charter, Naval Intelligence Activity, signed September 1, 2020 (OCR preserves "EXCOMs" for "EXCOM's")
  statement_date: '2020-09-01'
- id: q19
  added_date: '2026-04-22'
  text: |
    Karl E. Nell, a recently retired Army Colonel and current aerospace executive who was the Army's liaison for the UAP Task Force from 2021 to 2022 and worked with Grusch there, characterizes Grusch as "beyond reproach."
  source:
    path: news/thedebrief-grusch-2023.html
    location: The Debrief article, June 5, 2023, body
  significance: The Debrief (Kean/Blumenthal) — Karl E. Nell as Army liaison to UAPTF, 2021-2022
  context: The Debrief, 'Intelligence Officials Say U.S. Has Retrieved Non-Human Craft' by Leslie Kean and Ralph Blumenthal, June 5, 2023
  statement_date: '2023-06-05'
key_personnel:
- id: kp1
  added_date: '2026-04-20'
  person_path: /people/jay-stratton
  role: Director (named as former Office of Naval Intelligence senior civilian "leading the effort" per DoD Public Affairs statement)
  period_end: '2021'
  leadership_class: director
  source:
    path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
    location: A1 response from DoD spokesperson Susan Gough
  note: DoD Public Affairs statement via Gough is the strongest government source for the role. Americans for Safe Aerospace advisors page supports it ("Ex Director, UAP Task Force"). Exact start date is not given in the sources this page has cited. The 2021 end reflects the "was leading" language in the Gough statement (June 29, 2022), which describes Stratton as former Office of Naval Intelligence senior civilian who was leading the effort at an earlier point.
- id: kp2
  added_date: '2026-04-20'
  person_path: /people/travis-taylor
  role: Chief Scientist (informal designation, time-limited SMDC assignment)
  leadership_class: advisor
  source:
    path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
    location: A1 response from DoD spokesperson Susan Gough
  note: Per Gough, Taylor remained a government employee of U.S. Army Space and Missile Defense Command (SMDC) and was provided to UAPTF on a time-limited basis; "chief scientist" designation was informal.
- id: kp3
  added_date: '2026-04-20'
  person_path: /people/david-grusch
  role: Member (in his National Reconnaissance Office reservist capacity)
  period_start: '2019'
  period_end: '2021'
  leadership_class: staff
  source:
    path: government/oversight-house-gov-grusch-written-testimony-20230726.pdf
    location: Opening ¶8
  note: Grusch's written testimony states "I was a member of the UAPTF from 2019-2021" in his NRO reservist capacity. The 2019 start date comes before UAPTF's formal August 4, 2020 establishment by approximately one year, which points to either an informal task force or ONI UAP cell operating before 2020 that was later formally named UAPTF, or that Grusch testified to equivalent membership over the change from informal to formal. The April 16, 2020 UAP Security Classification Guide also comes before the public August 2020 establishment, supporting an operational record that began before 2020.
- id: kp4
  added_date: '2026-04-22'
  person_path: /people/karl-nell
  role: Army liaison for the UAP Task Force
  period_start: '2021'
  period_end: '2022'
  leadership_class: staff
  source:
    path: news/thedebrief-grusch-2023.html
    location: The Debrief article, June 5, 2023, body
  note: Retired Army Colonel and current aerospace executive. Per The Debrief's June 5, 2023 article by Leslie Kean and Ralph Blumenthal, Nell served as the Army's liaison for the UAP Task Force from 2021 to 2022 and worked with Grusch there. The Army liaison role is separate from the director role under Stratton (Navy).
org_relationships:
- id: or1
  added_date: '2026-04-20'
  organization_path: /organizations/aoimsg
  relationship_type: successor
  source:
    path: government/defense-gov-aoimsg-establishment-20211123.html
    location: article body ¶1
  note: AOIMSG established November 23, 2021 as the successor to the U.S. Navy's Unidentified Aerial Phenomena Task Force per DoD press release
- id: or2
  added_date: '2026-04-20'
  organization_path: /organizations/aaro
  relationship_type: other
  source:
    path: government/media-defense-gov-hicks-aaro-establishment-memo-20220715.pdf
    location: p.1
  note: AARO is the downstream successor in the chain — UAPTF → AOIMSG (Nov 2021) → AARO (Jul 15, 2022 per AARO HRR, public announcement Jul 20, 2022). AARO HRR Volume I characterizes AOIMSG as the direct successor that was renamed to AARO under the FY2022 NDAA before achieving initial operating capability. Secretary of the Navy directed to disestablish UAPTF and transfer data, analysis, or other relevant material to AARO. The primary-direct-successor relationship to UAPTF is or1 (AOIMSG); this entry captures the downstream succession chain terminus.
- id: or3
  added_date: '2026-04-20'
  organization_path: /organizations/odni
  relationship_type: partner
  source:
    path: government/dni-gov-odni-preliminary-assessment-20210625.pdf
    location: p.3
  note: ODNI National Intelligence Manager for Aviation co-drafted the June 2021 Preliminary Assessment with UAPTF
- id: or4
  added_date: '2026-04-22'
  organization_path: /organizations/nia
  relationship_type: parent
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: p.1 / p.3 Charter
  note: Naval Intelligence Activity (NIA) chartered the UAPTF per the September 1, 2020 Charter and was directed by DoD to lead the Task Force; NIA designates Task Force leadership. Distinct from ONI, which served as operating location.
- id: or5
  added_date: '2026-04-22'
  organization_path: /organizations/us-navy
  relationship_type: other
  source:
    path: government/defense-gov-uaptf-establishment-20200814.html
    location: article body ¶1
  note: "Navy-led per DoD press release: 'The Department of the Navy, under the cognizance of the Office of the Under Secretary of Defense for Intelligence and Security, will lead the UAPTF.' Navy sat above NIA in the chain of command."
- id: or6
  added_date: '2026-04-22'
  organization_path: /organizations/osd
  relationship_type: other
  source:
    path: government/defense-gov-uaptf-establishment-20200814.html
    location: article body ¶1
  note: The Office of the Under Secretary of Defense for Intelligence and Security (USD(I&S)) — an OSD component — was the cognizant OSD authority over UAPTF per the DoD press release. Also named in the ODNI Preliminary Assessment contributor list (June 25, 2021).
- id: or7
  added_date: '2026-04-22'
  organization_path: /organizations/oni
  relationship_type: other
  source:
    path: government/blackvault-uap-security-classification-guide-20200416.pdf
    location: Purpose, p.1
  note: UAPTF operated at the Office of Naval Intelligence (ONI) per the UAP Security Classification Guide, which identifies the Task Force as "at the Office of Naval Intelligence." ONI served as operating host; NIA served as chartering authority.
- id: or8
  added_date: '2026-04-22'
  organization_path: /organizations/aatip
  relationship_type: predecessor
  source:
    path: government/aaro-hrr-volume-1-20240308.pdf
    location: AARO HRR Volume I, Section IV predecessor-succession chain
  note: AARO HRR Volume I (March 2024) officially catalogs the predecessor-succession chain as AAWSAP/AATIP (2009-2012) → UAPTF (August 2020 - November 2021) → AOIMSG/AOIMEXEC (November 2021 - June 2022) → AARO (Established July 15, 2022). AARO's published record refers to "AARO and its predecessor organizations" framing.
- id: or9
  added_date: '2026-04-22'
  organization_path: /organizations/uap-excom
  relationship_type: other
  source:
    path: government/blackvault-uaptf-charter-foia-20250422.pdf
    location: UAPTF Charter, p.2, UAP Task Force Director responsibilities section
  note: UAP Executive Steering Committee (EXCOM) — senior oversight body sitting above UAPTF in the reporting chain, primary-source-attested by the UAPTF Charter (see q18). The Charter specifies UAPTF provides periodic updates via chain-of-command to EXCOM to support the EXCOM's oversight mission. Distinct from the USD(I&S) cognizant-authority relationship (or6) and the Navy lead-department relationship (or5) — EXCOM sits at the UAP-specific governance layer.
timeline:
