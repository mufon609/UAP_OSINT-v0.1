id: meta/research/uaptf
type: research-artifact
schema_version: 1
target_node: organizations/uaptf
status: active
created: '2026-04-20'
description: 'The Unidentified Aerial Phenomena Task Force ([`/organizations/uaptf`]) was a [`/organizations/us-navy`]-led task force chartered by the Naval Intelligence Activity ([`/organizations/nia`]) and operating at the [`/organizations/oni`]. Deputy Secretary of Defense David L. Norquist ([`/people/david-norquist`]) approved the establishment. DoD press release, August 14, 2020: "Deputy Secretary of Defense David L. Norquist approved the establishment of an Unidentified Aerial Phenomena (UAP) Task Force (UAPTF)" — "The Department of the Navy, under the cognizance of the Office of the Under Secretary of Defense for Intelligence and Security, will lead the UAPTF." The Charter states that the Naval Intelligence Activity was directed to lead the UAP Task Force, and that Leadership of the Task Force will be designated by the Director of the Naval Intelligence Activity — establishing NIA as the chartering authority distinct from ONI as operating location.


  The UAP Security Classification Guide (ID# 04-030, Naval Intelligence Activity ([`/organizations/nia`]), April 16, 2020) names "the Office of Naval Intelligence, Unidentified Aerial Phenomenon (UAP) Task Force" as its subject — four months before the DoD press release of August 14, 2020. The UAPTF Charter, dated September 1, 2020, describes the Task Force as "Congressionally mandated, Deputy Secretary of Defense directed" and its Purpose as "to create a single entity tasked with working across the Department of Defense" with the Intelligence Community and the Interagency "to develop and execute plans to collect, exploit, and analyze operational and scientific and technical data" on UAP.


  UAPTF drafted the June 25, 2021 [`/documents/odni-preliminary-assessment-2021`] with "the ODNI National Intelligence Manager for Aviation" and "input from USD(I&S), DIA, FBI, NRO, NGA, NSA, Air Force, Army, Navy, Navy/ONI, DARPA, FAA, NOAA, NGA, ODNI/NIM-Emerging and Disruptive Technology, ODNI/National Counterintelligence and Security Center, and ODNI/National Intelligence Council." The input list in the Preliminary Assessment as published names "NGA" two times (once before NSA and once after NOAA); shown here as it appears in the source. Senate Report 116-233 accompanying the Intelligence Authorization Act for Fiscal Year 2021 ("Advanced Aerial Threats" section) directed the DNI to submit the UAP report within 180 days of enactment.


  Start date difference — Grusch''s written testimony to the House Oversight Committee states his UAPTF membership from 2019 to 2021 in his NRO reservist capacity, but UAPTF''s formal establishment per the Norquist approval is August 4, 2020; the April 16, 2020 UAP Security Classification Guide also comes before the public August 2020 establishment. Both source records point to an informal task force or ONI UAP cell operating before 2020 that was later formally named UAPTF in August 2020, rather than a stand-up from scratch.


  UAPTF ended in two stages. First, the Airborne Object Identification and Management Synchronization Group ([`/organizations/aoimsg`]) was established November 23, 2021 to succeed UAPTF per the Hicks AOIMSG establishment memorandum; AARO Historical Record Report Volume I (March 2024) gives the UAPTF period as August 2020 through November 2021. Second, on July 15, 2022, the Hicks AARO establishment memorandum formally directed the Secretary of the Navy to disestablish UAPTF "no later than the date the AARO is established" and to "support the orderly transition of the UAPTF, including the transfer of any data, analysis, or other relevant material, to the AARO"; the Historical Record Report gives the formal AARO establishment date as July 15, 2022, with July 20, 2022 as the public release date. AOIMSG had not achieved initial operating capability before the FY2022 NDAA legislation renamed it to AARO with an expanded mission set, making AARO ([`/organizations/aaro`]) the later successor in the UAPTF → AOIMSG → AARO chain; AATIP ([`/organizations/aatip`]) is the predecessor per the Historical Record Report.


  DoD Public Affairs statement from spokesperson Susan Gough, June 29, 2022: "former Office of Naval Intelligence senior civilian John Stratton was leading the effort and informally referred to Dr. Taylor as his chief scientist". Stratton ([`/people/jay-stratton`]) is listed by Americans for Safe Aerospace as "Ex Director, UAP Task Force". Dr. Travis Taylor ([`/people/travis-taylor`]) — a U.S. Army Space and Missile Defense Command employee on time-limited assignment to UAPTF.

  '
