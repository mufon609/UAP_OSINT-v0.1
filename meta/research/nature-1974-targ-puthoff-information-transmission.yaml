description: 'INFORMATION TRANSMISSION UNDER CONDITIONS OF SENSORY SHIELDING by Dr. Harold E. Puthoff ([`/people/hal-puthoff`]) and Russell Targ ([`/people/russell-targ`]), Stanford Research Institute ([`/organizations/stanford-research-institute`]), Menlo Park, California 94025. Published in NATURE Magazine, October, 1974. Approved For Release 2001/03/07.


  Puthoff and Targ present results of experiments suggesting the existence of one or more perceptual modalities through which individuals obtain information about their environment, although this information is not presented to any known sense. They investigated the ability of certain people to describe graphical material or remote scenes shielded against ordinary perception. They also performed pilot studies to determine if electroencephalographic (EEG) recordings might indicate perception of remote happenings even in the absence of correct overt responses.


  The paper has three studies. First, experiments with Mr. Uri Geller ([`/people/uri-geller`]) in which Puthoff and Targ examined his ability, while located in an electrically shielded room, to reproduce target pictures drawn by experimenters located at remote locations. Second, double-blind experiments with Mr. Pat Price ([`/people/pat-price`]), in which Puthoff and Targ measured his ability to describe remote outdoor scenes many miles from his physical location. Finally, preliminary tests using EEGs.


  For the Geller experiments, the conditions and results for the 10 experiments carried out in the shielded room are displayed in Table 1 and Fig. 1. Experiments 1 through 10 were carried out using a shielded room in SRI''s facility for EEG research — a double walled steel room, locked by means of an inner and outer door, each of which is secured with a refrigerator-type locking mechanism. Experiments 11 through 13 were carried out in SRI''s Engineering Building to make use of the computer facilities available there, with Geller secured in a double walled, copper-screen Faraday cage 54 m down the hall and around the corner from the computer room.


  Puthoff and Targ conclude that a channel exists whereby information about a remote location can be obtained by means of an as yet unidentified perceptual modality, containing noise along with the signal as with all biological systems. The research was sponsored by The Foundation for Parasensory Investigation, New York City; Puthoff and Targ thank Mrs. Judith Skutch and Dr. Edgar D. Mitchell ([`/people/edgar-mitchell`]) of the Institute of Noetic Sciences as well as SRI associate Mr. Bonnar Cox.

  '
