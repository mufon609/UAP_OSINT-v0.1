establishes:

- 'SD004 page 1 carries a DOPSR clearance stamp dated September 6, 2023 (per q1).'
- 'SD004 page 1 names "Lockheed Martin Space Systems Vice President Dr. James Ryder (now deceased)" as the proposer of a UAP material divestment plan to AAWSAP leadership (per q2).'
- 'Elizondo''s December 19, 2024 Question for the Record Q1 response names Dr. James Lacatski, the former Director of AAWSAP, as the author of the SD004 page-1 statement (per q3).'
- 'Elizondo''s Q1 response reproduces the Lacatski statement verbatim as Attachment 2 (per q4), tying the named author to the substantive Ryder-naming text.'
- 'The DOPSR clearance date attested in q1 (the SD004 stamp itself) matches the date attested in q3 (Elizondo''s Q1 response): September 6, 2023.'
- 'The chain spans two independent primary sources from different originating dates (SD004 DOPSR clearance 2023-09-06 and Elizondo QFR 2024-12-19) and one institutional act (entry into the 2024-11-13 House Oversight hearing record as SD004).'

does_not_establish:

- 'The factual truth of Lacatski''s underlying claim — DOPSR clearance is about classification, not truth (q1 is a clearance stamp; q2 and q4 are the substantive statements; DOPSR authorized open publication, not adjudication of factual claims).'
- 'That James Ryder actually proposed the UAP material divestment plan Lacatski describes — that question is the subject of separate findings on the convergent allegation chain and the AAWSAP / Lockheed-Bigelow transfer record.'
- 'The full author list of SD004 beyond page 1 — this finding is scoped to the page-1 Q&A content; other pages of SD004 may have different provenance.'

