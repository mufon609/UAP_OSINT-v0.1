description: 'SD004 ([`/documents/docs-house-gov-hhrg-118-go12-20241113-sd004`]) page 1, published at the House Oversight UAP hearing, identified Lockheed Martin Space Systems Vice President Dr. James Ryder ([`/people/james-ryder`]) (now deceased) as having proposed a UAP material divestment plan to "SCIF-out Bigelow Aerospace ([`/organizations/bigelow-aerospace`]) Facilities" — submitted to AAWSAP ([`/organizations/aawsap`]) leadership; as published the page does not name its author, but carries a "CLEARED For Open Publication Sep 06, 2023" DOPSR ([`/organizations/dopsr`]) clearance stamp. Luis Elizondo''s ([`/people/luis-elizondo`]) December 19, 2024 Question for the Record response to Rep. Eric Burlison ([`/people/eric-burlison`]) ([`/documents/elizondo-qfr-burlison-20241219`]) confirmed that a DOPSR document "dated September 6, 2023" "authorized the release of a statement by Dr. James Lacatski ([`/people/james-lacatski`]), the former Director of the Advanced Aerospace Weapon System Application Program", and included the Lacatski statement in the Q1 response as Attachment 2. The chain confirms Lacatski as the author of the DOPSR-cleared SD004 page-1 statement that identified Dr. James Ryder at Lockheed Martin ([`/organizations/lockheed-martin`]).

  '

pattern_statement: 'Three-source attestation chain (SD004 page-1 statement with DOPSR clearance stamp + Elizondo December 2024 QFR Q1 naming Lacatski as the author + entry into the 2024-11-13 House Oversight hearing record) establishing James Lacatski as the author of the DOPSR-cleared (2023-09-06) statement that named Lockheed Martin Space Systems Vice President James Ryder.'

