credibility_notes: 'Gough speaks for the Department of Defense as a civilian Public Affairs spokesperson, not in a personal capacity. Her on-record statements carry institutional Department of Defense positions; her internal Pentagon emails released in FOIA case 24-F-0894 ([`/documents/blackvault-foia-24-f-0894-aaro-vol-i-rollout-emails`]) document the operational coordination behind those positions. The release includes a March 5, 2024 OSD(PA)–ODNI ([`/organizations/odni`]) email exchange in which OSD(PA) and ODNI agree to the omission of any ODNI mention from the AARO Historical Record Report Volume I press release, even though Dir, AARO reports to PDDNI as well as the Deputy Secretary of Defense; an Importance: High email from Gough to OUSD(I&S) ([`/organizations/ousd-is`]) Director of Congressional Activities David Kozik ([`/people/david-kozik`]) on March 6, 2024 in which Gough states OSD(PA) does not want to see sUAS added to AARO''s portfolio, sent in response to Senator Gillibrand ([`/people/kirsten-gillibrand`]) earlier the same day asking at a SASC briefing on the December 2023 JBLE drone incursions for sUAS to be catalogued by AARO; and a repeated email response from Gough to Scientific American, the Washington Examiner, and YLE Finland that declined further press engagement with Acting Director Tim Phillips ahead of an invite-only briefing on March 8, 2024.


  In June 2025 the Wall Street Journal piece ([`/documents/wsj-pentagon-disinformation-ufo-mythology-2025`]) on Pentagon disinformation in UFO mythology — covered by tovima.com ([`/organizations/tovima`]) — noted on-record confirming from Gough that AARO had uncovered evidence of fake classified program materials, that the Department of Defense did not include those AARO findings in its Volume I report because the investigation was not yet completed, and that the Department was committed to releasing a second volume of its Historical Record Report to cover AARO''s findings on reports of potential pranks and inauthentic materials later that year. As of February 25, 2026 (DefenseScoop), AARO had not released a 2025 annual report or Volume II.


  Her email signature in the FOIA case 24-F-0894 emails read Gough, Susan L (Sue) CIV OSD PA (USA) — a civilian Office of the Secretary of Defense Public Affairs USA assignment. She has held the AARO portfolio across AARO''s first Director Sean Kirkpatrick, Acting Director Tim Phillips, and Director Jon Kosloski, an ongoing tenure noted in sources from June 2022 through February 2026.

  '
