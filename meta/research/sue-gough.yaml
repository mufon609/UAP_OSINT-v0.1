background: 'Sue Gough is a civilian Department of Defense ([`/organizations/dod`]) spokesperson assigned to Defense Press Operations within the Office of the Secretary of Defense Public Affairs (OSD(PA)). Pentagon emails identify her as Gough, Susan L (Sue) CIV OSD PA (USA). Within OSD(PA) she is the principal Public Affairs contact for the All-domain Anomaly Resolution Office ([`/organizations/aaro`]), providing on-record statements about AARO, its predecessor the UAP Task Force ([`/organizations/uaptf`]), and related Department of Defense matters.


  She has held the AARO portfolio at OSD(PA) from June 2022 through February 2026 — an ongoing tenure across AARO''s first Director Sean Kirkpatrick ([`/people/sean-kirkpatrick`]), Acting Director Tim Phillips ([`/people/tim-phillips`]), and Director Jon Kosloski ([`/people/jonathan-kosloski`]).

  '
top_relevance: 'Sue Gough is the principal Department of Defense Public Affairs contact for the AARO portfolio. She provided the June 29, 2022 Public Affairs response to The Black Vault ([`/organizations/the-black-vault`]) that named former Office of Naval Intelligence ([`/organizations/oni`]) senior civilian John Stratton ([`/people/jay-stratton`]) as UAPTF lead, noted Dr. Travis Taylor''s ([`/people/travis-taylor`]) parent organization as the U.S. Army Space and Missile Defense Command ([`/organizations/u-s-army-smdc`]), and described Taylor as informally referred to chief scientist; was moderator of the December 16, 2022 joint AARO media engagement with Under Secretary of Defense for Intelligence and Security Ronald Moultrie ([`/people/ronald-moultrie`]) and Director Sean Kirkpatrick (which described AARO as the office that replaced the former Navy-led ([`/organizations/us-navy`]) UAPTF and noted the UAPTF stands by the conclusions presented by Director Bray ([`/people/scott-bray`]) in his briefing); led OSD(PA) coordination on the AARO Historical Record Report Volume I press release rollout in March 2024 (FOIA case 24-F-0894); confirmed AARO Full Operational Capability as of Oct. 1, 2024 to DefenseScoop ([`/organizations/defensescoop`]) journalist Brandi Vincent ([`/people/brandi-vincent`]); and reported AARO''s caseload of more than 2,000 UAP cases in February 2026.

  '
