quotes:
- id: q1
  added_date: '2026-05-06'
  text: |
    The Unidentified Aerial Phenomena Task Force (UAPTF) was and is (until the follow-on Department of Defense [DOD] organization is fully operational) a partnership across federal and DOD agencies, with a variety of organizations providing personnel as required. Dr. Taylor was a government employee assigned to the U.S. Army Space and Missile Defense Command (SMDC). SMDC provided Dr. Taylor on a time-limited basis as part of a larger number of contributing organizations across the DOD, the Intelligence Community (IC), and other parts of the federal government to assist with the stand-up of the UAPTF and its reporting requirements. It was not a full time assignment; he remained an employee of SMDC. In early 2021, following consultations with the UAPTF, SMDC worked to clarify and de-conflict assigned tasks, responsibilities, and outside activities to balance mission priorities.

    At the time of Dr. Taylor's initial work with the UAPTF, former Office of Naval Intelligence senior civilian John Stratton was leading the effort and informally referred to Dr. Taylor as his chief scientist as efforts to assemble a larger team were underway.
  source:
    path: news/blackvault-smdc-travis-taylor-uaptf-20220629.html
    location: 'A1 response to Q1 — Dr. Travis Taylor as UAP Task Force chief scientist'
  significance: 'Strongest on-record DoD attestation naming John Stratton as UAPTF lead and Travis Taylor as informally referred to chief scientist; SMDC time-limited assignment basis preserved.'
  context: 'Pentagon Public Affairs written statement to The Black Vault, A1 response, June 29, 2022'
  observation_type: relayed
  statement_date: '2022-06-29'
- id: q6
  added_date: '2026-05-06'
  text: |
    Good afternoon, I'm Sue Gough. I will be --from Defense Press Operations. I will be your moderator today. We are here to talk about the All-domain Anomaly Resolution Office, which as most of you know, is the office that replaced the former Navy-led UAPTF. We have with us here today, Under Secretary of Defense for Intelligence and Security Ronald Moultrie, and Dr. Sean Kirkpatrick, the director of AARO. And with that, I will turn it over to Mr. Moultrie.
  source:
    path: government/defense-gov-moultrie-kirkpatrick-aaro-roundtable-20221216.html
    location: 'STAFF moderator opening, joint AARO media roundtable, December 16, 2022'
  significance: 'Gough as moderator opens the December 16, 2022 joint AARO media roundtable with Under Secretary of Defense for Intelligence and Security Ronald Moultrie and AARO Director Sean Kirkpatrick.'
  context: 'STAFF speaker tag, joint AARO media roundtable, Pentagon, December 16, 2022'
  observation_type: relayed
  statement_date: '2022-12-16'
- id: q7
  added_date: '2026-05-06'
  text: |
    Friday, Dec. 1, is Dr. Kirkpatrick's last day in the office,
  source:
    path: news/defensescoop-kirkpatrick-departure-20231130.html
    location: 'DefenseScoop article body, opening Gough quote'
  significance: 'On-record DoD confirmation of AARO Director Sean Kirkpatrick''s last-day date as December 1, 2023.'
  context: 'DefenseScoop article by Brandi Vincent, ''AARO''s leader is leaving the Pentagon, and a new director needs to be named'', November 30, 2023'
  observation_type: relayed
  statement_date: '2023-11-30'
- id: q10
  added_date: '2026-05-06'
  text: |
    Thanks for reaching out. At this time, we are looking to keep any media engagement with AARO's acting director to a small group. Note, should we have an on-record engagement this week, we will post the transcript once it is available.  With that, I will be sure keep you in mind for any upcoming opportunities to engage with AARO going forward.

    Regarding an interview request, Acting Director Phillips does not have any availability for interviews at this time.  We will keep you in mind for future opportunities.
  source:
    path: government/blackvault-foia-24-f-0894-aaro-vol-1-rollout-emails.pdf
    location: 'Doc 1, Gough 2024-03-05 21:51'
  significance: 'Gough''s repeated standardized email response declining further press engagement with Acting Director Tim Phillips around the AARO Historical Record Report Volume I rollout, in favor of an invite-only briefing on March 8, 2024.'
  context: 'FOIA case 24-F-0894 release, Document 1 (YLE Finland journalist exchange), email sent March 5, 2024 21:51 (Helsinki time)'
  observation_type: relayed
  statement_date: '2024-03-05'
- id: q11
  added_date: '2026-05-06'
  text: |
    Question 2 - I'm working on the press release today.  Do you want DNI/ODNI mentioned?  Unlike the annual UAP report, the legislation calls for AARO producing the report - but Dir, AARO reports to PDDNI, too, so wanted to check.
  source:
    path: government/blackvault-foia-24-f-0894-aaro-vol-1-rollout-emails.pdf
    location: 'Doc 4, Gough 2024-03-05 12:51'
  significance: 'Gough explicitly references AARO''s reporting line to PDDNI before the OSD(PA)-ODNI agreement to omit any ODNI mention from the AARO Historical Record Report Volume I press release.'
  context: 'FOIA case 24-F-0894 release, Document 4 (Rollout update? — ODNI omission decision), Sue Gough email to ODNI counterpart, March 5, 2024 12:51 PM'
  observation_type: relayed
  statement_date: '2024-03-05'
- id: q12
  added_date: '2026-05-06'
  text: |
    Flagging for you in case you haven't heard.  We do not want to see sUAS added to AARO's portfolio!
  source:
    path: government/blackvault-foia-24-f-0894-aaro-vol-1-rollout-emails.pdf
    location: 'Doc 6, Gough 2024-03-06 13:45'
  significance: 'Importance: High institutional position from Gough that AARO should not absorb sUAS cataloguing, sent the same day Sen. Gillibrand requested AARO take that role at a SASC briefing on the December 2023 JBLE drone incursions.'
  context: 'FOIA case 24-F-0894 release, Document 6 (Following up from Unders — sUAS / cUAS / JBLE), Sue Gough to David Kozik, March 6, 2024 1:45 PM, Importance: High'
  observation_type: relayed
  statement_date: '2024-03-06'
- id: q13
  added_date: '2026-05-06'
  text: |
    Agree, coordinating is just fine and a necessary role. But knowing what the senator has done in the past, I was concerned she has a bigger role in mind.

    Anyway, wanted to make you were aware in case you hadn't gotten a readout of the engagement.
  source:
    path: government/blackvault-foia-24-f-0894-aaro-vol-1-rollout-emails.pdf
    location: 'Doc 6, Gough 2024-03-07 09:40'
  significance: 'Gough accepts Kozik''s coordinating-role framing for AARO on counter-sUAS while reiterating concern that Sen. Gillibrand was seeking a bigger AARO role; documents the senator-driven origin of the same-day Importance: High portfolio email.'
  context: 'FOIA case 24-F-0894 release, Document 6 (Following up from Unders), Sue Gough reply to Kozik, March 7, 2024 9:40 AM'
  observation_type: relayed
  statement_date: '2024-03-07'
- id: q14
  added_date: '2026-05-06'
  text: |
    AARO reached full operational capability as of Oct. 1, 2024. In practical terms, this means AARO now has the requisite personnel, expertise, facilities and tools to carry out its core mission,
  source:
    path: news/defensescoop-aaro-foc-briefing-20241205.html
    location: 'DefenseScoop article body, opening attribution paragraph for AARO Full Operational Capability'
  significance: 'On-record DoD declaration that AARO reached Full Operational Capability as of October 1, 2024 — the start of FY 2025 — preceding the Director Kosloski House Oversight closed-door briefing on December 6, 2024.'
  context: 'DefenseScoop article by Brandi Vincent, ''AARO functioning at full operational capability as lawmakers prep for classified UAP briefing'', December 5, 2024'
  observation_type: relayed
  statement_date: '2024-12-05'
- id: q15
  added_date: '2026-05-06'
  text: |
    The department is committed to releasing a second volume of its Historical Record Report, to include AARO's findings on reports of potential pranks and inauthentic materials,
  source:
    path: news/tovima-wsj-pentagon-disinformation-ufo-mythology-20250606.html
    location: 'WSJ article body, Gough on-record commitment to AARO Historical Record Report Volume II'
  significance: 'On-record DoD commitment to release a second volume of the AARO Historical Record Report covering AARO''s findings on potential pranks and inauthentic materials; the Tovima/WSJ piece notes Gough also acknowledged AARO had uncovered evidence of fake classified program materials.'
  context: 'Wall Street Journal piece on Pentagon disinformation in UFO mythology by Joel Schectman and Aruna Viswanatha, June 6, 2025 (carried by tovima.com)'
  observation_type: relayed
  statement_date: '2025-06-06'
- id: q16
  added_date: '2026-05-06'
  text: |
    AARO has been examining over 2,000 UAP cases.
  source:
    path: news/defensescoop-aaro-hegseth-disclosure-20260225.html
    location: 'DefenseScoop article body, Gough caseload paragraph'
  significance: 'On-record DoD AARO caseload of more than 2,000 UAP cases, an increase of at least 400 from the late-2024 public update of more than 1,600 reports.'
  context: 'DefenseScoop article by Brandi Vincent, February 25, 2026, in response to questions about AARO publication blackout and forthcoming Trump UAP-disclosure executive order'
  observation_type: relayed
  statement_date: '2026-02-25'
- id: q17
  added_date: '2026-05-06'
  text: |
    We have nothing to announce at this time.
  source:
    path: news/defensescoop-aaro-hegseth-disclosure-20260225.html
    location: 'DefenseScoop article body, Gough press-silence paragraph'
  significance: 'On-record DoD response to DefenseScoop on why AARO has not disseminated unclassified reports or briefed reporters on its efforts in more than a year — no announcement at this time.'
  context: 'DefenseScoop article by Brandi Vincent, February 25, 2026'
  observation_type: relayed
  statement_date: '2026-02-25'
