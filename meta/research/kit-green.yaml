    location: 'p. 8 and p. 10 footnotes'
  note: 'Per Kress 1977 footnotes (q1, q2), Green at OSI is the recipient of Puthoff''s June 17, 1972 letter from SRI documenting the magnetometer demonstration, and Green at LSD/OSI is the author of a 9 November 1973 Memorandum for the Record on Verification of Remote Viewing Experiments at SRI. The two Kress footnotes anchor the earliest and a second-attested point in Green''s OSI program-officer role at the 1972-1973 SRI-CIA parapsychology investigation inception. Period_end of 1973-11-09 reflects the last archived Kress 1977 attestation date; Green''s continuing role beyond that date is attested at narrative level by IRVA (q4) ("first analyst and program manager for Remote Viewing research") but no archived primary source pinpoints a Green-at-OSI date later than 1973-11-09.'

