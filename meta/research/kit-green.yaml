  observed: 'Wayne State School of Medicine (SOM) in Beijing, China'
  canonical: 'Wayne State School of Medicine (Detroit) — Beijing/Asia-Pacific program'
  location: 'NCBI bio, Christopher C. Green entry'
  source_path: government/ncbi-nas-green-bio-emerging-cognitive-neuroscience-2008.html
  resolution: preserve-as-sic-in-quotes
  note: 'The 2008 NCBI bio (q5) writes "assistant dean for Asia Pacific of the Wayne State School of Medicine (SOM) in Beijing, China" — the Wayne State School of Medicine is headquartered in Detroit, Michigan (per the IRVA bio q3); the "in Beijing, China" qualifier in q5 reflects Green''s Asia Pacific assistant dean role being based in Beijing, not a relocation of the school itself. The IRVA bio (q3) writes "Wayne State School of Medicine in Detroit, Michigan" without the Beijing qualifier. The two attestations are consistent — Wayne State SOM is in Detroit and Green''s Asia Pacific role operates from Beijing — but the q5 phrasing reads as if Wayne State itself is in Beijing. Preserved verbatim in q5.'

