context_extrinsic: {}

background: 'Christopher (Kit) Green is a medical doctor, forensic specialist, and former Central Intelligence Agency analyst whose career began with the US Federal Government in 1969 as a Senior Division Analyst for neurosciences at the Central Intelligence Agency (q4). Per the IRVA biographical page (q4), in the mid-’70s he was the first analyst and program manager for Remote Viewing research; he became a Branch Chief, Deputy Division Director, and Assistant National Intelligence Officer for Science and Technology. The 1977 Kress paper (q1, q2) names him in two specific OSI roles: recipient of Puthoff''s June 17, 1972 letter from Stanford Research Institute, and author of a 9 November 1973 LSD/OSI Memorandum for the Record on Verification of Remote Viewing Experiments at Stanford Research Institute. Green joined General Motors Corporation in 1985 as head of Life, Materials and Environmental Sciences, and later became Executive Director of Technology Intelligence, and Chief Technology Officer for GM Asia Pacific Operations (q4), serving from 1985 through 2004 per the NCBI bio (q5). He returned to the full-time practice of medicine and became a faculty member at the Wayne State School of Medicine in 2002 (q6); per the IRVA page he holds clinical appointments as Professor in the Departments of Diagnostic Radiology and Psychiatry & Behavioral Neurosciences of the Harper University Hospital, Detroit Medical Center, and is Assistant Dean (Asia Pacific) (q3). His medical specialties are brain imaging, forensic medicine and toxicology, and neurophysiology (q5). He holds the National Intelligence Medal and is a Fellow in the American Academy of Forensic Sciences (q3, q5). His Ph.D. is from the University of Colorado Medical School in neurophysiology, and his M.D. is from the Autonomous City University in El Paso, Texas/Monterey, Mexico (q5).'

top_relevance: 'Per the IRVA biographical page (q4), in the mid-’70s Green was the first analyst and program manager for Remote Viewing research at the Central Intelligence Agency — names him the CIA program manager for the Remote Viewing investigation cofounded by Russell Targ and Harold E. Puthoff at Stanford Research Institute. The 1977 Kress paper (q1, q2) names him as the OSI analyst who received Puthoff''s June 17, 1972 letter from SRI and as the LSD/OSI author of a 9 November 1973 Memorandum on Verification of Remote Viewing Experiments at Stanford Research Institute — Green at the program from its 1972 and 1973 beginning. Per Vice 2020 (q7) Green was brought in to consult on Brandon Fugal''s Skinwalker Ranch project, together with Hal Puthoff; Green and Puthoff were also involved in Bigelow''s DIA project (the Advanced Aerospace Weapon System Applications Program / AAWSAP). Green''s public identity as a CIA officer is shown through the PBS Secrets of the Dead Umbrella Assassin interview page (q8), where he describes his forensic role in the 1978 Georgi Markov ricin pellet assassination investigation as the most unusual and significant case of his twenty year career as an investigative officer with the Central Intelligence Agency.'

credibility_notes: 'Green holds the National Intelligence Medal and is a Fellow in the American Academy of Forensic Sciences per IRVA (q3) and the 2008 NCBI / NRC committee bio (q5) — both sources name the same honors. The NCBI bio (q5) names his career with the CIA as extended from 1969 to 1985 as a senior division analyst and assistant national intelligence officer for science and technology. The PBS Secrets of the Dead Umbrella Assassin interview page (q8) names his CIA tenure as a "twenty year career as an investigative officer with the Central Intelligence Agency" — a figure greater than the NCBI 1969 to 1985 figure. The same PBS page (q8) also notes that Green still serves as a consultant to the Central Intelligence Agency, which may be why the figure given by PBS is greater. The two sources are held as separate evidence without contributor judgment. The IRVA bio (q4) names him as "the first analyst and program manager for Remote Viewing research" in the mid-’70s — Green''s own description on the IRVA member page; Kress 1977 (q1, q2) names him at OSI in 1972 and 1973 as the recipient of Puthoff''s letter and the author of the LSD/OSI Verification memorandum but does not name him as "first" program manager. Vice 2020 (q7) names Green and Puthoff as scientists brought in to consult on Brandon Fugal''s Skinwalker Ranch project, and as also involved in Bigelow''s DIA project — friendship between Fugal and Green is named, but Green''s specific role on AAWSAP is not detailed in the consultant description.'

