  added_date: '2026-05-17'
  program: 'CIA Remote Viewing research program'
  role: 'First analyst and program manager (IRVA self-attested)'
  period_start: '1972'
  evidentiary_basis: 'self-attested'
  confidence: 'medium'
  source:
    path: news/irva-kit-green-wayback-20241212.html
    location: '¶2'
  note: 'Per IRVA biographical text (q4): "In the mid-’70s he was the first analyst and program manager for Remote Viewing research." Self-attested on Green''s IRVA member-organization page; the "first" characterization is not separately confirmed by Kress 1977 (which attests Green at OSI in 1972-1973 letter-recipient and memorandum-author roles, q1 and q2, but does not characterize him as "first" program manager). Confidence: medium — the role is anchored in archived Kress 1977 primary attestations of his OSI engagement at the program''s inception, but the "first" framing rests on self-attestation alone.'

