naming_quirks: []

establishes:

- 'Three independent primary sources (q1 from 2010, q2 from 2024, q3 from 2026) attest the same physical structure at Naval Air Station Patuxent River.'
- 'Fiscal year (FY2011) and approximate dollar magnitude triangulate across q1 ($10,160,000) and q2 (approximately $10 million).'
- 'Steny Hoyer''s role as the requesting representative is attested independently in q1 (Hoyer''s own 2010 press release) and q2 (Elizondo''s 2024 QFR: "allocated at the request of then-Representative Steny Hoyer").'
- 'The Sensitive Compartmented Information Facility designation in q1 corresponds to the Special Access Program Facility (SAP-F) designation in q2; both describe compartmented-information-handling infrastructure at the SAP / SCIF classification tier.'
- 'The structure physically exists at Pax River as of February 2026 per q3, sixteen years after the original Fiscal Year 2011 appropriation.'
- 'Hoyer''s 2010 press release (q1) predates any UAP framing of the appropriation by fourteen years and was a routine Military Construction announcement at the time of publication.'

does_not_establish:

- 'Whether the structure funded by the FY2011 appropriation was built to accommodate the alleged Lockheed-Bigelow material transfer described in Elizondo''s QFR, or for the routine SCIF / UAV ISR operations within the Atlantic Test Range that Hoyer''s 2010 press release describes.'
- 'The intended use of the Special Access Program Facility when constructed — q1 names control rooms for Unmanned Air Vehicles, intelligence data acquisition laboratory spaces, and Sensitive Compartmented Information Facility areas; q2 describes the structure as a SAP-F hangar designed to facilitate transfer of materials via air and river.'
- 'Whether the hangar Burlison visited in February 2026 is the structure Elizondo''s QFR describes — q4 (the 2026-03-12 Liberation Times update) reports three subsequent sources telling the outlet the visited hangar was not the structure allegedly built for the proposed transfer.'
- 'The contents of the structure beyond the empty-as-of-February-2026 observation in q3; q4 preserves the broader allegation that UAP-related materials may be stored within different facilities at Pax River.'
- 'Whether a private runway specifically built for Robert Bigelow exists at Pax River — q3 reports one source describing such a runway during the Burlison visit; q4''s update reports three subsequent sources telling Liberation Times Burlison did not see such a runway.'

contradictions:

- id: c1
  added_date: '2026-05-13'
  question: 'Did the FY2011 Military Construction appropriation fund an addition to existing Atlantic Test Range infrastructure, or a newly built hangar?'
  positions:
  - evidence_id: q1
    position: 'Hoyer 2010 press release: an "addition to the existing Atlantic Test Range" for Sensitive Compartmented Information Facility areas, UAV control rooms, and intelligence data acquisition laboratory spaces.'
  - evidence_id: q2
    position: 'Elizondo 2024 QFR: "a newly built hangar at the Patuxent River Naval Air Station" built to "Special Access Program Facility" requirements at any classification level.'
  note: 'Both name the same Fiscal Year 2011, approximately $10 million in funding, Patuxent River Naval Air Station, and Hoyer at the request. Hoyer states "addition to the existing Atlantic Test Range". Elizondo states "a newly built hangar at the Patuxent River Naval Air Station". Neither states which Pax River facility the $10,160,000 built.'

- id: c2
  added_date: '2026-05-13'
  question: 'Is the hangar Eric Burlison visited in February 2026 the structure named in Elizondo''s QFR Q7?'
  positions:
  - evidence_id: q3
    position: 'Liberation Times 2026-03-06 main report: Burlison "was able to verify the hangar exists, but that it remains empty" — paired in-text with Elizondo''s QFR description of the SAP-F hangar built to accommodate the alleged Lockheed-to-Bigelow transfer.'
  - evidence_id: q4
    position: 'Liberation Times 2026-03-12 update: "Three separate sources familiar with the trip said the hangar visited by Burlison was not the one allegedly built to facilitate the proposed transfer of materials. They also said Burlison did not see a runway built specifically for Bigelow."'
  note: 'Both are Liberation Times Christopher Sharp reporting on the same alleged transfer. The original story states Burlison "was able to verify the hangar exists"; the update states "three separate sources familiar with the trip said the hangar visited by Burlison was not the one allegedly built to facilitate the proposed transfer of materials". The allegation that UAP-related materials "may be stored at the U.S. base in Maryland" "within different facilities within Pax River" remains on the record.'

