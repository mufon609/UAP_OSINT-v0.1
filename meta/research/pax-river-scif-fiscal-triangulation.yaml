quotes:

- id: q1
  added_date: '2026-05-13'
  text: |-
    Atlantic Test Range Addition, Naval Air Station, Patuxent River – $10,160,000 Funding will be used to construct an addition to the existing Atlantic Test Range, which is the only Naval Test and Evaluation Range on the East Coast, to house new control rooms for Unmanned Air Vehicles, intelligence data acquisition laboratory spaces, as well as Sensitive Compartmented Information Facility areas.
  source:
    path: government/hoyer-house-gov-investments-southern-maryland-milcon-fy2011-20100728.html
    location: ¶ MILITARY CONSTRUCTION — Atlantic Test Range Addition line item
  significance: 'Hoyer FY2011 MILCON line item — $10,160,000 for Atlantic Test Range Addition at NAS Patuxent River including Sensitive Compartmented Information Facility areas'
  context: 'Congressman Steny Hoyer (MD-5) press release announcing FY2011 Military Construction and Veterans Affairs Appropriations Act provisions for Southern Maryland military facilities'
  statement_date: '2010-07-28'
  attestation_tier: on-record
  attestor_path: /people/steny-hoyer

- id: q2
  added_date: '2026-05-13'
  text: |-
    These facilities included locations in the Las Vegas area and a newly built hangar at the Patuxent River Naval Air Station ("PAX"). Specifically, the PAX River hangar was designed to facilitate the transfer of future materials via air and river. The hangar was purpose-built to meet the requirements of a Special Access Program Facility ("SAP-F") and was capable of accommodating materials at any classification level.
  source:
    path: government/douglas-johnson-elizondo-qfr-burlison-20241219.pdf
    location: 'p. 2, Q7 response'
  significance: 'Elizondo QFR Q7 — describes the Pax River hangar as a purpose-built Special Access Program Facility ("SAP-F") at any classification level; the Pax River location and SAP-F designation match the Hoyer 2010 press release SCIF attestation fourteen years earlier'
  context: 'Luis Elizondo (former AATIP Director) Question for the Record response to Rep. Eric Burlison''s December 9, 2024 letter; submitted following the November 13, 2024 House Oversight UAP hearing'
  statement_date: '2024-12-19'
  attestation_tier: dopsr-cleared
  attestor_path: /people/luis-elizondo

- id: q2b
  added_date: '2026-05-13'
  text: |-
    I was informed that funding for the hangar, approximately $10 million, was allocated at the request of then-Representative Steny Hoyer.
  source:
    path: news/liberationtimes-white-house-approved-trip-pax-river-20260306.html
    location: ¶ Elizondo written-testimony quotation
  significance: 'The funding sentence from Elizondo''s QFR Q7 as quoted verbatim by Liberation Times. The same sentence in the QFR PDF crosses a page break (page 2 to page 3) and the pdftotext extract embeds a "3" page-number artifact mid-sentence; Liberation Times reproduces the sentence intact. Attests "approximately $10 million" and Hoyer as requesting Representative — the two fiscal-data fields that triangulate against Hoyer''s 2010 press release fourteen years earlier.'
  context: 'Christopher Sharp, Liberation Times, March 6, 2026 quoting Elizondo''s December 19, 2024 Question for the Record response verbatim; Sharp''s lead-in: "Elizondo wrote that the hangar had been allocated at the request of then-Representative Steny Hoyer, who represented Maryland''s 5th congressional district"'
  statement_date: '2026-03-06'
  attestation_tier: secondary-source
  attestor_path: /people/christopher-sharp

- id: q3
  added_date: '2026-05-13'
  text: |-
    Liberation Times understands that Burlison was able to verify the hangar exists, but that it remains empty.
  source:
    path: news/liberationtimes-white-house-approved-trip-pax-river-20260306.html
    location: ¶ 4 (paragraph following Elizondo-allegation framing)
  significance: 'Liberation Times reports Burlison''s White House-approved Pax River site visit verified the hangar''s physical existence; the structure remains empty as of February 2026, sixteen years after the FY2011 appropriation'
  context: 'Christopher Sharp, Liberation Times, reporting on Rep. Eric Burlison''s February 2026 White House-approved site visit to Naval Air Station Patuxent River'
  statement_date: '2026-03-06'
  attestation_tier: secondary-source
  attestor_path: /people/christopher-sharp

- id: q4
  added_date: '2026-05-13'
  text: |-
    Three separate sources familiar with the trip said the hangar visited by Burlison was not the one allegedly built to facilitate the proposed transfer of materials. They also said Burlison did not see a runway built specifically for Bigelow.
  source:
    path: news/liberationtimes-white-house-approved-trip-pax-river-20260306.html
    location: ¶ Update -12 March 2026
  significance: 'Liberation Times 2026-03-12 update — three subsequent sources distinguish the hangar Burlison visited from the structure named in Elizondo''s QFR; preserves the broader allegation that UAP-related materials may be stored within different facilities at Pax River'
  context: 'Christopher Sharp, Liberation Times, follow-up sourcing six days after the original Burlison-visit report; both the original report and the update remain on the public record'
  statement_date: '2026-03-12'
  attestation_tier: secondary-source
  attestor_path: /people/christopher-sharp

