description: 'Hoyer ([`/people/steny-hoyer`]) 2010 press release ([`/documents/hoyer-fy2011-milcon-southern-maryland-20100728`]): "Atlantic Test Range Addition, Naval Air Station, Patuxent River ([`/locations/patuxent-river-nas`]) – $10,160,000" for "Sensitive Compartmented Information Facility areas". Elizondo ([`/people/luis-elizondo`]) Question for the Record ([`/documents/elizondo-qfr-burlison-20241219`]): "a newly built hangar at the Patuxent River Naval Air Station" built to meet "Special Access Program Facility" requirements with "approximately $10 million" "allocated at the request of then-Representative Steny Hoyer". Liberation Times ([`/organizations/liberation-times`]) reporting ([`/documents/liberationtimes-white-house-approved-trip-pax-river-20260306`]): Burlison ([`/people/eric-burlison`]) "was able to verify the hangar exists, but that it remains empty". Liberation Times update: "three separate sources familiar with the trip said the hangar visited by Burlison was not the one allegedly built to facilitate the proposed transfer of materials" — the alleged transfer was from Lockheed Martin ([`/organizations/lockheed-martin`]) to Bigelow Aerospace ([`/organizations/bigelow-aerospace`]).

  '

pattern_statement: 'Three independent primary sources converge on the fiscal data for a Sensitive Compartmented Information Facility / Special Access Program Facility at Naval Air Station Patuxent River (Fiscal Year 2011 Military Construction appropriation, approximately $10 million, requested by then-Representative Steny Hoyer).'

