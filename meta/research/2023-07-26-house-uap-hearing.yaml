quotes:
- id: q1
  added_date: '2026-04-20'
  statement_date: '2023-07-26'
  text: 'I have experienced advanced UAP firsthand and I am here to voice the concerns of more than 30 commercial aircrew and military veterans who have confided their similar encounters with me.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: "p. 10"
  significance: Graves opens — claim of firsthand UAP experience and a documented group of 30+ commercial aircrew and military veterans reporting similar encounters
  context: Graves oral statement
- id: q2
  added_date: '2026-04-20'
  statement_date: '2023-07-26'
  text: 'I was informed in the course of my official duties of a multi-decade UAP crash retrieval and reverse engineering program to which I was denied access to those additional read-ons when I requested it.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: "p. 12"
  significance: Grusch's core whistleblower claim in opening — awareness of and denied-access to a multi-decade UAP crash retrieval and reverse engineering program
  context: Grusch oral statement
- id: q3
  added_date: '2026-04-20'
  statement_date: '2023-07-26'
  text: 'Absolutely, based on interviewing over 40 witnesses over 4 years.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: "p. 19"
  significance: Grusch's quantitative basis for his claim that the U.S. Government is in possession of UAPs — 40+ witnesses interviewed over 4 years
  context: Grusch Q&A response to Ranking Member Garcia
- id: q4
  added_date: '2026-04-20'
  statement_date: '2023-07-26'
  text: 'I hope you understand that there would be bipartisan rejection of any attempt to vilify, demonize, or engage in other reprisals against our witnesses and people who are telling the truth from their perspective.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: "p. 22"
  significance: Full Committee Ranking Member's bipartisan whistleblower-protection statement
  context: Q&A with Grusch (first round, Raskin)
- id: q5
  added_date: '2026-04-20'
  statement_date: '2023-07-26'
  text: 'I call it administrative terrorism.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: "p. 22"
  significance: Grusch's framing of the reprisal pattern he describes against UAP-program whistleblowers
  context: Grusch Q&A response to Raskin (first round)
- id: q6
  added_date: '2026-04-20'
  statement_date: '2023-07-26'
  text: 'This is an approximation based off of my personal experience speaking with a number of pilots, but I would estimate we are somewhere near 5 percent reporting, perhaps.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: "p. 39"
  significance: Graves's estimate that only approximately 5 percent of pilot UAP sightings get reported — quantifies the under-reporting problem central to his testimony
  context: Graves Q&A response to Representative Mace
- id: q7
  added_date: '2026-04-20'
  statement_date: '2023-07-26'
  text: 'Nonhuman, and that was the assessment of people with direct knowledge on the program I talked to that are currently still on the program.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: "p. 40"
  significance: Grusch's "nonhuman biologics" assertion about recovered crash-retrieval biologics, attributed to direct-knowledge sources currently on the program
  context: Grusch Q&A response to Representative Mace
- id: q8
  added_date: '2026-04-20'
  statement_date: '2023-07-26'
  text: 'You know, it has been said it is probably the most credible UFO sighting in history, based on all the sensors that were tracking it and then for us to get visual.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: "p. 42"
  significance: Fravor's framing of the 2004 USS Nimitz encounter as probably the most credible UFO sighting in history — based on multi-sensor tracking plus visual
  context: Fravor Q&A response to Representative Langworthy
- id: q9
  added_date: '2026-04-20'
  statement_date: '2023-07-26'
  text: 'I also want to note for our witnesses and for the public that I am a freshman Member of Congress and I have only been here for 7 months. But this is by far the most bipartisan conversation and discussion that I have seen happen in the Congress and I think that a topic of this significance as it relates to our national security, as it relates to information that we are trying to gather for the American public does bring people together and I think that has been really great to see.

    '
  source:
    path: government/congress-gov-house-hearing-transcript-20230726.pdf
    location: "p. 49"
  significance: Ranking Minority Member Garcia's framing of the hearing as unusually bipartisan
  context: Garcia closing remarks
