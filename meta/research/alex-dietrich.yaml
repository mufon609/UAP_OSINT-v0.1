document_intrinsic:
  full_name: Alex Dietrich
  profession: Strike fighter pilot, U.S. Navy (retired)
context_extrinsic:
  display_title: Alex Dietrich
background: >
  Alex Dietrich is a retired U.S. Navy Lieutenant Commander and former
  F/A-18F strike fighter pilot. She commissioned through the NROTC
  scholarship at George Washington University in May 2001 and served
  20 years including two combat deployments during her squadron tours
  in support of Operation Iraqi Freedom and Operation Enduring Freedom,
  and a 2010 yearlong boots-on-ground deployment as a reconstruction
  engineer in Ghazni, Afghanistan. After retirement she has held
  faculty appointments at the U.S. Naval Academy (Department of
  Leadership, Ethics and Law), the consortium of schools in Washington
  DC (Georgetown, George Washington, Howard, and Catholic
  Universities), and the University of Colorado Boulder College of
  Engineering (adjunct instructor in the Engineering Leadership
  Program from 2022, then Scholar in Residence in the Engineering
  Management Program from 2023 — two distinct CU Boulder programs);
  she currently serves as Interim Chief Human Resources Officer at
  Syracuse University.
top_relevance: 'Dietrich was one of four naval aviators in the flight of 2 F/A-18Fs vectored to intercept and who visually acquired the Tic Tac object on November 14, 2004 (the USS Nimitz Tic Tac UAP encounter); she is one of two members of that flight who have spoken publicly about it. She was on the wing of Cmdr. Dave Fravor (then-commanding officer of VFA-41 Black Aces); each F/A-18F had a weapons system officer in the back seat. She has stated her rank at the time of the encounter as Lieutenant Junior Grade.


  Additional first-hand witnesses include the crew of the subsequent flight — Chad Underwood ([`/people/chad-underwood`]) and his pilot — that captured the FLIR targeting pod video shortly after, and the USS Princeton Aegis combat system operators who had been observing these objects for the previous 2 weeks (both per Fravor''s House Oversight Statement, [`/documents/written-testimony-fravor-2023`]).


  She had been in contact with the Office of Naval Intelligence ([`/organizations/oni`]) and Pentagon UAP investigators since about 2009 — a one-way flow in which they called her in to answer questions about the encounter and shared material from other incidents — and only spoke publicly for the first time on the May 16, 2021 CBS 60 Minutes broadcast.


  Dietrich joined Enigma Labs as their first advisor (an unpaid role) in November 2022, and joined Americans for Safe Aerospace as an Advisor at its launch in 2023. She published an opinion piece in The Debrief ([`/organizations/the-debrief`]) in February 2023. She was fortunate to attend the first meeting of the NASA UAP Independent Study Team ([`/organizations/nasa`]).

  '
credibility_notes: 'Dietrich is one of two witnesses who have spoken publicly about the November 14, 2004 USS Nimitz Tic Tac encounter (the other is her flight lead Cmdr. Dave Fravor [`/people/david-fravor`]); the other two members of their flight of 2 F/A-18Fs (the back-seater in each F/A-18F) have not made public statements. She personally observed and visually acquired the object during the encounter from the second F/A-18F.


  Her account is documented by Fravor in the lead aircraft, by the USS Princeton Aegis combat system (which reacquired the object 60 miles East at the CAP point seconds after it disappeared), and by the FLIR video captured by the subsequent F/A-18F that launched after Dietrich and Fravor''s flight returned. Dietrich''s own statement on the Somewhere in the Skies podcast places Chad Underwood ([`/people/chad-underwood`]) in the back seat of that aircraft with another pilot; the December 2019 New York Magazine interview with Underwood instead places him as the pilot of that flight. Underwood''s own statement about his own role takes priority over Dietrich''s statement about another pilot''s position.


  She had been in one-way contact with Pentagon UAP investigators since about 2009; the initial contact came from the Office of Naval Intelligence ([`/organizations/oni`]). Dietrich described the later contacts as her own assumption: "this ATIP being referred to in the media, the first generation being ATIP, and then the current—" (incomplete). The AATIP ([`/organizations/aatip`]) reference comes from Dietrich''s own assumption; AARO ([`/organizations/aaro`]) contact does not appear in her public statements. She first spoke publicly on the May 16, 2021 CBS 60 Minutes broadcast.

  '
