  added_date: '2026-04-23'
  observed: Chad and the back seat
  canonical: Chad Underwood (primary-source disagreement — position unresolved)
  location: "line 449"
  source_path: transcripts/somewhere-in-the-skies-dietrich-2024-downloaded.md
  resolution: disputed
  note: "Primary-source disagreement on Chad Underwood's position on the subsequent F/A-18F sortie that captured the FLIR1 video. Dietrich's YouTube-caption transcript of the Sprague podcast reads 'with Chad and the back seat and uh and his Pilot' — the caption is noisy and the phrase may be a transcription artifact of 'Chad in the back seat'; either reading supports Dietrich's claim that Chad was the WSO with an unnamed pilot. NYMag 2019 (sources/news/nymag-underwood-2019.html) frames Underwood as 'Navy Pilot Who Filmed the Tic Tac UFO' in its headline and describes him as the pilot of that sortie throughout. Per the source-priority hierarchy (subject's own words > witness recollection about that subject), Underwood's own first-person NYMag account outranks Dietrich's recollection for this positional fact. Both attestations retained; the future /people/chad-underwood node build resolves in Underwood's favor."
