rumors:
- id: rm1
  added_date: '2026-04-21'
  claim: Lt. Cmdr. Jim Slaight was Alex Dietrich's Weapons System Officer (WSO) in the back seat of her F/A-18F during the November 14, 2004 USS Nimitz Tic Tac encounter
  status: not-primary-source-established
  observed_sources:
    - Multiple secondary UAP-community sources name Slaight as Dietrich's backseater; Slaight briefly co-appeared with Fravor on a Jesse Watters Fox segment in 2017-2018 but has been largely silent since.
  note: Dietrich does NOT name her WSO in any of the 19 primary sources surveyed. In the American Veterans Center 2024 interview she refers to her backseater only by rank ('I had a department head a lieutenant commander in my back seat'). The Slaight identification is widely circulated but lacks Dietrich-direct or Slaight-direct primary-source attestation in the current source pool.
