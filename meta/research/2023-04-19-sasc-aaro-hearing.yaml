quotes:
- id: q1
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'It took a letter to Secretary Austin from Senator Rubio and me and 14 other senators to get the office temporary relief for the current fiscal year.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 4"
  significance: Gillibrand documents the bipartisan funding-relief letter that supplied AARO temporary fiscal year relief after the President's Budget for fiscal years 2023 and 2024 requested only operating expenses
  context: Gillibrand opening statement
- id: q2
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'In the fiscal year 2023 National Defense and Intelligence Authorization Act Congress established a direct reporting chain from the AARO director to the Deputy Secretary of Defense.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 4"
  significance: Gillibrand restates the FY2023 NDAA reporting-chain change — AARO director reports directly to the Deputy Secretary of Defense, with USD(I&S) limited to administrative support
  context: Gillibrand opening statement
- id: q3
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'The AARO team of more than three dozen experts is organized around four functional areas: operations, scientific research, integrated analysis, and strategic communications.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 9-37"
  significance: Kirkpatrick describes AARO's organizational structure — four functional areas including a strategic communications function
  context: Kirkpatrick oral statement
- id: q4
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'I should also state clearly for the record that in our research AARO has found no credible evidence thus far of extraterrestrial activity, off world technology, or objects that defy the known laws of physics.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 13-14"
  significance: Kirkpatrick's on-record statement that AARO has found no credible evidence of extraterrestrial activity, off-world technology, or objects defying the known laws of physics — the most-cited single line from this hearing in subsequent press and policy discussion
  context: Kirkpatrick oral statement
- id: q5
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'In other words, AARO''s mission is to turn UAP into SEP, somebody else''s problem.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 13"
  significance: Kirkpatrick's rhetorical framing of AARO's mission — handing off readily-explainable objects to the intelligence, law enforcement, or operational safety communities
  context: Kirkpatrick oral statement
- id: q6
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'So as of this week we are tracking over -- a total of 650 cases.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 21"
  significance: Kirkpatrick's case-load count at the time of the hearing — 650 total cases, up from 366 reported in January
  context: Q&A with Gillibrand
- id: q7
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'Over half, about 52 percent, of what has been reported to us are round or spheres.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 16"
  significance: Kirkpatrick's public characterization of UAP morphology — about 52 percent of reports are round or spheres
  context: Kirkpatrick chart presentation following oral statement
- id: q8
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'There are some authorities that we need. We currently are operating under Title 10 authorities but we have good relationships across the other agencies. But having additional authorities for collection tasking, counter-intelligence --

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 31"
  significance: 'Kirkpatrick states AARO needs additional collection-tasking and counter-intelligence authorities — Gillibrand immediately offered to author the language for the defense bill (line 1809-1817: "will you help us write that language so we can put it in the defense bill this year so that we know what authorities you need?")'
  context: Kirkpatrick Q&A response to Senator Rosen and Senator Gillibrand on AARO operating authorities
- id: q9
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'So USDINS and the -- I currently report to USDINS until they come up with the plan for how they are going to implement legislation.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 35"
  significance: Kirkpatrick reports the FY2023 NDAA reporting-chain change has not yet been implemented at the time of the hearing — he was still reporting to USD(I&S) pending DOD and DNI implementation guidance
  context: Kirkpatrick Q&A response to Gillibrand on AARO's logistics and reporting structure
- id: q10
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'I have. We submitted the first version of that before Christmas.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 36"
  significance: Kirkpatrick confirms AARO submitted a first version of the publicly discoverable safe disclosure website for approval before Christmas 2022 — but as of the hearing it was still under review with no estimate from his superiors
  context: Q&A with Gillibrand on the safe disclosure portal
- id: q11
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'We did not play a role in what you would respond other than that initial advice on what we are seeing and how we are seeing it.

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 38"
  significance: Kirkpatrick states AARO did not play a role in DOD's response to the PRC high-altitude balloon shoot-downs other than initial advice — confirming Gillibrand's framing that Pentagon leadership did not turn to AARO to play a leading role in advising the combatant commander
  context: Q&A with Gillibrand on AARO's role in the recent UAP incidents over North America
- id: q12
  added_date: '2026-04-28'
  statement_date: '2023-04-19'
  text: 'In 1979 Carl Sagan said extraordinary claims require extraordinary evidence. I would go one step further and I would say extraordinary claims require not only extraordinary evidence but extraordinary science and so how do you do that?

    '
  source:
    path: government/armed-services-senate-gov-sasc-aaro-transcript-20230419.pdf
    location: "p. 42"
  significance: Kirkpatrick's scientific-method framing — extends the Sagan formulation to require not only extraordinary evidence but extraordinary science as the standard for AARO conclusions
  context: Q&A with Gillibrand on academic community collaboration and the NASA UAP independent study
