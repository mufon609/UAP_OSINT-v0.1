  sha256: 37a40cb5173c423ad5a15be9bcca3dbb44360b931687bdfe58d5f6bda4632afa
  archive_status: 3
  note: 'SRI International ''Interactive Timeline of Innovation'' page (www.sri.com/timeline-of-innovation/), retrieved 2026-05-15. SRI''s first-party institutional history index. Verbatim self-attestation of founding and lineage: ''Founded in 1946 by Stanford University as the Stanford Research Institute, and independent since 1970, we''''ve created technologies, services, and ideas that have had a meaningful impact on every one of our lives throughout our history. In 1987, we acquired Sarnoff Corp. (formerly RCA Labs), and in 2023, we received as a donation the Palo Alto Research Center (PARC)''. Tightens the about-page attestation by naming ''Stanford University'' as the 1946 founder explicitly. Timeline entries by decade (1940s through 2020s) name decade-specific SRI innovations (Transmission electron microscope, ARPANET research, Disneyland feasibility studies, ERMA banking automation, optical video disk, etc.) — useful institutional-shape signal but parapsychology investigations are not surfaced on this page (consistent with sri.com positioning post-program). Schema.org Organization block at top of page declares legal name ''SRI International''. Does NOT attest the date of the rebrand from ''Stanford Research Institute'' to ''SRI International''. Text-native HTML (WordPress / Yoast SEO).'
  wayback_date: '2026-04-28'
