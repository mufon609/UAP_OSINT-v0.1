  archive_status: 3
  note: 'GAO-21-295, ''Defense Intelligence and Security: DOD Needs to Establish Oversight Expectations and to Develop Tools That Enhance Accountability'', published May 6, 2021. Report to Congressional Committees on OUSD(I&S) governance and oversight gaps. Findings: office hasn''t set clear expectations for its oversight mission; hasn''t clarified roles/responsibilities risking confusion or duplicative work; lacks tools to measure progress. Documents OUSD(I&S) organizational evolution 2017-2020 — gained responsibilities in artificial intelligence, law enforcement, personnel vetting, and identity intelligence; in 2018 assumed oversight of defense law enforcement authorities. The GAO recommendations are referenced verbatim in Moultrie''s HASC ISO Subcommittee testimony March 17, 2022 (lines 123-130). Wayback capture from 2021-05-06; gao.gov direct returns 403.'
