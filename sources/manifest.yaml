  note: 'SAFIRE Project corporate self-attestation of project genesis. Names 2012 Electric Universe conference where Montgomery Childs proposed SAFIRE: "In 2012 at a conference exploring the electrical nature of deep space Montgomery Childs proposed a way the Electric Sun Model could be tested." Childs''s foundational concept: "Two years of research has led me to the conclusion that the Electric Sun Model might be boiled down to a fundamental process: Charged plasma affecting matter of a different electrical potential." Names Scott Mainwaring as recognizing the proposal''s value and introducing it to his father Bruce Mainwaring; both Mainwarings supported the project through the Mainwaring Archive Foundation. Phase One/Two/Three structure with Phase Three priority for 2018 and beyond.'
