  note: SAFIRE Project's own historical / theoretical-lineage page. Establishes that SAFIRE was built to test 'The Electric Universe hypothesis, specifically The Electric Sun Model'. Cites historical figures Benjamin Franklin (1752 kite experiment), Michael Faraday, James Clerk Maxwell, Sir William Crookes, Nikola Tesla, Kristian Birkeland, Irving Langmuir, and Hannes Alfvén in tracing the electromagnetic-cosmology lineage. Identifies Wal Thornhill and Dr. Don Scott as contemporary leading proponents developing the Electric Sun Model. Asserts 99.9% of visible Universe is plasma.
