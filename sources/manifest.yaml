  note: 'Archive.org DjVu OCR clean-text sibling of CIA-RDP96-00787R000100220001-8.pdf (the CIA mirror of the Targ-Puthoff 1974 Nature paper). Fetched 2026-05-16 from https://archive.org/download/CIA-RDP96-00787R000100220001-8/CIA-RDP96-00787R000100220001-8_djvu.txt. The parent PDF is an Image Container PDF from a 2016 Acrobat scan with no usable text layer (pdftotext returns 1 line). The DjVu OCR is substantively clean across the 19-page paper — 41 mentions of Geller / Pat Price / Targ extract cleanly, including the abstract, the per-experiment narratives, and the formal conclusion. Some OCR artifacts present (line-break-induced hyphenation like ''imper-fect'', ''con-ducted'', and a few apostrophe-replacements like ''Geller* s'' for ''Geller''s'') — these are visually flagged by review-coverage but the substantive content matches the source PDF reliably. Verification: visual spot-check of the title page and conclusion paragraph against the source PDF in this session, plus secondary verification through the matching SRI experimenter and subject names across the document.'
