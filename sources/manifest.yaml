  note: 'TheUFOChronicles article by Frank Warren, published April 12, 2020: ''SKINWALKER RANCH: Original Owner/Family Member Sets The Record Straight''. Extended quotation from Garth Myers (younger brother of Kenneth John Myers) refuting any paranormal activity during the Myers-family ownership era (1933-1994). Direct Myers quote: ''Nothing, unequivocally, absolutely nothing that went on while she and my brother lived there.'' Sources cited: Frank B. Salisbury''s ''The Utah UFO Display'' (2010), pp. 218-222; interviews recorded September 3-5, 2009. Notes Edith Myers died March 3, 1994 and ranch sold to Terry Sherman ~3 months later. Primary source for the only extended Myers-era on-record testimony.'
