  note: 'DOE OSTI catalog entry for ORAU 1987 technical report ''Impact on education and career plans'' (Oak Ridge Associated Universities, December 1, 1987). Primary government catalog confirmation that the DOE High School Science Student Honors Program ran in summer 1986 at two laboratories: the High School Student Supercomputing Honors Program at Lawrence Livermore National Laboratory, and the High School Student Honors Research Program at Brookhaven National Laboratory. Documents who participated in the 1986 summer program. Full-text PDF not available through OSTI; the catalog metadata itself is the primary-source attestation that the program existed and ran at BNL in 1986. Per WorldCat the underlying report is held by libraries but not digitized; participant-level attribution for Kirkpatrick remains via Wikipedia citing AJC 1986 (audit 2.3 Open).'
