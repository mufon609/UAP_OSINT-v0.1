  archive_status: 3
  note: 'MuckRock FOIA request page for case 23-F-0905 (Robert Skvarla, Jr., filed May 19, 2023, with DoD/Office of the Under Secretary of Defense for Intelligence and Security; tracking 23-A-0905-A1). Direct fetch returns 403; archived via Wayback Machine snapshot from 2026-04-30 (full post-disposition page with 15 communications and 12 attached files). Request scope: Sancorp AARO contract HQ003422C0094. Final disposition per the released response: 125 pages identified responsive; 11 pages withheld in entirety under 5 U.S.C. § 552(b)(5) deliberative-process exemption; portions of remaining 114 pages withheld under (b)(4) (trade secrets / commercial confidential) and (b)(6) (personal privacy). Initial Denial Authority: Ms. Paulette Creighton, Division Director, Enterprise Acquisition Policy & Strategic Initiatives. Acquisition Directorate also conducted exhaustive searches for Correspondence, Requests for Information, Memorandums of Understanding, Letters of Interest, Task Letters, Privacy Impact Assessments, and Presentations by Sancorp and located no responsive records in those categories. Skvarla appealed Sept 18, 2023 (case 23-A-0905-A1); Joo Y. Chung (Assistant to the Secretary of Defense for Privacy, Civil Liberties, and Transparency) AFFIRMED the withholding decision Aug 21, 2024. Companion archive: Black Vault FOIA 23-F-1114 (already at government/blackvault-sancorp-23-f-1114-aaro-pws.pdf) covers the AARO PWS in full release form. Note: the handoff §11 figure of ''91 pages withheld'' was a paraphrase; the actual agency framing is 11-pages-entirely-withheld + 114-pages-with-redactions.'
  wayback_date: '2026-04-30'
