  archive_status: 1
  extraction_type: ocr-scan
  note: 'CIA Reading Room document CIA-RDP96-00791R000200030040-0: Parallel-copy of Kress, K. A., ''Parapsychology in Intelligence: A Personal Review and Conclusions'', Studies in Intelligence Winter 1977, declassified 1996. The repository already carries this paper under a different CIA stock number (cia-kress-parapsychology-in-intelligence-studies-intelligence-1977-declassified-1996.pdf from CIA-RDP88G01116R000600690003-8) — the two are the same Kress 1977 paper from different CIA declassification copies. Kress places the start of CIA work at SRI in April 1972 and discusses Geller''s results — including the internal SRI conclusion that films of Geller''s metal-bending were ''insufficient to determine whether metals are being bent by normal or paranormal means'' and that ''it was always necessary for him in the experimental situation to have physical contact with any metal he bent''. Source archived via Internet Archive stargatefiles collection because direct cia.gov access returns 302 to /readingroom landing page (as of 2026-05-16). OCR scan.'
