  note: 'International Remote Viewing Association (IRVA) speaker biography page for Christopher (Kit) Green, M.D., Ph.D. — Wayback Machine snapshot dated 2024-12-12. Verbatim text of Green''s career biography as published by IRVA: U.S. Federal Government 1969 as Senior Division Analyst for neurosciences at the CIA; mid-1970s first analyst and program manager for Remote Viewing research; Branch Chief, Deputy Division Director, Assistant National Intelligence Officer for Science and Technology; General Motors Corporation 1985 (Life Materials and Environmental Sciences; later Executive Director Technology Intelligence; later Chief Technology Officer GM Asia Pacific Operations); Wayne State School of Medicine faculty 2002 onward; NAS/NRC TIGER committee founder; National Intelligence Medal; Fellow in American Academy of Forensic Sciences. Higher source-priority than the Black Vault article quotation of the same bio. Wayback fuzzy-timestamp form per meta/sources-access.md.'
