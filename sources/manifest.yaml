  note: 'Donald J. Trump TRUTH Social post @realDonaldTrump status ID 116100300268316472, posted February 19, 2026 8:13 PM EST. Original URL: truthsocial.com/@realDonaldTrump/116100300268316472. The post directs ''the Secretary of War, and other relevant Departments and Agencies, to begin the process of identifying and releasing Government files related to alien and extraterrestrial life, unidentified aerial phenomena (UAP), and unidentified flying objects (UFOs), and any and all other information connected to these highly complex, but extremely interesting and important, matters.'' Archived via Trump''s Truth (trumpstruth.org), an independent archive of Trump''s TRUTH Social posts. Wayback capture 2026-03-03. This is the underlying directive that DefenseScoop February 25, 2026 (already-archived) referenced as the ''forthcoming'' UAP-disclosure executive order Hegseth committed to comply with.'
