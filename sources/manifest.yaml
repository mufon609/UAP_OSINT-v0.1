  note: '50 U.S.C. § 3373 — ''Establishment of All-domain Anomaly Resolution Office''. Codification of Section 1683 of the James M. Inhofe National Defense Authorization Act for Fiscal Year 2023 (P.L. 117-263, December 23, 2022; supersedes Section 1683 of NDAA FY2022 P.L. 117-81 which originally directed AARO''s establishment). Title 50, Chapter 45 (Miscellaneous Intelligence Community Authorities), Subchapter IV (Collection, Analysis, and Sharing of Intelligence). Specifies: (a) establishment within OSD or joint OSD-ODNI organization; (b) Director and Deputy Director appointment by SecDef in consultation with DNI; reporting line to Deputy Secretary of Defense and Principal Deputy Director of National Intelligence; classified-briefing obligations sunset December 31, 2026; GAO audit regime; line-organization designation authority; and the appropriate-congressional-committees list.'
