  note: 'Maddox, J. (editorial), ''Investigating the paranormal'', Nature 251, 559-560 (18 October 1974), DOI 10.1038/251559a0. The Nature editor''s accompanying editorial that ran in the same issue as the Targ-Puthoff paper on Geller. METADATA STUB ONLY — the archived HTML is the nature.com article landing page (HTTP 200 on direct fetch as of 2026-05-16) carrying title, byline, DOI, publication date, Altmetric / Citations counts, and a paywall sign-in prompt. The editorial body text is NOT in the archived file (zero mentions of Geller, metal, psychokinetic, extravagant, or rumour in the archived HTML). The well-known Maddox passage cautioning that the Targ-Puthoff paper ''does not present any evidence whatsoever for Geller''s alleged abilities to bend metal rods by stroking them, influence magnets at a distance, make watches stop or start by some psychokinetic force and so on'' (cited widely in secondary literature) cannot be verified against this archived file and is therefore not usable as a quotation source. A /documents/maddox-investigating-paranormal-1974 node build is deferred until body text becomes available — paths to investigate: JSTOR / institutional library subscription, scanned-print archive, or a cached-content snapshot from an older Wayback capture that pre-dates Nature''s paywall tightening. Manifest entry preserved as a bibliographic anchor for when the body becomes archivable.'
