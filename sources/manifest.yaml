  sha256: e0b7538e93f49c693c3ef18ef950adec95e08e24942ad71a5347426aa6b20c8f
  archive_status: 3
  note: 'SRI International ''Our People'' page accessed via /board-of-directors/ URL (sri.com routes /board-of-directors/ and /executive-team/ to the same combined page; MD5 identical at fetch time 2026-05-15). First-party current attestation of board roster + executive team. Current board (as of 2026-05-15 page state): David Motley (Board Chair, ''Co-founder, General Partner, BTN Ventures''; listing 2024-06-01); Stefan Heck (CEO and Founder of Nauto; 2024-04-02); Charles Mathis (Fortune 500 CFO retired); Marshall Mohr (EVP and CFO retired, Intuitive Surgical; 2023-02-02); Ellen Ochoa (Veteran Astronaut, Director of NASA Johnson Space Center retired; 2021-12-02); David Parekh (CEO; 2021-09-08); Ellen M. Pawlikowski (General Retired, US Air Force; 2022-09-01); Rengarajan Ramesh (Operating Partner, EagleTree Capital; 2024-01-18); Steven Walker (VP and CTO Lockheed Martin retired, former DARPA director; 2025-02-19). Executive team (current page state): David Parekh (CEO 2021-09-08), Kathlynn Brown (President Biosciences Div), John Crowe (President ATSD 2024-02-20), James Fritz (SVP Federal/Strategic Program Development), Todd A. Grindal (President SRI Education), Joann Lime (CHRO), Peter Marcotullio (SVP Commercialization), John McIntire (CLO), Michael Page (CIO), Steve Perna (President InSyS Division 2022-09-26), Suresh Sunderrajan (CFO), Dimitra Vergyri (Director STAR Lab). Listing dates next to each name indicate when the person was added to the Our People page; not necessarily their appointment date. Corroborates ProPublica FY2024 board roster (Motley as chair, Ochoa, Pawlikowski, Mathis); diverges by adding Heck, Mohr, Walker (current board) and omitting Young Jr, Rieman (on ProPublica FY2024 but not current page). Confirms Parekh CEO listing predates 2021-09-08.'
  wayback_date: '2024-08-08'
