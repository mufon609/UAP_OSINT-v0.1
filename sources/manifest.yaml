  note: 'Tovima.com syndication of the Wall Street Journal investigation ''The Pentagon Disinformation That Fueled America''s UFO Mythology'' by Joel Schectman and Aruna Viswanatha, originally published June 6 2025 (tovima posted 2025-06-08). The WSJ original is paywalled; this mirror carries the full article text. Documents two AARO Vol II findings Kirkpatrick attributes to his investigation: (1) Cold War deception programs — F-117 stealth-fighter testing at Area 51 covered by fabricated flying-saucer photos given to a bar owner by an Air Force colonel, and Salas Montana 1967 missile-silo electromagnetic-pulse-test cover-up; (2) the ''Yankee Blue'' decades-long Air Force hazing ritual showing newly-assigned commanders fake antigravity-craft photos under threat of arrest, prison, or execution. DoD spokeswoman Sue Gough on-record confirms AARO uncovered fake classified program materials and expects to publish findings in HRR Vol II ''later this year'' (deadline since missed). Source for audit finding 3.4.'
