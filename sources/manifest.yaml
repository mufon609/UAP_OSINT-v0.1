  note: 'CIA Reading Room document CIA-RDP96-00791R000100480003-3: ''Appendix I — Experiments — Uri Geller at SRI''. Appendix to SRI Final Report on Perceptual Augmentation (CIA-RDP96-00791R000300030004-9). Dated August 4, 1973. 32 pages. Parallel-copy of the Aug 4-11 1973 Geller experiments report (RDP79-00999A000300030027-0); the two documents are substantively the same Aug 1973 SRI report filed under different CIA stock numbers. Source archived via Internet Archive stargatefiles collection because direct cia.gov access returns 302 to /readingroom landing page (as of 2026-05-16). OCR scan of typewritten/photocopied document.'
