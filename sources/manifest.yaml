  note: 'Contributor-produced clean-text transcription of the 2023-07-26 House Oversight Subcommittee hearing transcript PDF (paired entry above; same path stem). Visually verified against PDF page renderings 2026-04-24. The PDF was generated by Acrobat Distiller from a `.txt` source (Producer metadata: "Acrobat Distiller 20.0 (Windows)"); it is NOT OCR-scanned, but pdftotext extraction produces Unicode-mapping artifacts — e.g., "11½" in Grusch''s sworn attestation to "11½ hours" of classified testimony renders as "11‡" via pdftotext. This transcription restores the clean original forms. Validator (validate.py extract_source_text) prefers this same-stem .txt sibling over pdftotext output for PDFs flagged extraction_type=extraction-lossy or =ocr-scan. Format: page-marker sections (`=== front cover (PDF p. 1) ===`, `=== p. II ===` through `=== p. III ===` for Roman-numeral front matter, `=== p. 1 ===` through `=== p. 50 ===` for stenographic content). Government page numbers match the in-document page footers (which existing quote Location refs cite). Committee rosters flattened from two-column print layout to one-name-per-line for plaintext scannability. Real document oddities preserved as-is: missing closing paren in "50 U.S.C § 3033(k)(5(D)(ii)" section 7 of PPD-19 citation; "testimoneys" in Rep. Burchett''s remarks p. 4; "TikTok" spelling retention and similar colloquial forms. Signatures and decorative glyphs on front cover represented as plaintext content only (no illustration markup).'
