  extraction_type: ocr-scan
  note: 'Kenneth A. Kress, ''Parapsychology in Intelligence: A Personal Review and Conclusions,'' Studies in Intelligence (CIA in-house journal), 1977; Sanitized Copy Approved for Release 2011/06/23 (document ID CIA-RDP88G01116R000600690003-8). Named primary-source author Kenneth A. Kress, CIA Operations Officer in the Office of Technical Service (OTS), recounts CIA''s mid-1970s engagement with the SRI parapsychology program. Verbatim: ''Two laser physicists, Dr. Russell Targ and Dr. Harold E. Puthoff, re-awakened CIA research in parapsychology''; documents the April 1972 Targ-CIA OSI meeting; Targ having ''recently joined the Stanford Research Institute (SRI)''; the August 1972 OTS contract ($874) with Targ and Puthoff; the 9 November 1973 SRI experiment; the 12 December 1974 OTS SRI Experiment memo. Foundational primary-source attestation of the CIA funding chain for the Targ + Puthoff SRI psychic-abilities investigation — closes Russell Targ artifact rumor r4 (CIA / Stargate funding) by direct first-party CIA attestation. OCR-scan PDF (typewritten 1977 original scanned during CIA declassification): visible character-corruption examples include ''lasqr physicists'' (→ ''laser physicists''), ''Tug'' (→ ''Targ''), ''Pen:eptual'' (→ ''Perceptual''), ''ORO'' (→ ''ORD''), ''parapsv-chology'' (→ ''parapsychology''). Per OCR-scan discipline (meta/conventions.md), quotes drawing on this source preserve source-form artifacts verbatim and register them as naming_quirks entries; a .txt sibling production may be warranted before heavy quote extraction.'
  wayback_date: '2025-04-09'
