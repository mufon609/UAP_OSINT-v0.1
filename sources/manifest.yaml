  note: '10 U.S.C. § 137 — Under Secretary of Defense for Intelligence and Security. Current statutory codification of the office. Original enactment: Pub. L. 107-314, Dec. 2, 2002 (NDAA FY2003). Rename USD(I) → USD(I&S) effected by Pub. L. 116-92 § 1621(e)(1)(A)(ii), Dec. 20, 2019 (NDAA FY2020). Subsequent amendments: Pub. L. 115-91 (2017), Pub. L. 115-232 (2018), Pub. L. 117-81 (2021). Captures the section''s four subsections: (a) appointment; (b) responsibilities (MIP direction, NIP execution, security matters, prescribed duties); (c) privacy/civil-liberties priority; (d) precedence after USD(P&R).'
