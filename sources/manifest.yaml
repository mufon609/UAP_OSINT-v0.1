  sha256: 327c1dcb645a1a289a43886ec0b1d90469d87382df49520c600e0f9ddf4b4ab8
  archive_status: 3
  note: 'AARO Fiscal Year 2024 Consolidated Annual Report on Unidentified Anomalous Phenomena, dated November 14, 2024 (Information Cut Off: June 1, 2024). Released by OSD/AARO. Statutory annual report covering the period May 1, 2023 to June 1, 2024. Documents 757 UAP reports during the reporting period (485 within-period, 272 from prior unreported 2021-2022); 49 case resolutions all to prosaic objects (balloons, birds, UAS); 243 additional cases recommended for closure pending peer review; 21 cases flagged as meriting further analysis based on reported anomalous characteristics and/or behaviors; 444 cases lacking sufficient data placed in Active Archive. Of 757 reports, 708 in air domain, 49 in space domain, none in maritime or transmedium. 392 reports came from the FAA. AARO 1,600+ cumulative holdings noted in companion Kosloski SFR. Documents the GREMLIN sensor architecture (Georgia Tech Research Institute) deployed for pattern-of-life analysis at a national-security site. Wayback capture from publication day 2024-11-14.'
  wayback_date: '2026-04-25'
