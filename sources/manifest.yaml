  sha256: e3477417ec0dbb86bc5af99dc1dca8c20b73058a4b259e1029bb803517dd5856
  archive_status: 1
  extraction_type: ocr-scan
  note: '''STAR GATE PROJECT: AN OVERVIEW'' (Short Title DTI-S-1056-SL), Defense Intelligence Agency Directorate for Scientific and Technical Intelligence, 30 April 1993 (29 pages). CIA Reading Room document CIA-RDP96-00789R002800180001-2 (Approved For Release 2000/08/08); mirrored via Internet Archive (URL embedded in PDF metadata Keywords field). DIA internal program-overview briefing of STAR GATE — the umbrella designation for the remote-viewing investigation that ran at SRI International (Menlo Park, CA) from 1970 to 1990 and at Princeton University. Attests: ''1970-1990 — SRI INTERNATIONAL, MENLO PARK, CA'' program window; CIA initiation followed by DIA continuation of funding; the SRI program discontinued in 1990; eleven years of work ''headed by Dr. H. Puthoff.'' Primary-source attestation of the formal Stargate program designation and the SRI funding chain (CIA → DIA). Closes Russell Targ artifact rumor r4 (CIA/DIA-funded SRI psychic-abilities investigation = Stargate Project, 1972-1995). OCR-scan PDF (Internet Archive''s pymupdf + mupdf rendering of typewritten 1993 CIA scans); visible spacing/character artifacts on headings and tables consistent with typewriter-scan OCR.'
