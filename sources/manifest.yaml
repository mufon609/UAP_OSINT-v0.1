  sha256: d095f4bddd88d4566fe922df21d8389e6fa9e73412c9dbe966f61df494cc5a30
  archive_status: 1
  note: 'Tablet Magazine, ''The Spy Who Bent a Million Spoons'' (article title in archived page: ''Israeli Mentalist Uri Geller''s Mind-Over-Matter Philosophy of Life''). Verified-publication first-person Geller interview by Tal Kra-Oz, published June 03, 2015. Contains direct Geller statements on his asserted Mossad / Aman recruitment chain: Yoav Shaham (described in article as a Mossad agent at the Cyprus bed-and-breakfast and later as a commander in the paratroopers killed in the West Bank) → Meir Amit (Mossad director 1963-1968) → Aharon Yariv (Aman head 1964-1972); Geller account: ''Yariv summoned me to a meeting in Tel Aviv. I went through all the biggest intelligence guys. And then that''s it — no comment from that point on.'' Web''s handoff cited the surname transliteration ''Shacham''; the archived article body consistently uses ''Shaham'' (no ''c''). Primary source for Geller''s own statements about Israeli intelligence service (Geller-self-claim primary, structurally parallel to the urigeller.com Burton 2007 article already in corpus). Direct fetch returns 403 (Tablet WAF blocking); archived via Wayback (https://web.archive.org/web/2024/https://www.tabletmag.com/sections/arts-letters/articles/the-spy-who-bent-a-million-spoons → snapshot 20250125134050) as of 2026-05-16.'
