  extraction_type: ocr-scan
  note: 'CIA Reading Room document CIA-RDP96-00791R000100420002-0: SRI Project Proposal No. ISH 73-146, ''Perceptual Augmentation Techniques, Part One — Technical Proposal''. 1 October 1973. Authors: H. Puthoff, R. Targ, B. Cox. Approved by Earle D. Jones (Director, Electronics and Bioengineering Laboratory, SRI). 59 pages. Cites prior ''carefully controlled remote perception experiments with Mr. Uri Geller'' as the basis for the proposed continuing program — primary SRI-side institutional attestation that Geller''s experiments grounded what became the multi-year SRI parapsychology program. Source archived via Internet Archive stargatefiles collection because direct cia.gov access returns 302 to /readingroom landing page (as of 2026-05-16). OCR scan.'
