  note: 'Michael D. Mumford, PhD; Andrew M. Rose, PhD; David A. Goslin, PhD, ''An Evaluation of Remote Viewing: Research and Applications,'' American Institutes for Research (AIR), 29 September 1995 (183 pages). Independent program evaluation commissioned by CIA at the end of the Stargate Project. Hosted publicly by Federation of American Scientists at fas.org/sgp/othergov/airreport.html (canonical public mirror; the AIR-prepared PDF carries no CREST stamps because it was authored by AIR rather than released through the CIA reading-room declassification process). Substantive content: Section 3 ''THE SRI ERA'' covering 1973-1988 SRI research with Section 3.2 ''THE EARLY SCIENTIFIC EFFORT AT SRI'' (Puthoff and Targ 1975); Section 3.3 ''AN OVERALL ANALYSIS OF THE SRI EXPERIMENTS: 1973-1988'' reporting the 1988 SRI internal analysis; bibliography cites ''Puthoff, Harold E. and Russell Targ (1975). Perceptual Augmentation Techniques: Part Two — Research Report'' as the foundational SRI bibliographic anchor. Independent government-commissioned attestation of Targ''s SRI cofounder role and the SRI program''s institutional shape across the 1970s and 1980s. Text-native PDF (Microsoft Word source via Acrobat PDFWriter 3.02, 1998-04-28); clean pdftotext extraction.'
