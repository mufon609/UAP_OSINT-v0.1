  note: 'MuckRock FOIA request page for case 23-F-0906 (Robert Skvarla, Jr., filed May 19, 2023, with DoD/Office of the Under Secretary of Defense for Intelligence and Security). Direct fetch returns 403; archived via Wayback Machine snapshot from 2026-04-30. Request scope: Sancorp IPMO contract HQ003422C0064. Status of THIS MuckRock-channel request as of 2026-04-30: ''Awaiting Response'' — only the May 24, 2023 interim response received (citing FOIA ''unusual circumstances'' for delay); no further communications since. Note: the IPMO PWS document for the SAME FOIA case number (23-F-0906) was separately posted to the WHS FOIA Reading Room at esd.whs.mil/Portals/54/Documents/FOID/Reading Room/Contracts/23-F-0906_Performance_Work_Statement.pdf — see manifest entry for that URL (path government/foia-23-f-0906-sancorp-ipmo-pws.pdf). The two retrieval channels (MuckRock filer-specific request vs. WHS Reading Room posting) are distinct DoD FOIA pathways for the same case; the AARO contract PWS (23-F-1114, released to John Greenewald via The Black Vault) and the IPMO contract PWS (23-F-0906, posted to WHS Reading Room) are both publicly retrievable, just via different release paths.'
