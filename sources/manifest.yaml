  extraction_type: ocr-scan
  note: 'CIA Reading Room document CIA-RDP79-00999A000300030027-0: ''EXPERIMENTS — URI GELLER AT SRI, AUGUST 4-11, 1973''. Dated August 13, 1973 (cover memo); experiments conducted August 4-11, 1973. 31 pages. Originating from CIA Office of Technical Service (OTS) program at SRI under contract 8473. Contains the eight-day session at SRI''s double-walled shielded room (Life Sciences Division, originally used for EEG research) — picture-drawing experiments, including the firecracker / camel-horse / bridge / bird-swan / arrow-through-heart trials. SRI conclusion: ''As a result of Geller''s success in the experimental period, we consider that he has demonstrated his paranormal perceptual ability in a convincing and unambiguous manner.'' Source archived via Internet Archive stargatefiles collection (https://archive.org/download/CIA-RDP79-00999A000300030027-0/CIA-RDP79-00999A000300030027-0.pdf) because direct cia.gov access returns 302 to /readingroom landing page (as of 2026-05-16). PDF is an OCR scan of typewritten/photocopied document with redactions; per-quote OCR-artifact preservation expected per meta/conventions.md OCR-scan discipline.'
