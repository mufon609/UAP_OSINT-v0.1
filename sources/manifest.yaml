  note: 'DOE OSTI catalog entry for ORAU 1987 follow-up assessment ''US Department of Energy High School Student Supercomputing Honors Program: A follow-up assessment'' (DOI 10.2172/6679837). Primary government catalog attestation that the DOE Honors Program family was inaugurated at LLNL in August 1985 — making the 1986 Brookhaven HSRP the second site in the family rather than the absolute inaugural year of the DOE Honors Program initiative. Useful for tightening Wikipedia''s ''inaugural High School Honors Research Program'' framing on the Kirkpatrick node (audit 2.3 context).'
